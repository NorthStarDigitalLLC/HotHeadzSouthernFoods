<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>HH Connection Test</title>
<style>body{background:#111;color:#eee;font-family:monospace;padding:20px}button{padding:12px 24px;font-size:16px;margin:8px;cursor:pointer;background:#e07828;color:#fff;border:none;border-radius:4px}pre{background:#1a1a1a;padding:16px;margin:12px 0;border-radius:4px;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto}.ok{color:#4dff88}.err{color:#ff4d4d}.warn{color:#ffbb47}</style>
</head>
<body>
<h2>🔥 Hot Headz — Connection Test</h2>
<p>Click each button. We need to find which method works on your domain.</p>

<button onclick="test1()">Test 1: GET (like staff portal)</button>
<button onclick="test2()">Test 2: POST text/plain</button>
<button onclick="test3()">Test 3: POST no headers</button>
<button onclick="test4()">Test 4: No-cors GET</button>
<pre id="log">Click a button to start testing...</pre>

<script>
var URL = 'https://script.google.com/macros/s/AKfycbz7Zw5EAbw2TbXlhUxhZErQQjel7FcngRp_bCV-qT61PehYXnZ5jkUL_c4GFxcBv02LaA/exec';
var log = document.getElementById('log');

function addLog(msg, cls) {
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

async function test1() {
  log.innerHTML = '';
  addLog('TEST 1: GET with mode:cors (staff portal pattern)');
  addLog('URL: ' + URL + '?action=lunch');
  try {
    var r = await fetch(URL + '?action=lunch', { method: 'GET', mode: 'cors' });
    addLog('Status: ' + r.status, 'ok');
    var text = await r.text();
    addLog('Response length: ' + text.length, 'ok');
    addLog('First 500 chars: ' + text.slice(0, 500), 'ok');
  } catch(e) {
    addLog('FAILED: ' + e.message, 'err');
    addLog('This means GET with cors is blocked.', 'warn');
  }
}

async function test2() {
  log.innerHTML = '';
  addLog('TEST 2: POST with Content-Type: text/plain');
  try {
    var r = await fetch(URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'lunch' })
    });
    addLog('Status: ' + r.status, 'ok');
    var text = await r.text();
    addLog('Response length: ' + text.length, 'ok');
    addLog('First 500 chars: ' + text.slice(0, 500), 'ok');
  } catch(e) {
    addLog('FAILED: ' + e.message, 'err');
  }
}

async function test3() {
  log.innerHTML = '';
  addLog('TEST 3: POST with no Content-Type header at all');
  try {
    var r = await fetch(URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({ action: 'lunch' })
    });
    addLog('Status: ' + r.status, 'ok');
    var text = await r.text();
    addLog('Response length: ' + text.length, 'ok');
    addLog('First 500 chars: ' + text.slice(0, 500), 'ok');
  } catch(e) {
    addLog('FAILED: ' + e.message, 'err');
  }
}

async function test4() {
  log.innerHTML = '';
  addLog('TEST 4: GET with mode:no-cors (opaque response)');
  try {
    var r = await fetch(URL + '?action=lunch', { method: 'GET', mode: 'no-cors' });
    addLog('Status: ' + r.status + ' (0 = opaque, expected with no-cors)', 'warn');
    addLog('Type: ' + r.type, 'warn');
    try {
      var text = await r.text();
      addLog('Response: ' + (text || '(empty - opaque responses hide content)'), text ? 'ok' : 'warn');
    } catch(e2) {
      addLog('Cannot read body (expected with no-cors): ' + e2.message, 'warn');
    }
  } catch(e) {
    addLog('FAILED: ' + e.message, 'err');
  }
}

addLog('Page loaded. Your current origin: ' + window.location.origin);
addLog('Target URL: ' + URL);
addLog('');
</script>
</body>
</html>
