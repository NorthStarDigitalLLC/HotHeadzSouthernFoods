  facebook:{num:'08',desc:'daily specials every morning',ey:'Facebook',    cta:'Visit Our Facebook',  title:'Follow\nThe Feed.',          sub:'Daily specials posted every morning',                      chips:['Daily Specials','Morning Posts','Photos','Follow Us'],   rule:'Posted fresh every morning.',  dest:'https://www.facebook.com/people/Hot-Headz-Southern-Foods/100064025473003/',mood:[30,8,0],extColor:[24,119,242]},
  find:    {num:'09',desc:'2741 us-190 deridder la',ey:'Find Us',     cta:'Get Directions',      title:"We're on\nUS-190.",          sub:'2741 US-190 &middot; DeRidder, LA',                        chips:['2741 US-190','(337) 221-1035','Easy Parking','Open Daily'],rule:'Follow the smell.',           dest:'https://maps.google.com/?q=2741+US-190+DeRidder+LA',mood:[24,6,0],extColor:[52,168,83]},
  staff:   {num:'10',desc:'schedule shifts notices',ey:'Staff Portal',cta:'Open Staff Portal',   title:'Employee\nPortal.',          sub:'Schedule &middot; Shifts &middot; Notices',                chips:['View Schedule','My Shifts','Notice Board','Manager'],    rule:'Made from scratch. Like the food.',dest:'staff-portal.html',mood:[42,14,0]},
};
const KEYS = Object.keys(PAGES);

/* ── CANVAS ── */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, NAV_R, INN_R;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W/2; CY = H/2;
  NAV_R = W < 500 ? Math.min(W,H)*.30 : W < 768 ? Math.min(W,H)*.32 : Math.min(W,H)*.36;
  INN_R = Math.min(W,H) * .065;
}

/* ── CURSOR ── */
const curEl = document.getElementById('cur');
const cur2El = document.getElementById('cur2');
let mx = W/2, my = H/2, lcx = W/2, lcy = H/2;
// Cursor trail — circular buffer of recent positions
var TRAIL_LEN=18, trailX=new Float32Array(TRAIL_LEN), trailY=new Float32Array(TRAIL_LEN), trailIdx=0;
for(var ti=0;ti<TRAIL_LEN;ti++){trailX[ti]=W/2;trailY[ti]=H/2;}
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; trailX[trailIdx]=mx;trailY[trailIdx]=my;trailIdx=(trailIdx+1)%TRAIL_LEN; });
(function curLoop() {
  curEl.style.left = mx + 'px'; curEl.style.top = my + 'px';
  lcx += (mx - lcx) * .11; lcy += (my - lcy) * .11;
  cur2El.style.left = lcx + 'px'; cur2El.style.top = lcy + 'px';
  requestAnimationFrame(curLoop);
})();

/* ── STATUS BAR ── */
(function() {
  var n = new Date(), mins = n.getHours()*60 + n.getMinutes();
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var d = days[n.getDay()];
  document.getElementById('tb-hr').textContent = d==='Sunday'?'7am-3pm': d==='Saturday'?'6am-2pm':'5:30am-2pm';
  var o = d==='Sunday'?420: d==='Saturday'?360:330;
  var cl = d==='Sunday'?900:840;
  var open = mins >= o && mins < cl;
  document.getElementById('tb-stxt').textContent = open ? 'Open Now' : 'Closed';
  document.getElementById('tb-stxt').style.color = open ? '#f05020' : 'rgba(232,180,160,.35)';
  document.getElementById('tb-dot').className = 'dot ' + (open ? 'dot-o' : 'dot-c');
})();

/* ── CLOCK ── */
var HOURS = {Sunday:{o:420,c:900},Saturday:{o:360,c:840},Monday:{o:330,c:840},Tuesday:{o:330,c:840},Wednesday:{o:330,c:840},Thursday:{o:330,c:840},Friday:{o:330,c:840}};
var CF_DAYS = ['Thursday','Friday','Saturday'];
var DNAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var clockState = {label:'CLOSED',sub:'',h:'00',m:'00',s:'00',isOpen:false};

function updateClock() {
  var now = new Date();
  var day = DNAMES[now.getDay()];
  var hr = HOURS[day];
  var nm = now.getHours()*60 + now.getMinutes();
  var ns = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  var isCf = CF_DAYS.indexOf(day) >= 0;
  var isOpen = nm >= hr.o && nm < hr.c;
  var isCfOpen = isCf && nm >= 960 && nm < 1200;
  clockState.isOpen = isOpen || isCfOpen;
  var secs = 0, label = '', sub = '';
  if (ns < hr.o*60) { label='CLOSED'; sub='Opens soon'; secs=hr.o*60-ns; }
  else if (ns < hr.c*60) {
    if (ns < 37800) { label='BREAKFAST'; sub='Breakfast ends in'; secs=37800-ns; }
    else if (ns < 39600) { label='TRANSITIONING'; sub='Lunch starts in'; secs=39600-ns; }
    else { label='OPEN'; sub='Closes in'; secs=hr.c*60-ns; }
  } else if (isCf && ns < 57600) { label='CRAWFISH AT 4PM'; sub='Crawfish starts in'; secs=57600-ns; }
  else if (isCf && ns < 72000) { label='CRAWFISH NIGHT'; sub='Crawfish ends in'; secs=72000-ns; }
  else { label='CLOSED'; sub='See you tomorrow'; secs=86400-ns+hr.o*60; }
  var hh=Math.floor(secs/3600), mm=Math.floor((secs%3600)/60), ss=secs%60;
  clockState.label=label; clockState.sub=sub;
  clockState.h=String(hh).padStart(2,'0');
  clockState.m=String(mm).padStart(2,'0');
  clockState.s=String(ss).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 1000);

/* ── DOT-MATRIX SAMPLER ── */
function sampleDots(text, cx, cy, tw, th, step) {
  var SC=4, OW=Math.round(tw*SC), OH=Math.round(th*SC);
  var oc = document.createElement('canvas');
  oc.width=OW; oc.height=OH;
  var ox = oc.getContext('2d');
  var fs = Math.round(OH*.72);
  ox.font = '700 '+fs+'px DM Sans,Arial,sans-serif';
  var mw = ox.measureText(text).width;
  if (mw > OW*.9) fs = Math.round(fs*(OW*.9/mw));
  ox.font = '700 '+fs+'px DM Sans,Arial,sans-serif';
  ox.fillStyle = '#fff'; ox.textAlign='center'; ox.textBaseline='middle';
  ox.fillText(text, OW/2, OH/2);
  var d = ox.getImageData(0,0,OW,OH).data;
  var gs = Math.round(step*SC);
  var pts = [], ox2=cx-tw/2, oy2=cy-th/2;
  for (var gy=Math.round(gs/2); gy<OH; gy+=gs) {
    for (var gx=Math.round(gs/2); gx<OW; gx+=gs) {
      var sum=0, cnt=0;
      for (var dy=-1; dy<=1; dy++) for (var dx=-1; dx<=1; dx++) {
        var ix=gx+dx, iy=gy+dy;
        if (ix>=0&&ix<OW&&iy>=0&&iy<OH) { sum+=d[(iy*OW+ix)*4+3]; cnt++; }
      }
      if (sum/cnt > 80) pts.push({x:ox2+(gx/OW)*tw, y:oy2+(gy/OH)*th, b:(sum/cnt)/255});
    }
  }
  return pts;
}

/* ── PARTICLES ── */
var selKey = null, navDest = '';
var cancelHover = false;
var particles = [];
var wordDots = {}, selDots = [], cancelDots = [];
var clockParts = {}, clockSegs = {};
var prevCH='', prevCM='', prevCS='', prevCL='';

function navAngle(i) { return (i/KEYS.length)*Math.PI*2 - Math.PI/2 + Math.PI*.1; }
function navPos(i) {
  var a=navAngle(i);
  // Subtle orbital drift — each word bobs on its own sine wave
  var drift=2.5, ph=orbitPhase[i]||0;
  var ox=Math.cos(a+Math.PI/2)*Math.sin(performance.now()*0.0007+ph)*drift;
  var oy=Math.sin(a+Math.PI/2)*Math.sin(performance.now()*0.0007+ph)*drift;
  return {x:CX+Math.cos(a)*NAV_R+ox, y:CY+Math.sin(a)*NAV_R+oy};
}

function buildWordDots() {
  wordDots = {};
  for (var i=0; i<KEYS.length; i++) {
    var key = KEYS[i], pos = navPos(i);
    var sp = 2*Math.PI*NAV_R/KEYS.length;
    var bw = sp*.80, bh = bw*(W<600?.72:.60);
    wordDots[key] = sampleDots(PAGES[key].ey, pos.x, pos.y, bw, bh, Math.max(.4,bh/62));
  }
}

function buildSelDots() {
  selDots=[]; cancelDots=[];
  if (!selKey) return;
  var lines = PAGES[selKey].ey.split('\n');
  var bw=Math.min(W*.72,360), bh=bw*(W<500?.32:.28);
  var lh=bh/lines.length, step=Math.max(.5,lh/62);
  var totalH = lh*lines.length;
  for (var li=0; li<lines.length; li++) {
    var ly = CY - totalH*.6 + li*lh;
    selDots = selDots.concat(sampleDots(lines[li], CX, ly, bw, lh, step));
  }
  var cbw=Math.min(W*.18,140), cbh=cbw*.28;
  var cy2 = CY + totalH*.55 + cbh;
  window._cY=cy2; window._cBw=cbw; window._cBh=cbh;
  cancelDots = sampleDots('X  Cancel', CX, cy2, cbw, cbh, Math.max(.5,cbh/40));
}

function getSegLayout() {
  var sc=Math.min(W,H), dh=sc*(W<500?.08:.10);
  var cw=dh*.30, dw=dh*1.20, tot=dw*3+cw*2, sx=CX-tot/2, dy=CY+sc*.01;
  return {
    HH:{x:sx+dw/2,y:dy,w:dw,h:dh},
    C1:{x:sx+dw+cw/2,y:dy,w:cw,h:dh},
    MM:{x:sx+dw+cw+dw/2,y:dy,w:dw,h:dh},
    C2:{x:sx+dw*2+cw*1.5,y:dy,w:cw,h:dh},
    SS:{x:sx+dw*2+cw*2+dw/2,y:dy,w:dw,h:dh},
    LBL:{x:CX,y:CY-sc*.10,w:Math.min(W*.35,260),h:sc*.04},
    SUB:{x:CX,y:CY+sc*.09,w:Math.min(W*.42,300),h:sc*.032}
  };
}

function segCol(sid) {
  var isD = ['HH','C1','MM','C2','SS'].indexOf(sid)>=0;
  if (isD) return clockState.isOpen?{r:255,g:200,b:80}:{r:210,g:170,b:145};
  if (sid==='LBL') return clockState.isOpen?{r:255,g:148,b:60}:{r:210,g:170,b:145};
  return {r:210,g:170,b:145};
}
function segA(sid, bright) {
  var isD = ['HH','C1','MM','C2','SS'].indexOf(sid)>=0;
  if (isD) return clockState.isOpen ? .72+bright*.28 : .20+bright*.08;
  if (sid==='LBL') return clockState.isOpen ? .55 : .16;
  return .15;
}

function retargetSeg(sid, dots) {
  var ex = clockParts[sid] || [];
  var col = segCol(sid);
  var isD = ['HH','C1','MM','C2','SS'].indexOf(sid)>=0;
  var take = Math.min(ex.length, dots.length);
  for (var i=0; i<take; i++) {
    ex[i].tx=dots[i].x; ex[i].ty=dots[i].y;
    ex[i].spd=.16+Math.random()*.06; ex[i].wm=.03;
    ex[i].rc=col.r; ex[i].gc=col.g; ex[i].bc=col.b;
    ex[i].a=segA(sid,dots[i].b);
  }
  for (var i=take; i<dots.length; i++) {
    var d=dots[i], p={x:d.x+(Math.random()-.5)*5,y:d.y+(Math.random()-.5)*5,
      tx:d.x,ty:d.y,spd:.16+Math.random()*.06,
      r:isD?.65+Math.random()*.25:.38+Math.random()*.14,
      a:segA(sid,d.b),wb:Math.random()*Math.PI*2,
      ws:.002+Math.random()*.003,wm:.03,
      rc:col.r,gc:col.g,bc:col.b,ck:true,sid:sid};
    ex.push(p); particles.push(p);
  }
  for (var i=dots.length; i<ex.length; i++) ex[i].a=0;
  clockParts[sid] = ex.slice(0,dots.length);
}

function buildAllClockSegs(force) {
  if (selKey) return;
  var L = getSegLayout();
  var txt = {HH:clockState.h,C1:':',MM:clockState.m,C2:':',SS:clockState.s,LBL:clockState.label,SUB:clockState.sub};
  var ch = {HH:force||clockState.h!==prevCH,C1:force||!clockSegs.C1,MM:force||clockState.m!==prevCM,
    C2:force||!clockSegs.C2,SS:force||clockState.s!==prevCS,LBL:force||clockState.label!==prevCL,SUB:force||!clockSegs.SUB};
  var sids = Object.keys(ch);
  for (var i=0; i<sids.length; i++) {
    var sid=sids[i];
    if (ch[sid]) {
      clockSegs[sid]=sampleDots(txt[sid],L[sid].x,L[sid].y,L[sid].w,L[sid].h,Math.max(.4,L[sid].h/50));
      retargetSeg(sid,clockSegs[sid]);
    }
  }
  prevCH=clockState.h; prevCM=clockState.m; prevCS=clockState.s; prevCL=clockState.label;
}

function initClockParticles() {
  if (selKey) return;
  var L = getSegLayout();
  var txt = {HH:clockState.h,C1:':',MM:clockState.m,C2:':',SS:clockState.s,LBL:clockState.label,SUB:clockState.sub};
  var sids = Object.keys(txt);
  for (var si=0; si<sids.length; si++) {
    var sid=sids[si];
    clockParts[sid]=[];
    var dots=sampleDots(txt[sid],L[sid].x,L[sid].y,L[sid].w,L[sid].h,Math.max(.4,L[sid].h/50));
    clockSegs[sid]=dots;
    var col=segCol(sid), isD=['HH','C1','MM','C2','SS'].indexOf(sid)>=0;
    for (var i=0; i<dots.length; i++) {
      var d=dots[i];
      var p={x:CX+(Math.random()-.5)*W*.8,y:CY+(Math.random()-.5)*H*.8,
        tx:d.x,ty:d.y,spd:.04+Math.random()*.03,
        r:isD?.65+Math.random()*.25:.38+Math.random()*.14,
        a:segA(sid,d.b),wb:Math.random()*Math.PI*2,
        ws:.002+Math.random()*.003,wm:.03,
        rc:col.r,gc:col.g,bc:col.b,ck:true,sid:sid};
      clockParts[sid].push(p); particles.push(p);
    }
  }
  prevCH=clockState.h; prevCM=clockState.m; prevCS=clockState.s; prevCL=clockState.label;
}

function buildParticles() {
  particles=[];
  function rand() { return {x:CX+(Math.random()-.5)*W*.9,y:CY+(Math.random()-.5)*H*.9}; }
  var s, i, d, key, dim;

  for (i=0;i<selDots.length;i++) { d=selDots[i];s=rand();particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,spd:.022+Math.random()*.016,r:.9+Math.random()*.4,a:.85+d.b*.15,wb:Math.random()*Math.PI*2,ws:.003+Math.random()*.006,wm:.3,t:3}); }
  for (i=0;i<cancelDots.length;i++) { d=cancelDots[i];s=rand();particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,spd:.06+Math.random()*.04,r:.5+Math.random()*.25,a:.32+d.b*.12,wb:Math.random()*Math.PI*2,ws:.003+Math.random()*.006,wm:.1,t:5}); }

  for (i=0;i<KEYS.length;i++) {
    key=KEYS[i]; dim=!!selKey;
    var wd = wordDots[key]||[];
    for (var j=0;j<wd.length;j++) { d=wd[j];s=rand();particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,spd:.018+Math.random()*.014,r:dim?.35:.55+Math.random()*.25,a:dim?.18:.7+d.b*.3,wb:Math.random()*Math.PI*2,ws:.003+Math.random()*.007,wm:.2,t:dim?2:1,_key:key}); }
  }
  for (i=0;i<80;i++) { var a=(i/80)*Math.PI*2,r=INN_R*(.5+Math.random()*.9);s=rand();particles.push({x:s.x,y:s.y,tx:CX+Math.cos(a)*r,ty:CY+Math.sin(a)*r,spd:.025+Math.random()*.02,r:1.2+Math.random()*.8,a:.5+Math.random()*.4,wb:Math.random()*Math.PI*2,ws:.006+Math.random()*.01,wm:.4,t:4}); }
  for (i=0;i<180;i++) { var a2=Math.random()*Math.PI*2,r2=INN_R*1.5+Math.random()*NAV_R*1.4;particles.push({x:Math.random()*W,y:Math.random()*H,tx:CX+Math.cos(a2)*r2,ty:CY+Math.sin(a2)*r2,spd:.004+Math.random()*.005,r:.8+Math.random()*1.2,a:.06+Math.random()*.1,wb:Math.random()*Math.PI*2,ws:.002+Math.random()*.006,wm:1.5+Math.random()*2,t:0}); }
}

function rebuild() {
  buildWordDots(); buildSelDots();
  clockSegs={}; clockParts={}; prevCH=''; prevCM=''; prevCS=''; prevCL='';
  buildParticles();
  initClockParticles();
}

setInterval(function(){ if(!selKey) buildAllClockSegs(false); }, 1000);

/* ── HIT TESTS ── */
function hitNav(x,y) {
  var r = W<600?80:65;
  for (var i=0;i<KEYS.length;i++) { var p=navPos(i); if((x-p.x)*(x-p.x)+(y-p.y)*(y-p.y)<r*r) return KEYS[i]; }
  return null;
}
function hitCancel(x,y) {
  if (!selKey||!window._cY) return false;
  return Math.abs(x-CX)<(window._cBw||140)/2 && Math.abs(y-window._cY)<(window._cBh||40)/2;
}

var hovKey=null, prevHovKey=null, hovDescParts=[];
function buildHovDesc(key){
  hovDescParts.forEach(function(p){var idx=particles.indexOf(p);if(idx>=0)particles.splice(idx,1);});
  hovDescParts=[];
  if(!key||!PAGES[key]||!PAGES[key].desc)return;
  var pos=navPos(KEYS.indexOf(key));
  var ang=navAngle(KEYS.indexOf(key));
  var offX=Math.cos(ang)*28, offY=Math.sin(ang)*28;
  var sc=Math.min(W,H), tw=sc*0.18, th=sc*0.022;
  var dots=sampleDots(PAGES[key].desc, pos.x+offX, pos.y+offY, tw, th, Math.max(0.4,th/28));
  dots.forEach(function(d){
    var p={x:pos.x,y:pos.y,tx:d.x,ty:d.y,spd:0.18+Math.random()*0.08,
      r:0.45+Math.random()*0.25,a:0.45,wb:Math.random()*Math.PI*2,
      ws:0.003,wm:0.1,rc:232,gc:180,bc:160,t:0,ck:false,_hovDesc:true};
    hovDescParts.push(p); particles.push(p);
  });
}
canvas.addEventListener('mousemove', function(e) {
  cancelHover = hitCancel(e.clientX,e.clientY);
  hovKey = hitNav(e.clientX,e.clientY);
  document.body.classList.toggle('hov', !!hovKey||cancelHover);
  if(hovKey!==prevHovKey){ buildHovDesc(hovKey); prevHovKey=hovKey; }
});
canvas.addEventListener('click', function(e) {
  if (wormCancelHit(e.clientX,e.clientY)) { abortWorm(); return; }
  var k = hitNav(e.clientX,e.clientY);
  if (k && !wormActive){
    // Scatter all other words' particles — burst outward from their word center
    for(var si3=0;si3<particles.length;si3++){
      var sp3=particles[si3];
      if(sp3._key && sp3._key!==k){
        var kIdx=KEYS.indexOf(sp3._key);
        var kpos=navPos(kIdx);
        var sang=Math.atan2(kpos.y-CY,kpos.x-CX);
        var burst=50+Math.random()*80;
        sp3.tx=kpos.x+Math.cos(sang)*burst+(Math.random()-.5)*30;
        sp3.ty=kpos.y+Math.sin(sang)*burst+(Math.random()-.5)*30;
        sp3.spd=0.35+Math.random()*0.15; // fast — visible in 200ms
      } else if(sp3._key===k){
        // Clicked word: particles rush toward center
        sp3.tx=CX+(Math.random()-.5)*20;
        sp3.ty=CY+(Math.random()-.5)*20;
        sp3.spd=0.4;
      }
    }
    var _dest=PAGES[k].dest;
    setTimeout(function(){ wormTransition(null,_dest); },220);
  }
});
canvas.addEventListener('touchend', function(e) {
  var t=e.changedTouches[0];
  if (wormCancelHit(t.clientX,t.clientY)) { abortWorm(); return; }
  var k=hitNav(t.clientX,t.clientY);
  if (k && !wormActive) wormTransition(null, PAGES[k].dest);
}, {passive:true});

/* ── WORM CANCEL — shown in center of ring during spin ── */
var wormCancelActive=false, wormAborted=false;
var wormCancelR=38; // hit radius

function wormCancelHit(x,y){
  if(!wormCancelActive) return false;
  var dx=x-CX, dy=y-CY;
  return dx*dx+dy*dy < wormCancelR*wormCancelR;
}

function abortWorm(){
  if(!wormActive) return;
  wormAborted=true;
  wormActive=false;
  wormCancelActive=false;
  // Explosion: blast all particles outward from center
  for(var ei=0;ei<particles.length;ei++){
    var p=particles[ei];
    var ba=Math.random()*Math.PI*2;
    var br=INN_R*1.5+Math.random()*NAV_R*1.8;
    p.tx=CX+Math.cos(ba)*br; p.ty=CY+Math.sin(ba)*br;
    p.spd=0.08+Math.random()*0.06; p.wm=2+Math.random()*3;
  }
  tR=8; tG=4; tB=7;
  // Rebuild after explosion settles
  setTimeout(function(){ rebuild(); },600);
}

document.addEventListener('keydown', function(e){if(e.key==='Escape') abortWorm();});

/* ── WORM TRANSITION — uses existing particles, no new arrays ──
   destKey set → show second screen after worm
   dest set    → navigate to page after worm              */
var wormActive = false;

function wormTransition(destKey, dest) {
  if (wormActive) return;
  wormActive = true;
  document.getElementById('hint').style.display='none';

  var TOTAL=5500, elapsed=0, lastTs=null, done=false;
  // Destination worm color — vivid and distinct per page
  var wormR=245, wormG=237, wormB=232;
  var extC=null;
  if(dest){
    var _ek=Object.keys(PAGES).find(function(k){return PAGES[k].dest===dest;});
    if(_ek){
      extC=PAGES[_ek].extColor||null;
      var m=PAGES[_ek].mood;
      if(extC){
        wormR=extC[0]; wormG=extC[1]; wormB=extC[2];
      } else if(m){
        // Map mood to vivid hues — each page gets a clearly different color
        var hues={
          home:[255,140,60],   menu:[255,200,40],  lunch:[255,180,20],
          beer:[80,180,255],   delivery:[255,80,40], order:[255,120,20],
          about:[200,140,255], facebook:[60,100,255], find:[60,200,80],
          staff:[255,160,0]
        };
        var col=hues[_ek]||[245,237,232];
        wormR=col[0]; wormG=col[1]; wormB=col[2];
      }
    }
  }
  var PI=Math.PI, minD=Math.min(W,H);
  var ringR=minD*0.28, tubeR=minD*0.050, TWISTS=3;

  // Massive particle count — no limit
  var EXTRA=28000, extraParticles=[];
  for(var ei=0;ei<EXTRA;ei++){
    var ep={x:CX+(Math.random()-.5)*12,y:CY+(Math.random()-.5)*12,
      tx:CX,ty:CY,spd:0.99,r:0.4+Math.random()*0.4,
      a:0.7+Math.random()*0.3,wb:0,ws:0,wm:0,rc:wormR,gc:wormG,bc:wormB,t:1};
    extraParticles.push(ep); particles.push(ep);
  }

  // Cancel text particles
  var cancelDots=sampleDots('CANCEL',CX,CY,minD*0.18,minD*0.045,Math.max(0.5,minD*0.045/40));
  var cancelParticles=[];
  for(var ci=0;ci<cancelDots.length;ci++){
    var cd=cancelDots[ci];
    var cp={x:CX+(Math.random()-.5)*6,y:CY+(Math.random()-.5)*6,
      tx:cd.x,ty:cd.y,spd:0.99,r:0.8+Math.random()*0.3,
      a:0,wb:0,ws:0,wm:0,rc:240,gc:80,bc:32,t:1,_cx:cd.x,_cy:cd.y};
    cancelParticles.push(cp); particles.push(cp); extraParticles.push(cp);
  }

  // Build ringParticles as direct refs — immune to array mutations during animation
  var ringParticles=[];
  var allWormParticles=particles.slice(); // snapshot of array at start
  // Exclude cancel particles from ring
  var cancelSet=new Set(cancelParticles);
  for(var i=0;i<allWormParticles.length;i++){
    if(!cancelSet.has(allWormParticles[i])) ringParticles.push(allWormParticles[i]);
  }
  var ringN=ringParticles.length;
  var cdLastDigit=-1, cdParticles=[], spinAccum=0;

  var PER_RING=18, SLOTS=Math.ceil(ringN/PER_RING);
  for(var i=0;i<ringN;i++){
    var rp0=ringParticles[i];
    var slot=i%SLOTS, inner=Math.floor(i/SLOTS);
    rp0._t   = slot/SLOTS;
    rp0._ca  = (inner/PER_RING)*PI*2;
    rp0._cr  = Math.sqrt((inner+0.5)/PER_RING)*tubeR;
    rp0._arm = Math.floor(rp0._t*4)%4;
    rp0._at  = (rp0._t*4)%1;
    rp0._sx  = rp0.x;
    rp0._sy  = rp0.y;
    var _ad=[-(PI/2),0,PI/2,PI][rp0._arm];
    var _at2=rp0._at;
    var _len=ringR*_at2;
    var _tw=_at2*PI*2*TWISTS+rp0._ca;
    var _cr2=rp0._cr*(0.3+_at2*0.7);
    var _perp=_ad+PI/2;
    var _twist=Math.sin(_at2*PI*6)*0.28;
    var _r=_len*(1+_twist*0.08);
    rp0._armX=CX+Math.cos(_ad)*_r+Math.cos(_perp)*Math.cos(_tw)*_cr2;
    rp0._armY=CY+Math.sin(_ad)*_r+Math.sin(_perp)*Math.cos(_tw)*_cr2;
    rp0.ck=false;
    rp0.rc=wormR; rp0.gc=wormG; rp0.bc=wormB;
    rp0.a=0.75+Math.random()*0.25;
    rp0.wm=0;
  }

  var armDirs=[-(PI/2),0,PI/2,PI];

  function io(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function lerp(a,b,t){return a+(b-a)*t;}

  function ringPos(t,ca,cr){
    // No spinAngle during formation — ring forms at its true position
    var angle=t*PI*2-PI/2;
    var cx2=CX+Math.cos(angle)*ringR, cy2=CY+Math.sin(angle)*ringR;
    var tang=angle+PI/2, tw=t*PI*2*TWISTS+ca;
    return {x:cx2+Math.cos(tang+tw)*cr, y:cy2+Math.sin(tang+tw)*cr};
  }

  function ringPosSpin(t,ca,cr,spinAngle){
    var angle=t*PI*2-PI/2+spinAngle;
    var cx2=CX+Math.cos(angle)*ringR, cy2=CY+Math.sin(angle)*ringR;
    var tang=angle+PI/2, tw=t*PI*2*TWISTS+ca;
    return {x:cx2+Math.cos(tang+tw)*cr, y:cy2+Math.sin(tang+tw)*cr};
  }

  function wormFrame(ts){
    if(done)return;
    var dt=lastTs?Math.min(ts-lastTs,50):16; lastTs=ts; elapsed+=dt;

    if(wormAborted){
      wormAborted=false; wormCancelActive=false;
      for(var ei=0;ei<extraParticles.length;ei++){
        var idx=particles.indexOf(extraParticles[ei]);
        if(idx>=0) particles.splice(idx,1);
      }
      extraParticles=[]; cdParticles=[]; tR=8; tG=4; tB=7; rebuild(); return;
    }

    var p=clamp(elapsed/TOTAL,0,1);

    // Formation phases driven by p (fixed duration)
    // Spin is FREE — accumulates independently after formation done
    var pCollapse = io(clamp(p/0.13,        0,1));
    var pArms     = io(clamp((p-0.11)/0.20, 0,1));
    var pSweep    = io(clamp((p-0.30)/0.38, 0,1));
    var formDone  = p >= 0.68; // ring fully formed

    // Spin accumulates freely once formation done
    if(formDone) spinAccum += dt * 0.0018; // ~1 rotation per 3.5s
    var spinAngle = spinAccum;
    var cancelFade= io(clamp((p-0.38)/0.28, 0,1));

    // Navigate when countdown hits 0
    var spinStartMs = TOTAL * 0.68;
    var spinMs2 = Math.max(0, elapsed - spinStartMs);
    // ── Orbital electrons around ring during countdown ──
    if(formDone && spinAccum>0.1){
      var numOrb=6;
      for(var oi2=0;oi2<numOrb;oi2++){
        var orbA=spinAccum*2.5+(oi2/numOrb)*Math.PI*2;
        var orbR=minD*0.28+minD*0.07;
        var ox2=CX+Math.cos(orbA)*orbR, oy2=CY+Math.sin(orbA)*orbR;
        ctx.beginPath();ctx.arc(ox2,oy2,2.5,0,Math.PI*2);
        ctx.fillStyle='rgba(255,200,80,0.7)';ctx.fill();
        // tail
        for(var ot=1;ot<5;ot++){
          var ta=orbA-(ot*0.12);
          var tx2=CX+Math.cos(ta)*orbR,ty2=CY+Math.sin(ta)*orbR;
          ctx.beginPath();ctx.arc(tx2,ty2,2.5*(1-ot/5),0,Math.PI*2);
          ctx.fillStyle='rgba(255,200,80,'+(0.4*(1-ot/5))+')';ctx.fill();
        }
      }
    }

    if(formDone && spinMs2 >= 5000 && !done) {
      done=true; wormActive=false; wormCancelActive=false;
      for(var ei=0;ei<extraParticles.length;ei++){
        var idx=particles.indexOf(extraParticles[ei]);
        if(idx>=0) particles.splice(idx,1);
      }
      extraParticles=[]; cdParticles=[];
      if(dest){
        document.getElementById('topbar').style.display='none';
        navLoopOn=false;
        setTimeout(function(){
          if(dest.indexOf('http')===0)window.open(dest,'_blank');
          else window.location.href=dest;
        },100);
      }
      return;
    }

    wormCancelActive = cancelFade > 0.3;

    for(var i=0;i<ringN;i++){
      var rpi=ringParticles[i];
      var t   = rpi._t;
      var ca  = rpi._ca;
      var cr  = rpi._cr;
      var at  = rpi._at;
      var ad  = armDirs[rpi._arm];

      var pulse=Math.sin(t*Math.PI*4+spinAccum)*12;
      rpi.rc=Math.min(255,wormR+pulse|0);
      rpi.gc=Math.min(255,wormG+pulse*0.5|0);
      rpi.bc=Math.min(255,wormB|0);
      rpi.wm=0;

      var colX=lerp(rpi._sx,CX,pCollapse);
      var colY=lerp(rpi._sy,CY,pCollapse);

      var armX=rpi._armX, armY=rpi._armY;
      var fromX=lerp(colX,armX,pArms);
      var fromY=lerp(colY,armY,pArms);

      // Sweep — tip leaves first (at=1, delay=0), base leaves last (at=0, delay=0.88)
      // Source is ALWAYS the frozen full arm position — never partial arm
      // So particles travel outward FROM arm TO ring — no falling in
      var delay  = (1-at)*0.88;
      var window2= 1.0-delay;
      var localE = at<0.02 ? io(clamp((pSweep-delay)/0.12,0,1))
                           : io(clamp((pSweep-delay)/window2,0,1));

      var rp = spinAngle>0.001 ? ringPosSpin(t,ca,cr,spinAngle) : ringPos(t,ca,cr);

      var x,y;
      if(pArms<0.001){
        x=colX; y=colY;
      } else if(pSweep<0.001){
        x=fromX; y=fromY;
      } else {
        // Always lerp FROM full arm position TO ring — clean outward motion
        x=lerp(armX,rp.x,localE);
        y=lerp(armY,rp.y,localE);
        // Show arm for particles not yet swept (localE<1)
        if(localE<1){
          // Blend: show arm position while waiting, then sweep to ring
          var blend=io(clamp(pArms,0,1));
          x=lerp(lerp(colX,armX,blend), rp.x, localE);
          y=lerp(lerp(colY,armY,blend), rp.y, localE);
        }
      }

      rpi.x=x; rpi.y=y;
      rpi.tx=x; rpi.ty=y; rpi.spd=0.99;
    }

    // Cancel particles bloom from center as ring forms
    for(var ci=0;ci<cancelParticles.length;ci++){
      var cp=cancelParticles[ci];
      var cx2=lerp(CX,cp._cx,cancelFade);
      var cy2=lerp(CY,cp._cy,cancelFade);
      cp.a=cancelFade*0.95; cp.x=cx2; cp.y=cy2; cp.tx=cx2; cp.ty=cy2;
    }

    // Particle-based countdown — 5 real seconds during spin
    if(spinAngle > 0.05) {
      var spinMs = spinMs2;
      var cdSecs = Math.max(0, 5 - Math.floor(spinMs / 1000));
      if(cdSecs !== cdLastDigit) {
        cdLastDigit = cdSecs;
        // Sample new digit as dots
        var dh = minD*0.10;
        var dw = dh*0.75;
        var ddots = sampleDots(String(cdSecs), CX, CY-minD*0.055, dw, dh, Math.max(0.5,dh/40));
        // Retarget existing digit particles or create new ones
        var need = ddots.length;
        // Reuse existing, add/remove as needed
        while(cdParticles.length > need) {
          var rem = cdParticles.pop();
          var ri = particles.indexOf(rem);
          if(ri>=0) particles.splice(ri,1);
          var ei2 = extraParticles.indexOf(rem);
          if(ei2>=0) extraParticles.splice(ei2,1);
        }
        while(cdParticles.length < need) {
          var np={x:CX+(Math.random()-.5)*8,y:CY-minD*0.055+(Math.random()-.5)*8,
            tx:CX,ty:CY,spd:0.99,r:0.7+Math.random()*0.25,a:0,
            wb:0,ws:0,wm:0,rc:245,gc:237,bc:232,t:1};
          cdParticles.push(np); particles.push(np); extraParticles.push(np);
        }
        // Assign targets
        for(var di=0;di<ddots.length;di++){
          cdParticles[di].tx=ddots[di].x;
          cdParticles[di].ty=ddots[di].y;
          cdParticles[di]._cdx=ddots[di].x;
          cdParticles[di]._cdy=ddots[di].y;
          cdParticles[di].spd=0.99;
        }
      }
      // Move digit particles to their positions
      var cdAlpha = Math.min(1, spinMs/300);
      for(var di=0;di<cdParticles.length;di++){
        cdParticles[di].x=cdParticles[di]._cdx||cdParticles[di].tx;
        cdParticles[di].y=cdParticles[di]._cdy||cdParticles[di].ty;
        cdParticles[di].tx=cdParticles[di].x;
        cdParticles[di].ty=cdParticles[di].y;
        cdParticles[di].a=cdAlpha*0.9;
        cdParticles[di].rc=245;cdParticles[di].gc=237;cdParticles[di].bc=232;
      }
    }

    requestAnimationFrame(wormFrame);
  }
  requestAnimationFrame(wormFrame);
}




function loadingScreen(dest) {
  var N=2000;
  var px=new Float32Array(N), py=new Float32Array(N);
  var tx=new Float32Array(N), ty=new Float32Array(N);
  var pr=new Float32Array(N), ph=new Float32Array(N);
  var minD=Math.min(W,H);

  for (var i=0;i<N;i++) {
    var a=Math.random()*Math.PI*2, r=minD*(.05+Math.random()*.55);
    px[i]=CX+Math.cos(a)*r; py[i]=CY+Math.sin(a)*r;
    tx[i]=CX; ty[i]=CY;
    pr[i]=.9+Math.random()*1.2; ph[i]=Math.random()*25;
  }

  var B=[600,1100,2000,2400];
  var elapsed=0, lastTs=null, wA=0, stage=0, done=false;

  function setWorm(angle) {
    for (var i=0;i<N;i++) {
      var t=i/N, a=t*Math.PI*2+angle;
      var twist=Math.sin(t*Math.PI*10+angle*3)*.28;
      var r=minD*(.17+twist*.05)+Math.sin(angle*2+t*8)*minD*.03;
      tx[i]=CX+Math.cos(a)*r; ty[i]=CY+Math.sin(a)*r;
    }
  }

  function frame(ts) {
    var dt = lastTs ? Math.min(ts-lastTs, 50) : 16;
    lastTs = ts;
    elapsed += dt;
    var e = elapsed;

    var ns = e<B[0]?0 : e<B[1]?1 : e<B[2]?2 : e<B[3]?3 : 4;
    if (ns !== stage) {
      stage = ns;
      if (stage===1) setWorm(0);
      if (stage===3) { for(var i=0;i<N;i++){tx[i]=CX+(Math.random()-.5)*4;ty[i]=CY+(Math.random()-.5)*4;} }
    }
    if (stage===2) { wA+=.08; setWorm(wA); }

    var spd = stage===0?.14 : stage===1?.11 : stage===2?.28 : .45;

    ctx.fillStyle='#080407';
    ctx.fillRect(0,0,W,H);

    for (var i=0;i<N;i++) {
      px[i]+=(tx[i]-px[i])*spd;
      py[i]+=(ty[i]-py[i])*spd;
      var hue = stage<2 ? 20+ph[i] : 10+ph[i]+Math.sin(wA*2+i/N*Math.PI)*20;
      var lit = stage===2 ? 50+Math.sin(wA*3+i/N*Math.PI*2)*15 : 55;
      var alpha = stage===2 ? .7+Math.sin(wA+i/N*Math.PI*2)*.3 : .85;
      ctx.fillStyle='hsla('+hue+',100%,'+lit+'%,'+alpha+')';
      ctx.beginPath(); ctx.arc(px[i],py[i],pr[i],0,Math.PI*2); ctx.fill();
    }

    if (stage>=3) {
      var prog=Math.min(1,(e-B[2])/(B[3]-B[2]));
      ctx.fillStyle='rgba(180,0,0,'+prog*.95+')';
      ctx.fillRect(0,0,W,H);
    }

    if (stage>=4 && !done) {
      done=true;
      setTimeout(function(){
        if(dest.indexOf('http')===0) window.open(dest,'_blank');
        else window.location.href=dest;
      }, 150);
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

/* ── MOOD ── */
var mr=8,mg=4,mb=7, tR=8,tG=4,tB=7;

/* ── SHOOTING STARS ── */
var stars=[];
function spawnStar(){
  var edge=Math.random();
  var sx,sy,ang;
  if(edge<0.25){sx=Math.random()*W;sy=-10;ang=Math.PI/2+(.3-Math.random()*.6);}
  else if(edge<0.5){sx=W+10;sy=Math.random()*H;ang=Math.PI+(0.3-Math.random()*.6);}
  else if(edge<0.75){sx=Math.random()*W;sy=H+10;ang=-Math.PI/2+(.3-Math.random()*.6);}
  else{sx=-10;sy=Math.random()*H;ang=0.3-Math.random()*.6;}
  stars.push({x:sx,y:sy,vx:Math.cos(ang)*12,vy:Math.sin(ang)*12,life:1,maxLen:60+Math.random()*80});
}
setInterval(function(){if(Math.random()<0.4)spawnStar();},1800);

/* ── DOUBLE-CLICK RIPPLE ── */
var ripples=[];
canvas.addEventListener('dblclick',function(e){
  if(wormActive)return;
  ripples.push({x:e.clientX,y:e.clientY,r:0,life:1});
  // knock nearby particles outward
  for(var i=0;i<particles.length;i++){
    var p=particles[i]; if(p.ck||p._key)continue;
    var dx=p.x-e.clientX,dy=p.y-e.clientY,d=Math.sqrt(dx*dx+dy*dy);
    if(d<120&&d>0){
      var f=(1-d/120)*18;
      p.tx+=dx/d*f; p.ty+=dy/d*f;
      setTimeout((function(pp){return function(){pp.tx=pp._otx||pp.tx;pp.ty=pp._oty||pp.ty;};})(p),800);
    }
  }
});

/* ── ATTRACT MODE (cursor still 3s) ── */
var lastMoveTs=0, attractMode=false;
document.addEventListener('mousemove',function(){lastMoveTs=performance.now();attractMode=false;});

/* ── NAV RING ORBIT OFFSET ── */
var orbitPhase=[];
for(var oi=0;oi<10;oi++) orbitPhase.push(Math.random()*Math.PI*2);

/* ── EASTER EGG ── */
var centerClicks=0, centerClickTs=0;
canvas.addEventListener('click',function(e){
  var dx=e.clientX-CX,dy=e.clientY-CY;
  if(dx*dx+dy*dy<INN_R*INN_R && !wormActive){
    var now=performance.now();
    if(now-centerClickTs>1200) centerClicks=0;
    centerClickTs=now; centerClicks++;
    if(centerClicks>=5){ centerClicks=0; triggerEasterEgg(); }
  }
});
var easterEggActive=false, easterEggTs=0;
function triggerEasterEgg(){
  easterEggActive=true; easterEggTs=performance.now();
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a2=Math.random()*Math.PI*2, r2=50+Math.random()*NAV_R*1.5;
    p.tx=CX+Math.cos(a2)*r2; p.ty=CY+Math.sin(a2)*r2;
    p.spd=0.05+Math.random()*0.08; p.wm=3+Math.random()*4;
  }
  setTimeout(function(){easterEggActive=false;rebuild();},2500);
}

/* ── DESATURATE when closed ── */
var desatTarget=0, desatCurrent=0;

/* ── DAY/DATE particles ── */
var dateDots=[], dateParts=[], dateBuilt=false;
function buildDateParticles(){
  var now=new Date();
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var txt=days[now.getDay()]+' '+months[now.getMonth()]+' '+now.getDate();
  var sc=Math.min(W,H), tw=sc*0.22, th=sc*0.025;
  var dots=sampleDots(txt,CX,H-50,tw,th,Math.max(0.4,th/30));
  dateParts=[];
  dots.forEach(function(d){
    var p={x:CX+(Math.random()-.5)*W,y:H-50+(Math.random()-.5)*30,
      tx:d.x,ty:d.y,spd:0.03+Math.random()*0.02,r:0.5+Math.random()*0.3,
      a:0.10,wb:Math.random()*Math.PI*2,ws:0.001,wm:0.05,
      rc:232,gc:180,bc:160,t:0,ck:false};
    dateParts.push(p); particles.push(p);
  });
  dateBuilt=true;
}

/* ── CRAWFISH BANNER ── */
var crawfishBanner=[], crawfishBuilt=false, prevIsCrawfish=false;
function buildCrawfishBanner(){
  var sc=Math.min(W,H);
  var dots=sampleDots('🦞 CRAWFISH NIGHT',CX,H-28,sc*0.45,sc*0.032,Math.max(0.5,sc*0.032/35));
  crawfishBanner=[];
  dots.forEach(function(d){
    var p={x:CX+(Math.random()-.5)*W*0.5,y:H+20,
      tx:d.x,ty:d.y,spd:0.06+Math.random()*0.03,r:0.7+Math.random()*0.3,
      a:0.8,wb:Math.random()*Math.PI*2,ws:0.002,wm:0.08,
      rc:240,gc:80,bc:32,t:0,ck:false};
    crawfishBanner.push(p); particles.push(p);
  });
  crawfishBuilt=true;
}
function removeCrawfishBanner(){
  crawfishBanner.forEach(function(p){
    var idx=particles.indexOf(p); if(idx>=0)particles.splice(idx,1);
  });
  crawfishBanner=[]; crawfishBuilt=false;
}

/* ── OPEN TRANSITION: explode then reform when status changes ── */
var prevClockLabel='';
function checkStatusChange(){
  if(clockState.label!==prevClockLabel && prevClockLabel!=='' && !wormActive){
    if(clockState.label==='OPEN'||clockState.label==='CRAWFISH NIGHT'){
      // Burst clock particles outward
      for(var i=0;i<particles.length;i++){
        if(particles[i].ck){
          var a2=Math.random()*Math.PI*2,r2=INN_R*2+Math.random()*INN_R*3;
          particles[i].tx=CX+Math.cos(a2)*r2;
          particles[i].ty=CY+Math.sin(a2)*r2;
          particles[i].spd=0.06; particles[i].wm=2;
        }
      }
      setTimeout(function(){
        clockSegs={}; clockParts={}; prevCH=''; prevCM=''; prevCS=''; prevCL='';
        initClockParticles();
      },800);
    }
  }
  prevClockLabel=clockState.label;
}
setInterval(checkStatusChange,1000);

/* ── MAIN LOOP ── */
var navLoopOn=false, lastT=0;

function loop(ts) {
  if (!navLoopOn) return;
  requestAnimationFrame(loop);
  var dt=Math.min((ts-lastT)||16,32); lastT=ts;
  mr+=(tR-mr)*.014; mg+=(tG-mg)*.014; mb+=(tB-mb)*.014;

  // ── Slow background hue cycle (several minutes) ──
  var hueShift=Math.sin(ts*0.000008)*6; // ±6 hue degrees over ~13 min cycle
  ctx.fillStyle='rgb('+Math.round(mr)+','+Math.round(mg)+','+Math.round(mb)+')';
  ctx.fillRect(0,0,W,H);

  var bg=ctx.createRadialGradient(CX,H,0,CX,H,H*.85);
  bg.addColorStop(0,'rgba(196,24,0,'+(.05+mr/900)+')'); bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // ── Desaturate when closed ──
  desatTarget=clockState.isOpen?0:0.55;
  desatCurrent+=(desatTarget-desatCurrent)*0.003;
  if(desatCurrent>0.02){
    ctx.save(); ctx.globalCompositeOperation='saturation';
    ctx.fillStyle='rgba(128,128,128,'+desatCurrent+')'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // ── Easter egg: rainbow chaos ──
  if(easterEggActive){
    var eAge=(performance.now()-easterEggTs)/2500;
    for(var ei3=0;ei3<particles.length;ei3++){
      var ep=particles[ei3];
      var hue=(ep._t===undefined?0:ep._t)*360+ts*0.3+ei3*7;
      ep.rc=Math.round(128+Math.sin(hue*Math.PI/180)*127);
      ep.gc=Math.round(128+Math.sin((hue+120)*Math.PI/180)*127);
      ep.bc=Math.round(128+Math.sin((hue+240)*Math.PI/180)*127);
    }
  }

  // ── Compass rose grid ──
  ctx.save(); ctx.globalAlpha=0.025;
  for(var cr2=0;cr2<16;cr2++){
    var cra=(cr2/16)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(cra)*INN_R*0.5,CY+Math.sin(cra)*INN_R*0.5);
    ctx.lineTo(CX+Math.cos(cra)*W,CY+Math.sin(cra)*W);
    ctx.strokeStyle='rgba(232,180,160,1)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  // Concentric rings
  for(var cr3=1;cr3<=4;cr3++){
    ctx.beginPath(); ctx.arc(CX,CY,NAV_R*cr3*0.35,0,Math.PI*2);
    ctx.strokeStyle='rgba(232,180,160,1)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.restore();

  // ── Crawfish banner: build/remove as needed ──
  if(clockState.isCrawfish && !crawfishBuilt) buildCrawfishBanner();
  if(!clockState.isCrawfish && crawfishBuilt) removeCrawfishBanner();

  // ── Date particles: build once ──
  if(!dateBuilt && navLoopOn) buildDateParticles();

  // ── Attract mode: cursor still 3s → ambient particles spiral toward cursor ──
  if(performance.now()-lastMoveTs>3000 && !wormActive){
    attractMode=true;
    for(var ai=0;ai<particles.length;ai++){
      var ap=particles[ai];
      if(ap.t===0){ // only ambient
        var adx=mx-ap.x,ady=my-ap.y;
        ap.tx=ap.x+adx*0.02; ap.ty=ap.y+ady*0.02;
      }
    }
  }

  // ── Shooting stars ──
  for(var si2=stars.length-1;si2>=0;si2--){
    var st=stars[si2];
    st.x+=st.vx; st.y+=st.vy; st.life-=0.022;
    if(st.life<=0||st.x<-50||st.x>W+50||st.y<-50||st.y>H+50){stars.splice(si2,1);continue;}
    ctx.save();
    ctx.globalAlpha=st.life*0.7;
    ctx.beginPath();
    ctx.moveTo(st.x,st.y);
    ctx.lineTo(st.x-st.vx*(st.maxLen/12),st.y-st.vy*(st.maxLen/12));
    var sg2=ctx.createLinearGradient(st.x,st.y,st.x-st.vx*5,st.y-st.vy*5);
    sg2.addColorStop(0,'rgba(255,237,200,0.9)');
    sg2.addColorStop(1,'rgba(255,148,60,0)');
    ctx.strokeStyle=sg2; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }

  // ── Ripple effects ──
  for(var ri=ripples.length-1;ri>=0;ri--){
    var rp2=ripples[ri]; rp2.r+=5; rp2.life-=0.04;
    if(rp2.life<=0){ripples.splice(ri,1);continue;}
    ctx.beginPath();ctx.arc(rp2.x,rp2.y,rp2.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(240,80,32,'+rp2.life*0.4+')';ctx.lineWidth=1.5;ctx.stroke();
  }

  if(selKey){var ssi=KEYS.indexOf(selKey),ssp=navPos(ssi);var ssg=ctx.createRadialGradient(ssp.x,ssp.y,0,ssp.x,ssp.y,80);ssg.addColorStop(0,'rgba(240,80,32,.12)');ssg.addColorStop(1,'transparent');ctx.fillStyle=ssg;ctx.beginPath();ctx.arc(ssp.x,ssp.y,80,0,Math.PI*2);ctx.fill();}

  // ── Inner ring: 4 arcs rotating in opposite pairs ──
  for(var ai2=0;ai2<4;ai2++){
    var arcStart=(ai2/4)*Math.PI*2 + (ai2%2===0?ts*0.0008:-ts*0.0008);
    ctx.beginPath();
    ctx.arc(CX,CY,INN_R,arcStart,arcStart+Math.PI*0.45);
    ctx.strokeStyle='rgba(240,80,32,'+(0.12+Math.sin(ts*0.002+ai2)*0.06)+')';
    ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.beginPath();ctx.arc(CX,CY,NAV_R,0,Math.PI*2);ctx.strokeStyle='rgba(232,180,160,.05)';ctx.lineWidth=.5;ctx.stroke();

  // Word echo pass — draw dim offset shadows first
  for(var i=0;i<particles.length;i++){
    var pe=particles[i];
    if(pe.t!==1&&pe.t!==2)continue;
    ctx.beginPath();ctx.arc(pe.x+2,pe.y+2,pe.r*0.7,0,Math.PI*2);
    ctx.fillStyle='rgba(240,80,32,0.04)';ctx.fill();
  }

  for(var i=0;i<KEYS.length;i++){
    var angle=navAngle(i),isSel=selKey===KEYS[i];
    ctx.beginPath();ctx.moveTo(CX+Math.cos(angle)*(INN_R+2),CY+Math.sin(angle)*(INN_R+2));
    ctx.lineTo(CX+Math.cos(angle)*(NAV_R-52),CY+Math.sin(angle)*(NAV_R-52));
    ctx.strokeStyle=isSel?'rgba(240,80,32,.2)':'rgba(232,180,160,.04)';ctx.lineWidth=.5;ctx.stroke();
    ctx.font='600 8px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isSel?'rgba(240,80,32,.7)':selKey?'rgba(232,180,160,0)':'rgba(232,180,160,.18)';
    ctx.fillText(PAGES[KEYS[i]].num,CX+Math.cos(angle)*(NAV_R+20),CY+Math.sin(angle)*(NAV_R+20));
  }

  // ── Cursor trail — newest = brightest, oldest = faintest ──
  for(var ti2=0;ti2<TRAIL_LEN;ti2++){
    // Walk backward from current index so ti2=0 is newest
    var tidx=(trailIdx-1-ti2+TRAIL_LEN)%TRAIL_LEN;
    var tFrac=1-(ti2/TRAIL_LEN);
    var tAlpha=tFrac*tFrac*0.35;
    var tRad=tFrac*4.5;
    ctx.beginPath();ctx.arc(trailX[tidx],trailY[tidx],tRad,0,Math.PI*2);
    ctx.fillStyle='rgba(240,80,32,'+tAlpha.toFixed(2)+')';ctx.fill();
  }

  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    p.wb+=p.ws;

    // ── Hover magnetism: hovered word particles drift toward cursor ──
    var ptx=p.tx, pty=p.ty;
    if(hovKey && !wormActive && p._key===hovKey){
      var pull=0.18;
      ptx=p.tx+(mx-p.tx)*pull;
      pty=p.ty+(my-p.ty)*pull;
    }

    var dist=Math.sqrt((ptx-p.x)*(ptx-p.x)+(pty-p.y)*(pty-p.y));
    var wob=p.wm*Math.min(dist/60,1);
    p.x+=(ptx+Math.sin(p.wb)*wob-p.x)*p.spd*(dt/16);
    p.y+=(pty+Math.cos(p.wb*.73)*wob-p.y)*p.spd*(dt/16);
    var rc=p.rc||245,gc=p.gc||237,bc=p.bc||232,a=p.a;

    if(p.ck){
      if(selKey){ a=0; }
      else {
        // ── Clock heartbeat: sharp pulse on each second tick ──
        var beat=Math.pow(Math.max(0,1-((ts%1000)/180)),3);
        a=p.a*(1+beat*0.9);
        // ── Crawfish night: clock turns red-orange ──
        if(clockState.isCrawfish){ rc=255;gc=100;bc=20; }
      }
    }
    else if(p.t===3){rc=255;gc=255;bc=255;}
    else if(p.t===4){rc=255;gc=148;bc=60;}
    else if(p.t===2){a*=.22;}
    else if(p.t===5){rc=240;gc=80;bc=32;if(cancelHover)a=Math.min(1,a*2.8);}
    else if(p.t===1 && !wormActive){
      // ── Hover glow: brighten particles belonging to hovered word ──
      if(hovKey && p._key===hovKey){
        rc=255;gc=210;bc=170;a=Math.min(1,a*2.2);
      }
      // ── Staff portal amber pulse ──
      if(p._key==='staff'){
        var staffPulse=0.5+Math.sin(ts*0.0025)*0.5;
        rc=255;gc=Math.round(120+staffPulse*60);bc=20;
        a=Math.min(1,a*(1.1+staffPulse*0.3));
      }
    }

    if(a<.03)continue;
    // ── Depth: particles closer to center slightly larger+brighter ──
    var depthDx=p.x-CX, depthDy=p.y-CY;
    var depthD=Math.sqrt(depthDx*depthDx+depthDy*depthDy);
    var depthScale=1+Math.max(0,1-depthD/(NAV_R*1.2))*0.4;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*depthScale,0,Math.PI*2);
    ctx.fillStyle='rgba('+rc+','+gc+','+bc+','+a.toFixed(2)+')';ctx.fill();
  }

  // Outer ambient glow pulse
  var pR=NAV_R*(1.02+Math.sin(ts*.0011)*.008);
  ctx.beginPath();ctx.arc(CX,CY,pR,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,180,160,'+(0.03+Math.sin(ts*.0011)*.02)+')';ctx.lineWidth=.5;ctx.stroke();
}

/* ── RIGHT-CLICK / LONG-PRESS TOOLTIP ── */
var tooltipKey=null, tooltipParts=[], tooltipTs=0;
canvas.addEventListener('contextmenu',function(e){
  e.preventDefault();
  var k=hitNav(e.clientX,e.clientY);
  if(k&&!wormActive){
    tooltipKey=k;
    // Remove old tooltip parts
    tooltipParts.forEach(function(p){var idx=particles.indexOf(p);if(idx>=0)particles.splice(idx,1);});
    tooltipParts=[];
    var pg=PAGES[k], url=pg.dest.replace('https://','').replace('http://','').slice(0,28);
    var pos=navPos(KEYS.indexOf(k));
    var tw2=Math.min(W*0.28,220), th2=Math.min(W,H)*0.028;
    var dots=sampleDots(url,pos.x,pos.y-38,tw2,th2,Math.max(0.4,th2/30));
    dots.forEach(function(d){
      var p={x:pos.x,y:pos.y,tx:d.x,ty:d.y,spd:0.22,r:0.5+Math.random()*0.2,
        a:0.5,wb:Math.random()*Math.PI*2,ws:0.002,wm:0.05,
        rc:255,gc:200,bc:80,t:0,ck:false,_tooltip:true};
      tooltipParts.push(p); particles.push(p);
    });
    setTimeout(function(){
      tooltipParts.forEach(function(p){var idx=particles.indexOf(p);if(idx>=0)particles.splice(idx,1);});
      tooltipParts=[]; tooltipKey=null;
    },2200);
  }
});

/* ── BOOT ── */
document.fonts.ready.then(function(){
  rebuild();
  navLoopOn=true;
  requestAnimationFrame(loop);
});
window.addEventListener('resize', function(){ resize(); rebuild(); });
</script>
