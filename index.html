<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Headz — Navigate</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080407;font-family:'DM Sans',sans-serif;cursor:none;-webkit-tap-highlight-color:transparent;}
canvas{position:fixed;inset:0;display:block;}
#cur{position:fixed;width:8px;height:8px;border-radius:50%;background:#f05020;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px #f05020;}
#cur2{position:fixed;width:30px;height:30px;border-radius:50%;border:1px solid rgba(240,80,32,.4);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s;}
body.hov #cur2{width:50px;height:50px;border-color:rgba(240,80,32,.7);}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px clamp(16px,3vw,44px);border-bottom:1px solid rgba(232,180,160,.06);background:rgba(8,4,7,.75);backdrop-filter:blur(20px);}
.tb-sm{font-size:7.5px;letter-spacing:.28em;text-transform:uppercase;color:rgba(232,180,160,.28);}
#tb-st{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
.dot{width:5px;height:5px;border-radius:50%;animation:dp 1.8s ease-in-out infinite;}
.dot-o{background:#ffa048;box-shadow:0 0 5px #ffa048;color:#f05020;}
.dot-c{background:rgba(232,180,160,.2);color:rgba(232,180,160,.35);}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
#brand-n{font-family:'Abril Fatface',serif;font-size:clamp(16px,2.2vw,26px);color:#f5ede8;text-align:center;line-height:1;}
#brand-t{font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:rgba(232,180,160,.22);text-align:center;margin-top:3px;}
/* info panel */
#info{position:fixed;left:clamp(14px,3vw,48px);top:50%;transform:translateY(-50%);z-index:100;width:clamp(160px,17vw,230px);opacity:0;transition:opacity .5s;}
#info.show{opacity:1;}
.i-n{font-family:'Abril Fatface',serif;font-size:clamp(55px,8vw,95px);line-height:1;color:rgba(232,180,160,.04);margin-bottom:-10px;}
.i-ey{font-size:7.5px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:#f05020;opacity:.8;display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.i-ey::before{content:'';width:14px;height:1px;background:currentColor;}
.i-title{font-family:'Abril Fatface',serif;font-size:clamp(18px,2.5vw,32px);line-height:.95;color:#f5ede8;margin-bottom:6px;}
.i-sub{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(9px,1vw,12px);color:rgba(232,180,160,.32);margin-bottom:12px;line-height:1.65;}
.i-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:13px;}
.i-chip{font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border:1px solid rgba(232,180,160,.1);color:rgba(232,180,160,.3);}
.i-chip.h{border-color:rgba(240,80,32,.28);color:#f05020;}
.i-rule{font-family:'DM Serif Display',serif;font-style:italic;font-size:10px;color:rgba(232,180,160,.16);padding-top:9px;border-top:1px solid rgba(232,180,160,.05);}
/* countdown */
#cdw{position:fixed;right:clamp(14px,3vw,48px);top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:11px;opacity:0;transition:opacity .5s;pointer-events:none;}
#cdw.show{opacity:1;pointer-events:all;}
#cd-arc{fill:none;stroke:#f05020;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:289;stroke-dashoffset:0;transform-origin:55px 55px;transform:rotate(-90deg);filter:drop-shadow(0 0 6px rgba(240,80,32,.55));}
#cd-bg{fill:none;stroke:rgba(232,180,160,.07);stroke-width:2;}
#cd-n{font-family:'Abril Fatface',serif;font-size:40px;fill:#f5ede8;text-anchor:middle;dominant-baseline:central;}
#cd-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;fill:rgba(232,180,160,.28);text-anchor:middle;}
#cd-dest{font-family:'DM Serif Display',serif;font-style:italic;font-size:11px;color:rgba(232,180,160,.42);text-align:center;width:115px;line-height:1.5;}
#cd-go{font-family:'DM Sans',sans-serif;font-weight:700;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;padding:11px 24px;background:#f05020;color:#080407;border:none;cursor:none;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);transition:background .2s;}
#cd-go:hover{background:#e83010;}
#cd-cancel{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,180,160,.28);background:none;border:1px solid rgba(232,180,160,.1);padding:8px 18px;cursor:none;transition:all .2s;}
#cd-cancel:hover{color:rgba(232,180,160,.65);border-color:rgba(232,180,160,.3);}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.26em;text-transform:uppercase;color:rgba(232,180,160,.14);z-index:200;pointer-events:none;animation:hfade 5s ease-in-out 2s both;}
@keyframes hfade{0%{opacity:0}20%{opacity:1}72%{opacity:1}100%{opacity:0}}
@media(max-width:680px){#info{display:none;}#cdw{right:auto;left:50%;bottom:20px;top:auto;transform:translateX(-50%);flex-direction:row;flex-wrap:wrap;justify-content:center;gap:8px;max-width:90vw;background:rgba(8,4,7,.85);padding:10px 14px;border:1px solid rgba(232,180,160,.08);}#cdw svg{width:70px;height:70px;}#cd-n{font-size:26px;}#cd-lbl{font-size:6px;}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur2"></div>
<canvas id="c"></canvas>
<div id="topbar">
  <div><div class="tb-sm">DeRidder · Louisiana</div><div id="tb-st"><span class="dot" id="tb-dot"></span><span id="tb-stxt">—</span></div></div>
  <div><div id="brand-n">Hot Headz</div><div id="brand-t">Southern Foods · Est. 2020</div></div>
  <div style="text-align:right"><div class="tb-sm">(337) 221-1035</div><div class="tb-sm" id="tb-hr"></div></div>
</div>
<div id="info">
  <div class="i-n" id="i-n"></div><div class="i-ey" id="i-ey"></div>
  <div class="i-title" id="i-title"></div><div class="i-sub" id="i-sub"></div>
  <div class="i-chips" id="i-chips"></div><div class="i-rule" id="i-rule"></div>
</div>
<div id="cdw">
  <svg width="110" height="110" viewBox="0 0 110 110">
    <circle id="cd-bg" cx="55" cy="55" r="46"/>
    <circle id="cd-arc" cx="55" cy="55" r="46"/>
    <text id="cd-n" x="55" y="50">15</text>
    <text id="cd-lbl" x="55" y="73">navigating</text>
  </svg>
  <div id="cd-dest"></div>
  <button id="cd-go">Go Now →</button>
  <button id="cd-cancel" style="display:none">Cancel</button>
</div>
<div id="hint">Click any word to navigate</div>

<script>
const PAGES={
  home:    {num:'01',ey:'Home',        cta:'Go to Home Page',    title:'Hot Headz\nSouthern Foods.',  sub:'Fresh · From Scratch · Est. 2020',          chips:['Est. 2020','DeRidder, LA','From Scratch','(337) 221-1035'],rule:'Home is where the food is.',    dest:'index.html',       mood:[58,8,0]},
  menu:    {num:'02',ey:'The Menu',    cta:'See Full Menu',      title:'Fresh.\nFrom Scratch.',       sub:'Breakfast · Lunch · Daily Specials',         chips:['Breakfast','Fried Chicken','Catfish','Daily Specials'],   rule:'From scratch, every time.',    dest:'menu.html',        mood:[58,8,0]},
  lunch:   {num:'✦', ey:'Lunch',       cta:'See Lunch Menu',     title:'Lunch.\nDone Right.',         sub:'Daily Southern plates · changes every day',  chips:['Changes Daily','Southern Plates','Check Facebook','Sides'],rule:'Check Facebook every morning.', dest:'menu.html#lunch',  mood:[58,8,0]},
  beer:    {num:'✦', ey:'Beer',        cta:'See Beer Menu',      title:'Cold.\nCold Beer.',           sub:'Ice cold · Natural Light · Modelo',          chips:['Natural Light','Miller Lite','Modelo','Budweiser'],       rule:'Best with fried chicken.',     dest:'menu.html#beer',   mood:[26,4,0]},
  delivery:{num:'03',ey:'Delivery',    cta:'Delivery Info',      title:'We Bring\nThe Food.',         sub:'10+ plates · within 10 miles',               chips:['10+ Plates','10 Miles','Call Ahead','Group Orders'],      rule:'Delivered hot and fresh.',     dest:'delivery.html',    mood:[42,4,0]},
  order:   {num:'04',ey:'Order Now',   cta:'Call (337) 221-1035',title:'Call\nAhead.',                sub:'Skip the line · Ready when you arrive',      chips:['(337) 221-1035','Mon–Fri 5:30am','Skip Line','Carry-Out'],rule:"We'll have it ready.",          dest:'tel:3372211035',   mood:[50,8,0]},
  about:   {num:'05',ey:'About Us',    cta:'Read Our Story',     title:'Comfort\nFood Done Right.',   sub:'Family-owned · DeRidder proud · Since 2020', chips:['Est. 2020','Family Owned','From Scratch','DeRidder'],     rule:'Real Southern cooking.',       dest:'about.html',       mood:[40,16,0]},
  facebook:{num:'06',ey:'Facebook',    cta:'Visit Our Facebook', title:'Follow\nThe Feed.',           sub:'Daily specials posted every morning',         chips:['Daily Specials','Morning Posts','Photos','Follow Us'],    rule:'Posted fresh every morning.',  dest:'https://www.facebook.com/people/Hot-Headz-Southern-Foods/100064025473003/',mood:[30,8,0]},
  find:    {num:'07',ey:'Find Us',     cta:'Get Directions',     title:"We're on\nUS-190.",           sub:'2741 US-190 · DeRidder, LA 70634',           chips:['2741 US-190','(337) 221-1035','Easy Parking','Open Daily'],rule:'Follow the smell.',            dest:'https://maps.google.com/?q=2741+US-190+DeRidder+LA',mood:[24,6,0]},
  staff:   {num:'08',ey:'Staff Portal',cta:'Open Staff Portal',  title:'Employee\nPortal.',           sub:'Schedule · Shifts · Notices',                chips:['View Schedule','My Shifts','Notice Board','Manager'],     rule:'Made from scratch. Like the food.',dest:'staff-portal.html',mood:[42,14,0]},
};
const KEYS=Object.keys(PAGES);

/* ── CANVAS ── */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,CX,CY,NAV_R,INN_R;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  CX=W/2; CY=H/2;
  NAV_R=W<500?Math.min(W,H)*0.30:W<768?Math.min(W,H)*0.32:Math.min(W,H)*0.36;
  INN_R=Math.min(W,H)*0.065;
}

/* ── CURSOR ── */
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=300,my=300,lx=300,ly=300;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function cl(){cur.style.left=mx+'px';cur.style.top=my+'px';lx+=(mx-lx)*.11;ly+=(my-ly)*.11;cur2.style.left=lx+'px';cur2.style.top=ly+'px';requestAnimationFrame(cl);})();

/* ── STATUS ── */
(function(){
  const n=new Date(),mins=n.getHours()*60+n.getMinutes();
  const d=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n.getDay()];
  document.getElementById('tb-hr').textContent=d==='Sunday'?'7am–3pm':d==='Saturday'?'6am–2pm':'5:30am–2pm';
  const o=d==='Sunday'?420:d==='Saturday'?360:330,cl=d==='Sunday'?900:840,open=mins>=o&&mins<cl;
  document.getElementById('tb-stxt').textContent=open?'Open Now':'Closed';
  document.getElementById('tb-stxt').style.color=open?'#f05020':'rgba(232,180,160,.35)';
  const dot=document.getElementById('tb-dot');
  dot.className='dot '+(open?'dot-o':'dot-c');
})();


/* ── CENTER CLOCK & STATUS ── */
// Mirrors the logic from menu.html — live countdown to close/open/crawfish
const HOURS={
  Sunday:   {open:7*60,    close:15*60},
  Saturday: {open:6*60,    close:14*60},
  Monday:   {open:5*60+30, close:14*60},
  Tuesday:  {open:5*60+30, close:14*60},
  Wednesday:{open:5*60+30, close:14*60},
  Thursday: {open:5*60+30, close:14*60},
  Friday:   {open:5*60+30, close:14*60},
};
const CF_DAYS=['Thursday','Friday','Saturday']; // crawfish nights
const CF_START=16*60, CF_END=20*60;
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getTodayName(){ return DAYS[new Date().getDay()]; }
function fmtTime(h){
  const hh=Math.floor(h/60),mm=h%60,ampm=hh>=12?'pm':'am';
  return (hh>12?hh-12:hh||12)+':'+(mm<10?'0'+mm:mm)+ampm;
}
function fmtCountdown(totalSecs){
  const h=Math.floor(totalSecs/3600);
  const m=Math.floor((totalSecs%3600)/60);
  const s=totalSecs%60;
  return {h:String(h).padStart(2,'0'), m:String(m).padStart(2,'0'), s:String(s).padStart(2,'0')};
}

// Holds current clock state — updated every second
let clockState={
  label:'',       // e.g. "OPEN NOW" / "CLOSED" / "CRAWFISH TONIGHT"
  sublabel:'',    // e.g. "Closes in" / "Opens in"
  h:'00',m:'00',s:'00',
  isOpen:false,
  isCrawfish:false,
};

function updateClockState(){
  const now=new Date();
  const dayName=getTodayName();
  const hr=HOURS[dayName];
  const nowMins=now.getHours()*60+now.getMinutes();
  const nowSecs=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const isCfDay=CF_DAYS.includes(dayName);

  const isMainOpen=nowMins>=hr.open&&nowMins<hr.close;
  const isCfOpen=isCfDay&&nowMins>=CF_START&&nowMins<CF_END;
  clockState.isOpen=isMainOpen||isCfOpen;
  clockState.isCrawfish=isCfOpen;

  let targetSecs=0,label='',sublabel='';

  if(nowSecs<hr.open*60){
    // Before open
    label='CLOSED';sublabel='Opens '+fmtTime(hr.open);
    targetSecs=hr.open*60-nowSecs;
  } else if(nowSecs<hr.close*60){
    // During main hours
    if(nowSecs<10*60+30*60){ label='BREAKFAST';sublabel='Breakfast ends in'; targetSecs=10*60*60+30*60-nowSecs; }
    else if(nowSecs<11*60*60){ label='TRANSITIONING';sublabel='Lunch starts in'; targetSecs=11*60*60-nowSecs; }
    else { label='OPEN';sublabel='Closes in'; targetSecs=hr.close*60-nowSecs; }
  } else if(isCfDay&&nowSecs<CF_START*60){
    // Between close and crawfish
    label='CRAWFISH AT 4PM';sublabel='Crawfish starts in';
    targetSecs=CF_START*60-nowSecs;
  } else if(isCfDay&&nowSecs<CF_END*60){
    // Crawfish hours
    label='CRAWFISH NIGHT';sublabel='Crawfish ends in';
    targetSecs=CF_END*60-nowSecs;
  } else {
    // Closed for the day
    const tom=new Date(now); tom.setDate(tom.getDate()+1);
    const tomName=DAYS[tom.getDay()];
    const tomHr=HOURS[tomName];
    label='CLOSED';sublabel='Opens '+fmtTime(tomHr.open)+' '+tomName;
    const secsTilMidnight=86400-nowSecs;
    targetSecs=secsTilMidnight+tomHr.open*60;
  }

  const cd=fmtCountdown(Math.max(0,Math.floor(targetSecs)));
  clockState.label=label;
  clockState.sublabel=sublabel;
  clockState.h=cd.h; clockState.m=cd.m; clockState.s=cd.s;
}

updateClockState();
setInterval(updateClockState,1000);

/* drawCenterClock is now particle-based — no canvas text */
function drawCenterClock(){ /* particles handle this */ }

/* ── DOT-MATRIX TEXT SAMPLER ──
   Samples text as a grid of evenly-spaced dots.
   DOT_STEP controls spacing — larger = fewer, bigger dots = more readable.
   Returns array of {x,y} screen coordinates. */
function sampleDotMatrix(text, cx, cy, targetW, targetH, dotStep){
  // Render at 4x scale for good antialiasing, then downsample to dot grid
  const SCALE=4;
  const OW=Math.round(targetW*SCALE);
  const OH=Math.round(targetH*SCALE);
  const oc=document.createElement('canvas');
  oc.width=OW; oc.height=OH;
  const ox=oc.getContext('2d');
  ox.clearRect(0,0,OW,OH);
  // Fit font to canvas
  let fs=Math.round(OH*0.72);
  ox.font=`700 ${fs}px DM Sans,Arial Black,Arial,sans-serif`;
  const mw=ox.measureText(text).width;
  if(mw>OW*0.9) fs=Math.round(fs*(OW*0.9/mw));
  ox.font=`700 ${fs}px DM Sans,Arial Black,Arial,sans-serif`;
  ox.fillStyle='#fff';
  ox.textAlign='center';
  ox.textBaseline='middle';
  ox.fillText(text,OW/2,OH/2);
  const d=ox.getImageData(0,0,OW,OH).data;
  const pts=[];
  // Sample on a dot grid — dotStep is in screen pixels
  const gridStep=Math.round(dotStep*SCALE);
  const offX=cx-targetW/2;
  const offY=cy-targetH/2;
  for(let gy=Math.round(gridStep/2);gy<OH;gy+=gridStep){
    for(let gx=Math.round(gridStep/2);gx<OW;gx+=gridStep){
      // Average alpha in a small region around this grid point
      let sum=0,count=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        const ix=gx+dx,iy=gy+dy;
        if(ix>=0&&ix<OW&&iy>=0&&iy<OH){sum+=d[(iy*OW+ix)*4+3];count++;}
      }
      const avg=sum/count;
      if(avg>80){
        // Map back to screen coordinates
        pts.push({
          x: offX+(gx/OW)*targetW,
          y: offY+(gy/OH)*targetH,
          bright: avg/255
        });
      }
    }
  }
  return pts;
}

/* ── PARTICLE SYSTEM ── */
// Each nav word: pre-sampled dot positions
// Particles travel FROM random positions TO their dot positions
let selKey=null;
let cancelHover=false;
let cancelY=0,cancelBw=0,cancelBh=0;
let wordDots={}; // key -> [{x,y,bright}]
let selDots=[];  // selected center title dots
let cancelDots=[];  // cancel button as particles
let clockDots=[];   // clock timer as particles — type 6=label, 7=digits, 8=sublabel
let lastClockSec=-1; // track when time changes to rebuild clock particles
let particles=[];// [{x,y,tx,ty,spd,r,a,bright,wb,ws,wm,type}]
// type: 0=ambient 1=nav-active 2=nav-dimmed 3=selected 4=inner 5=cancel 6=clock-label 7=clock-digits 8=clock-sub

function navAngle(i){ return (i/KEYS.length)*Math.PI*2-Math.PI/2+Math.PI*0.1; }
function navPos(i){ const a=navAngle(i); return{x:CX+Math.cos(a)*NAV_R,y:CY+Math.sin(a)*NAV_R}; }

function buildWordDots(){
  wordDots={};
  KEYS.forEach((key,i)=>{
    const pos=navPos(i);
    // Word bounding box — width based on arc spacing, height tall enough to read
    const arcSpacing=2*Math.PI*NAV_R/KEYS.length;
    const bw=arcSpacing*0.80;
    const bh=bw*(W<600?0.72:0.60);
    // DOT_STEP = spacing between dots in screen pixels
    // Larger = fewer bigger dots, more readable
    const dotStep=Math.max(0.4, bh/62);
    wordDots[key]=sampleDotMatrix(PAGES[key].ey, pos.x, pos.y, bw, bh, dotStep);
  });
}

function buildSelDots(){
  selDots=[];
  cancelDots=[];
  if(!selKey) return;
  const lines=PAGES[selKey].title.split('\n');
  const bw=Math.min(W*0.72,360);
  const bh=bw*(W<500?0.32:0.28);
  const lh=bh/lines.length;
  const dotStep=Math.max(0.5, lh/62);
  // Title lines — centered vertically in upper half of center
  const titleTotalH=lh*lines.length;
  lines.forEach((ln,li)=>{
    const ly=CY-titleTotalH*0.6+li*lh;
    selDots=selDots.concat(sampleDotMatrix(ln,CX,ly,bw,lh,dotStep));
  });
  // Cancel button text — below title, smaller
  const cancelBw=Math.min(W*0.18,140);
  const cancelBh=cancelBw*0.28;
  const cancelStep=Math.max(0.5, cancelBh/40);
  cancelY=CY+titleTotalH*0.55+cancelBh;
  window._cY=cancelY; window._cBw=cancelBw; window._cBh=cancelBh;
  cancelDots=sampleDotMatrix('✕  Cancel',CX,cancelY,cancelBw,cancelBh,cancelStep);
}

function buildClockDots(){
  clockDots=[];
  if(selKey) return; // clock hidden when nav selected

  const sc=Math.min(W,H);
  // Layout: status label above, HH:MM:SS big in center, sublabel below
  const labelY   = CY - sc*0.10;
  const digitsY  = CY + sc*0.01;
  const subY     = CY + sc*0.09;

  // Status label — small
  const lbw=Math.min(W*0.35,260), lbh=sc*0.04;
  const ldotStep=Math.max(0.4, lbh/28);
  sampleDotMatrix(clockState.label||'--', CX, labelY, lbw, lbh, ldotStep)
    .forEach(d=>clockDots.push({...d,ctype:6}));

  // Time digits HH:MM:SS — big
  const timeStr=clockState.h+':'+clockState.m+':'+clockState.s;
  const dbw=Math.min(W*0.82,420), dbh=sc*(W<500?0.08:0.10);
  const ddotStep=Math.max(0.4, dbh/55);
  sampleDotMatrix(timeStr, CX, digitsY, dbw, dbh, ddotStep)
    .forEach(d=>clockDots.push({...d,ctype:7}));

  // Sublabel — small italic below
  const sbw=Math.min(W*0.42,300), sbh=sc*0.032;
  const sdotStep=Math.max(0.4, sbh/22);
  sampleDotMatrix(clockState.sublabel||'', CX, subY, sbw, sbh, sdotStep)
    .forEach(d=>clockDots.push({...d,ctype:8}));
}

function buildParticles(){
  particles=[];
  const rand=()=>({
    x:CX+(Math.random()-.5)*W*0.9,
    y:CY+(Math.random()-.5)*H*0.9
  });

  // Selected center dots — most prominent
  selDots.forEach(d=>{
    const s=rand();
    particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,
      spd:0.022+Math.random()*0.016,
      r:0.9+Math.random()*0.4,
      a:0.85+d.bright*0.15,
      wb:Math.random()*Math.PI*2,ws:0.003+Math.random()*0.006,wm:0.3,
      type:3});
  });

  // Cancel button as particles — dimmer, clickable
  cancelDots.forEach(d=>{
    const s=rand();
    particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,
      spd:0.06+Math.random()*0.04,
      r:0.5+Math.random()*0.25,
      a:0.32+d.bright*0.12,
      wb:Math.random()*Math.PI*2,ws:0.003+Math.random()*0.006,wm:0.1,
      type:5});
  });

  // Nav word dots
  KEYS.forEach(key=>{
    const isDimmed=selKey&&key!==selKey;
    const type=isDimmed?2:1;
    const dotR=isDimmed?1.5:2.2+Math.random()*0.8;
    (wordDots[key]||[]).forEach(d=>{
      const s=rand();
      particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,
        spd:0.018+Math.random()*0.014,
        r:isDimmed?0.35:0.55+Math.random()*0.25, // 0.55–0.80px nav
        a:isDimmed?0.18:(0.7+d.bright*0.3),
        wb:Math.random()*Math.PI*2,ws:0.003+Math.random()*0.007,wm:0.2,
        type});
    });
  });

  // Clock timer particles (only when no selection)
  clockDots.forEach(d=>{
    const s=rand();
    const isDigits=d.ctype===7;
    const isLabel=d.ctype===6;
    // digits: amber/fire when open, dim cream when closed
    let rc=245,gc=237,bc=232,aa=0.6;
    if(isDigits){
      if(clockState.isOpen){rc=255;gc=200;bc=80;aa=0.75+d.bright*0.25;}
      else{rc=232;gc=180;bc=160;aa=0.25+d.bright*0.15;}
    } else if(isLabel){
      if(clockState.isOpen){rc=255;gc=148;bc=60;aa=0.55;}
      else{rc=232;gc=180;bc=160;aa=0.18;}
    } else { // sublabel
      rc=232;gc=180;bc=160;aa=0.2;
    }
    particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,
      spd:0.055+Math.random()*0.035,  // fast — reforms every second
      r:isDigits?0.7+Math.random()*0.3:0.45+Math.random()*0.2,
      a:aa,
      wb:Math.random()*Math.PI*2,ws:0.003+Math.random()*0.005,wm:0.15,
      rc,gc,bc,  // store color on particle
      type:d.ctype});
  });

  // Inner ring
  for(let i=0;i<80;i++){
    const a=(i/80)*Math.PI*2;
    const r=INN_R*(0.5+Math.random()*0.9);
    const s=rand();
    particles.push({x:s.x,y:s.y,tx:CX+Math.cos(a)*r,ty:CY+Math.sin(a)*r,
      spd:0.025+Math.random()*0.02,r:1.2+Math.random()*0.8,a:0.5+Math.random()*0.4,
      wb:Math.random()*Math.PI*2,ws:0.006+Math.random()*0.01,wm:0.4,type:4});
  }

  // Ambient
  for(let i=0;i<180;i++){
    const a=Math.random()*Math.PI*2,r=INN_R*1.5+Math.random()*NAV_R*1.4;
    particles.push({x:Math.random()*W,y:Math.random()*H,
      tx:CX+Math.cos(a)*r,ty:CY+Math.sin(a)*r,
      spd:0.004+Math.random()*0.005,r:0.8+Math.random()*1.2,a:0.06+Math.random()*0.1,
      wb:Math.random()*Math.PI*2,ws:0.002+Math.random()*0.006,wm:1.5+Math.random()*2,type:0});
  }
}

function rebuild(){
  buildWordDots();
  buildSelDots();
  buildClockDots();
  buildParticles();
}

// Rebuild clock particles every second when no selection
setInterval(()=>{
  if(!selKey){
    buildClockDots();
    // Only replace clock particles in the array — faster than full rebuild
    particles=particles.filter(p=>p.type<6||p.type>8);
    const rand=()=>({x:CX+(Math.random()-.5)*W*0.9,y:CY+(Math.random()-.5)*H*0.9});
    clockDots.forEach(d=>{
      const s=rand();
      const isDigits=d.ctype===7,isLabel=d.ctype===6;
      let rc=245,gc=237,bc=232,aa=0.6;
      if(isDigits){if(clockState.isOpen){rc=255;gc=200;bc=80;aa=0.75+d.bright*0.25;}else{rc=232;gc=180;bc=160;aa=0.25+d.bright*0.15;}}
      else if(isLabel){if(clockState.isOpen){rc=255;gc=148;bc=60;aa=0.55;}else{rc=232;gc=180;bc=160;aa=0.18;}}
      else{rc=232;gc=180;bc=160;aa=0.2;}
      particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,
        spd:0.055+Math.random()*0.035,
        r:isDigits?0.7+Math.random()*0.3:0.45+Math.random()*0.2,
        a:aa,wb:Math.random()*Math.PI*2,ws:0.003+Math.random()*0.005,wm:0.15,
        rc,gc,bc,type:d.ctype});
    });
  }
},1000);

/* ── HIT TEST ── */
canvas.addEventListener('mousemove',e=>{
  let hit=false;
  for(let i=0;i<KEYS.length;i++){const p=navPos(i);const dx=e.clientX-p.x,dy=e.clientY-p.y;const hitR=W<600?80:65;if(dx*dx+dy*dy<hitR*hitR){hit=true;break;}}
  // cancel region hit
  if(selKey&&window._cY){
    const cx2=CX,cy2=window._cY,bw2=window._cBw||140,bh2=window._cBh||40;
    if(Math.abs(e.clientX-cx2)<bw2/2&&Math.abs(e.clientY-cy2)<bh2/2){hit=true;cancelHover=true;}
    else cancelHover=false;
  } else cancelHover=false;
  document.body.classList.toggle('hov',hit);
});
canvas.addEventListener('click',e=>{
  // cancel region
  if(selKey&&window._cY){
    const cx2=CX,cy2=window._cY,bw2=window._cBw||140,bh2=window._cBh||40;
    if(Math.abs(e.clientX-cx2)<bw2/2&&Math.abs(e.clientY-cy2)<bh2/2){cancelNav();return;}
  }
  for(let i=0;i<KEYS.length;i++){
    const p=navPos(i);const dx=e.clientX-p.x,dy=e.clientY-p.y;
    const hitR2=W<600?80:65;if(dx*dx+dy*dy<hitR2*hitR2){selectNav(KEYS[i]);return;}
  }
});

/* ── COUNTDOWN ── */
let cdInt=null,cdSec=5;
const cdArc=document.getElementById('cd-arc'),cdNEl=document.getElementById('cd-n');
const CIRC=2*Math.PI*46;
function setArc(s){cdArc.style.strokeDashoffset=CIRC*(1-s/15);cdNEl.textContent=s;}
function startCD(){stopCD();cdSec=15;setArc(15);cdInt=setInterval(()=>{cdSec--;setArc(cdSec);if(cdSec<=0){stopCD();doNav();}},1000);}
function stopCD(){if(cdInt){clearInterval(cdInt);cdInt=null;}}
function doNav(){if(!selKey)return;const d=PAGES[selKey].dest;if(d.startsWith('http')||d.startsWith('tel'))window.open(d,'_blank');else window.location.href=d;}

/* ── SELECT ── */
function selectNav(key){
  selKey=key;
  const pg=PAGES[key];
  document.getElementById('i-n').textContent=pg.num;
  document.getElementById('i-ey').textContent=pg.ey;
  document.getElementById('i-title').innerHTML=pg.title.replace('\n','<br>');
  document.getElementById('i-sub').textContent=pg.sub;
  document.getElementById('i-chips').innerHTML=pg.chips.map((c,j)=>`<span class="i-chip${j<2?' h':''}">${c}</span>`).join('');
  document.getElementById('i-rule').textContent=pg.rule;
  document.getElementById('info').classList.add('show');
  document.getElementById('cd-dest').textContent=pg.cta;
  document.getElementById('cdw').classList.add('show');
  const m=pg.mood;tr=m[0];tg=m[1];tb=m[2];
  rebuild();startCD();
}
function cancelNav(){
  stopCD();selKey=null;
  document.getElementById('info').classList.remove('show');
  document.getElementById('cdw').classList.remove('show');
  tr=8;tg=4;tb=7;
  rebuild();
}
document.getElementById('cd-cancel').addEventListener('click',cancelNav);
document.getElementById('cd-go').addEventListener('click',()=>{stopCD();doNav();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')cancelNav();});

/* ── MOOD ── */
let mr=8,mg=4,mb=7,tr=8,tg=4,tb=7;

/* ── DRAW ── */
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)||16,32);lastT=ts;
  mr+=(tr-mr)*.014;mg+=(tg-mg)*.014;mb+=(tb-mb)*.014;

  ctx.fillStyle=`rgb(${Math.round(mr)},${Math.round(mg)},${Math.round(mb)})`;
  ctx.fillRect(0,0,W,H);

  // bottom glow
  const bg=ctx.createRadialGradient(CX,H,0,CX,H,H*.85);
  bg.addColorStop(0,`rgba(196,24,0,${.05+mr/900})`);
  bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // selected word spotlight on ring
  if(selKey){
    const si=KEYS.indexOf(selKey);
    const sp=navPos(si);
    const sg=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,80);
    sg.addColorStop(0,'rgba(240,80,32,.12)');sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sp.x,sp.y,80,0,Math.PI*2);ctx.fill();
  }

  // guide circles
  ctx.beginPath();ctx.arc(CX,CY,NAV_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,180,160,.05)';ctx.lineWidth=.5;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,INN_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(240,80,32,.1)';ctx.lineWidth=.5;ctx.stroke();

  // center clock
  drawCenterClock();

  // spokes
  KEYS.forEach((key,i)=>{
    const angle=navAngle(i);
    const isSel=selKey===key;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(angle)*(INN_R+2),CY+Math.sin(angle)*(INN_R+2));
    ctx.lineTo(CX+Math.cos(angle)*(NAV_R-52),CY+Math.sin(angle)*(NAV_R-52));
    ctx.strokeStyle=isSel?'rgba(240,80,32,.2)':'rgba(232,180,160,.04)';
    ctx.lineWidth=.5;ctx.stroke();
    // number label
    const nr=NAV_R+20;
    ctx.font=`600 8px DM Sans,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isSel?'rgba(240,80,32,.7)':selKey?'rgba(232,180,160,.06)':'rgba(232,180,160,.18)';
    ctx.fillText(PAGES[key].num,CX+Math.cos(angle)*nr,CY+Math.sin(angle)*nr);
  });

  // update + draw particles
  const P=particles;
  for(let i=0;i<P.length;i++){
    const p=P[i];
    p.wb+=p.ws;
    // wobble decays as particle approaches target
    const dist=Math.hypot(p.tx-p.x,p.ty-p.y);
    const wScale=Math.min(dist/60,1);
    const ox=Math.sin(p.wb)*p.wm*wScale;
    const oy=Math.cos(p.wb*.73)*p.wm*wScale;
    p.x+=(p.tx+ox-p.x)*p.spd*(dt/16);
    p.y+=(p.ty+oy-p.y)*p.spd*(dt/16);

    // color by type
    let rc=p.rc||245,gc=p.gc||237,bc=p.bc||232,a=p.a;
    if(p.type===3){rc=255;gc=255;bc=255;}              // selected: white
    else if(p.type===4){rc=255;gc=148;bc=60;}           // inner: amber
    else if(p.type===2){rc=p.rc||245;gc=p.gc||237;bc=p.bc||232;a*=0.22;}  // dimmed nav
    else if(p.type===5){                                // cancel button
      rc=240;gc=80;bc=32;
      if(cancelHover){a=Math.min(1,p.a*2.8);}
    }
    // types 6,7,8 use per-particle rc/gc/bc already set above

    if(a<0.03) continue;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rc},${gc},${bc},${a.toFixed(2)})`;
    ctx.fill();
  }

  // inner pulse
  const pR=INN_R*(.76+Math.sin(ts*.0017)*.14);
  ctx.beginPath();ctx.arc(CX,CY,pR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,148,60,${.16+Math.sin(ts*.002)*.06})`;
  ctx.lineWidth=1;ctx.stroke();
}

/* ── BOOT ── */
resize();
document.fonts.ready.then(()=>{
  rebuild();
  requestAnimationFrame(loop);
});
window.addEventListener('resize',()=>{resize();rebuild();});
</script>
</body>
