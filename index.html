<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Headz — Navigate</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#080407;--deep:#130509;--coal:#1e0a0c;
  --pepper:#c41800;--fire:#e83010;--chili:#f05020;--heat:#f87038;--burn:#ffa048;
  --cream:#f5ede8;--parch:#ead4c8;--sand:#c49888;
  --serif:'DM Serif Display',Georgia,serif;
  --display:'Abril Fatface',Georgia,serif;
  --body:'DM Sans',sans-serif;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--void);color:var(--cream);
  font-family:var(--body);cursor:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── CURSOR ── */
#cursor{position:fixed;width:8px;height:8px;border-radius:50%;
  background:var(--chili);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--chili),0 0 20px rgba(240,80,32,.3);
  transition:width .2s,height .2s,background .2s;}
#cursor.big{width:18px;height:18px;background:var(--fire);}
#cursor-ring{position:fixed;width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(240,80,32,.35);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);transition:width .35s,height .35s,border-color .35s;}
#cursor.big ~ #cursor-ring,body.hov #cursor-ring{width:54px;height:54px;border-color:rgba(240,80,32,.6);}

/* ── CANVAS ── */
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(12px,2vh,22px) clamp(16px,3vw,40px);
  border-bottom:1px solid rgba(232,180,160,.06);
}
#tb-left{display:flex;flex-direction:column;gap:3px;}
.tb-ey{font-family:var(--body);font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:rgba(232,180,160,.35);}
#tb-status{display:flex;align-items:center;gap:6px;font-family:var(--body);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--chili);}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--burn);box-shadow:0 0 6px var(--burn);animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
#brand{text-align:center;}
#brand-name{font-family:var(--display);font-size:clamp(16px,2.2vw,26px);color:var(--cream);letter-spacing:.01em;line-height:1;}
#brand-tag{font-family:var(--body);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(232,180,160,.3);margin-top:3px;}
#tb-right{text-align:right;display:flex;flex-direction:column;gap:3px;}
.tb-meta{font-family:var(--body);font-size:clamp(9px,1vw,11px);letter-spacing:.06em;color:rgba(232,180,160,.35);}

/* ── INFO PANEL — left side, shows selected page info ── */
#info-panel{
  position:fixed;left:clamp(16px,3vw,48px);top:50%;transform:translateY(-50%);
  z-index:50;width:clamp(180px,20vw,260px);
  opacity:0;transition:opacity .5s ease;pointer-events:none;
}
#info-panel.show{opacity:1;}
.ip-num{font-family:var(--display);font-size:clamp(60px,8vw,100px);line-height:1;color:rgba(232,180,160,.05);margin-bottom:-10px;}
.ip-ey{font-family:var(--body);font-weight:600;font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--chili);opacity:.8;display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ip-ey::before{content:'';width:18px;height:1px;background:currentColor;}
.ip-title{font-family:var(--display);font-size:clamp(22px,3vw,36px);line-height:.95;color:var(--cream);margin-bottom:8px;}
.ip-italic{font-family:var(--serif);font-style:italic;font-size:clamp(10px,1.1vw,13px);color:rgba(232,180,160,.4);margin-bottom:14px;line-height:1.6;}
.ip-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.ip-chip{font-family:var(--body);font-size:7px;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px;border:1px solid rgba(232,180,160,.1);color:rgba(232,180,160,.4);}
.ip-chip.hot{border-color:rgba(240,80,32,.3);color:var(--chili);background:rgba(240,80,32,.06);}
.ip-rule{font-family:var(--serif);font-style:italic;font-size:11px;color:rgba(232,180,160,.2);padding-top:12px;border-top:1px solid rgba(232,180,160,.06);}

/* ── COUNTDOWN UI ── */
#cd-wrap{
  position:fixed;right:clamp(16px,3vw,48px);top:50%;transform:translateY(-50%);
  z-index:50;display:flex;flex-direction:column;align-items:center;gap:12px;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
#cd-wrap.show{opacity:1;pointer-events:all;}
#cd-svg{overflow:visible;}
#cd-bg{fill:none;stroke:rgba(232,180,160,.06);stroke-width:2;}
#cd-arc{fill:none;stroke:var(--chili);stroke-width:2;stroke-linecap:round;
  transition:stroke-dashoffset .9s linear;transform:rotate(-90deg);transform-origin:50% 50%;
  filter:drop-shadow(0 0 6px rgba(240,80,32,.5));}
#cd-num-text{font-family:var(--display);font-size:36px;fill:var(--cream);text-anchor:middle;dominant-baseline:central;}
#cd-label{font-family:var(--body);font-size:9px;letter-spacing:.2em;text-transform:uppercase;fill:rgba(232,180,160,.3);text-anchor:middle;}
#cd-dest{font-family:var(--serif);font-style:italic;font-size:clamp(10px,1vw,12px);color:rgba(232,180,160,.5);text-align:center;max-width:120px;}
#cd-cta{
  font-family:var(--body);font-weight:700;font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  padding:10px 22px;background:var(--chili);color:var(--void);border:none;cursor:none;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  transition:background .2s;
}
#cd-cta:hover{background:var(--fire);}
#cd-cancel{
  font-family:var(--body);font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(232,180,160,.3);background:none;border:1px solid rgba(232,180,160,.1);
  padding:8px 18px;cursor:none;transition:all .2s;
}
#cd-cancel:hover{color:rgba(232,180,160,.7);border-color:rgba(232,180,160,.25);}

/* ── HINT ── */
#hint{
  position:fixed;bottom:clamp(14px,3vh,28px);left:50%;transform:translateX(-50%);
  font-family:var(--body);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(232,180,160,.18);z-index:50;pointer-events:none;
  animation:hintFade 3s ease-in-out 2s both;
}
@keyframes hintFade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* ── MOBILE ── */
@media(max-width:700px){
  #info-panel{display:none}
  #cd-wrap{right:50%;transform:translate(50%,-50%);}
  #topbar{padding:10px 14px;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="c"></canvas>

<div id="topbar">
  <div id="tb-left">
    <div class="tb-ey">DeRidder · Louisiana</div>
    <div id="tb-status"><span class="tb-dot"></span><span id="tb-status-text">Open Now</span></div>
  </div>
  <div id="brand">
    <div id="brand-name">Hot Headz</div>
    <div id="brand-tag">Southern Foods · Est. 2020</div>
  </div>
  <div id="tb-right">
    <div class="tb-meta">(337) 221-1035</div>
    <div class="tb-meta" id="tb-hours">5:30am – 2:00pm</div>
  </div>
</div>

<div id="info-panel">
  <div class="ip-num" id="ip-num">01</div>
  <div class="ip-ey" id="ip-ey">Section</div>
  <div class="ip-title" id="ip-title"></div>
  <div class="ip-italic" id="ip-italic"></div>
  <div class="ip-chips" id="ip-chips"></div>
  <div class="ip-rule" id="ip-rule"></div>
</div>

<div id="cd-wrap">
  <svg id="cd-svg" width="110" height="110" viewBox="0 0 110 110">
    <circle id="cd-bg" cx="55" cy="55" r="46"/>
    <circle id="cd-arc" cx="55" cy="55" r="46" stroke-dasharray="289" stroke-dashoffset="0"/>
    <text id="cd-num-text" x="55" y="50">5</text>
    <text id="cd-label" x="55" y="72">navigating</text>
  </svg>
  <div id="cd-dest"></div>
  <button id="cd-cta">Go Now →</button>
  <button id="cd-cancel">Cancel</button>
</div>

<div id="hint">Click any nav word to select</div>

<script>
const PAGES = {
  home:     {num:'01',eyebrow:'Home',       cta:'Go to Home Page',    title:'Hot Headz\nSouthern Foods.',      italic:'Fresh · From Scratch · Est. 2020',            meta:'2741 US-190 · DeRidder, LA · (337) 221-1035', chips:['Est. 2020','DeRidder, LA','Made From Scratch','(337) 221-1035','Mon–Fri 5:30am','Sun 7am–3pm'],rule:'Home is where the food is.',        dest:'index.html',         mood:[0x3a,0x08,0x00]},
  menu:     {num:'02',eyebrow:'The Menu',   cta:'See Full Menu',      title:'Fresh.\nFrom Scratch.',           italic:'Breakfast · Lunch · Daily specials · Desserts', meta:'Made fresh every morning — no shortcuts',     chips:['Breakfast Plates','Red Beans & Rice','Fried Chicken','Catfish','Crawfish Étouffée','Daily Specials'],rule:'From scratch, every time.',        dest:'menu.html',          mood:[0x3a,0x08,0x00]},
  lunch:    {num:'✦', eyebrow:'Lunch',      cta:'See Lunch Menu',     title:'Lunch.\nDone Right.',             italic:'Daily Southern plates · Changes every day',    meta:'Served Mon–Fri until 2pm · Sun until 3pm',    chips:['Changes Daily','Southern Plates','Includes Sides','Check Facebook','Mon–Fri to 2pm','Sun to 3pm'],rule:'Check Facebook for today\'s plate.',dest:'menu.html#lunch',    mood:[0x3a,0x08,0x00]},
  beer:     {num:'✦', eyebrow:'Beer',       cta:'See Beer Menu',      title:'Cold.\nCold Beer.',               italic:'Ice cold · Natural Light · Modelo · Budweiser', meta:'Ask staff for what\'s available today',       chips:['Natural Light','Miller Lite','Coors Light','Bud Light','Budweiser','Modelo'],rule:'Best with a plate of fried chicken.',dest:'menu.html#beer',     mood:[0x1a,0x04,0x00]},
  delivery: {num:'03',eyebrow:'Delivery',   cta:'See Delivery Info',  title:'We Bring\nThe Food.',             italic:'10+ plate orders · within 10 miles',           meta:'Call (337) 221-1035 to arrange',              chips:['10+ Plates','Within 10 Miles','Call Ahead','(337) 221-1035','Group Orders','Office Lunch'],rule:'Delivered hot and fresh.',         dest:'delivery.html',      mood:[0x2a,0x04,0x00]},
  order:    {num:'04',eyebrow:'Order Now',  cta:'Call (337) 221-1035',title:'Call\nAhead.',                    italic:'Skip the line · Ready when you arrive',        meta:'(337) 221-1035 · Mon–Fri 5:30am',             chips:['(337) 221-1035','Mon–Fri from 5:30am','Sat from 6am','Sun from 7am','Skip the Line','Carry-Out Ready'],rule:'We\'ll have it ready.',            dest:'tel:3372211035',     mood:[0x32,0x08,0x00]},
  about:    {num:'05',eyebrow:'About Us',   cta:'Read Our Story',     title:'Comfort\nFood Done Right.',       italic:'Family-owned · DeRidder proud · Since 2020',   meta:'2741 US-190, DeRidder, LA 70634',             chips:['Est. 2020','Family Owned','Made From Scratch','DeRidder Proud','Dine-In','Carry-Out'],rule:'Real Southern cooking.',            dest:'about.html',         mood:[0x28,0x10,0x00]},
  facebook: {num:'06',eyebrow:'Facebook',   cta:'Visit Our Facebook', title:'Follow\nThe Feed.',               italic:'Daily specials posted every morning',           meta:'Check Facebook before you drive out',         chips:['Daily Specials','Morning Posts','Photos','Announcements','Community','Follow Us'],rule:'Posted fresh every morning.',      dest:'https://www.facebook.com/people/Hot-Headz-Southern-Foods/100064025473003/',mood:[0x1e,0x08,0x00]},
  find:     {num:'07',eyebrow:'Find Us',    cta:'Get Directions',     title:'We\'re on\nUS-190.',               italic:'2741 US-190 · DeRidder, LA 70634',             meta:'Mon–Fri 5:30am–2pm · Sat 6am–2pm · Sun 7am–3pm',chips:['2741 US-190','(337) 221-1035','Mon–Fri 5:30–2','Sat 6–2','Sun 7–3','Crawfish Thu–Sat PM'],rule:'Follow the smell of Southern cooking.',dest:'https://maps.google.com/?q=2741+US-190+DeRidder+LA+70634',mood:[0x18,0x06,0x00]},
  staff:    {num:'08',eyebrow:'Staff Portal',cta:'Open Staff Portal', title:'Employee\nPortal.',                italic:'Schedule · Shifts · Notices',                  meta:'For Hot Headz staff only — sign in required', chips:['View Schedule','My Shifts','Notice Board','Manager Access','Live Updates','All Devices'],rule:'Made from scratch. Just like the food.',dest:'staff-portal.html',  mood:[0x2a,0x0e,0x00]},
};

const NAV_KEYS = ['home','menu','lunch','beer','delivery','order','about','facebook','find','staff'];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H,cx,cy;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  buildTargets();
}
window.addEventListener('resize', resize);

// ── CURSOR ──
const curEl = document.getElementById('cursor');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function curLoop(){
  curEl.style.left=mx+'px';curEl.style.top=my+'px';
  rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;
  document.getElementById('cursor-ring').style.left=rx+'px';
  document.getElementById('cursor-ring').style.top=ry+'px';
  requestAnimationFrame(curLoop);
})();

// ── STATUS BAR ──
(function(){
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),mins=h*60+m;
  const day=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  const open=day==='Sunday'?420:day==='Saturday'?360:330;
  const close=day==='Sunday'?900:840;
  const hrs={Sunday:'7:00am – 3:00pm',Saturday:'6:00am – 2:00pm'};
  document.getElementById('tb-hours').textContent=hrs[day]||'5:30am – 2:00pm';
  const isOpen=mins>=open&&mins<close;
  document.getElementById('tb-status-text').textContent=isOpen?'Open Now':'Closed';
  document.querySelector('.tb-dot').style.background=isOpen?'#ffa048':'rgba(232,180,160,.3)';
})();

// ── PARTICLES ──
const TOTAL = 600;
const particles = [];

class P{
  constructor(){
    this.x = Math.random()*800-400;
    this.y = Math.random()*600-300;
    this.tx = 0; this.ty = 0;
    this.r = Math.random()*1.8+0.3;
    this.a = Math.random()*0.6+0.15;
    this.spd = 0.035+Math.random()*0.045;
    this.wb = Math.random()*Math.PI*2;
    this.ws = 0.008+Math.random()*0.018;
    this.wm = Math.random()*1.4+0.2;
    this.group = 'float';
  }
}
for(let i=0;i<TOTAL;i++) particles.push(new P());

// ── TEXT → PARTICLE POSITIONS ──
function textPts(txt, bx, by, bw, bh, step){
  const off=document.createElement('canvas');
  off.width=bw; off.height=bh;
  const ox=off.getContext('2d');
  const fs=Math.min(bh*0.72,bw/(txt.length*0.52+0.5));
  ox.fillStyle='#fff';
  ox.font=`700 ${fs}px 'DM Sans',sans-serif`;
  ox.textAlign='center';ox.textBaseline='middle';
  ox.fillText(txt,bw/2,bh/2);
  const d=ox.getImageData(0,0,bw,bh).data;
  const pts=[];
  for(let y=0;y<bh;y+=step) for(let x=0;x<bw;x+=step)
    if(d[(y*bw+x)*4+3]>100) pts.push({x:bx+x,y:by+y});
  return pts;
}

function circlePts(ocx,ocy,r,n){
  const pts=[];
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    pts.push({x:ocx+Math.cos(a)*r,y:ocy+Math.sin(a)*r});
  }
  return pts;
}

function ringPts(ocx,ocy,r,thickness,n){
  const pts=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const rd=r-thickness/2+Math.random()*thickness;
    pts.push({x:ocx+Math.cos(a)*rd,y:ocy+Math.sin(a)*rd});
  }
  return pts;
}

let groupTargets={};
let selectedKey=null;

function buildTargets(){
  if(!W||!H) return;
  groupTargets={};
  const navR=Math.min(W,H)*0.32;
  const innerR=Math.min(W,H)*0.07;

  // Center formation — glowing ring of particles
  groupTargets.center=ringPts(cx,cy,innerR,6,60);

  // Nav words around ring
  NAV_KEYS.forEach((key,i)=>{
    const angle=(i/NAV_KEYS.length)*Math.PI*2-Math.PI/2;
    const lx=cx+Math.cos(angle)*navR;
    const ly=cy+Math.sin(angle)*navR;
    const label=PAGES[key].eyebrow;
    const bw=Math.min(140,W*0.18),bh=34;
    const pts=textPts(label,lx-bw/2,ly-bh/2,bw,bh,3);
    groupTargets['nav_'+key]=pts.length?pts:[{x:lx,y:ly}];
  });

  // Selected — big text in center
  if(selectedKey){
    const p=PAGES[selectedKey];
    const lines=p.title.split('\n');
    const bw=Math.min(W*0.55,380),bh=90;
    let allPts=[];
    lines.forEach((line,li)=>{
      const lineH=bh/lines.length;
      const pts=textPts(line,cx-bw/2,cy-bh/2+li*lineH,bw,lineH,2);
      allPts=allPts.concat(pts);
    });
    groupTargets.selected=allPts.length?allPts:[{x:cx,y:cy}];
  }

  // Scatter for overflow
  groupTargets.scatter=[];
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2;
    const r=navR*1.25+Math.random()*Math.min(W,H)*0.2;
    groupTargets.scatter.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r});
  }

  assignParticles();
}

function assignParticles(){
  const order=['selected','center',...NAV_KEYS.map(k=>'nav_'+k),'scatter'];
  let pi=0;
  order.forEach(gid=>{
    const pts=groupTargets[gid];
    if(!pts||!pts.length) return;
    // how many particles for this group
    let count;
    if(gid==='selected') count=Math.min(pts.length,180);
    else if(gid==='center') count=Math.min(pts.length,50);
    else if(gid.startsWith('nav_')){
      const key=gid.replace('nav_','');
      count=Math.min(pts.length, selectedKey&&selectedKey!==key?Math.floor(pts.length*0.4):pts.length);
    } else count=Math.min(pts.length,60);

    for(let i=0;i<count&&pi<TOTAL;i++,pi++){
      const pt=pts[i%pts.length];
      particles[pi].tx=pt.x;
      particles[pi].ty=pt.y;
      particles[pi].group=gid;
    }
  });
  // rest float
  for(;pi<TOTAL;pi++){
    const a=Math.random()*Math.PI*2;
    const r=Math.min(W,H)*0.15+Math.random()*Math.min(W,H)*0.45;
    particles[pi].tx=cx+Math.cos(a)*r;
    particles[pi].ty=cy+Math.sin(a)*r;
    particles[pi].group='float';
  }
}

// ── HIT AREAS ──
function navHit(key){
  const i=NAV_KEYS.indexOf(key);
  const angle=(i/NAV_KEYS.length)*Math.PI*2-Math.PI/2;
  const navR=Math.min(W,H)*0.32;
  return{x:cx+Math.cos(angle)*navR,y:cy+Math.sin(angle)*navR,r:58};
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  for(const key of NAV_KEYS){
    const h=navHit(key);
    const dx=mx-h.x,dy=my-h.y;
    if(dx*dx+dy*dy<h.r*h.r){selectNav(key);return;}
  }
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let hit=false;
  for(const key of NAV_KEYS){
    const h=navHit(key);
    const dx=mx-h.x,dy=my-h.y;
    if(dx*dx+dy*dy<h.r*h.r){hit=true;break;}
  }
  document.body.classList.toggle('hov',hit);
  curEl.classList.toggle('big',hit);
});

// ── COUNTDOWN ──
let cdInterval=null,cdSecs=5;
const cdArc=document.getElementById('cd-arc');
const cdNum=document.getElementById('cd-num-text');
const CIRC=2*Math.PI*46;

function setArc(secs){
  const pct=secs/5;
  cdArc.style.strokeDashoffset=CIRC*(1-pct);
  cdNum.textContent=secs;
}

function startCD(){
  stopCD();
  cdSecs=5;setArc(5);
  cdInterval=setInterval(()=>{
    cdSecs--;
    setArc(cdSecs);
    if(cdSecs<=0){stopCD();navigate();}
  },1000);
}

function stopCD(){
  if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
}

function navigate(){
  if(!selectedKey) return;
  const dest=PAGES[selectedKey].dest;
  if(dest.startsWith('http')||dest.startsWith('tel')) window.open(dest,'_blank');
  else window.location.href=dest;
}

// ── INFO PANEL ──
function showInfo(key){
  const p=PAGES[key];
  const ip=document.getElementById('info-panel');
  document.getElementById('ip-num').textContent=p.num;
  document.getElementById('ip-ey').textContent=p.eyebrow;
  document.getElementById('ip-title').innerHTML=p.title.replace('\n','<br>');
  document.getElementById('ip-italic').textContent=p.italic;
  document.getElementById('ip-chips').innerHTML=p.chips.slice(0,4).map((c,i)=>`<span class="ip-chip${i<2?' hot':''}">${c}</span>`).join('');
  document.getElementById('ip-rule').textContent=p.rule;
  ip.classList.add('show');
  document.getElementById('cd-dest').textContent=p.cta;
  document.getElementById('cd-wrap').classList.add('show');
}

function hideInfo(){
  document.getElementById('info-panel').classList.remove('show');
  document.getElementById('cd-wrap').classList.remove('show');
}

function selectNav(key){
  if(selectedKey===key) return;
  selectedKey=key;
  showInfo(key);
  buildTargets();
  startCD();
}

function cancel(){
  stopCD();
  selectedKey=null;
  hideInfo();
  buildTargets();
}

document.getElementById('cd-cancel').addEventListener('click',cancel);
document.getElementById('cd-cta').addEventListener('click',()=>{stopCD();navigate();});
document.addEventListener('keydown',e=>{if(e.key==='Escape') cancel();});

// ── BACKGROUND MOOD COLOR ──
let moodR=8,moodG=4,moodB=7;
let targetR=8,targetG=4,targetB=7;

// ── DRAW LOOP ──
resize();

let last=0;
(function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-last,30);last=ts;

  // Blend mood color
  if(selectedKey){
    const m=PAGES[selectedKey].mood;
    targetR=m[0];targetG=m[1];targetB=m[2];
  } else {targetR=8;targetG=4;targetB=7;}
  moodR+=(targetR-moodR)*0.015;
  moodG+=(targetG-moodG)*0.015;
  moodB+=(targetB-moodB)*0.015;

  // Background
  const r=Math.round(moodR),g=Math.round(moodG),b=Math.round(moodB);
  ctx.fillStyle=`rgba(${r},${g},${b},0.22)`;
  ctx.fillRect(0,0,W,H);

  // Radial heat glow at bottom
  const grd=ctx.createRadialGradient(cx,H,0,cx,H,H*0.65);
  grd.addColorStop(0,`rgba(196,24,0,${0.04+moodR/255*0.06})`);
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

  const navR=Math.min(W,H)*0.32;
  const innerR=Math.min(W,H)*0.07;

  // Outer ring guide
  ctx.beginPath();ctx.arc(cx,cy,navR,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,180,160,0.04)';ctx.lineWidth=0.5;ctx.stroke();

  // Inner ring guide
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);
  ctx.strokeStyle='rgba(240,80,32,0.08)';ctx.lineWidth=0.5;ctx.stroke();

  // Spoke lines + nav labels
  NAV_KEYS.forEach((key,i)=>{
    const angle=(i/NAV_KEYS.length)*Math.PI*2-Math.PI/2;
    const lx=cx+Math.cos(angle)*navR;
    const ly=cy+Math.sin(angle)*navR;
    const isSel=selectedKey===key;
    const isDimmed=selectedKey&&!isSel;

    // Spoke
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*innerR,cy+Math.sin(angle)*innerR);
    ctx.lineTo(cx+Math.cos(angle)*(navR-62),cy+Math.sin(angle)*(navR-62));
    ctx.strokeStyle=isSel?'rgba(240,80,32,0.15)':'rgba(232,180,160,0.04)';
    ctx.lineWidth=0.5;ctx.stroke();

    // Hit glow when selected
    if(isSel){
      const grd2=ctx.createRadialGradient(lx,ly,0,lx,ly,62);
      grd2.addColorStop(0,'rgba(240,80,32,0.08)');
      grd2.addColorStop(1,'transparent');
      ctx.fillStyle=grd2;ctx.beginPath();
      ctx.arc(lx,ly,62,0,Math.PI*2);ctx.fill();
      // ring accent
      ctx.beginPath();ctx.arc(lx,ly,54,0,Math.PI*2);
      ctx.strokeStyle='rgba(240,80,32,0.18)';ctx.lineWidth=0.5;ctx.stroke();
    }

    // Nav number
    ctx.font=`500 9px 'DM Sans',sans-serif`;
    ctx.fillStyle=isSel?'rgba(240,80,32,0.7)':isDimmed?'rgba(232,180,160,0.08)':'rgba(232,180,160,0.18)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    // position number above label
    const numAngle=angle;
    const nr=navR+24;
    ctx.fillText(PAGES[key].num,cx+Math.cos(numAngle)*nr,cy+Math.sin(numAngle)*nr);
  });

  // Particles
  particles.forEach(p=>{
    p.wb+=p.ws;
    const wx=Math.sin(p.wb)*p.wm;
    const wy=Math.cos(p.wb*0.7)*p.wm;
    p.x+=(p.tx+wx-p.x)*p.spd*(dt/16);
    p.y+=(p.ty+wy-p.y)*p.spd*(dt/16);

    let alpha=p.a,radius=p.r;
    const g=p.group;

    if(g==='selected'){alpha=Math.min(1,p.a*2.4);radius=p.r*1.15;}
    else if(g==='center'){alpha=p.a*1.6;radius=p.r*0.9;}
    else if(g==='float'){alpha=p.a*0.25;}
    else if(g.startsWith('nav_')){
      const k=g.replace('nav_','');
      if(selectedKey&&k!==selectedKey){alpha=p.a*0.18;radius=p.r*0.8;}
      else if(!selectedKey){alpha=p.a;}
    }

    // Color: selected = warm red, center = amber, nav = cream, float = dim
    let fill;
    if(g==='selected'){
      const warm=Math.random()>0.3;
      fill=warm?`rgba(240,80,32,${alpha})`:`rgba(245,237,232,${alpha})`;
    } else if(g==='center'){
      fill=`rgba(255,160,72,${alpha})`;
    } else {
      fill=`rgba(245,237,232,${alpha})`;
    }

    ctx.beginPath();ctx.arc(p.x,p.y,radius,0,Math.PI*2);
    ctx.fillStyle=fill;ctx.fill();
  });

  // Center pulse ring
  const pulseR=innerR*(0.82+Math.sin(ts*0.002)*0.08);
  ctx.beginPath();ctx.arc(cx,cy,pulseR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,160,72,${0.12+Math.sin(ts*0.002)*0.05})`;
  ctx.lineWidth=1;ctx.stroke();

})();
</script>
