<script>
const PAGES={
  home:    {num:'01',ey:'Home',        dest:'home.html',       color:[255,140,60]},
  menu:    {num:'02',ey:'The Menu',    dest:'menu.html',        color:[255,200,40]},
  lunch:   {num:'✦', ey:'Lunch',       dest:'menu.html#lunch',  color:[255,180,20]},
  beer:    {num:'✦', ey:'Beer',        dest:'menu.html#beer',   color:[80,180,255]},
  delivery:{num:'03',ey:'Delivery',    dest:'delivery.html',    color:[255,80,40]},
  order:   {num:'04',ey:'Order Now',   dest:'order.html',       color:[255,120,20]},
  about:   {num:'05',ey:'About Us',    dest:'about.html',       color:[200,140,255]},
  facebook:{num:'06',ey:'Facebook',    dest:'https://www.facebook.com/people/Hot-Headz-Southern-Foods/100064025473003/',color:[60,100,255]},
  find:    {num:'07',ey:'Find Us',     dest:'https://maps.google.com/?q=2741+US-190+DeRidder+LA',color:[60,200,80]},
  staff:   {num:'08',ey:'Staff Portal',dest:'staff-portal.html',color:[255,160,0]},
};
const KEYS=Object.keys(PAGES);

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,CX,CY,NAV_R,INN_R;
let compassCache=null;
function resize(){
  W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;
  CX=W/2;CY=H/2;
  NAV_R=W<500?Math.min(W,H)*.30:W<768?Math.min(W,H)*.32:Math.min(W,H)*.36;
  INN_R=Math.min(W,H)*.065;
  compassCache=null;
}
resize();

const curEl=document.getElementById('cur'),cur2El=document.getElementById('cur2');
let mx=W/2,my=H/2,lcx=W/2,lcy=H/2;
const TRAIL=20,trailX=new Float32Array(TRAIL).fill(W/2),trailY=new Float32Array(TRAIL).fill(H/2);
let trailIdx=0,lastMoveTs=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;trailX[trailIdx]=mx;trailY[trailIdx]=my;trailIdx=(trailIdx+1)%TRAIL;lastMoveTs=performance.now();});
(function cl(){curEl.style.left=mx+'px';curEl.style.top=my+'px';lcx+=(mx-lcx)*.11;lcy+=(my-lcy)*.11;cur2El.style.left=lcx+'px';cur2El.style.top=lcy+'px';requestAnimationFrame(cl);})();

(function(){
  const n=new Date(),mins=n.getHours()*60+n.getMinutes();
  const d=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n.getDay()];
  document.getElementById('tb-hr').textContent=d==='Sunday'?'7am–3pm':d==='Saturday'?'6am–2pm':'5:30am–2pm';
  const o=d==='Sunday'?420:d==='Saturday'?360:330,cl2=d==='Sunday'?900:840,open=mins>=o&&mins<cl2;
  document.getElementById('tb-stxt').textContent=open?'Open Now':'Closed';
  document.getElementById('tb-stxt').style.color=open?'#f05020':'rgba(232,180,160,.35)';
  document.getElementById('tb-dot').className='dot '+(open?'dot-o':'dot-c');
})();

const HOURS={Sunday:{o:420,c:900},Saturday:{o:360,c:840},Monday:{o:330,c:840},Tuesday:{o:330,c:840},Wednesday:{o:330,c:840},Thursday:{o:330,c:840},Friday:{o:330,c:840}};
const CF_DAYS=['Thursday','Friday','Saturday'];
const DNAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let clockState={label:'CLOSED',sub:'',h:'00',m:'00',s:'00',isOpen:false,isCrawfish:false};
function updateClock(){
  const now=new Date(),day=DNAMES[now.getDay()],hr=HOURS[day];
  const nm=now.getHours()*60+now.getMinutes(),ns=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const isCf=CF_DAYS.includes(day);
  clockState.isOpen=(nm>=hr.o&&nm<hr.c)||(isCf&&nm>=960&&nm<1200);
  clockState.isCrawfish=isCf&&nm>=960&&nm<1200;
  let secs=0,label='',sub='';
  if(ns<hr.o*60){label='CLOSED';sub='Opens soon';secs=hr.o*60-ns;}
  else if(ns<hr.c*60){
    if(ns<37800){label='BREAKFAST';sub='Breakfast ends in';secs=37800-ns;}
    else if(ns<39600){label='TRANSITIONING';sub='Lunch starts in';secs=39600-ns;}
    else{label='OPEN';sub='Closes in';secs=hr.c*60-ns;}
  }else if(isCf&&ns<57600){label='CRAWFISH AT 4PM';sub='Crawfish starts in';secs=57600-ns;}
  else if(isCf&&ns<72000){label='CRAWFISH NIGHT';sub='Crawfish ends in';secs=72000-ns;}
  else{label='CLOSED';sub='See you tomorrow';secs=86400-ns+hr.o*60;}
  const hh=Math.floor(secs/3600),mm2=Math.floor((secs%3600)/60),ss=secs%60;
  clockState.label=label;clockState.sub=sub;
  clockState.h=String(hh).padStart(2,'0');clockState.m=String(mm2).padStart(2,'0');clockState.s=String(ss).padStart(2,'0');
}
updateClock();setInterval(updateClock,1000);

function sampleDots(text,cx,cy,tw,th,step){
  const SC=4,OW=Math.round(tw*SC),OH=Math.round(th*SC);
  const oc=document.createElement('canvas');oc.width=OW;oc.height=OH;
  const ox=oc.getContext('2d');
  let fs=Math.round(OH*.72);
  ox.font=`700 ${fs}px DM Sans,Arial,sans-serif`;
  const mw=ox.measureText(text).width;
  if(mw>OW*.9)fs=Math.round(fs*(OW*.9/mw));
  ox.font=`700 ${fs}px DM Sans,Arial,sans-serif`;
  ox.fillStyle='#fff';ox.textAlign='center';ox.textBaseline='middle';
  ox.fillText(text,OW/2,OH/2);
  const d=ox.getImageData(0,0,OW,OH).data,pts=[],gs=Math.round(step*SC);
  const ox2=cx-tw/2,oy2=cy-th/2;
  for(let gy=Math.round(gs/2);gy<OH;gy+=gs)
    for(let gx=Math.round(gs/2);gx<OW;gx+=gs){
      let sum=0,cnt=0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        const ix=gx+dx,iy=gy+dy;
        if(ix>=0&&ix<OW&&iy>=0&&iy<OH){sum+=d[(iy*OW+ix)*4+3];cnt++;}
      }
      if(sum/cnt>80)pts.push({x:ox2+(gx/OW)*tw,y:oy2+(gy/OH)*th,b:(sum/cnt)/255});
    }
  return pts;
}

// Sample big display text using Abril Fatface
function sampleDisplayDots(text,cx,cy,tw,th,step){
  const SC=4,OW=Math.round(tw*SC),OH=Math.round(th*SC);
  const oc=document.createElement('canvas');oc.width=OW;oc.height=OH;
  const ox=oc.getContext('2d');
  let fs=Math.round(OH*.85);
  ox.font=`${fs}px 'Abril Fatface',serif`;
  const mw=ox.measureText(text).width;
  if(mw>OW*.94)fs=Math.round(fs*(OW*.94/mw));
  ox.font=`${fs}px 'Abril Fatface',serif`;
  ox.fillStyle='#fff';ox.textAlign='center';ox.textBaseline='middle';
  ox.fillText(text,OW/2,OH/2);
  const d=ox.getImageData(0,0,OW,OH).data,pts=[],gs=Math.round(step*SC);
  const ox2=cx-tw/2,oy2=cy-th/2;
  for(let gy=Math.round(gs/2);gy<OH;gy+=gs)
    for(let gx=Math.round(gs/2);gx<OW;gx+=gs){
      let sum=0,cnt=0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        const ix=gx+dx,iy=gy+dy;
        if(ix>=0&&ix<OW&&iy>=0&&iy<OH){sum+=d[(iy*OW+ix)*4+3];cnt++;}
      }
      if(sum/cnt>55)pts.push({x:ox2+(gx/OW)*tw,y:oy2+(gy/OH)*th,b:(sum/cnt)/255});
    }
  return pts;
}

let hovKey=null,particles=[];
let wordDots={},clockParts={},clockSegs={},prevCH='',prevCM='',prevCS='',prevCL='';
const orbitPhase=Array.from({length:10},()=>Math.random()*Math.PI*2);
function navAngle(i){return(i/KEYS.length)*Math.PI*2-Math.PI/2+Math.PI*.1;}
function navPos(i){
  const a=navAngle(i),drift=2.5,ph=orbitPhase[i]||0;
  const ox2=Math.cos(a+Math.PI/2)*Math.sin(performance.now()*.0007+ph)*drift;
  const oy2=Math.sin(a+Math.PI/2)*Math.sin(performance.now()*.0007+ph)*drift;
  return{x:CX+Math.cos(a)*NAV_R+ox2,y:CY+Math.sin(a)*NAV_R+oy2};
}

function buildWordDots(){
  wordDots={};
  KEYS.forEach((key,i)=>{
    const pos=navPos(i),sp=2*Math.PI*NAV_R/KEYS.length,bw=sp*.80,bh=bw*(W<600?.72:.60);
    wordDots[key]=sampleDots(PAGES[key].ey,pos.x,pos.y,bw,bh,Math.max(.4,bh/62));
  });
}
function getSegLayout(){
  const sc=Math.min(W,H),dh=sc*(W<500?.08:.10),cw=dh*.30,dw=dh*1.20,tot=dw*3+cw*2,sx=CX-tot/2,dy=CY+sc*.01;
  return{HH:{x:sx+dw/2,y:dy,w:dw,h:dh},C1:{x:sx+dw+cw/2,y:dy,w:cw,h:dh},MM:{x:sx+dw+cw+dw/2,y:dy,w:dw,h:dh},C2:{x:sx+dw*2+cw*1.5,y:dy,w:cw,h:dh},SS:{x:sx+dw*2+cw*2+dw/2,y:dy,w:dw,h:dh},LBL:{x:CX,y:CY-sc*.10,w:Math.min(W*.35,260),h:sc*.04},SUB:{x:CX,y:CY+sc*.09,w:Math.min(W*.42,300),h:sc*.032}};
}
function segCol(sid){const isD=['HH','C1','MM','C2','SS'].includes(sid);if(isD)return clockState.isOpen?{r:255,g:200,b:80}:{r:210,g:170,b:145};if(sid==='LBL')return clockState.isOpen?{r:255,g:148,b:60}:{r:210,g:170,b:145};return{r:210,g:170,b:145};}
function segA(sid,bright){const isD=['HH','C1','MM','C2','SS'].includes(sid);if(isD)return clockState.isOpen?.72+bright*.28:.20+bright*.08;if(sid==='LBL')return clockState.isOpen?.55:.16;return .15;}
function retargetSeg(sid,dots){
  const ex=clockParts[sid]||[],col=segCol(sid),isD=['HH','C1','MM','C2','SS'].includes(sid),take=Math.min(ex.length,dots.length);
  for(let i=0;i<take;i++){ex[i].tx=dots[i].x;ex[i].ty=dots[i].y;ex[i].spd=.16+Math.random()*.06;ex[i].wm=.03;ex[i].rc=col.r;ex[i].gc=col.g;ex[i].bc=col.b;ex[i].a=segA(sid,dots[i].b);}
  for(let i=take;i<dots.length;i++){const d=dots[i],p={x:d.x+(Math.random()-.5)*5,y:d.y+(Math.random()-.5)*5,tx:d.x,ty:d.y,spd:.16+Math.random()*.06,r:isD?.65+Math.random()*.25:.38+Math.random()*.14,a:segA(sid,d.b),wb:Math.random()*Math.PI*2,ws:.002+Math.random()*.003,wm:.03,rc:col.r,gc:col.g,bc:col.b,ck:true,sid};ex.push(p);particles.push(p);}
  for(let i=dots.length;i<ex.length;i++)ex[i].a=0;
  clockParts[sid]=ex.slice(0,dots.length);
}
function buildAllClockSegs(force){
  if(navActive)return;
  const L=getSegLayout(),texts={HH:clockState.h,C1:':',MM:clockState.m,C2:':',SS:clockState.s,LBL:clockState.label||'',SUB:clockState.sub||''};
  const changed={HH:force||clockState.h!==prevCH,C1:force||!clockSegs.C1,MM:force||clockState.m!==prevCM,C2:force||!clockSegs.C2,SS:force||clockState.s!==prevCS,LBL:force||clockState.label!==prevCL,SUB:force||!clockSegs.SUB};
  Object.keys(changed).forEach(sid=>{if(changed[sid]){clockSegs[sid]=sampleDots(texts[sid],L[sid].x,L[sid].y,L[sid].w,L[sid].h,Math.max(.4,L[sid].h/50));retargetSeg(sid,clockSegs[sid]);}});
  prevCH=clockState.h;prevCM=clockState.m;prevCS=clockState.s;prevCL=clockState.label;
}
function initClockParticles(){
  if(navActive)return;
  const L=getSegLayout(),texts={HH:clockState.h,C1:':',MM:clockState.m,C2:':',SS:clockState.s,LBL:clockState.label||'',SUB:clockState.sub||''};
  Object.keys(texts).forEach(sid=>{
    clockParts[sid]=[];
    const dots=sampleDots(texts[sid],L[sid].x,L[sid].y,L[sid].w,L[sid].h,Math.max(.4,L[sid].h/50));
    clockSegs[sid]=dots;
    const col=segCol(sid),isD=['HH','C1','MM','C2','SS'].includes(sid);
    dots.forEach(d=>{const p={x:CX+(Math.random()-.5)*W*.8,y:CY+(Math.random()-.5)*H*.8,tx:d.x,ty:d.y,spd:.04+Math.random()*.03,r:isD?.65+Math.random()*.25:.38+Math.random()*.14,a:segA(sid,d.b),wb:Math.random()*Math.PI*2,ws:.002+Math.random()*.003,wm:.03,rc:col.r,gc:col.g,bc:col.b,ck:true,sid};clockParts[sid].push(p);particles.push(p);});
  });
  prevCH=clockState.h;prevCM=clockState.m;prevCS=clockState.s;prevCL=clockState.label;
}
function buildParticles(){
  particles=[];
  const rand=()=>({x:CX+(Math.random()-.5)*W*.9,y:CY+(Math.random()-.5)*H*.9});
  KEYS.forEach(key=>{
    (wordDots[key]||[]).forEach(d=>{const s=rand();particles.push({x:s.x,y:s.y,tx:d.x,ty:d.y,spd:.018+Math.random()*.014,r:.55+Math.random()*.25,a:.7+d.b*.3,wb:Math.random()*Math.PI*2,ws:.003+Math.random()*.007,wm:.2,t:1,_key:key});});
  });
  for(let i=0;i<80;i++){const a=(i/80)*Math.PI*2,r=INN_R*(.5+Math.random()*.9),s=rand();particles.push({x:s.x,y:s.y,tx:CX+Math.cos(a)*r,ty:CY+Math.sin(a)*r,spd:.025+Math.random()*.02,r:1.2+Math.random()*.8,a:.5+Math.random()*.4,wb:Math.random()*Math.PI*2,ws:.006+Math.random()*.01,wm:.4,t:4});}
  for(let i=0;i<180;i++){const a=Math.random()*Math.PI*2,r=INN_R*1.5+Math.random()*NAV_R*1.4;particles.push({x:Math.random()*W,y:Math.random()*H,tx:CX+Math.cos(a)*r,ty:CY+Math.sin(a)*r,spd:.004+Math.random()*.005,r:.8+Math.random()*1.2,a:.06+Math.random()*.1,wb:Math.random()*Math.PI*2,ws:.002+Math.random()*.006,wm:1.5+Math.random()*2,t:0});}
}
function rebuild(){
  buildWordDots();clockSegs={};clockParts={};prevCH='';prevCM='';prevCS='';prevCL='';
  buildParticles();initClockParticles();
}
setInterval(()=>{if(!navActive)buildAllClockSegs(false);},1000);

function hitNav(x,y){const r=W<600?80:65;for(let i=0;i<KEYS.length;i++){const p=navPos(i);if((x-p.x)**2+(y-p.y)**2<r*r)return KEYS[i];}return null;}
canvas.addEventListener('mousemove',e=>{hovKey=hitNav(e.clientX,e.clientY);document.body.classList.toggle('hov',!!hovKey);});
let lastTouch=0;
canvas.addEventListener('click',e=>{
  if(performance.now()-lastTouch<600)return; // suppress click after touch
  const k=hitNav(e.clientX,e.clientY);if(k&&!navActive)doNavigate(PAGES[k].dest,PAGES[k].color);
});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  lastTouch=performance.now();
  const t=e.changedTouches[0];const k=hitNav(t.clientX,t.clientY);if(k&&!navActive)doNavigate(PAGES[k].dest,PAGES[k].color);
},{passive:false});

const stars=[];
function spawnStar(){
  const edge=Math.floor(Math.random()*4);let sx,sy,ang;
  if(edge===0){sx=Math.random()*W;sy=-10;ang=Math.PI/2+(.3-Math.random()*.6);}
  else if(edge===1){sx=W+10;sy=Math.random()*H;ang=Math.PI+(.3-Math.random()*.6);}
  else if(edge===2){sx=Math.random()*W;sy=H+10;ang=-Math.PI/2+(.3-Math.random()*.6);}
  else{sx=-10;sy=Math.random()*H;ang=.3-Math.random()*.6;}
  stars.push({x:sx,y:sy,vx:Math.cos(ang)*11,vy:Math.sin(ang)*11,life:1,len:60+Math.random()*80});
}
setInterval(()=>{if(Math.random()<.4&&!navActive)spawnStar();},1800);
const ripples=[];
canvas.addEventListener('dblclick',e=>{ripples.push({x:e.clientX,y:e.clientY,r:0,life:1});});

/* ═══════════════════════════════════════════
   NAV ANIMATION
   Click → all dots converge from their
   positions and form giant "HOT HEADZ"
   across the whole screen → hold a beat
   → explode outward → navigate
═══════════════════════════════════════════ */
let navActive=false;
let navDest='',navColor=[255,140,60];
// 0=idle 1=converging 2=formed 3=exploding
let navPhase=0,navPhaseTs=0;
// dots for "HOT HEADZ" target
let hotHeadzDots=[];
// extra spawned particles for coverage
let navExtras=[];

function buildHotHeadzDots(){
  const tw=W*.93;
  const th=H*(W<500?.25:.34);
  // dot spacing: denser = more dots = better letter fill
  const step=Math.max(1.0, tw/460);
  hotHeadzDots=sampleDisplayDots('HOT HEADZ',CX,CY,tw,th,step);
}

function startNavAnimation(col){
  buildHotHeadzDots();
  const [nr,ng,nb]=col;

  // Collect all movable particles and assign them to HOT HEADZ dot targets
  const movable=particles.filter(p=>!p.ck); // exclude clock
  // Shuffle for organic assignment
  for(let i=movable.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[movable[i],movable[j]]=[movable[j],movable[i]];}

  navExtras=[];
  hotHeadzDots.forEach((d,i)=>{
    let p;
    if(i<movable.length){
      p=movable[i];
    } else {
      // spawn from random scattered position
      p={
        x:Math.random()*W, y:Math.random()*H,
        tx:d.x,ty:d.y,
        spd:.06+Math.random()*.04,
        r:.7+Math.random()*.6,
        a:1,
        wb:Math.random()*Math.PI*2,
        ws:.002+Math.random()*.004,
        wm:.04,
        t:99,_nav:true
      };
      navExtras.push(p);
      particles.push(p);
    }
    // retarget to HOT HEADZ position
    p.tx=d.x; p.ty=d.y;
    p.spd=.07+Math.random()*.04;
    p.wm=.03;
    p.rc=nr; p.gc=ng; p.bc=nb;
    p.a=Math.max(p.a||.5, .85);
    p.r=Math.max(p.r||.6, .9+Math.random()*.5);
    p._nav=true;
    p._navDone=false;
  });

  // Particles that didn't get a dot: drift them off-screen cleanly
  movable.slice(hotHeadzDots.length).forEach(p=>{
    const a=Math.random()*Math.PI*2;
    const dist=Math.max(W,H)*.7;
    p.tx=CX+Math.cos(a)*dist;
    p.ty=CY+Math.sin(a)*dist;
    p.spd=.035+Math.random()*.025;
    p.wm=0;
    p.a*=.6;
    p._nav=false;
  });

  // Clock particles: fade out
  particles.filter(p=>p.ck).forEach(p=>{ p.a*=.15; });
}

function doNavigate(dest,col){
  if(navActive)return;
  navActive=true;
  navDest=dest;
  navColor=[...col];
  navPhase=1;
  navPhaseTs=performance.now();

  document.getElementById('topbar').style.opacity='0';
  document.getElementById('hint').style.opacity='0';

  startNavAnimation(col);

  // Phase 2: "formed" — particles are in place, hold a beat
  setTimeout(()=>{ navPhase=2; navPhaseTs=performance.now(); }, 1000);

  // Phase 3: explosion outward
  setTimeout(()=>{
    navPhase=3; navPhaseTs=performance.now();
    particles.forEach(p=>{
      if(p._nav){
        const angle=Math.atan2(p.y-CY,p.x-CX)+(Math.random()-.5)*.6;
        const spd=5+Math.random()*12;
        p._vx=Math.cos(angle)*spd;
        p._vy=Math.sin(angle)*spd;
        p._exploding=true;
      }
    });
    // Central flash ring
    ripples.push({x:CX,y:CY,r:10,life:1.0,fat:true,col:navColor});
    ripples.push({x:CX,y:CY,r:5, life:0.8,fat:false,col:[255,255,255]});
    ripples.push({x:CX,y:CY,r:0, life:0.6,fat:false,col:navColor});
  }, 1900);

  // Navigate
  setTimeout(()=>{
    dest.startsWith('http')?window.open(dest,'_blank'):window.location.href=dest;
  }, 2300);
}

let mr=8,mg=4,mb=7;
let navLoopOn=false,lastT=0;

function loop(ts){
  if(!navLoopOn)return;
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)||16,32);lastT=ts;

  ctx.fillStyle=`rgb(${Math.round(mr)},${Math.round(mg)},${Math.round(mb)})`;
  ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(CX,H,0,CX,H,H*.85);
  bg.addColorStop(0,`rgba(196,24,0,${.05+mr/900})`);bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(!clockState.isOpen){ctx.save();ctx.globalCompositeOperation='saturation';ctx.fillStyle='rgba(128,128,128,0.4)';ctx.fillRect(0,0,W,H);ctx.restore();}

  // Deepen bg during nav
  if(navActive){
    const progress=navPhase>=2?Math.min(1,(ts-navPhaseTs)/400):Math.min(1,(ts-navPhaseTs)/700);
    ctx.fillStyle=`rgba(3,1,3,${navPhase===1?progress*.6:navPhase===2?.65:.65*(1-Math.min(1,(ts-navPhaseTs)/400))})`;
    ctx.fillRect(0,0,W,H);
  }

  if(!compassCache){
    compassCache=document.createElement('canvas');compassCache.width=W;compassCache.height=H;
    const cc=compassCache.getContext('2d');cc.globalAlpha=0.022;
    for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;cc.beginPath();cc.moveTo(CX+Math.cos(a)*INN_R*.5,CY+Math.sin(a)*INN_R*.5);cc.lineTo(CX+Math.cos(a)*W,CY+Math.sin(a)*W);cc.strokeStyle='rgba(232,180,160,1)';cc.lineWidth=.5;cc.stroke();}
    for(let i=1;i<=3;i++){cc.beginPath();cc.arc(CX,CY,NAV_R*i*.38,0,Math.PI*2);cc.strokeStyle='rgba(232,180,160,1)';cc.lineWidth=.5;cc.stroke();}
  }
  if(!navActive)ctx.drawImage(compassCache,0,0);

  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];s.x+=s.vx;s.y+=s.vy;s.life-=.022;
    if(s.life<=0||s.x<-50||s.x>W+50||s.y<-50||s.y>H+50){stars.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=s.life*.7;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*(s.len/12),s.y-s.vy*(s.len/12));
    const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*5,s.y-s.vy*5);
    g.addColorStop(0,'rgba(255,237,200,.9)');g.addColorStop(1,'rgba(255,148,60,0)');
    ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  }

  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i];r.r+=r.fat?20:9;r.life-=r.fat?.016:.032;
    if(r.life<=0){ripples.splice(i,1);continue;}
    const col=r.col||[240,80,32];
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${r.life*.8})`;
    ctx.lineWidth=r.fat?7:1.5;ctx.stroke();
  }

  if(!navActive){
    for(let i=0;i<4;i++){
      const arcStart=(i/4)*Math.PI*2+(i%2===0?ts*.0008:-ts*.0008);
      ctx.beginPath();ctx.arc(CX,CY,INN_R,arcStart,arcStart+Math.PI*.45);
      ctx.strokeStyle=`rgba(240,80,32,${.12+Math.sin(ts*.002+i)*.05})`;ctx.lineWidth=1.5;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(CX,CY,NAV_R,0,Math.PI*2);ctx.strokeStyle='rgba(232,180,160,.05)';ctx.lineWidth=.5;ctx.stroke();
    KEYS.forEach((key,i)=>{
      const angle=navAngle(i);
      ctx.beginPath();ctx.moveTo(CX+Math.cos(angle)*(INN_R+2),CY+Math.sin(angle)*(INN_R+2));
      ctx.lineTo(CX+Math.cos(angle)*(NAV_R-52),CY+Math.sin(angle)*(NAV_R-52));
      ctx.strokeStyle='rgba(232,180,160,.04)';ctx.lineWidth=.5;ctx.stroke();
      ctx.font='600 8px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(232,180,160,.18)';
      ctx.fillText(PAGES[key].num,CX+Math.cos(angle)*(NAV_R+20),CY+Math.sin(angle)*(NAV_R+20));
    });
    for(let i=0;i<TRAIL;i++){
      const idx=(trailIdx-1-i+TRAIL)%TRAIL,f=1-i/TRAIL;
      ctx.beginPath();ctx.arc(trailX[idx],trailY[idx],f*4,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,80,32,${f*f*.3})`;ctx.fill();
    }
  }

  if(performance.now()-lastMoveTs>3000&&!navActive){
    particles.forEach(p=>{if(p.t===0){p.tx=p.x+(mx-p.x)*.02;p.ty=p.y+(my-p.y)*.02;}});
  }

  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    p.wb+=p.ws;

    if(p._exploding){
      p.x+=p._vx*(dt/16); p.y+=p._vy*(dt/16);
      p._vx*=1.06; p._vy*=1.06;
      p.a*=.93;
    } else {
      let ptx=p.tx,pty=p.ty;
      if(!navActive&&hovKey&&p._key===hovKey){ptx=p.tx+(mx-p.tx)*.18;pty=p.ty+(my-p.ty)*.18;}
      const dist=Math.sqrt((ptx-p.x)**2+(pty-p.y)**2);
      const wob=p.wm*Math.min(dist/60,1);
      p.x+=(ptx+Math.sin(p.wb)*wob-p.x)*p.spd*(dt/16);
      p.y+=(pty+Math.cos(p.wb*.73)*wob-p.y)*p.spd*(dt/16);
    }

    let rc=p.rc||245,gc=p.gc||237,bc=p.bc||232,a=p.a;

    if(p.ck&&!navActive){
      const beat=Math.pow(Math.max(0,1-(ts%1000)/180),3);
      a=p.a*(1+beat*.9);
      if(clockState.isCrawfish){rc=255;gc=100;bc=20;}
    } else if(p.ck&&navActive){
      a=0;
    } else if(p.t===4&&!navActive){rc=255;gc=148;bc=60;}
    else if(p.t===1&&!navActive){
      if(hovKey&&p._key===hovKey){rc=255;gc=210;bc=170;a=Math.min(1,a*2.2);}
      if(p._key==='staff'){const sp=.5+Math.sin(ts*.0025)*.5;rc=255;gc=Math.round(120+sp*60);bc=20;a=Math.min(1,a*(1.1+sp*.3));}
    }

    // Nav particles: boost alpha as they near their target
    if(navActive&&p._nav&&!p._exploding){
      const dx=p.tx-p.x,dy2=p.ty-p.y;
      const nearness=1-Math.min(1,Math.sqrt(dx*dx+dy2*dy2)/50);
      a=.4+nearness*.6;
    }

    if(a<.03)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rc},${gc},${bc},${a.toFixed(2)})`;ctx.fill();
  }

  if(!navActive){
    ctx.beginPath();ctx.arc(CX,CY,NAV_R*(1.02+Math.sin(ts*.0011)*.008),0,Math.PI*2);
    ctx.strokeStyle=`rgba(232,180,160,${.03+Math.sin(ts*.0011)*.02})`;ctx.lineWidth=.5;ctx.stroke();
  }

  // Phase 2: slow scanline sweep across the formed text for drama
  if(navPhase===2){
    const elapsed=(ts-navPhaseTs);
    const scanFraction=(elapsed%1200)/1200;
    const scanY=(CY-H*.20)+scanFraction*H*.40;
    const sg=ctx.createLinearGradient(0,scanY-40,0,scanY+40);
    const [nr,ng,nb]=navColor;
    sg.addColorStop(0,'transparent');
    sg.addColorStop(.4,`rgba(${nr},${ng},${nb},0.04)`);
    sg.addColorStop(.5,`rgba(255,255,255,0.06)`);
    sg.addColorStop(.6,`rgba(${nr},${ng},${nb},0.04)`);
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.fillRect(0,scanY-40,W,80);
  }
}

document.fonts.ready.then(()=>{rebuild();navLoopOn=true;requestAnimationFrame(loop);});
window.addEventListener('resize',()=>{resize();rebuild();});
</script>
</body>
</html>
