<!DOCTYPE html>
<html>
<head><title>Cloud Debug</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px;">
<h2>Hot Headz Cloud Debug</h2>
<div id="output">Loading...</div>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbxHd4heBpNJzAsgodKJMlgq8dVa_qlpHjIUHHRFYL6AIJys-d4x5Mxm1P_egFfvQiNtnQ/exec';

// Test 1: JSONP — ?action=menu
const cb1 = '_test1_' + Date.now();
window[cb1] = function(result) {
  delete window[cb1];
  document.getElementById('output').innerHTML = '<h3>?action=menu response:</h3><pre>' + 
    JSON.stringify(result, null, 2).slice(0, 3000) + '</pre>';
};
const s1 = document.createElement('script');
s1.src = URL + '?action=menu&callback=' + cb1;
s1.onerror = function() {
  document.getElementById('output').innerHTML = '<h3 style="color:red">JSONP FAILED</h3><p>The script tag could not load. The Apps Script URL may be wrong or not deployed.</p>';
};
document.head.appendChild(s1);

setTimeout(function() {
  if (window[cb1]) {
    document.getElementById('output').innerHTML += '<h3 style="color:orange">TIMED OUT after 10s</h3>';
    delete window[cb1];
  }
}, 10000);
</script>
</body>
</html>
