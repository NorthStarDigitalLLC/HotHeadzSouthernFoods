<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hot Headz – Menu Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--void:#0a0a0e;--surface:#131318;--card:#1a1a22;--border:rgba(255,255,255,.1);--text:#f0ece6;--text2:rgba(240,236,230,.7);--text3:rgba(240,236,230,.45);--fire:#ff7a18;--fire2:#ffb347;--ember:rgba(255,122,24,.12);--danger:#ff4d4d;--success:#4dff88;--radius:14px;--radius-sm:10px;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
    #toastBox{position:fixed;top:16px;right:16px;z-index:100000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{pointer-events:auto;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;backdrop-filter:blur(12px);animation:toastIn .35s ease,toastOut .4s 2.6s ease forwards;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:340px;}
    .toast.success{background:rgba(30,60,40,.9);border:1px solid rgba(77,255,136,.2);}
    .toast.error{background:rgba(60,20,20,.9);border:1px solid rgba(255,77,77,.25);}
    .toast.info{background:rgba(20,30,60,.9);border:1px solid rgba(100,140,255,.2);}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
    .admin-gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:10000;overflow:hidden;}
    .gate-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,#1e1510,#0a0806 50%,#050404);z-index:0;}
    .gate-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 80%,rgba(196,24,0,.08),transparent 60%);}
    .gate-embers{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .gate-ember{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--fire);opacity:0;animation:gEmber linear infinite;}
    @keyframes gEmber{0%{opacity:0;transform:translateY(0) scale(1)}10%{opacity:.8}60%{opacity:.4}100%{opacity:0;transform:translateY(-100vh) scale(0.3)}}
    .gate-card{position:relative;z-index:2;width:100%;max-width:440px;animation:fadeUp .8s ease;}
    .gate-logo{display:flex;justify-content:center;margin-bottom:24px;}
    .gate-logo img{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,122,24,.3);box-shadow:0 0 40px rgba(255,122,24,.15);animation:floatL 4s ease-in-out infinite;}
    .gate-brand{font-family:'Abril Fatface',Georgia,serif;font-size:clamp(28px,7vw,38px);text-align:center;line-height:1.1;margin-bottom:4px;color:var(--text);}
    .gate-brand em{color:var(--fire);font-style:normal;}
    .gate-sub{font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:14px;color:rgba(212,168,152,.6);text-align:center;letter-spacing:.05em;margin-bottom:28px;}
    .gate-divider{width:60px;height:2px;margin:0 auto 28px;background:linear-gradient(90deg,transparent,var(--fire),transparent);border-radius:2px;}
    .gate-form{background:rgba(15,12,10,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px 28px;margin-bottom:16px;}
    .gate-form-title{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(212,168,152,.5);text-align:center;margin-bottom:20px;}
    .gate-pin-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
    .gate-pin-digit{width:48px;height:56px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:24px;font-weight:800;text-align:center;font-family:'DM Sans',sans-serif;transition:all .2s;caret-color:var(--fire);}
    .gate-pin-digit:focus{outline:none;border-color:var(--fire);background:rgba(255,122,24,.06);box-shadow:0 0 20px rgba(255,122,24,.1);}
    .gate-pin-digit.filled{border-color:rgba(255,122,24,.4);}
    .gate-pin-digit.error{border-color:var(--danger);animation:gShake .4s ease;}
    @keyframes gShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    .gate-unlock{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;color:#fff;cursor:pointer;transition:all .25s;background:linear-gradient(135deg,var(--fire),#e85520);box-shadow:0 4px 20px rgba(255,122,24,.25);}
    .gate-unlock:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,122,24,.35);}
    .gate-unlock:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
    .gate-error{color:var(--danger);font-size:12px;font-weight:700;text-align:center;min-height:18px;margin-top:10px;}
    .gate-footer{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .gate-footer a{padding:10px 20px;border-radius:40px;font-weight:700;font-size:12px;text-decoration:none;transition:all .2s;letter-spacing:.03em;}
    .gf-menu{background:rgba(255,122,24,.1);border:1px solid rgba(255,122,24,.2);color:var(--fire);}
    .gf-home{border:1px solid rgba(255,255,255,.1);color:var(--text3);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatL{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .editor{display:none;position:fixed;inset:0;z-index:9999;background:var(--void);flex-direction:column;}
    .editor.active{display:flex;}
    .topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:48px;}
    .topbar-brand{font-family:'Abril Fatface',serif;font-size:15px;white-space:nowrap;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
    .topbar-tabs{display:flex;gap:3px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .topbar-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:6px 13px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .tab-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
    .tab-btn.active{background:var(--ember);color:var(--fire);}
    .tab-btn.menu-tab{border:1px solid rgba(255,255,255,.06);}
    .tab-btn.menu-tab.active{background:rgba(100,180,255,.12);color:#7ac4ff;border-color:rgba(100,180,255,.2);}
    /* AI Publish tab — purple/magenta theme to match the brand cohesion of the feature */
    .tab-btn.ai-tab{border:1px solid rgba(180,100,255,.18);background:rgba(180,100,255,.04);color:#c89cff;}
    .tab-btn.ai-tab:hover{background:rgba(180,100,255,.1);color:#d8b8ff;}
    .tab-btn.ai-tab.active{background:linear-gradient(135deg,rgba(180,100,255,.18),rgba(255,100,200,.12));color:#e0c0ff;border-color:rgba(180,100,255,.5);box-shadow:0 0 12px rgba(180,100,255,.15);}
    .tab-btn.static-tab{border:1px solid rgba(255,255,255,.06);}
    .tab-btn.static-tab.active{background:rgba(150,255,150,.1);color:#7ae59a;border-color:rgba(150,255,150,.2);}
    .tb-actions{display:flex;gap:5px;flex-shrink:0;}
    .tb-btn{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .tb-btn:hover{background:rgba(255,255,255,.1);}
    .tb-btn.undo{font-size:15px;padding:5px 9px;}
    .tb-btn.export-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;font-weight:900;padding:7px 16px;}
    .tb-btn.signout-btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--text2);font-weight:800;padding:7px 14px;margin-left:4px;}
    .tb-btn.signout-btn:hover{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.3);color:var(--danger);}
    .main-layout{flex:1;display:flex;min-height:0;overflow:hidden;}
    .canvas-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--void);}
    .canvas-toolbar{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
    .ct-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .ct-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
    .ct-sep{flex:1;}
    .ct-label{font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap;}
    .ct-range{width:80px;accent-color:var(--fire);}
    .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;overflow:hidden;}
    #hhMEcanvas{max-width:100%;max-height:100%;border-radius:8px;touch-action:none;background:#0e0e12;object-fit:contain;}
    .canvas-foot{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);background:var(--surface);}
    .cf-toggle{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;}
    .cf-toggle input{accent-color:var(--fire);}
    .side-panel{width:380px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
    /* The left side panel only appears when the AI Lunch tab is active.
       Mirrors the right panel but with its border on the right side. */
    .side-panel-left{order:-1;}
    .side-panel-left.active{display:flex;}
    .side-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
    .side-scroll::-webkit-scrollbar{width:4px;}
    .side-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
    .acc{border-bottom:1px solid var(--border);}
    .acc-head{display:flex;align-items:center;gap:7px;padding:11px 14px;cursor:pointer;user-select:none;}
    .acc-head:hover{background:rgba(255,255,255,.03);}
    .acc-arrow{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
    .acc.open .acc-arrow{transform:rotate(90deg);}
    .acc-title{font-size:13px;font-weight:800;color:var(--text);flex:1;}
    .acc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--ember);color:var(--fire);}
    .acc-body{display:none;padding:0 14px 14px;}
    .acc.open .acc-body{display:block;}
    .fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .fi{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;width:100%;margin-bottom:8px;}
    .fi:focus{outline:none;border-color:var(--fire);}
    .fi-ta{resize:vertical;min-height:80px;line-height:1.45;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .fs{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;width:100%;margin-bottom:8px;}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .sm-btn{padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .sm-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
    .sm-btn.danger{border-color:rgba(255,77,77,.2);background:rgba(255,77,77,.1);color:var(--danger);}
    .sm-btn.primary{background:var(--ember);border-color:rgba(255,122,24,.2);color:var(--fire);}
    .sm-btn.success{background:rgba(77,255,136,.1);border-color:rgba(77,255,136,.2);color:var(--success);}
    .qf-card{background:rgba(255,122,24,.04);border:1px solid rgba(255,122,24,.1);border-radius:var(--radius);padding:10px;margin-bottom:8px;}
    .qf-title{font-size:12px;font-weight:800;color:var(--fire);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
    .qf-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--fire);}
    .qf-details summary{list-style:none;}.qf-details summary::-webkit-details-marker{display:none;}
    .qf-details[open] summary{color:var(--fire)!important;}
    .swatch-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .swatch{width:26px;height:26px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .12s;}
    .swatch:hover{transform:scale(1.12);}
    .swatch.active{border-color:#fff;}
    .static-card{background:rgba(77,255,136,.04);border:1px solid rgba(77,255,136,.12);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
    .static-card-title{font-size:12px;font-weight:800;color:#7ae59a;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .static-card-title::before{content:'';width:3px;height:12px;border-radius:2px;background:#7ae59a;}
    /* ═══ Projects tab — cleaner cards ═══ */
    .proj-active-banner{background:linear-gradient(135deg,rgba(255,122,24,.16),rgba(255,179,71,.10));border:1px solid rgba(255,122,24,.35);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
    .proj-active-label{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--fire2);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
    .proj-active-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--fire);box-shadow:0 0 10px var(--fire);animation:projPulse 2s ease-in-out infinite;}
    @keyframes projPulse{0%,100%{opacity:.6}50%{opacity:1}}
    .proj-active-name{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px;line-height:1.2;word-break:break-word;}
    .proj-active-meta{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:8px;}
    .proj-active-actions{display:flex;gap:5px;flex-wrap:wrap;}
    .proj-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 11px;margin-bottom:6px;transition:background .15s,border-color .15s;}
    .proj-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.16);}
    .proj-card.is-active{background:rgba(255,122,24,.06);border-color:rgba(255,122,24,.3);}
    .proj-card-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
    .proj-card-info{flex:1;min-width:0;}
    .proj-card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.25;word-break:break-word;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .proj-card-active-tag{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--fire);color:#fff;padding:2px 6px;border-radius:6px;flex-shrink:0;}
    .proj-card-date{font-size:10px;color:var(--text3);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:5px;}
    .proj-card-date::before{content:'🕒';font-size:9px;opacity:.7;}
    .proj-card-by{font-size:10px;color:var(--text3);font-weight:600;margin-top:1px;font-style:italic;}
    .proj-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
    .proj-badge{display:inline-block;padding:1px 6px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.02em;}
    .proj-badge-img{background:rgba(100,180,255,.1);border-color:rgba(100,180,255,.2);color:#7ac4ff;}
    .proj-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
    .proj-actions .sm-btn{padding:4px 9px;font-size:10px;}
    .proj-search{padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:12px;font-weight:600;font-family:inherit;width:100%;margin-bottom:8px;}
    .proj-search:focus{outline:none;border-color:var(--fire);}
    .proj-empty{padding:14px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.1);border-radius:var(--radius-sm);color:var(--text3);font-size:11px;text-align:center;font-style:italic;line-height:1.5;}
    .proj-empty strong{color:var(--text2);font-style:normal;font-weight:700;}
    .proj-date-group{margin:14px 0 6px;padding:0 2px;display:flex;align-items:center;gap:8px;}
    .proj-date-group:first-child{margin-top:6px;}
    .proj-date-group-label{font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);}
    .proj-date-group-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent);}
    .proj-date-group-count{font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--text3);letter-spacing:.05em;}
    .proj-cloud-prompt{padding:12px;background:rgba(100,180,255,.05);border:1px solid rgba(100,180,255,.15);border-radius:var(--radius-sm);margin-bottom:8px;}
    .proj-cloud-prompt p{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px;}
    .proj-cloud-prompt .fi{margin-bottom:6px;}
    .proj-section-head{display:flex;align-items:center;gap:6px;margin:6px 0 8px;}
    .proj-section-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
    .proj-section-count{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text2);}
    .status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;}
    .status-pill.loading{background:rgba(100,140,255,.12);color:#7c9eff;}
    .status-pill.loaded{background:rgba(77,255,136,.12);color:#7ae59a;}
    .status-pill.error{background:rgba(255,77,77,.12);color:#ff7a7a;}
    .hours-row{display:grid;grid-template-columns:80px 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center;}
    .hours-row .hr-day{font-size:11px;font-weight:700;color:var(--text2);}
    .hours-row .fi{margin-bottom:0;padding:7px 10px;font-size:12px;}
    /* ═══ Lunch Forecast three-card layout ═══ */
    .lunch-section-card{background:rgba(255,122,24,.04);border:1px solid rgba(255,122,24,.14);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
    .lunch-section-card.sides{background:rgba(77,255,136,.03);border-color:rgba(77,255,136,.12);}
    .lunch-section-card.samedaily{background:rgba(100,180,255,.03);border-color:rgba(100,180,255,.12);}
    /* AI extract card — purple/magenta to stand out from the meats/sides cards */
    .ai-extract-card{background:linear-gradient(135deg,rgba(180,100,255,.08),rgba(255,100,200,.06));border:1px solid rgba(180,100,255,.25);border-radius:var(--radius);padding:12px;margin-bottom:10px;position:relative;overflow:hidden;}
    .ai-extract-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(180,100,255,.15),transparent 70%);pointer-events:none;}
    .ai-extract-title{font-size:13px;font-weight:800;color:#c89cff;margin-bottom:4px;display:flex;align-items:center;gap:5px;letter-spacing:.02em;}
    .ai-extract-hint{font-size:10px;color:var(--text2);line-height:1.45;margin-bottom:2px;}
    .ai-extract-btn{background:linear-gradient(135deg,#b864ff,#7a3fd6) !important;border:none !important;color:#fff !important;font-weight:800 !important;padding:8px 14px !important;box-shadow:0 2px 10px rgba(180,100,255,.3);}
    .ai-extract-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(180,100,255,.4);}
    /* Box-trainer overlay over canvas */
    .train-overlay{position:absolute;inset:0;cursor:crosshair;background:rgba(0,0,0,.35);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:14px;}
    .train-hint{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,#b864ff,#7a3fd6);padding:10px 18px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;text-align:center;line-height:1.4;}

(function(){
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));

function safeJSON(r,f){try{return JSON.parse(r)}catch{return f}}
function toHex(c){if(/^#([0-9a-f]{3}){1,2}$/i.test(String(c)))return c;const m=String(c).match(/rgba?\((\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);if(m)return'#'+[m[1],m[2],m[3]].map(x=>clamp(+x,0,255).toString(16).padStart(2,'0')).join('');return'#ffffff';}
function hexRgba(h,a){const x=String(h||'#000').replace('#','');const f=x.length===3?x.split('').map(c=>c+c).join(''):x.padEnd(6,'0').slice(0,6);return`rgba(${parseInt(f.slice(0,2),16)},${parseInt(f.slice(2,4),16)},${parseInt(f.slice(4,6),16)},${clamp(a,0,1)})`;}
function todayDefaults(){const n=new Date();return{weekday:n.toLocaleDateString(undefined,{weekday:'long'}),dateStr:n.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'})};}

/* GATE */
const PIN_HASH='77334823791bea53e508ba59387c1287c8da962026769657b4686756db4b7bc8';
async function hashPin(pin){const enc=new TextEncoder().encode(pin);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
const SESSION_KEY='hhMenuAuth';
const LOCKOUT_KEY='hhMenuLockout';
const MAX_ATTEMPTS=5;
const LOCKOUT_MINUTES=2;
let failCount=0;

(function(){
  const container=document.getElementById('gateEmbers');if(!container)return;
  for(let i=0;i<20;i++){
    const e=document.createElement('div');e.className='gate-ember';

const digits=document.querySelectorAll('.gate-pin-digit');
digits.forEach((d,i)=>{
  d.addEventListener('input',()=>{
    d.value=d.value.replace(/\D/g,'').slice(0,1);
    if(d.value&&i<digits.length-1)digits[i+1].focus();
    d.classList.toggle('filled',!!d.value);
  });
  d.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!d.value&&i>0){digits[i-1].focus();digits[i-1].value='';digits[i-1].classList.remove('filled');}
    if(e.key==='Enter')document.getElementById('unlockBtn').click();
  });
  d.addEventListener('paste',e=>{
    e.preventDefault();
    const paste=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
    for(let j=0;j<paste.length&&j<digits.length;j++){digits[j].value=paste[j];digits[j].classList.add('filled');}
    if(paste.length>=4)document.getElementById('unlockBtn').click();
  });
});
if(digits[0])digits[0].focus();

function getPin(){return Array.from(digits).map(d=>d.value).join('');}
function shakeDigits(){digits.forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),500);});}
function clearDigits(){digits.forEach(d=>{d.value='';d.classList.remove('filled','error');});digits[0]?.focus();}

function checkLockout(){
  const data=safeJSON(localStorage.getItem(LOCKOUT_KEY),null);
  if(!data)return false;
  const elapsed=(Date.now()-data.time)/60000;
  if(elapsed>=LOCKOUT_MINUTES){localStorage.removeItem(LOCKOUT_KEY);failCount=0;return false;}
  failCount=data.count||0;
  if(failCount>=MAX_ATTEMPTS){
    const remaining=Math.ceil(LOCKOUT_MINUTES-elapsed);
    document.getElementById('pinError').textContent='Too many attempts. Try again in '+remaining+' min.';
    document.getElementById('unlockBtn').disabled=true;
    setTimeout(()=>{localStorage.removeItem(LOCKOUT_KEY);failCount=0;document.getElementById('pinError').textContent='';document.getElementById('unlockBtn').disabled=false;},remaining*60000);
    return true;
  }
  return false;
}

function checkSession(){
  const ts=parseInt(localStorage.getItem(SESSION_KEY)||'0',10);
  if(ts&&(Date.now()-ts)<8*60*60*1000)return true;
  return false;
}

function unlockEditor(){
  localStorage.setItem(SESSION_KEY,String(Date.now()));
  localStorage.removeItem(LOCKOUT_KEY);
  document.getElementById('adminGate').style.display='none';
  document.getElementById('editorShell').classList.add('active');
  setTimeout(()=>draw(),60);
}

if(checkSession()){unlockEditor();}
else{checkLockout();}

document.getElementById('unlockBtn').addEventListener('click',async()=>{
  if(checkLockout())return;
  const pin=getPin();
  if(pin.length!==4){document.getElementById('pinError').textContent='Enter all 4 digits.';shakeDigits();return;}
  const hash=await hashPin(pin);
  if(hash===PIN_HASH){
    document.getElementById('pinError').textContent='';
    failCount=0;
    unlockEditor();
  }else{
    failCount++;
    localStorage.setItem(LOCKOUT_KEY,JSON.stringify({count:failCount,time:Date.now()}));
    if(failCount>=MAX_ATTEMPTS){
      document.getElementById('pinError').textContent='Too many attempts. Locked for '+LOCKOUT_MINUTES+' minutes.';
      document.getElementById('unlockBtn').disabled=true;
    }else{
      document.getElementById('pinError').textContent='Wrong PIN. '+(MAX_ATTEMPTS-failCount)+' attempts left.';
    }
    shakeDigits();clearDigits();
  }
});

function saveUndo(){undoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));if(undoStack.length>40)undoStack.shift();redoStack=[];}
function doUndo(){if(!undoStack.length)return;redoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));const s=JSON.parse(undoStack.pop());boxes=s.boxes;photoScale=s.photoScale;photoRot=s.photoRot;photoOffsetX=s.photoOffsetX;photoOffsetY=s.photoOffsetY;document.getElementById('photoZoom').value=String(photoScale);activeId=null;rebuildSidePanel();draw();toast('Undo','info');}
function doRedo(){if(!redoStack.length)return;undoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));const s=JSON.parse(redoStack.pop());boxes=s.boxes;photoScale=s.photoScale;photoRot=s.photoRot;photoOffsetX=s.photoOffsetX;photoOffsetY=s.photoOffsetY;document.getElementById('photoZoom').value=String(photoScale);activeId=null;rebuildSidePanel();draw();toast('Redo','info');}
document.getElementById('undoBtn').addEventListener('click',doUndo);

/* Format a timestamp as "Tuesday, Apr 22 · 3:42 PM" */
function fmtSavedAt(ts){
  if(!ts)return '';
  const d=typeof ts==='number'?new Date(ts):new Date(ts);
  if(isNaN(d.getTime()))return '';
  const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const yesterday=new Date(now); yesterday.setDate(now.getDate()-1);
  const isYesterday=d.toDateString()===yesterday.toDateString();
  const time=d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  if(sameDay)return 'Today · '+time;
  if(isYesterday)return 'Yesterday · '+time;
  const day=d.toLocaleDateString(undefined,{weekday:'long'});
  const date=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  // include year if not current year
  const yearTag=d.getFullYear()===now.getFullYear()?'':', '+d.getFullYear();
  return day+', '+date+yearTag+' · '+time;
}
/* Try to parse a date out of common project name patterns:
   "Sunday 5/3/2026", "5/3/2026 Lunch", "Friday Lunch 04/28", "April 28 2026", etc.
   Returns ms-since-epoch, or 0 if nothing parseable. */
function parseTimestampFromName(name){
  if (!name || typeof name !== 'string') return 0;
  const now = new Date();
  // Pattern: M/D/YYYY or MM/DD/YYYY
  let m = name.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    const dt = new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]));
    if (!isNaN(dt.getTime())) return dt.getTime();
  }
  // Pattern: M/D or MM/DD (assume current year)
  m = name.match(/(?:^|\s)(\d{1,2})\/(\d{1,2})(?!\d)/);
  if (m) {
    const dt = new Date(now.getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
    if (!isNaN(dt.getTime())) return dt.getTime();
  }
  // Pattern: "April 28", "Apr 28 2026"
  m = name.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{1,2})(?:[,\s]+(\d{4}))?/i);
  if (m) {
    const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const yr = m[3] ? parseInt(m[3]) : now.getFullYear();
    const dt = new Date(yr, months[m[1].toLowerCase().slice(0,3)], parseInt(m[2]));
    if (!isNaN(dt.getTime())) return dt.getTime();
  }
  return 0;
}

/* Group projects by date buckets — forward-looking for menu planning.
   Buckets in order:
     Today | Tomorrow | This Week (rest) | Next Week | Later | Past Dates
   Within future buckets: ascending (soonest first).
   Within Past Dates: descending (most recent past first).
   Falls back to parsing date out of project name when timestamp is missing. */
function groupProjectsByDate(projects, getTimestamp){
  if (!Array.isArray(projects) || !projects.length) return [];
  const getTs = getTimestamp || (p => p.updatedAt || p.updated_at || p.createdAt || p.created_at || 0);
  function resolveTs(p){
    let ts = getTs(p);
    if (typeof ts !== 'number') ts = new Date(ts).getTime();
    if (!ts || isNaN(ts)) {
      ts = parseTimestampFromName(p.name || '');
    }
    return ts || 0;
  }
  const withTs = projects.map(p => ({ p: p, ts: resolveTs(p) }));

  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const startOfTomorrow = startOfToday + 86400000;
  const startOfDayAfterTomorrow = startOfToday + 2 * 86400000;
  // End of this week = next Sunday at 00:00 (so Sun..Sat current week)
  const dow = now.getDay(); // 0=Sun
  const startOfNextWeek = startOfToday + ((7 - dow) * 86400000);
  const startOfWeekAfterNext = startOfNextWeek + (7 * 86400000);

  // Build buckets in DESIRED order so iteration order is correct
  const order = ['Today','Tomorrow','This Week','Next Week','Later','Past Dates','No Date'];
  const buckets = new Map();
  order.forEach(label => buckets.set(label, { label, items: [] }));

  withTs.forEach(({p, ts}) => {
    if (!ts) { buckets.get('No Date').items.push({p, ts:0}); return; }
    if (ts < startOfToday)                     buckets.get('Past Dates').items.push({p, ts});
    else if (ts < startOfTomorrow)             buckets.get('Today').items.push({p, ts});
    else if (ts < startOfDayAfterTomorrow)     buckets.get('Tomorrow').items.push({p, ts});
    else if (ts < startOfNextWeek)             buckets.get('This Week').items.push({p, ts});
    else if (ts < startOfWeekAfterNext)        buckets.get('Next Week').items.push({p, ts});
    else                                       buckets.get('Later').items.push({p, ts});
  });

  // Sort within each bucket
  buckets.forEach((bucket, label) => {
    if (label === 'Past Dates') {
      // Descending: most recent past first
      bucket.items.sort((a, b) => b.ts - a.ts);
    } else {
      // Ascending: soonest first (Today, Tomorrow, future)
      bucket.items.sort((a, b) => a.ts - b.ts);
    }
    bucket.items = bucket.items.map(x => x.p);
  });

  // Drop empty buckets, preserve order
  return order.map(label => buckets.get(label)).filter(b => b.items.length);
}

}

async function apiPost(params){
  var action=params.action;
  try{
    switch(action){
      case 'getMenuDefaults':{
        var rows=await sbGet('menu_defaults?select=key,value,updated_at');
        if(!Array.isArray(rows))return{success:false,error:rows&&rows.message||'fetch failed'};
        var defaults={};rows.forEach(function(r){defaults[r.key]=r.value;});
        return{success:true,defaults:defaults};
      }
      case 'saveMenuDefault':{
        var payload={key:params.key,value:typeof params.json==='string'?JSON.parse(params.json):params.json};
        await fetch(SUPABASE_URL+'/rest/v1/menu_defaults',{method:'POST',headers:Object.assign({},sbJsonHeaders(),{'Prefer':'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(payload)}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t||('HTTP '+r.status));});});
        return{success:true};
      }
      case 'resetMenuDefault':{
        await sbWrite('DELETE','menu_defaults?key=eq.'+encodeURIComponent(params.key));
        return{success:true};
      }
      case 'getFullMenu':{
        var res=await Promise.all([sbGet('menu_defaults?select=key,value'),sbGet('lunch_dates?select=lunch_date,data')]);
        var defaults={};if(Array.isArray(res[0]))res[0].forEach(function(r){defaults[r.key]=r.value;});
        var dates={};if(Array.isArray(res[1]))res[1].forEach(function(r){dates[r.lunch_date]=r.data;});
        return{success:true,data:{defaults:defaults,dates:dates}};
      }
      case 'lunch':{
        var rows=await sbGet('lunch_dates?select=lunch_date,data,updated_at&order=lunch_date.asc');
        if(!Array.isArray(rows))return{success:false,error:rows&&rows.message||'fetch failed'};
        var dates={};rows.forEach(function(r){dates[r.lunch_date]=r.data;});
        return{success:true,dates:dates};
      }
      case 'save-lunch':{
        var payload={lunch_date:params.date,data:params.data,saved_by:params.publishedBy||getCloudName()||null};
        await fetch(SUPABASE_URL+'/rest/v1/lunch_dates',{method:'POST',headers:Object.assign({},sbJsonHeaders(),{'Prefer':'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(payload)}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t||('HTTP '+r.status));});});
        return{success:true};
      }
      case 'delete-lunch':{
        await sbWrite('DELETE','lunch_dates?lunch_date=eq.'+encodeURIComponent(params.date));
        return{success:true};
      }
      case 'list':{
        var rows=await sbGet('drawing_projects?select=id,name,updated_at,created_at&order=updated_at.desc');
        if(!Array.isArray(rows))return{success:false,error:rows&&rows.message||'fetch failed'};
        return{success:true,projects:rows};
      }
      case 'load':{
        var rows=await sbGet('drawing_projects?select=*&id=eq.'+encodeURIComponent(params.id));
        if(!Array.isArray(rows)||!rows.length)return{success:false,error:'Project not found'};
        var p=rows[0];return{success:true,project:{id:p.id,name:p.name,data:p.data,updatedAt:p.updated_at,createdAt:p.created_at}};
      }
      case 'save':{
        var proj=params.project||params;
        var payload={id:proj.id,name:proj.name,data:proj.data,saved_by:proj.savedBy||params.savedBy||getCloudName()||null,updated_at:new Date().toISOString()};
        await fetch(SUPABASE_URL+'/rest/v1/drawing_projects',{method:'POST',headers:Object.assign({},sbJsonHeaders(),{'Prefer':'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(payload)}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t||('HTTP '+r.status));});});
        return{success:true,id:proj.id};
      }
      case 'delete':{
        await sbWrite('DELETE','drawing_projects?id=eq.'+encodeURIComponent(params.id));
        return{success:true};
      }
      default:
        console.warn('[HH editor] Unknown action:',action);
        return{success:false,error:'Unknown action: '+action};
    }
  }catch(err){
    console.warn('[HH editor] apiPost error for',action,':',err.message);
    return{success:false,error:err.message};
  }
}

async function cloudSaveAs(name){
  // Always creates a NEW cloud project (fork-style)
  const projName=name||prompt('Save as new cloud project. Name:','Menu '+new Date().toLocaleDateString());
  if(!projName||!projName.trim())return;
  toast('Saving to cloud...','info');
  const payload=currentPayload();
  const lightPayload=Object.assign({},payload,{imgDataURL:''});
  const newId=uid();
  const result=await cloudRequest('save',{project:{id:newId,name:projName.trim(),savedBy:getCloudName(),data:lightPayload}});
  if(result?.success){
    setActiveCloudId(newId,projName.trim());
    toast('Saved "'+projName.trim()+'" to cloud!','success');
    rebuildSidePanel();
  } else toast('Cloud save failed: '+(result?.error||'unknown'),'error');
}
async function cloudSaveOver(id,name){
  // Overwrites an EXISTING cloud project — id required
  if(!id){toast('No active cloud project to save over','error');return;}
  toast('Updating "'+name+'"...','info');
  const payload=currentPayload();
  const lightPayload=Object.assign({},payload,{imgDataURL:''});
  const result=await cloudRequest('save',{project:{id:id,name:name,savedBy:getCloudName(),data:lightPayload}});
  if(result?.success){
    setActiveCloudId(id,name);
    toast('Saved "'+name+'"!','success');
    rebuildSidePanel();
  } else toast('Cloud save failed: '+(result?.error||'unknown'),'error');
}
/* Backward-compat alias used by old code paths */
async function cloudSave(name){return cloudSaveAs(name);}
async function cloudUpdate(id,name){return cloudSaveOver(id,name);}
async function cloudList(){const result=await cloudRequest('list');if(result?.success)return result.projects||[];toast('Could not load cloud projects: '+(result?.error||'unknown'),'error');return[];}
async function cloudLoad(id){
  toast('Loading from cloud...','info');
  const result=await cloudRequest('load',{id});
  if(result?.success&&result.project?.data){
    await applyPayload(result.project.data);
    setActiveCloudId(result.project.id,result.project.name);
    toast('Loaded "'+result.project.name+'"!','success');
    rebuildSidePanel();
  } else toast('Cloud load failed: '+(result?.error||'unknown'),'error');
}
async function cloudRename(id,oldName){
  const newName=prompt('Rename cloud project:',oldName);
  if(newName===null||!newName.trim()||newName.trim()===oldName)return;
  // Load full data first (server save needs the data field)
  toast('Renaming...','info');
  const loadRes=await cloudRequest('load',{id});
  if(!loadRes?.success||!loadRes.project){toast('Could not rename: load failed','error');return;}
  const result=await cloudRequest('save',{project:{id:id,name:newName.trim(),savedBy:getCloudName(),data:loadRes.project.data}});
  if(result?.success){
    if(getActiveCloudId()===id)setActiveCloudId(id,newName.trim());
    toast('Renamed!','success');
    rebuildSidePanel();
  } else toast('Rename failed: '+(result?.error||'unknown'),'error');
}
async function cloudDelete(id,name){
  if(!confirm('Delete "'+name+'" from cloud? This affects everyone.'))return;
  const result=await cloudRequest('delete',{id});
  if(result?.success){
    if(getActiveCloudId()===id)setActiveCloudId(null);
    toast('Deleted from cloud','info');
    rebuildSidePanel();
  } else toast('Cloud delete failed: '+(result?.error||'unknown'),'error');
}

/* ═══════════════════════════════════════════════════════════
   SIDES CLASSIFIER — matches delivery.html's getKnownSidesSet
   Used to auto-split legacy items[] into meats/sides on load.
   ═══════════════════════════════════════════════════════════ */
function normalizeItemName(s){return String(s||'').toLowerCase().replace(/^\s*[\u2022\u2023\u25E6\u2043\u2219\-\*]\s*/,'').replace(/\s*&\s*/g,' and ').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
const KNOWN_SIDES = [
  'Mac & Cheese','Macaroni & Cheese','Macaroni and Cheese','Cornbread','Rolls','Biscuits',
  'Rice','White Rice','Steamed Rice','Beans','Baked Beans',
  'Greens','Collard Greens','Mustard Greens','Turnip Greens',
  'Mashed Potatoes','Mashed Potatoes & Gravy','Mashed Potatoes and Gravy',
  'Sweet Potato','Sweet Potatoes','Sweet Potato Casserole',
  'Black-eyed Peas','Black Eyed Peas','Field Peas','Green Beans','String Beans',
  'Corn','Creamed Corn','Corn on the Cob','Cabbage','Fried Cabbage',
  'Fried Okra','Okra','Stewed Okra','Potato Salad','Coleslaw','Cole Slaw','Slaw',
  'Green Salad','Tossed Salad','Side Salad','Hushpuppies','Hush Puppies',
  'Baked Potato','Loaded Baked Potato','French Fries','Fries','Fried Potatoes',
  'Dirty Rice','Broccoli','Cauliflower','Carrots','Squash',
  'Dressing','Cornbread Dressing','Stuffing','Macaroni Salad','Pasta Salad',
  'Lima Beans','Butter Beans','Pinto Beans','Black Beans'
];
const KNOWN_SIDES_SET = (function(){var s={};KNOWN_SIDES.forEach(function(n){s[normalizeItemName(n)]=true;});return s;})();
function isSideName(name){return !!KNOWN_SIDES_SET[normalizeItemName(name)];}
function isSameDailyName(name){
  // Uses menu_defaults.sameDaily if loaded, else known globals
  var globals = (menuDefaultsCache && menuDefaultsCache.sameDaily && menuDefaultsCache.sameDaily.items) || [];
  var normSet = {};
  globals.forEach(function(it){var n=typeof it==='string'?it:(it&&it.name)||'';if(n)normSet[normalizeItemName(n)]=true;});
  // Fallback hardcoded in case defaults haven't loaded
  if (!globals.length) {
    ['Turkey Clubs','Turkey Club','Chicken Salad','Chicken Salad Croissants','Chicken Salad Croissant','Croissants','Croissant'].forEach(function(n){normSet[normalizeItemName(n)]=true;});
  }
  return !!normSet[normalizeItemName(name)];
}
function isNonFoodLine(name){
  var n = normalizeItemName(name);
  if (!n) return true;
  if (/\d+\s*\d*\s*(am|pm)/i.test(n)) return true;
  if (n === 'lunch' || n === 'sides' || n === 'meats' || n === 'same daily') return true;
  if (/^(lunch|breakfast|dinner|menu|sides|meats)\s*$/i.test(n)) return true;
  return false;
}
/* Split legacy items[] into {meats, sides} — used to migrate old rows on load */
function splitItemsIntoMeatsSides(items){
  if (!Array.isArray(items)) return { meats: [], sides: [] };
  var meats = [], sides = [];
  items.forEach(function(it){
    var name = typeof it === 'string' ? it : (it && it.name) || '';
    if (!name) return;
    if (isNonFoodLine(name)) return;
    if (isSameDailyName(name)) return;   // drop same-daily items
    var item = typeof it === 'object' ? it : { name: name, desc: '' };
    if (isSideName(name)) sides.push(item);
    else meats.push(item);
  });
  return { meats: meats, sides: sides };
}

async function publishLunch(){
  // Detect whether the structured Lunch Forecast fields are present (and populated).
  const meatsTA = document.getElementById('lunchMeatsTA');
  const sidesTA = document.getElementById('lunchSidesTA');
  const sameDailyTA = document.getElementById('lunchSameDailyTA');
  const hasStructured = meatsTA && (meatsTA.value || '').trim().length > 0;

  let meatsArr, sidesArr, sameDailyArr, itemsArr;

  if (hasStructured) {
    const parse = text => linesTo(text).map(line => {
      const parts = line.split('|');
      return { name: (parts[0]||'').trim(), desc: parts.slice(1).join('|').trim() };
    }).filter(i => i.name);
    meatsArr = parse(meatsTA.value);
    sidesArr = parse(sidesTA?.value || '');
    sameDailyArr = parse(sameDailyTA?.value || '');
    const globals = (menuDefaultsCache?.sameDaily?.items) || [];
    const effectiveSameDaily = sameDailyArr.length ? sameDailyArr :
      globals.map(i => typeof i === 'string' ? { name: i, desc: '' } : i);
    itemsArr = [].concat(meatsArr, sidesArr, effectiveSameDaily);
  } else {
    // Fallback: parse from canvas Lunch text box (old behavior, for folks still using it)
    const lunchBox = boxes.find(b => b.name === 'Lunch');
    if (!lunchBox || !lunchBox.text.trim()) { toast('Fill the Lunch Forecast fields (or the canvas Lunch text box)', 'error'); return; }
    const lines = lunchBox.text.split('\n').map(l => l.trim()).filter(Boolean);
    const parsedItems = [];
    for (const line of lines) {
      if (line.toUpperCase() === 'LUNCH') continue;
      if (/^\d{1,2}:\d{2}\s*(AM|PM)/i.test(line)) continue;
      if (/^(Same Daily|Same daily)/i.test(line)) continue;  // skip the header
      let clean = line.replace(/^[\u2022\u2023\u25E6\u2043\u2219\-\*]\s*/, '').trim();
      if (clean) parsedItems.push({name: clean, desc: ''});
    }
    if (!parsedItems.length) { toast('Could not parse any lunch items', 'error'); return; }
    const split = splitItemsIntoMeatsSides(parsedItems);
    meatsArr = split.meats;
    sidesArr = split.sides;
    sameDailyArr = [];
    itemsArr = parsedItems;
  }

  const now = new Date();
  const dateISO = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const preview = meatsArr.map(i => i.name).slice(0, 8).join(', ') + (meatsArr.length > 8 ? '...' : '');

  if (!confirm('Publish lunch for ' + dateISO + '?\n\n' +
      meatsArr.length + ' meat(s): ' + preview + '\n' +
      sidesArr.length + ' side(s)\n' +
      (sameDailyArr.length ? sameDailyArr.length + ' Same Daily override' : 'Using global Same Daily'))) return;

  toast('Publishing to live menu...', 'info');
  try {
    const result = await apiPost({
      action: 'save-lunch',
      date: dateISO,
      data: {
        lunch: { show: true, items: itemsArr, meats: meatsArr, sides: sidesArr, sameDaily: sameDailyArr },
        dessert: { items: [] },
        crawfish: { show: false }
      },
      publishedBy: getCloudName()
    });
    if (result?.success) toast('Published! '+meatsArr.length+' meats, '+sidesArr.length+' sides now live.', 'success');
    else toast('Publish failed: '+(result?.error||'unknown error'), 'error');
  } catch(e) { toast('Publish error: '+e.message, 'error'); }
}

function linesTo(text){return String(text||'').split('\n').map(s=>s.trim()).filter(Boolean);}

function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isoToDay(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long'});}
function isoToLabel(iso){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);return dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
function getClosingMinutes(dayName){const hours=(menuDefaultsCache&&menuDefaultsCache.hours&&menuDefaultsCache.hours.weekly)||[];const entry=hours.find(h=>String(h.day||'').toLowerCase()===String(dayName||'').toLowerCase());if(!entry||!entry.close)return 14*60;const m=entry.close.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 14*60;let h=parseInt(m[1]),mn=parseInt(m[2]);if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+mn;}
function isClosedDay(dayName){const hours=(menuDefaultsCache&&menuDefaultsCache.hours&&menuDefaultsCache.hours.weekly)||[];const entry=hours.find(h=>String(h.day||'').toLowerCase()===String(dayName||'').toLowerCase());// No entry OR no open/close = closed
return !entry || (!entry.open && !entry.close);}
function getDayOffset(){const now=new Date();const dayName=now.toLocaleDateString('en-US',{weekday:'long'});const nowMins=now.getHours()*60+now.getMinutes();const closeMins=getClosingMinutes(dayName);return nowMins>=closeMins?1:0;}
function dateOffsetAdj(n){
  // Start from today + the after-close shift
  let shift=getDayOffset();
  const d=new Date();
  d.setDate(d.getDate()+n+shift);
  // Now skip forward over any consecutive closed days (max 7 hops to prevent infinite loop)
  for(let i=0;i<7;i++){
    const dayName=d.toLocaleDateString('en-US',{weekday:'long'});
    if(!isClosedDay(dayName))break;
    d.setDate(d.getDate()+1);
  }
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function wireAiLunchTab(){
  // 1) Show the LEFT side panel and render the Lunch editor into it
  const leftPanel = document.getElementById('sidePanelLeft');
  const leftScroll = document.getElementById('sideScrollLeft');
  if(leftPanel && leftScroll){
    leftPanel.style.display = 'flex';
    leftPanel.classList.add('active');
    leftScroll.innerHTML = buildMenuLunch();
  }

  // 2) Wire the Lunch editor (it uses document.querySelectorAll so works regardless of where it lives)
  wireMenuPanel();

  // 3) Track the active date
  _aiTabSelectedDate = dateOffsetAdj(0);
  document.querySelectorAll('.lunchDateBtn').forEach(btn => {
    btn.addEventListener('click', () => { _aiTabSelectedDate = btn.dataset.date; });
  });

  // 4) Wire AI buttons (in the RIGHT panel)
  const snapBtn = document.getElementById('aiSnapBtn');
  const pickBtn = document.getElementById('aiPickBtn');
  const fileInp = document.getElementById('aiPhotoFile');

  if(snapBtn) snapBtn.addEventListener('click', () => {
    fileInp.setAttribute('capture','environment');
    fileInp.click();
  });
  if(pickBtn) pickBtn.addEventListener('click', () => {
    fileInp.removeAttribute('capture');
    fileInp.click();
  });
  if(fileInp) fileInp.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    e.target.value = '';
    await runAiPublishFlow(file);
  });

  // 5) Wire training buttons
  const trainStartBtn = document.getElementById('trainStartBtn');
  const trainUseCurrentBtn = document.getElementById('trainUseCurrentBtn');
  const trainClearBtn = document.getElementById('trainClearBtn');
  if(trainStartBtn) trainStartBtn.addEventListener('click', startBoxTraining);
  if(trainUseCurrentBtn) trainUseCurrentBtn.addEventListener('click', useCurrentBoxAsTrained);
  if(trainClearBtn) trainClearBtn.addEventListener('click', clearTrainedBox);

  // 6) Refresh the trained box info display
  refreshTrainedBoxInfo();
}

    info:    'background:rgba(100,140,255,.12);color:#7c9eff;border:1px solid rgba(100,140,255,.25);',
    loading: 'background:rgba(255,200,80,.12);color:#ffc850;border:1px solid rgba(255,200,80,.25);',

/* Build the canvas Lunch text box content in the exact format the user wants:
   LUNCH
   11:00 AM - 2:00 PM
   
   • <meats>
   • <sides>
   
   Same Daily
   • <same daily items>
*/
function buildCanvasLunchText(meats, sides, sameDailyOverride){
  const items = [].concat(
    (meats||[]).map(i => typeof i==='string' ? i : i.name),
    (sides||[]).map(i => typeof i==='string' ? i : i.name)
  ).filter(Boolean);

  let sd = (sameDailyOverride||[]).map(i => typeof i==='string' ? i : (i.name||'')).filter(Boolean);
  if(!sd.length){
    const globals = (menuDefaultsCache && menuDefaultsCache.sameDaily && menuDefaultsCache.sameDaily.items) || [];
    sd = globals.map(i => typeof i==='string' ? i : (i.name||'')).filter(Boolean);
  }

  let txt = 'LUNCH\n11:00 AM - 2:00 PM\n';
  if(items.length) txt += '\n' + items.map(n => '\u2022 ' + n).join('\n');
  if(sd.length)    txt += '\n\nSame Daily\n' + sd.map(n => '\u2022 ' + n).join('\n');
  return txt;
}

/* ═══════════════════════════════════════════════════════════
   BOX TRAINING — draw a rectangle on the canvas to set the
   target area for the Lunch text. Saved to Supabase under the
   `lunchBoxBounds` menu_default key so it works everywhere.

   Stored format:
     { xPct: <number>, yPct: <number>, wPct: <number>, hPct: <number> }
   Where x,y are the TOP-LEFT corner of the box (% of canvas) and
   w,h are the box's width/height (% of canvas).
   ═══════════════════════════════════════════════════════════ */

// Get the current trained bounds from the menu defaults cache
function getTrainedLunchBounds(){
  return (menuDefaultsCache && menuDefaultsCache.lunchBoxBounds) || null;
}

// Update the info card showing what's currently trained
function refreshTrainedBoxInfo(){
  const el = document.getElementById('trainedBoxDetails');
  if(!el) return;

    return;
  }
  el.innerHTML = `x: ${(+b.xPct).toFixed(1)}%, y: ${(+b.yPct).toFixed(1)}%<br>w: ${(+b.wPct).toFixed(1)}%, h: ${(+b.hPct).toFixed(1)}%`;
}

function setTrainStatus(msg, kind){

// "Use current box" — just capture wherever the Lunch text box is RIGHT NOW
// (in case user dragged/resized it manually and wants to lock that in)
async function useCurrentBoxAsTrained(){
  const lunchBox = boxes.find(b => b.name === 'Lunch');
  if(!lunchBox){ setTrainStatus('No "Lunch" text box on canvas', 'error'); return; }
  // Get its current rendered bounds
  if(!lunchBox.__hit){ draw(); }
  const h = lunchBox.__hit;
  if(!h){ setTrainStatus('Could not measure box — try again after canvas renders', 'error'); return; }
  const bounds = {
    xPct: (h.left / canvas.width) * 100,
    yPct: (h.top / canvas.height) * 100,
    wPct: ((h.right - h.left) / canvas.width) * 100,
    hPct: ((h.bottom - h.top) / canvas.height) * 100
  };
  await saveTrainedBounds(bounds);
}

async function clearTrainedBox(){
  if(!confirm('Clear the trained lunch box position?\n\nAI will fall back to template defaults.')) return;
  setTrainStatus('Clearing…', 'loading');
  try {
    const res = await apiPost({ action:'resetMenuDefault', key:'lunchBoxBounds' });
    if(res && res.success){
      if(menuDefaultsCache) delete menuDefaultsCache.lunchBoxBounds;
      setTrainStatus('Trained box cleared.', 'success');
      refreshTrainedBoxInfo();
    } else {
      setTrainStatus('Clear failed: '+(res?.error||'unknown'), 'error');
    }
  } catch(e){
    setTrainStatus('Clear error: '+e.message, 'error');
  }
}

async function saveTrainedBounds(bounds){
  setTrainStatus('Saving trained box…', 'loading');
  try {
    const res = await apiPost({ action:'saveMenuDefault', key:'lunchBoxBounds', json: JSON.stringify(bounds) });
    if(res && res.success){
      if(!menuDefaultsCache) menuDefaultsCache = {};
      menuDefaultsCache.lunchBoxBounds = bounds;
      setTrainStatus('Saved! AI will now fit lunch text into this box.', 'success');
      refreshTrainedBoxInfo();
      // Apply the trained bounds to the current Lunch box right now so user sees the change
      const lunchBox = boxes.find(b => b.name === 'Lunch');
      if(lunchBox){
        saveUndo();
        autoFitLunchBox(lunchBox);
        draw();
        triggerAutoSave();
      }
    } else {
      setTrainStatus('Save failed: '+(res?.error||'unknown'), 'error');
    }
  } catch(e){
    setTrainStatus('Save error: '+e.message, 'error');
  }
}

// State for the drawing session
let _trainDragging = false;
let _trainStartCanvas = null;  // {x,y} in canvas coordinates
let _trainOverlay = null;
let _trainRect = null;
let _trainStartScreen = null;  // {x,y} in screen coordinates relative to canvas

function startBoxTraining(){
  // Build the overlay covering the canvas area
  const canvasArea = document.querySelector('.canvas-area');
  if(!canvasArea){ setTrainStatus('Could not find canvas area', 'error'); return; }

  // Make sure the area is position:relative so we can absolutely-position overlay
  if(getComputedStyle(canvasArea).position === 'static') canvasArea.style.position = 'relative';

  // Clean up any prior overlay
  endBoxTraining();

  _trainOverlay = document.createElement('div');
  _trainOverlay.className = 'train-overlay';
  _trainOverlay.innerHTML = '<div class="train-hint">Click and drag on the canvas to draw the lunch text box.<br>Release to save.</div>';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'train-cancel';
  cancelBtn.textContent = '\u2715 Cancel';
  cancelBtn.addEventListener('click', endBoxTraining);
  _trainOverlay.appendChild(cancelBtn);
  canvasArea.appendChild(_trainOverlay);

  // Wire mouse/touch on the overlay
  _trainOverlay.addEventListener('pointerdown', onTrainDown);
  _trainOverlay.addEventListener('pointermove', onTrainMove);
  _trainOverlay.addEventListener('pointerup',   onTrainUp);
  _trainOverlay.addEventListener('pointercancel', onTrainUp);

  setTrainStatus('Drawing mode — click & drag on the canvas', 'info');
}

function endBoxTraining(){
  if(_trainOverlay){
    _trainOverlay.remove();
    _trainOverlay = null;
  }
  _trainRect = null;
  _trainDragging = false;
  _trainStartScreen = null;
  _trainStartCanvas = null;
}

// Convert a pointer client position to canvas-pixel coords (matches the existing
// rawFromClient helper used by the editor's drag handlers).
function clientToCanvasCoords(cx, cy){
  const r = canvas.getBoundingClientRect();
  return {
    x: (cx - r.left) * (canvas.width / r.width),
    y: (cy - r.top)  * (canvas.height / r.height)
  };
}

function onTrainDown(e){
  e.preventDefault();
  e.stopPropagation();
  _trainDragging = true;
  _trainStartCanvas = clientToCanvasCoords(e.clientX, e.clientY);
  _trainStartScreen = { x: e.clientX, y: e.clientY };
  // Create rect element
  _trainRect = document.createElement('div');
  _trainRect.className = 'train-rect';
  const rect = canvas.getBoundingClientRect();
  const overlayRect = _trainOverlay.getBoundingClientRect();
  // Position relative to the overlay
  const startX = e.clientX - overlayRect.left;
  const startY = e.clientY - overlayRect.top;
  _trainRect.style.left = startX + 'px';
  _trainRect.style.top  = startY + 'px';
  _trainRect.style.width = '0';
  _trainRect.style.height = '0';
  _trainOverlay.appendChild(_trainRect);
  _trainOverlay.setPointerCapture(e.pointerId);
}

function onTrainMove(e){
  if(!_trainDragging || !_trainRect) return;
  e.preventDefault();
  const overlayRect = _trainOverlay.getBoundingClientRect();
  const startScreenX = _trainStartScreen.x - overlayRect.left;
  const startScreenY = _trainStartScreen.y - overlayRect.top;
  const curScreenX = e.clientX - overlayRect.left;
  const curScreenY = e.clientY - overlayRect.top;
  const left = Math.min(startScreenX, curScreenX);
  const top  = Math.min(startScreenY, curScreenY);
  const w = Math.abs(curScreenX - startScreenX);
  const h = Math.abs(curScreenY - startScreenY);
  _trainRect.style.left = left + 'px';
  _trainRect.style.top  = top + 'px';
  _trainRect.style.width = w + 'px';
  _trainRect.style.height = h + 'px';
}

async function onTrainUp(e){
  if(!_trainDragging) return;
  _trainDragging = false;
  const endCanvas = clientToCanvasCoords(e.clientX, e.clientY);
  const x1 = Math.min(_trainStartCanvas.x, endCanvas.x);
  const y1 = Math.min(_trainStartCanvas.y, endCanvas.y);
  const x2 = Math.max(_trainStartCanvas.x, endCanvas.x);
  const y2 = Math.max(_trainStartCanvas.y, endCanvas.y);
  const wPx = x2 - x1, hPx = y2 - y1;

  // Validate: minimum 30×30 px so accidental clicks don't save a tiny box
  if(wPx < 30 || hPx < 30){
    setTrainStatus('Box too small — try again (drag a bigger rectangle)', 'error');
    endBoxTraining();
    return;
  }

  const bounds = {
    xPct: (x1 / canvas.width)  * 100,
    yPct: (y1 / canvas.height) * 100,
    wPct: (wPx / canvas.width)  * 100,
    hPct: (hPx / canvas.height) * 100
  };

  endBoxTraining();
  await saveTrainedBounds(bounds);
}

/* AUTO-FIT — apply trained bounds (if any), then shrink font to fit.
   This replaces the prior simple version. */
function autoFitLunchBox(lunchBox){
  if(!lunchBox) return;

  // Get the target bounds. Prefer trained, fall back to template default.
  const trained = getTrainedLunchBounds();
  const bounds = trained ? trained : {
    xPct: 8,           // bottom-left column on template
    yPct: 68,
    wPct: 22,
    hPct: 22
  };

  // Position the box so its TOP-LEFT corner lands at (xPct, yPct).
  // The renderer centers boxes on (xPct, yPct), so we need to offset by half width/height.
  // We render first to measure, then position. Use a 2-pass approach.
  lunchBox.maxWidthPct = bounds.wPct;
  lunchBox.align = 'left';

  // Center-point of the trained rectangle:
  const centerX = bounds.xPct + bounds.wPct / 2;
  const centerY = bounds.yPct + bounds.hPct / 2;
  lunchBox.xPct = centerX;
  lunchBox.yPct = centerY;

  // ── Shrink to fit ──
  const text = lunchBox.text || '';
  const explicitLines = text.split('\n');
  const lineHeight = lunchBox.lineHeight || 1.22;

  // Iteratively try sizes from largest to smallest
  let sizePct = 1.50; // start big — auto-grow first
  const minSize = 0.50;
  const stepDown = 0.04;
  while(sizePct >= minSize){
    // Estimate chars-per-line at this size given the box width
    const charsPerLine = Math.max(12, Math.round(bounds.wPct * 2.5 / sizePct));
    let wrappedLines = 0;
    for(const l of explicitLines){
      wrappedLines += Math.max(1, Math.ceil((l.length || 1) / charsPerLine));
    }
    const totalHeight = wrappedLines * sizePct * lineHeight;
    if(totalHeight <= bounds.hPct) break;
    sizePct -= stepDown;
  }
  if(sizePct < minSize) sizePct = minSize;

  lunchBox.sizePct = sizePct;
}

/* The main AI Publish flow — runs everything in sequence */
async function runAiPublishFlow(file){
  try {
    // 1. Make sure defaults are loaded
    if(!menuDefaultsCache){
      setAiTabStatus('Loading menu defaults…', 'loading');
      await loadMenuDefaults();
    }

    // 2. Resolve the active date — first check our cached date, then the
    //    actually-active button (in case user clicked one without our listener catching it)
    let date = _aiTabSelectedDate;
    const activeDateBtn = document.querySelector('.lunchDateBtn.primary');
    if(activeDateBtn && activeDateBtn.dataset.date) date = activeDateBtn.dataset.date;
    if(!date) date = dateOffsetAdj(0);

    // 3. Prepare the photo (always re-encode via canvas)
    setAiTabStatus('Preparing photo ('+Math.round(file.size/1024)+' KB '+file.type+')…', 'loading');
    let blob, mediaType;
    try {
      blob = await compressImageForAiTab(file, 1600, 0.85);
      mediaType = 'image/jpeg';
    } catch(prepErr){
      const supportedTypes = ['image/jpeg','image/jpg','image/png','image/gif','image/webp'];
      const fileType = (file.type||'').toLowerCase();
      if(supportedTypes.includes(fileType)){
        blob = file; mediaType = fileType;
      } else {
        setAiTabStatus('Cannot process this photo format ('+(file.type||'unknown')+'). On iPhone: Settings → Camera → Formats → Most Compatible.', 'error');
        return;
      }
    }
    if(blob.size > 5*1024*1024){
      setAiTabStatus('Photo too large after compression ('+Math.round(blob.size/1024/1024)+'MB).', 'error');
      return;
    }

    // 4. Send to AI
    setAiTabStatus('Sending '+Math.round(blob.size/1024)+'KB to Claude…', 'loading');
    const base64 = await fileToBase64Tab(blob);
    const userPrompt = (document.getElementById('aiUserPrompt')?.value || '').trim();

    const resp = await fetch('/api/ai-extract-menu', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: base64, imageMediaType: mediaType, userPrompt: userPrompt })
    });
    let data;
    try { data = await resp.json(); }
    catch(jsonErr){
      const rawTxt = await resp.text().catch(()=>'(no body)');
      setAiTabStatus('Server returned bad data (HTTP '+resp.status+'): '+rawTxt.slice(0,200), 'error');
      return;
    }
    if(!resp.ok || !data.success){
      let msg = data.error || ('HTTP '+resp.status);
      if(data.debug) msg += ' [bytes:'+data.debug.imageBytes+' format:'+data.debug.detectedFormat+']';
      setAiTabStatus('Failed: '+msg, 'error');
      console.error('AI extract response:', data);
      return;
    }

    const meats = data.meats || [];
    const sides = data.sides || [];

    // 5. Show preview of extracted items
    renderAiPreview(meats, sides);

    // 6. Fill the right-side Lunch form fields with the new items
    const meatsTA = document.getElementById('lunchMeatsTA');
    const sidesTA = document.getElementById('lunchSidesTA');
    if(meatsTA) meatsTA.value = data.meatsText || '';
    if(sidesTA) sidesTA.value = data.sidesText || '';

    const autoPublish = document.getElementById('aiAutoPublish')?.checked;
    const autoCanvas  = document.getElementById('aiAutoCanvas')?.checked;
    const autoFit     = document.getElementById('aiAutoFit')?.checked;

    const actions = [];

    // 7. Update canvas Day & Date boxes for the selected date
    if(autoCanvas){
      const dayBox  = boxes.find(b => b.name === 'Day');
      const dateBox = boxes.find(b => b.name === 'Date');
      const [yyyy, mm, dd] = date.split('-').map(Number);
      const dt = new Date(yyyy, mm-1, dd);
      const dayName = dt.toLocaleDateString(undefined, {weekday: 'long'});
      const dateStr = dt.toLocaleDateString(undefined, {month: 'long', day: 'numeric', year: 'numeric'});
      let canvasChanged = false;
      if(dayBox && dayBox.text !== dayName) { dayBox.text = dayName; canvasChanged = true; }
      if(dateBox && dateBox.text !== dateStr) { dateBox.text = dateStr; canvasChanged = true; }

      // 8. Update canvas Lunch text box + auto-fit
      const lunchBox = boxes.find(b => b.name === 'Lunch');
      if(lunchBox){
        if(canvasChanged === false) saveUndo(); // saveUndo if we haven't already implicitly via earlier change
        else saveUndo();
        lunchBox.text = buildCanvasLunchText(meats, sides, []);
        if(autoFit) autoFitLunchBox(lunchBox);
        canvasChanged = true;
        actions.push('canvas updated' + (autoFit ? ' (auto-fit)' : ''));
      } else {
        actions.push('canvas SKIPPED (no "Lunch" text box)');
      }

      if(canvasChanged){
        draw();
        triggerAutoSave();
      }
    }

    // 9. Auto-publish to website
    if(autoPublish){
      setAiTabStatus('Publishing to website for '+isoToLabel(date)+'…', 'loading');
      const itemsArr = [].concat(meats, sides);
      const dateData = {
        lunch: { show: true, items: itemsArr, meats: meats, sides: sides, sameDaily: [] },
        dessert: { items: [] },
        crawfish: { show: false }  // default OFF per user request
      };
      try {
        const pubRes = await apiPost({
          action: 'save-lunch',
          date: date,
          data: dateData,
          publishedBy: getCloudName()
        });
        if(pubRes?.success){
          actions.push('published to '+date);
        } else {
          actions.push('publish FAILED ('+(pubRes?.error||'unknown')+')');
        }
      } catch(e){
        actions.push('publish ERROR ('+e.message+')');
      }
    }

    const summary = 'Done! '+meats.length+' meats, '+sides.length+' sides. '+actions.join(' \u2022 ');
    setAiTabStatus(summary, 'success');
    toast('AI extracted '+(meats.length+sides.length)+' items', 'success');

  } catch (err) {
    setAiTabStatus('Error: '+(err.message||String(err)), 'error');
    console.error('AI publish error:', err);
  }
}

// Helpers — local to the AI tab to avoid name clashes
function fileToBase64Tab(blob){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = String(r.result || '');
      const comma = dataUrl.indexOf(',');
      resolve(comma >= 0 ? dataUrl.slice(comma+1) : dataUrl);
    };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
async function compressImageForAiTab(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxDim || h > maxDim){
        const scale = Math.min(maxDim/w, maxDim/h);
        w = Math.round(w*scale); h = Math.round(h*scale);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.fillStyle = '#fff'; cx.fillRect(0,0,w,h);
      cx.drawImage(img, 0, 0, w, h);
      c.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/jpeg', quality);
    };
    img.onerror = () => reject(new Error('Browser could not decode this image (type: '+(file.type||'unknown')+')'));
    reader.readAsDataURL(file);
  });
}

      html+='<div style="display:flex;align-items:center;gap:6px;padding:8px;border-radius:var(--radius-sm);margin-bottom:4px;background:'+(isPast?'rgba(255,77,77,.04)':'rgba(255,255,255,.03)')+';border:1px solid '+(isPast?'rgba(255,77,77,.12)':'var(--border)')+';"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;">'+esc(day)+' '+ageBadge+shapeTag+'</div><div style="font-size:10px;color:var(--text3);">'+esc(label)+' \u2022 '+itemCount+' item'+(itemCount===1?'':'s')+(meatCount>0?' ('+meatCount+' meats)':'')+'</div></div><button class="sm-btn savedDateLoad" data-date="'+esc(date)+'">Load</button><button class="sm-btn danger savedDateDel" data-date="'+esc(date)+'" data-day="'+esc(day)+'" style="padding:4px 8px;">\u00d7</button></div>';
    });
    if(pastCount>0)html='<div style="font-size:11px;color:var(--text2);padding:6px 0;margin-bottom:6px;">Total: '+keys.length+' \u2022 <span style="color:#ff7a7a;font-weight:700;">'+pastCount+' past</span></div>'+html;
    else html='<div style="font-size:11px;color:var(--text2);padding:6px 0;margin-bottom:6px;">Total: '+keys.length+' dates</div>'+html;
    el.innerHTML=html;
    el.querySelectorAll('.savedDateDel').forEach(btn=>{btn.addEventListener('click',async()=>{const date=btn.dataset.date;const day=btn.dataset.day;if(!confirm('Delete lunch for '+day+' ('+date+')?'))return;const ok=await deleteLunchForDate(date);if(ok)refreshSavedDatesList();});});
    el.querySelectorAll('.savedDateLoad').forEach(btn=>{btn.addEventListener('click',()=>{const date=btn.dataset.date;const dayBtn=document.querySelector('.lunchDateBtn[data-date="'+date+'"]');if(dayBtn){dayBtn.click();}else{toast('Date '+date+' outside 7-day range','info');}});});
    window._lastSavedDates=dates;
  }catch(e){el.innerHTML='<div style="font-size:11px;color:var(--danger);padding:6px;">Error: '+e.message+'</div>';}
}

async function deleteAllPastDates(){
  try{
    const result=await apiPost({action:'lunch'});if(!result||!result.success){toast('Could not load','error');return;}
    const dates=result.dates||{};const todayStr=todayISO();const pastKeys=Object.keys(dates).filter(d=>d<todayStr).sort();
    if(!pastKeys.length){toast('No past dates','info');return;}
    if(!confirm('Delete '+pastKeys.length+' past dates?\n\n'+pastKeys.join('\n')))return;
    toast('Deleting...','info');let deleted=0,failed=0;
    for(const date of pastKeys){try{const r=await apiPost({action:'delete-lunch',date:date});if(r&&r.success)deleted++;else failed++;}catch(e){failed++;}}
    if(failed===0)toast('Deleted '+deleted+' dates','success');else toast('Deleted '+deleted+', failed '+failed,'error');
    refreshSavedDatesList();
  }catch(e){toast('Error: '+e.message,'error');}
}

function wireMenuPanel(){
  document.querySelectorAll('.lunchDateBtn').forEach(btn=>{
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.lunchDateBtn').forEach(b=>b.classList.remove('primary'));
      btn.classList.add('primary');
      const date=btn.dataset.date;
      const el=document.getElementById('lunchDateEditor');
      if(!el) return;
      el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px;">Loading...</div>';

      // Make sure Same Daily globals are loaded (they affect auto-split)
      if (!menuDefaultsCache) await loadMenuDefaults();

      let lunchData=null;
      try {
        const result=await apiGet({action:'lunch'});
        if(result?.success && result?.dates?.[date]) lunchData=result.dates[date];
      } catch(e) { toast('Could not load','error'); }

      const lunch = lunchData?.lunch || {};
      let meats = Array.isArray(lunch.meats) ? lunch.meats : null;
      let sides = Array.isArray(lunch.sides) ? lunch.sides : null;
      let sameDailyOverride = Array.isArray(lunch.sameDaily) ? lunch.sameDaily : null;

      // BACKWARD COMPAT: split legacy items[] on load
      if (!meats && Array.isArray(lunch.items) && lunch.items.length) {
        const split = splitItemsIntoMeatsSides(lunch.items);
        meats = split.meats;
        sides = split.sides;
      }
      meats = meats || []; sides = sides || []; sameDailyOverride = sameDailyOverride || [];

      const fmtItems = arr => arr.map(i => {
        if (typeof i === 'object') return i.name + (i.desc ? ' | ' + i.desc : '');
        return i || '';
      }).join('\n');

      const dessertItems = lunchData?.dessert?.items || [];
      const showCrawfish = lunchData?.crawfish?.show === true;
      const globalSameDaily = (menuDefaultsCache?.sameDaily?.items) || [];
      const globalSdText = globalSameDaily.map(i => typeof i === 'object' ? i.name : i).join(', ');

      let lh='<div style="font-size:12px;font-weight:700;color:var(--fire);margin-bottom:8px;">'+isoToDay(date)+' \u2022 '+date+'</div>';

      lh+='<div class="lunch-section-card">';
      lh+='<div class="lunch-section-title meats">\ud83c\udf57 Meats</div>';
      lh+='<div class="lunch-section-hint">Main dishes only. Use <em>Name | Description</em> for expandable details.</div>';
      lh+='<textarea class="fi fi-ta" id="lunchMeatsTA" rows="8" placeholder="Beef Tips | Tender beef in gravy\nBBQ Chicken\nMeatloaf">'+esc(fmtItems(meats))+'</textarea>';
      lh+='</div>';

      lh+='<div class="lunch-section-card sides">';
      lh+='<div class="lunch-section-title sides">\ud83e\udd57 Sides</div>';
      lh+='<div class="lunch-section-hint">The sides offered with today\'s plates.</div>';
      lh+='<textarea class="fi fi-ta" id="lunchSidesTA" rows="6" placeholder="Mac & Cheese\nCornbread\nGreen Beans\nMashed Potatoes">'+esc(fmtItems(sides))+'</textarea>';
      lh+='</div>';

      lh+='<div class="lunch-section-card samedaily">';
      lh+='<div class="lunch-section-title samedaily">\ud83d\udcc5 Same Daily Override (this day only)</div>';
      lh+='<div class="lunch-section-hint">Leave blank to use global'+(globalSdText?' (<em>'+esc(globalSdText)+'</em>)':'')+'. Fill in to override.</div>';
      lh+='<textarea class="fi fi-ta" id="lunchSameDailyTA" rows="3" placeholder="(blank = global)">'+esc(fmtItems(sameDailyOverride))+'</textarea>';
      lh+='</div>';

      lh+='<div class="fr"><div><div class="fl">Dessert</div><input class="fi" id="lunchDessert" value="'+esc(dessertItems.join(', '))+'" placeholder="Cake"></div><div><div class="fl">Crawfish</div><label class="cf-toggle" style="margin-top:8px;"><input type="checkbox" id="lunchCrawfish"'+(showCrawfish?' checked':'')+'> Available</label></div></div>';

      lh+='<div class="btn-row" style="margin-top:8px;">';
      lh+='<button class="sm-btn primary" id="saveLunchDate">\ud83d\udcbe Save '+isoToLabel(date)+'</button>';
      lh+='<button class="sm-btn" id="syncCanvas" title="Push these items into the canvas Lunch text box">\ud83d\udd04 Sync to Canvas</button>';
      lh+='<button class="sm-btn danger" id="deleteLunchDate">\u00d7 Clear</button>';
      lh+='</div>';

      el.innerHTML=lh;

      const parseField = text => linesTo(text).map(line => {
        const parts = line.split('|');
        return { name: (parts[0]||'').trim(), desc: parts.slice(1).join('|').trim() };
      }).filter(i => i.name);

      document.getElementById('saveLunchDate')?.addEventListener('click', async () => {
        const meatsArr = parseField(document.getElementById('lunchMeatsTA').value);
        const sidesArr = parseField(document.getElementById('lunchSidesTA').value);
        const sameDailyArr = parseField(document.getElementById('lunchSameDailyTA').value);
        const effectiveSameDaily = sameDailyArr.length ? sameDailyArr :
          ((menuDefaultsCache?.sameDaily?.items) || []).map(i => typeof i === 'string' ? { name: i, desc: '' } : i);
        const itemsArr = [].concat(meatsArr, sidesArr, effectiveSameDaily);
        const dessert = linesTo(document.getElementById('lunchDessert').value.replace(/,/g, '\n'));
        const crawfish = document.getElementById('lunchCrawfish').checked;
        const dateData = {
          lunch: { show: true, items: itemsArr, meats: meatsArr, sides: sidesArr, sameDaily: sameDailyArr },
          dessert: { items: dessert },
          crawfish: { show: crawfish }
        };
        await saveLunchForDate(date, dateData);
      });

      document.getElementById('syncCanvas')?.addEventListener('click', () => {
        const meatLines = linesTo(document.getElementById('lunchMeatsTA').value).map(l => l.split('|')[0].trim()).filter(Boolean);
        const sideLines = linesTo(document.getElementById('lunchSidesTA').value).map(l => l.split('|')[0].trim()).filter(Boolean);
        const sdLines = linesTo(document.getElementById('lunchSameDailyTA').value).map(l => l.split('|')[0].trim()).filter(Boolean);
        const effectiveSameDaily = sdLines.length ? sdLines :
          ((menuDefaultsCache?.sameDaily?.items) || []).map(i => typeof i === 'string' ? i : (i.name || '')).filter(Boolean);

        let canvasText = 'LUNCH\n11:00 AM - 2:00 PM\n';
        if (meatLines.length) canvasText += '\n' + meatLines.map(n => '\u2022 ' + n).join('\n');
        if (sideLines.length) canvasText += '\n\n' + sideLines.map(n => '\u2022 ' + n).join('\n');
        if (effectiveSameDaily.length) canvasText += '\n\nSame Daily\n' + effectiveSameDaily.map(n => '\u2022 ' + n).join('\n');

        const lunchBox = boxes.find(b => b.name === 'Lunch');
        if (lunchBox) {
          saveUndo();
          lunchBox.text = canvasText;
          draw();
          triggerAutoSave();
          toast('Canvas updated!', 'success');
        } else {
          toast('No "Lunch" text box on canvas','error');
        }
      });

      document.getElementById('deleteLunchDate')?.addEventListener('click', async () => {
        if (!confirm('Clear lunch for '+date+'?')) return;
        await deleteLunchForDate(date);
        btn.click();
        refreshSavedDatesList();
      });
    });
  });
  const todayBtn=document.querySelector('.lunchDateBtn');
  if(todayBtn && (currentTab==='menu-lunch' || currentTab==='ai-lunch')) todayBtn.click();
  const lsd=document.getElementById('loadSavedDates');
  if(lsd) lsd.addEventListener('click', refreshSavedDatesList);
  const dap=document.getElementById('deleteAllPastDates');
  if(dap) dap.addEventListener('click', deleteAllPastDates);
  if (currentTab==='menu-lunch' || currentTab==='ai-lunch') setTimeout(refreshSavedDatesList, 100);
}

async function saveLunchForDate(date,data){try{const j=await apiPost({action:'save-lunch',date:date,data:data});if(j.success){toast('Saved for '+date,'success');if(typeof refreshSavedDatesList==='function')setTimeout(refreshSavedDatesList,300);return true;}else{toast('Save failed: '+(j.error||''),'error');return false;}}catch(e){toast('Save error: '+e.message,'error');return false;}}
async function deleteLunchForDate(date){try{const j=await apiPost({action:'delete-lunch',date:date});if(j.success){toast('Removed '+date,'info');return true;}}catch(e){}return false;}
