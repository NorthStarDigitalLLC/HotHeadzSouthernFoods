<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hot Headz – Menu Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --void:#0a0a0e;--surface:#131318;--card:#1a1a22;--border:rgba(255,255,255,.1);
      --text:#f0ece6;--text2:rgba(240,236,230,.7);--text3:rgba(240,236,230,.45);
      --fire:#ff7a18;--fire2:#ffb347;--ember:rgba(255,122,24,.15);
      --danger:#ff4d4d;--danger-bg:rgba(255,77,77,.12);
      --success:#4dff88;--success-bg:rgba(77,255,136,.12);
      --radius:14px;--radius-sm:10px;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--text);
      font-family:'DM Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}

    /* ── TOAST ── */
    #toastBox{position:fixed;top:16px;right:16px;z-index:100000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{pointer-events:auto;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
      color:#fff;backdrop-filter:blur(12px);animation:toastIn .35s ease,toastOut .4s 2.8s ease forwards;
      box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:340px;}
    .toast.success{background:rgba(30,60,40,.88);border:1px solid rgba(77,255,136,.25);}
    .toast.error{background:rgba(60,20,20,.88);border:1px solid rgba(255,77,77,.3);}
    .toast.info{background:rgba(20,30,60,.88);border:1px solid rgba(100,140,255,.25);}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}

    /* ── ADMIN GATE ── */
    .admin-gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;
      background:radial-gradient(ellipse at 30% 20%,#1e1510,#07060a);z-index:10000;}
    .admin-card{background:rgba(20,18,22,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);
      border-radius:28px;padding:44px 36px;text-align:center;max-width:480px;width:100%;
      box-shadow:0 40px 80px rgba(0,0,0,.5);animation:fadeUp .7s ease;}
    .lock-icon{font-size:56px;margin-bottom:16px;animation:floatLock 3s ease-in-out infinite;}
    .admin-card h1{font-family:'Abril Fatface',serif;font-size:32px;margin-bottom:12px;
      background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .admin-card p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
    .pin-row{display:flex;gap:10px;justify-content:center;margin:24px 0 14px;}
    .pin-row input{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:40px;padding:13px 18px;
      width:150px;font-size:20px;text-align:center;color:#fff;font-weight:700;letter-spacing:4px;}
    .pin-row input:focus{outline:none;border-color:var(--fire);}
    .unlock-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border:none;border-radius:40px;padding:13px 26px;
      font-size:16px;font-weight:800;color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    .unlock-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,122,24,.35);}
    .error-msg{color:var(--danger);font-size:13px;min-height:22px;margin-bottom:8px;}
    .gate-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
    .gate-links a{padding:11px 22px;border-radius:40px;font-weight:700;font-size:13px;text-decoration:none;transition:all .2s;}
    .gate-link-primary{background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;}
    .gate-link-ghost{border:1px solid var(--border);color:var(--text2);}
    .gate-link-ghost:hover{background:rgba(255,255,255,.06);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatLock{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    /* ── EDITOR SHELL ── */
    .editor{display:none;position:fixed;inset:0;z-index:9999;background:var(--void);flex-direction:column;}
    .editor.active{display:flex;}

    /* ── TOP BAR ── */
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);
      background:var(--surface);flex-shrink:0;min-height:52px;}
    .topbar-brand{font-family:'Abril Fatface',serif;font-size:16px;white-space:nowrap;
      background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
    .topbar-tabs{display:flex;gap:4px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .topbar-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--text2);
      font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;letter-spacing:.02em;}
    .tab-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
    .tab-btn.active{background:var(--ember);color:var(--fire);}
    .topbar-actions{display:flex;gap:6px;flex-shrink:0;}
    .tb-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.05);
      color:var(--text);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .tb-btn:hover{background:rgba(255,255,255,.1);}
    .tb-btn.undo{font-size:15px;padding:6px 10px;}
    .tb-btn.export-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;
      font-size:13px;font-weight:900;padding:8px 18px;}
    .tb-btn.export-btn:hover{box-shadow:0 4px 16px rgba(255,122,24,.3);}

    /* ── MAIN LAYOUT ── */
    .main-layout{flex:1;display:flex;min-height:0;overflow:hidden;}

    /* ── CANVAS PANEL ── */
    .canvas-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--void);}
    .canvas-toolbar{display:flex;gap:8px;padding:8px 12px;align-items:center;flex-wrap:wrap;
      border-bottom:1px solid var(--border);background:var(--surface);}
    .ct-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.05);
      color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .ct-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
    .ct-sep{flex:1;}
    .ct-label{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap;}
    .ct-range{width:100px;accent-color:var(--fire);}
    .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;min-height:0;}
    #hhMEcanvas{width:100%;height:100%;border-radius:var(--radius-sm);touch-action:none;background:#0e0e12;
      box-shadow:0 0 0 1px var(--border);}
    .canvas-foot{display:flex;gap:8px;padding:8px 12px;align-items:center;flex-wrap:wrap;
      border-top:1px solid var(--border);background:var(--surface);}
    .cf-toggle{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;}
    .cf-toggle input{accent-color:var(--fire);}

    /* ── SIDE PANEL ── */
    .side-panel{width:380px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);
      display:flex;flex-direction:column;overflow:hidden;}
    .side-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
    .side-scroll::-webkit-scrollbar{width:5px;}
    .side-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}

    /* Accordion sections */
    .acc{border-bottom:1px solid var(--border);}
    .acc-head{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}
    .acc-head:hover{background:rgba(255,255,255,.03);}
    .acc-arrow{font-size:10px;color:var(--text3);transition:transform .25s;flex-shrink:0;}
    .acc.open .acc-arrow{transform:rotate(90deg);}
    .acc-title{font-size:13px;font-weight:800;color:var(--text);flex:1;letter-spacing:-.01em;}
    .acc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--ember);color:var(--fire);}
    .acc-body{display:none;padding:0 14px 14px;}
    .acc.open .acc-body{display:block;}

    /* Form elements */
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
    .field:last-child{margin-bottom:0;}
    .field-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
    .field-input{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
      background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;width:100%;}
    .field-input:focus{outline:none;border-color:var(--fire);}
    .field-ta{resize:vertical;min-height:90px;line-height:1.5;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .field-range{width:100%;accent-color:var(--fire);}
    .field-select{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
      background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;}
    .field-color{height:40px;padding:4px 8px;cursor:pointer;}

    .btn-row{display:flex;gap:6px;flex-wrap:wrap;}
    .sm-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);
      color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .sm-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
    .sm-btn.danger{border-color:rgba(255,77,77,.2);background:var(--danger-bg);color:var(--danger);}
    .sm-btn.danger:hover{background:rgba(255,77,77,.2);}
    .sm-btn.primary{background:var(--ember);border-color:rgba(255,122,24,.2);color:var(--fire);}

    /* Quick-fill */
    .qf-section{background:rgba(255,122,24,.04);border:1px solid rgba(255,122,24,.12);border-radius:var(--radius);
      padding:12px;margin-bottom:10px;}
    .qf-section-title{font-size:12px;font-weight:800;color:var(--fire);margin-bottom:8px;
      display:flex;align-items:center;gap:6px;}
    .qf-section-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--fire);}

    /* Color swatches */
    .swatch-row{display:flex;gap:6px;flex-wrap:wrap;}
    .swatch{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s;}
    .swatch:hover{transform:scale(1.15);}
    .swatch.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3);}

    /* ── MOBILE ── */
    @media(max-width:900px){
      .side-panel{display:none;position:fixed;inset:0;width:100%;z-index:10001;border-left:none;}
      .side-panel.mobile-open{display:flex;}
      .mobile-panel-close{display:flex!important;}
    }
    @media(min-width:901px){
      .mobile-panel-close{display:none!important;}
    }
    .mobile-panel-close{display:none;position:sticky;top:0;z-index:2;padding:10px 14px;
      background:var(--surface);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;}
    .mpc-title{font-size:14px;font-weight:800;color:var(--text);}
    .mpc-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);
      background:rgba(255,255,255,.06);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;}

    /* Mobile bottom bar */
    .mobile-bar{display:none;flex-shrink:0;padding:8px 12px;gap:6px;border-top:1px solid var(--border);
      background:var(--surface);align-items:center;justify-content:space-between;}
    @media(max-width:900px){.mobile-bar{display:flex;}}
    .mob-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);
      background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;}
    .mob-btn.primary{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;color:#fff;}

    /* Hide desktop-only on mobile */
    @media(max-width:900px){
      .topbar-actions .tb-btn:not(.export-btn):not(.undo){display:none;}
    }

    /* Export modal */
    .export-modal{display:none;position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.7);
      backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
    .export-modal.active{display:flex;}
    .export-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:28px;max-width:420px;width:100%;text-align:center;animation:fadeUp .3s ease;}
    .export-card h2{font-family:'Abril Fatface',serif;font-size:24px;margin-bottom:8px;
      background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .export-card p{font-size:13px;color:var(--text2);margin-bottom:20px;}
    .export-btns{display:flex;flex-direction:column;gap:10px;}
    .export-big-btn{padding:16px;border-radius:var(--radius);border:1px solid var(--border);
      background:rgba(255,255,255,.05);color:var(--text);font-size:14px;font-weight:800;cursor:pointer;
      transition:all .2s;display:flex;align-items:center;gap:12px;}
    .export-big-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-1px);}
    .export-big-btn.main{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;}
    .export-big-btn .icon{font-size:22px;}
    .export-big-btn .meta{text-align:left;flex:1;}
    .export-big-btn .meta small{display:block;font-size:11px;font-weight:600;opacity:.7;margin-top:2px;}
    .export-close{margin-top:14px;padding:10px;border:none;background:transparent;color:var(--text3);
      font-size:13px;font-weight:700;cursor:pointer;}
    .export-close:hover{color:var(--text);}
  </style>
</head>
<body>

<div id="toastBox"></div>

<!-- ADMIN GATE -->
<div class="admin-gate" id="adminGate">
  <div class="admin-card">
    <div class="lock-icon">🔒</div>
    <h1>Menu Editor</h1>
    <p>Staff-only area for building the daily Facebook menu post.</p>
    <div class="pin-row">
      <input type="password" id="pinInput" maxlength="6" placeholder="PIN" inputmode="numeric">
      <button class="unlock-btn" id="unlockBtn">Unlock</button>
    </div>
    <div class="error-msg" id="pinError"></div>
    <div class="gate-links">
      <a href="/menu" class="gate-link-primary">View Menu</a>
      <a href="/" class="gate-link-ghost">Home</a>
    </div>
  </div>
</div>

<!-- EDITOR -->
<div class="editor" id="editorShell">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">Hot Headz</div>
    <div class="topbar-sep"></div>
    <div class="topbar-tabs">
      <button class="tab-btn active" data-tab="quickfill">Quick Fill</button>
      <button class="tab-btn" data-tab="textboxes">Text Boxes</button>
      <button class="tab-btn" data-tab="photo">Photo</button>
      <button class="tab-btn" data-tab="canvas">Canvas</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
    </div>
    <div class="topbar-actions">
      <button class="tb-btn undo" id="undoBtn" title="Undo">↩</button>
      <button class="tb-btn undo" id="redoBtn" title="Redo">↪</button>
      <button class="tb-btn export-btn" id="exportBtn">Export ↓</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- CANVAS -->
    <div class="canvas-panel">
      <div class="canvas-toolbar">
        <input id="hhMEfile" type="file" accept="image/*" style="font-size:11px;color:var(--text2);max-width:160px;">
        <button class="ct-btn" id="resetViewBtn">Reset</button>
        <button class="ct-btn" id="fitViewBtn">Fit</button>
        <button class="ct-btn" id="rotateBtn">Rotate 90°</button>
        <div class="ct-sep"></div>
        <span class="ct-label">Photo</span>
        <input class="ct-range" id="photoZoom" type="range" min="0.3" max="4" step="0.01" value="1">
        <span class="ct-label">View</span>
        <input class="ct-range" id="viewZoom" type="range" min="0.5" max="3" step="0.01" value="1">
      </div>
      <div class="canvas-area">
        <canvas id="hhMEcanvas"></canvas>
      </div>
      <div class="canvas-foot">
        <label class="cf-toggle"><input id="showText" type="checkbox" checked> Text</label>
        <label class="cf-toggle"><input id="snapOn" type="checkbox" checked> Snap</label>
        <label class="cf-toggle"><input id="outlineOn" type="checkbox" checked> Outline</label>
        <div style="flex:1;"></div>
        <span style="font-size:10px;color:var(--text3);">Tap canvas to deselect • Right-drag=pan • Wheel=zoom • Alt+Wheel=photo zoom</span>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="side-panel" id="sidePanel">
      <div class="mobile-panel-close">
        <span class="mpc-title">Settings</span>
        <button class="mpc-btn" id="closeSidePanel">Done</button>
      </div>
      <div class="side-scroll" id="sideScroll">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Mobile bottom bar -->
  <div class="mobile-bar">
    <button class="mob-btn" id="mobUndoBtn">↩ Undo</button>
    <button class="mob-btn" id="mobSettingsBtn">⚙ Settings</button>
    <button class="mob-btn primary" id="mobExportBtn">Export ↓</button>
  </div>
</div>

<!-- Export Modal -->
<div class="export-modal" id="exportModal">
  <div class="export-card">
    <h2>Export Menu</h2>
    <p>Download your finished menu image, cropped to the photo bounds.</p>
    <div class="export-btns">
      <button class="export-big-btn main" id="dlJpg">
        <span class="icon">📸</span>
        <span class="meta">Download JPG<small>Best for Facebook — smaller file size</small></span>
      </button>
      <button class="export-big-btn" id="dlPng">
        <span class="icon">🖼</span>
        <span class="meta">Download PNG<small>Lossless quality — larger file</small></span>
      </button>
      <button class="export-big-btn" id="dlJsonExport">
        <span class="icon">💾</span>
        <span class="meta">Export Project JSON<small>Save layout for later or share with team</small></span>
      </button>
    </div>
    <button class="export-close" id="closeExport">Cancel</button>
  </div>
</div>

<script>
(function(){
// ═══════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const uid=()=>Math.random().toString(16).slice(2)+'-'+Date.now().toString(16);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg,type='info'){
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  document.getElementById('toastBox').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function safeJSON(raw,fb){try{return JSON.parse(raw)}catch{return fb}}
function toHex(c){
  if(/^#([0-9a-f]{3}){1,2}$/i.test(String(c)))return c;
  const m=String(c).match(/rgba?\((\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
  if(m)return'#'+[m[1],m[2],m[3]].map(x=>clamp(+x,0,255).toString(16).padStart(2,'0')).join('');
  return'#ffffff';
}
function hexRgba(hex,a){
  const h=String(hex||'#000').replace('#','');
  const f=h.length===3?h.split('').map(x=>x+x).join(''):h.padEnd(6,'0').slice(0,6);
  return`rgba(${parseInt(f.slice(0,2),16)},${parseInt(f.slice(2,4),16)},${parseInt(f.slice(4,6),16)},${clamp(a,0,1)})`;
}
function todayDefaults(){
  const n=new Date();
  return{weekday:n.toLocaleDateString(undefined,{weekday:'long'}),dateStr:n.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'})};
}
const isCoarse=()=>{try{return matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0}catch{return false}};

// ═══════════════════════════════════════
//  FONT & COLOR PRESETS
// ═══════════════════════════════════════
const FONTS=[
  {label:"System (Clean)",value:'system-ui,-apple-system,Segoe UI,Roboto,Arial'},
  {label:"DM Sans (Brand)",value:'"DM Sans",system-ui,sans-serif'},
  {label:"Abril Fatface (Display)",value:'"Abril Fatface",Georgia,serif'},
  {label:"DM Serif Display",value:'"DM Serif Display",Georgia,serif'},
  {label:"Playfair Display",value:'"Playfair Display",Georgia,serif'},
  {label:"Bebas Neue (Bold)",value:'"Bebas Neue",Impact,sans-serif'},
  {label:"Oswald (Modern)",value:'"Oswald",Arial,sans-serif'},

function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=rej;r.readAsDataURL(file);})}

async function compressImage(dataUrl,opts={}){
  const{maxDim=2200,quality=0.9}=opts;
  const im=new Image();im.src=dataUrl;
  await new Promise(r=>{im.onload=()=>r(1);im.onerror=()=>r(0);});
  if(!im.naturalWidth)return dataUrl;
  const sc=Math.min(1,maxDim/Math.max(im.naturalWidth,im.naturalHeight));
  const w=Math.round(im.naturalWidth*sc),h=Math.round(im.naturalHeight*sc);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(im,0,0,w,h);
  return c.toDataURL('image/jpeg',quality);
}

async function loadImg(dataUrl){
  return new Promise(r=>{
    img=new Image();
    img.onload=()=>{imgLoaded=true;r(true);};
    img.onerror=()=>{imgLoaded=false;r(false);};
    img.src=dataUrl;
  });
}

// ═══════════════════════════════════════
//  CANVAS DRAWING
// ═══════════════════════════════════════
function setCanvasSize(){canvas.width=outW;canvas.height=outH;}
const pxX=p=>(p/100)*canvas.width,pxY=p=>(p/100)*canvas.height;
const pctX=px=>(px/canvas.width)*100,pctY=px=>(px/canvas.height)*100;
const fontPx=p=>Math.max(6,(p/100)*canvas.height);

function roundRect(x,y,w,h,r){
  const rr=Math.min(r,w/2,h/2);ctx.beginPath();
  ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();
}

function drawPhoto(){
  ctx.fillStyle='#111216';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!imgLoaded){
    ctx.save();ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='700 20px system-ui';ctx.textAlign='center';
    ctx.fillText('Upload a menu template image to start',canvas.width/2,canvas.height/2);
    ctx.restore();return;
  }
  const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;
  const fit=Math.min(w/bw,h/bh)*photoScale;
  const cx=w/2+photoOffsetX,cy=h/2+photoOffsetY;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(photoRot*Math.PI/180);
  ctx.drawImage(img,-bw*fit/2,-bh*fit/2,bw*fit,bh*fit);ctx.restore();
}

function measureBox(b){
  const size=fontPx(b.sizePct),lines=String(b.text??'').split('\n'),lineH=size*(b.lineHeight||1.15);
  ctx.save();ctx.font=`${b.italic?'italic ':''}${b.bold?'900 ':'700 '}${Math.round(size)}px ${b.fontFamily}`;
  let maxW=0;for(const l of lines)maxW=Math.max(maxW,ctx.measureText(l).width);
  ctx.restore();
  return{lines,size,lineH,maxW,totalH:lines.length*lineH};
}

function rotatedAABB(cx,cy,rw,rh,deg){
  const rad=(deg||0)*Math.PI/180,hw=rw/2,hh=rh/2;
  const corners=[{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}];
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const p of corners){
    const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx;
    const ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;
    minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);
  }
  return{left:minX,top:minY,right:maxX,bottom:maxY};
}

function drawTextBox(b){
  const x=pxX(b.xPct),y=pxY(b.yPct);
  const{lines,size,lineH,maxW,totalH}=measureBox(b);
  const lx=-maxW/2,ly=-totalH/2,px=b.bgPadX??14,py=b.bgPadY??10;
  const rw=maxW+(b.bgOn?px*2:0),rh=totalH+(b.bgOn?py*2:0);
  ctx.save();ctx.translate(x,y);ctx.rotate((b.rotationDeg||0)*Math.PI/180);
  if(b.bgOn){
    ctx.save();ctx.shadowBlur=0;
    ctx.fillStyle=hexRgba(b.bgColor||'#000',clamp(b.bgOpacity??.3,0,1));
    roundRect(lx-px,ly-py,maxW+px*2,totalH+py*2,b.bgRadius??14);ctx.fill();ctx.restore();
  }
  if(b.shadow){ctx.shadowColor=b.shadowColor||'rgba(0,0,0,0.45)';ctx.shadowBlur=b.shadowBlur??16;}
  else{ctx.shadowColor='rgba(0,0,0,0)';ctx.shadowBlur=0;}
  ctx.fillStyle=hexRgba(b.color||'#fff',clamp(b.opacity??.95,0,1));
  ctx.font=`${b.italic?'italic ':''}${b.bold?'900 ':'700 '}${Math.round(size)}px ${b.fontFamily}`;
  ctx.textBaseline='middle';
  const al=(b.align||'left').toLowerCase();
  let dx=0;
  if(al==='center'){ctx.textAlign='center';dx=0;}
  else if(al==='right'){ctx.textAlign='right';dx=lx+maxW;}
  else{ctx.textAlign='left';dx=lx;}
  for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],dx,ly+(i+.5)*lineH);
  ctx.restore();
  b.__hit=rotatedAABB(x,y,rw,rh,b.rotationDeg||0);
}

function drawOutline(){
  if(!document.getElementById('outlineOn').checked)return;
  const b=boxes.find(x=>x.id===activeId);
  if(!b||!b.__hit)return;
  const h=b.__hit;
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.setLineDash([6,5]);
  ctx.strokeRect(h.left,h.top,h.right-h.left,h.bottom-h.top);ctx.restore();
}

function draw(){
  setCanvasSize();
  ctx.save();ctx.translate(viewX,viewY);ctx.scale(viewScale,viewScale);
  drawPhoto();
  if(document.getElementById('showText').checked){
    for(const b of boxes)drawTextBox(b);
    if(activeId)drawOutline();
  }
  ctx.restore();
}

function resetAll(){photoScale=1;document.getElementById('photoZoom').value='1';photoRot=0;photoOffsetX=0;photoOffsetY=0;viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function fitView(){viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function maybeSnap(v){return document.getElementById('snapOn').checked?Math.round(v*2)/2:v;}

function rawFromClient(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*(canvas.width/r.width),y:(cy-r.top)*(canvas.height/r.height)};}
function worldFromClient(cx,cy){const r=rawFromClient(cx,cy);return{x:(r.x-viewX)/viewScale,y:(r.y-viewY)/viewScale};}
function hitTest(px,py){for(let i=boxes.length-1;i>=0;i--){const b=boxes[i],h=b.__hit;if(h&&px>=h.left&&px<=h.right&&py>=h.top&&py<=h.bottom)return b;}return null;}

// ── Pointer events ──
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch'){
    pointers.set(e.pointerId,{clientX:e.clientX,clientY:e.clientY});
    if(pointers.size===2){pinchActive=true;const p=computePinch();lastMid=p?.mid;lastDist=p?.dist;dragging=false;canvas.setPointerCapture(e.pointerId);return;}
  }
  if(!isCoarse()&&e.button===2){const p=rawFromClient(e.clientX,e.clientY);dragging=true;dragMode='view';lastX=p.x;lastY=p.y;canvas.setPointerCapture(e.pointerId);return;}
  const p=worldFromClient(e.clientX,e.clientY);lastX=p.x;lastY=p.y;
  if(document.getElementById('showText').checked){
    const hit=hitTest(p.x,p.y);
    if(hit){saveUndo();activeId=hit.id;dragging=true;dragMode='text';rebuildSidePanel();canvas.setPointerCapture(e.pointerId);draw();return;}
  }
  saveUndo();activeId=null;rebuildSidePanel();dragging=true;dragMode='image';canvas.setPointerCapture(e.pointerId);draw();
});

function computePinch(){
  if(pointers.size!==2)return null;
  const pts=Array.from(pointers.values());
  const a=rawFromClient(pts[0].clientX,pts[0].clientY),b=rawFromClient(pts[1].clientX,pts[1].clientY);
  return{mid:{x:(a.x+b.x)/2,y:(a.y+b.y)/2},dist:Math.hypot(a.x-b.x,a.y-b.y)};
}

canvas.addEventListener('pointermove',e=>{
  if(e.pointerType==='touch'&&pointers.has(e.pointerId))pointers.set(e.pointerId,{clientX:e.clientX,clientY:e.clientY});
  if(pinchActive&&pointers.size===2){
    const p=computePinch();if(!p)return;
    if(lastMid){viewX+=p.mid.x-lastMid.x;viewY+=p.mid.y-lastMid.y;}
    if(lastDist&&p.dist){viewScale=clamp(viewScale*(p.dist/lastDist),.5,3);document.getElementById('viewZoom').value=String(viewScale);}
    lastMid=p.mid;lastDist=p.dist;draw();return;
  }
  if(!dragging)return;
  if(dragMode==='view'){const p=rawFromClient(e.clientX,e.clientY);viewX+=p.x-lastX;viewY+=p.y-lastY;lastX=p.x;lastY=p.y;draw();return;}
  const p=worldFromClient(e.clientX,e.clientY);const dx=p.x-lastX,dy=p.y-lastY;lastX=p.x;lastY=p.y;
  if(dragMode==='image'){photoOffsetX+=dx;photoOffsetY+=dy;draw();return;}
  if(dragMode==='text'){
    const b=boxes.find(x=>x.id===activeId);if(!b)return;
    b.xPct=maybeSnap(clamp(pctX(pxX(b.xPct)+dx),0,100));
    b.yPct=maybeSnap(clamp(pctY(pxY(b.yPct)+dy),0,100));
    draw();triggerAutoSave();
  }
});

function endPointer(e){
  dragging=false;if(e?.pointerType==='touch'){pointers.delete(e.pointerId);if(pointers.size<2){pinchActive=false;lastMid=null;lastDist=null;}}
  triggerAutoSave();
}
canvas.addEventListener('pointerup',endPointer);
canvas.addEventListener('pointercancel',endPointer);

canvas.addEventListener('wheel',e=>{
  e.preventDefault();const d=Math.sign(e.deltaY)*-0.08;
  if(e.altKey){photoScale=clamp(photoScale+d,.3,4);document.getElementById('photoZoom').value=String(photoScale);draw();return;}
  viewScale=clamp(viewScale+d,.5,3);document.getElementById('viewZoom').value=String(viewScale);draw();
},{passive:false});

function createProject(name){
  const store=loadStore();

  store.items.unshift(p);store.activeId=p.id;
  const r=saveStore(store);
  if(!r.ok){toast('Save failed: '+r.error,'error');return false;}
  toast('Project created!','success');rebuildSidePanel();return true;
}

function saveProject(){
  const store=loadStore();const active=store.items.find(p=>p.id===store.activeId);
  if(!active){createProject();return;}
  active.updatedAt=Date.now();active.data=currentPayload();
  const r=saveStore(store);
  if(!r.ok){toast('Save failed: '+r.error,'error');return;}
  toast('Project saved!','success');rebuildSidePanel();
}

async function loadProject(id){
  const store=loadStore();const p=store.items.find(x=>x.id===id);if(!p)return;
  store.activeId=id;saveStore(store);
  if(p.data)await applyPayload(p.data);
  rebuildSidePanel();
}

function deleteProject(id){
  const store=loadStore();const p=store.items.find(x=>x.id===id);
  if(!p||!confirm(`Delete "${p.name}"?`))return;
  store.items=store.items.filter(x=>x.id!==id);
  if(store.activeId===id)store.activeId=store.items[0]?.id??null;
  saveStore(store);
  const next=store.items.find(x=>x.id===store.activeId);
  if(next?.data)applyPayload(next.data);
  else{loadStarterBoxes();imgLoaded=false;imgDataURL='';resetAll();}
  toast('Project deleted','info');rebuildSidePanel();
}

function getPhotoAABB(){
  if(!imgLoaded)return null;
  const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;
  const fit=Math.min(w/bw,h/bh)*photoScale;
  const cx=w/2+photoOffsetX,cy=h/2+photoOffsetY,dw=bw*fit,dh=bh*fit;
  const rad=photoRot*Math.PI/180;
  const corners=[{x:-dw/2,y:-dh/2},{x:dw/2,y:-dh/2},{x:dw/2,y:dh/2},{x:-dw/2,y:dh/2}];
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const p of corners){
    const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx;
    const ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;
    minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);
  }
  return{sx:Math.max(0,Math.floor(minX)),sy:Math.max(0,Math.floor(minY)),
    sw:Math.max(1,Math.min(w,Math.ceil(maxX))-Math.max(0,Math.floor(minX))),
    sh:Math.max(1,Math.min(h,Math.ceil(maxY))-Math.max(0,Math.floor(minY)))};
}

function exportCropped(mime,ext,quality){
  if(!imgLoaded){toast('Upload a template image first','error');return;}
  const ov={viewX,viewY,viewScale};viewX=0;viewY=0;viewScale=1;draw();
  const aabb=getPhotoAABB();viewX=ov.viewX;viewY=ov.viewY;viewScale=ov.viewScale;
  if(!aabb){toast('No photo bounds found','error');return;}
  const out=document.createElement('canvas');out.width=aabb.sw;out.height=aabb.sh;
  out.getContext('2d').drawImage(canvas,aabb.sx,aabb.sy,aabb.sw,aabb.sh,0,0,aabb.sw,aabb.sh);
  out.toBlob(blob=>{
    if(!blob)return;
    const a=document.createElement('a');
    a.download=`hotheadz-menu-${new Date().toISOString().slice(0,10)}.${ext}`;
    a.href=URL.createObjectURL(blob);document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    toast(`${ext.toUpperCase()} downloaded!`,'success');
  },mime,quality);
}

function exportJSON(){
  const store=loadStore();const active=store.items.find(p=>p.id===store.activeId);
  const project={id:active?.id||uid(),name:active?.name||'Menu Export',createdAt:active?.createdAt||Date.now(),updatedAt:Date.now(),data:currentPayload()};
  const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.download=`hotheadz-menu-${new Date().toISOString().slice(0,10)}.json`;
  a.href=URL.createObjectURL(blob);document.body.appendChild(a);a.click();a.remove();
  toast('JSON exported!','success');
}

let currentTab='quickfill';

function rebuildSidePanel(){
  const container=document.getElementById('sideScroll');
  let html='';

  if(currentTab==='quickfill') html=buildQuickFillPanel();
  else if(currentTab==='textboxes') html=buildTextBoxesPanel();
  else if(currentTab==='photo') html=buildPhotoPanel();
  else if(currentTab==='canvas') html=buildCanvasPanel();
  else if(currentTab==='projects') html=buildProjectsPanel();

  container.innerHTML=html;
  wirePanel();
}

// ── QUICK FILL ──
function buildQuickFillPanel(){
  const sections=[
    {name:'Day',label:'Day of Week',placeholder:'Wednesday'},
    {name:'Date',label:'Date',placeholder:'March 4th 2026'},
    {name:'Breakfast',label:'Breakfast Items',placeholder:'BREAKFAST\n5:30 AM - 10:30 AM\n\n• Eggs & Bacon\n• Pancakes',ta:true},
    {name:'Lunch',label:'Lunch Items',placeholder:'LUNCH\n11:00 AM - 2:00 PM\n\n• Fried Chicken\n• Red Beans & Rice',ta:true},
    {name:'Drinks',label:'Drinks',placeholder:'DRINKS\n\n• Sweet Tea\n• Coke',ta:true},
    {name:'Salad Bar',label:'Salad Bar',placeholder:'SALAD BAR\n\n• Lettuce\n• Toppings',ta:true},
    {name:'Dessert',label:'Dessert',placeholder:'DESSERT\n\nBread Pudding',ta:true},
    {name:'Bottom Note',label:'Bottom Note',placeholder:'For pricing and hours...',ta:true},
  ];

  let html=`<div class="acc open"><div class="acc-head"><span class="acc-arrow">▶</span><span class="acc-title">Quick Fill — Today's Menu</span></div><div class="acc-body">`;
  html+=`<p style="font-size:12px;color:var(--text3);margin-bottom:12px;">Type your menu items below. Changes update the canvas live.</p>`;
  html+=`<div class="btn-row" style="margin-bottom:12px;"><button class="sm-btn primary" id="qfToday">Fill Today's Date</button><button class="sm-btn" id="qfReset">Reset All Text</button></div>`;

  for(const s of sections){
    const box=boxes.find(b=>b.name===s.name);
    const val=box?box.text:'';
    html+=`<div class="qf-section"><div class="qf-section-title">${esc(s.label)}</div>`;
    if(s.ta){
      html+=`<textarea class="field-input field-ta qf-input" data-name="${esc(s.name)}" placeholder="${esc(s.placeholder)}" rows="4">${esc(val)}</textarea>`;
    }else{
      html+=`<input class="field-input qf-input" data-name="${esc(s.name)}" placeholder="${esc(s.placeholder)}" value="${esc(val)}">`;
    }
    html+=`</div>`;
  }
  html+=`</div></div>`;
  return html;
}

// ── TEXT BOXES ──
function buildTextBoxesPanel(){
  let html=`<div class="acc open"><div class="acc-head"><span class="acc-arrow">▶</span><span class="acc-title">Text Boxes</span><span class="acc-badge">${boxes.length}</span></div><div class="acc-body">`;
  html+=`<div class="btn-row" style="margin-bottom:10px;"><button class="sm-btn primary" id="addBoxBtn">+ Add Box</button><button class="sm-btn" id="dupBoxBtn">Duplicate</button><button class="sm-btn danger" id="delBoxBtn">Delete</button></div>`;
  html+=`<div class="field"><div class="field-label">Select box</div><select class="field-select" id="boxSelect">`;
  html+=`<option value=""${!activeId?' selected':''}>(none)</option>`;
  boxes.forEach((b,i)=>html+=`<option value="${esc(b.id)}"${b.id===activeId?' selected':''}>${i+1}. ${esc(b.name)}</option>`);
  html+=`</select></div>`;
  html+=`</div></div>`;

  // Active box editor
  const b=boxes.find(x=>x.id===activeId);
  if(b){
    const fontOpts=FONTS.map(f=>`<option value="${esc(f.value)}"${f.value===b.fontFamily?' selected':''}>${esc(f.label)}</option>`).join('');

    html+=`<div class="acc open"><div class="acc-head"><span class="acc-arrow">▶</span><span class="acc-title">Edit: ${esc(b.name)}</span></div><div class="acc-body">`;
    html+=`<div class="field"><div class="field-label">Name</div><input class="field-input" id="bName" value="${esc(b.name)}"></div>`;
    html+=`<div class="field"><div class="field-label">Text</div><textarea class="field-input field-ta" id="bText" rows="5">${esc(b.text)}</textarea></div>`;
    html+=`<div class="field-row"><div class="field"><div class="field-label">X</div><input class="field-range" type="range" id="bX" min="0" max="100" step="0.1" value="${b.xPct}"></div>`;
    html+=`<div class="field"><div class="field-label">Y</div><input class="field-range" type="range" id="bY" min="0" max="100" step="0.1" value="${b.yPct}"></div></div>`;
    html+=`<div class="field-row"><div class="field"><div class="field-label">Size</div><input class="field-range" type="range" id="bSize" min="0.3" max="10" step="0.05" value="${b.sizePct}"></div>`;
    html+=`<div class="field"><div class="field-label">Size #</div><input class="field-input" type="number" id="bSizeN" min="0.3" max="10" step="0.05" value="${b.sizePct}"></div></div>`;
    html+=`<div class="field-row"><div class="field"><div class="field-label">Font</div><select class="field-select" id="bFont">${fontOpts}</select></div>`;
    html+=`<div class="field"><div class="field-label">Align</div><select class="field-select" id="bAlign"><option value="left"${b.align==='left'?' selected':''}>Left</option><option value="center"${b.align==='center'?' selected':''}>Center</option><option value="right"${b.align==='right'?' selected':''}>Right</option></select></div></div>`;

    // Color swatches
    html+=`<div class="field"><div class="field-label">Text Color</div><div class="swatch-row">`;
    BRAND_COLORS.forEach(c=>html+=`<div class="swatch bColorSwatch${toHex(b.color)===c?' active':''}" data-color="${c}" style="background:${c};"></div>`);
    html+=`<input class="field-input field-color" type="color" id="bColor" value="${toHex(b.color)}" style="width:28px;height:28px;padding:2px;border-radius:6px;">`;
    html+=`</div></div>`;

    html+=`<div class="field-row"><div class="field"><div class="field-label">Opacity</div><input class="field-range" type="range" id="bOp" min="0" max="1" step="0.01" value="${b.opacity}"></div>`;
    html+=`<div class="field"><div class="field-label">Rotation</div><input class="field-input" type="number" id="bRot" value="${b.rotationDeg||0}" step="1"></div></div>`;
    html+=`<div class="field-row"><div class="field"><div class="field-label">Line Height</div><input class="field-range" type="range" id="bLH" min="0.8" max="2.2" step="0.01" value="${b.lineHeight||1.15}"></div>`;
    html+=`<div class="field"><div class="field-label">Shadow</div><label class="cf-toggle" style="margin-top:6px;"><input type="checkbox" id="bShadow"${b.shadow?' checked':''}> On</label></div></div>`;

    // BG section
    html+=`<div class="field" style="margin-top:6px;"><div class="field-label">Background</div>`;
    html+=`<label class="cf-toggle"><input type="checkbox" id="bBgOn"${b.bgOn?' checked':''}> Enable</label></div>`;
    html+=`<div class="field-row"><div class="field"><div class="field-label">BG Color</div><input class="field-input field-color" type="color" id="bBgColor" value="${toHex(b.bgColor)}" style="height:36px;"></div>`;
    html+=`<div class="field"><div class="field-label">BG Opacity</div><input class="field-range" type="range" id="bBgOp" min="0" max="1" step="0.01" value="${b.bgOpacity??.3}"></div></div>`;

    html+=`</div></div>`;
  }

  return html;
}

// ── PROJECTS ──
function buildProjectsPanel(){
  const store=loadStore();
  let html=`<div class="acc open"><div class="acc-head"><span class="acc-arrow">▶</span><span class="acc-title">Projects</span><span class="acc-badge">${store.items.length}</span></div><div class="acc-body">`;
  html+=`<div class="btn-row" style="margin-bottom:10px;"><button class="sm-btn primary" id="pNew">New Project</button><button class="sm-btn" id="pSave">Save</button><button class="sm-btn" id="pImportFile">Import File</button></div>`;

  if(store.items.length===0){
    html+=`<p style="font-size:12px;color:var(--text3);">No projects yet. Create one to save your work.</p>`;
  }else{
    store.items.forEach(p=>{
      const isActive=p.id===store.activeId;
      const date=new Date(p.updatedAt||p.createdAt||Date.now()).toLocaleString();
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:4px;background:${isActive?'var(--ember)':'rgba(255,255,255,.03)'};border:1px solid ${isActive?'rgba(255,122,24,.2)':'var(--border)'};">`;
      html+=`<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;color:${isActive?'var(--fire)':'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>`;
      html+=`<div style="font-size:10px;color:var(--text3);">${date}</div></div>`;
      if(!isActive)html+=`<button class="sm-btn pLoad" data-id="${esc(p.id)}">Load</button>`;
      html+=`<button class="sm-btn danger pDel" data-id="${esc(p.id)}">×</button>`;
      html+=`</div>`;
    });
  }
  html+=`</div></div>`;
  return html;
}

// ── Wire panel events ──
function wirePanel(){
  // Accordion toggles
  document.querySelectorAll('.acc-head').forEach(h=>{
    h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));
  });

  // Quick fill
  document.querySelectorAll('.qf-input').forEach(el=>{
    el.addEventListener('input',()=>{
      const name=el.dataset.name;const box=boxes.find(b=>b.name===name);
      if(box){saveUndo();box.text=el.value;draw();triggerAutoSave();}
    });
  });
  const qfToday=document.getElementById('qfToday');
  if(qfToday)qfToday.addEventListener('click',()=>{
    const t=todayDefaults();
    const dayBox=boxes.find(b=>b.name==='Day');
    const dateBox=boxes.find(b=>b.name==='Date');
    if(dayBox){saveUndo();dayBox.text=t.weekday;}
    if(dateBox)dateBox.text=t.dateStr;
    draw();rebuildSidePanel();triggerAutoSave();
    toast("Today's date filled!",'success');
  });
  const qfReset=document.getElementById('qfReset');
  if(qfReset)qfReset.addEventListener('click',()=>{
    if(!confirm('Reset all text to defaults?'))return;
    saveUndo();loadStarterBoxes();draw();rebuildSidePanel();triggerAutoSave();
    toast('Text reset to defaults','info');
  });

  // Text boxes
  const boxSelect=document.getElementById('boxSelect');
  if(boxSelect)boxSelect.addEventListener('change',()=>{activeId=boxSelect.value||null;rebuildSidePanel();draw();});
  const addBoxBtn=document.getElementById('addBoxBtn');
  if(addBoxBtn)addBoxBtn.addEventListener('click',()=>{saveUndo();const b=defaultBox('New Box','New text',50,50);boxes.push(b);activeId=b.id;rebuildSidePanel();draw();triggerAutoSave();});
  const dupBoxBtn=document.getElementById('dupBoxBtn');
  if(dupBoxBtn)dupBoxBtn.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur)return;saveUndo();const c=JSON.parse(JSON.stringify(cur));c.id=uid();c.name+=' (copy)';c.xPct=clamp(cur.xPct+2,0,100);c.yPct=clamp(cur.yPct+2,0,100);boxes.push(c);activeId=c.id;rebuildSidePanel();draw();triggerAutoSave();});
  const delBoxBtn=document.getElementById('delBoxBtn');
  if(delBoxBtn)delBoxBtn.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur||!confirm(`Delete "${cur.name}"?`))return;saveUndo();boxes=boxes.filter(b=>b.id!==cur.id);activeId=null;rebuildSidePanel();draw();triggerAutoSave();});

  // Box editor fields
  const b=boxes.find(x=>x.id===activeId);
  if(b){
    const wire=(id,fn,evt='input')=>{const el=document.getElementById(id);if(el)el.addEventListener(evt,fn);};
    wire('bName',e=>{b.name=e.target.value;draw();triggerAutoSave();});
    wire('bText',e=>{b.text=e.target.value;draw();triggerAutoSave();});
    wire('bX',e=>{b.xPct=parseFloat(e.target.value);draw();triggerAutoSave();});
    wire('bY',e=>{b.yPct=parseFloat(e.target.value);draw();triggerAutoSave();});
    wire('bSize',e=>{b.sizePct=parseFloat(e.target.value);const n=document.getElementById('bSizeN');if(n)n.value=b.sizePct;draw();triggerAutoSave();});
    wire('bSizeN',e=>{b.sizePct=clamp(parseFloat(e.target.value||'1'),.3,10);const s=document.getElementById('bSize');if(s)s.value=b.sizePct;draw();triggerAutoSave();});
    wire('bFont',e=>{b.fontFamily=e.target.value;draw();triggerAutoSave();},'change');
    wire('bAlign',e=>{b.align=e.target.value;draw();triggerAutoSave();},'change');
    wire('bColor',e=>{b.color=e.target.value;draw();triggerAutoSave();});
    wire('bOp',e=>{b.opacity=parseFloat(e.target.value);draw();triggerAutoSave();});
    wire('bRot',e=>{b.rotationDeg=parseFloat(e.target.value||'0');draw();triggerAutoSave();});
    wire('bLH',e=>{b.lineHeight=parseFloat(e.target.value);draw();triggerAutoSave();});
    wire('bShadow',e=>{b.shadow=!!e.target.checked;draw();triggerAutoSave();},'change');
    wire('bBgOn',e=>{b.bgOn=!!e.target.checked;draw();triggerAutoSave();},'change');
    wire('bBgColor',e=>{b.bgColor=e.target.value;draw();triggerAutoSave();});
    wire('bBgOp',e=>{b.bgOpacity=parseFloat(e.target.value);draw();triggerAutoSave();});

    // Color swatches
    document.querySelectorAll('.bColorSwatch').forEach(sw=>{
      sw.addEventListener('click',()=>{
        b.color=sw.dataset.color;draw();triggerAutoSave();rebuildSidePanel();
      });
    });
  }

  // Photo panel
  const pZoom2=document.getElementById('pZoom2');
  if(pZoom2)pZoom2.addEventListener('input',()=>{photoScale=parseFloat(pZoom2.value);document.getElementById('photoZoom').value=pZoom2.value;draw();});
  const pRot2=document.getElementById('pRot2');
  if(pRot2)pRot2.addEventListener('click',()=>{saveUndo();photoRot=(photoRot+90)%360;draw();triggerAutoSave();});
  const pReset2=document.getElementById('pReset2');
  if(pReset2)pReset2.addEventListener('click',()=>{saveUndo();photoScale=1;photoRot=0;photoOffsetX=0;photoOffsetY=0;document.getElementById('photoZoom').value='1';draw();triggerAutoSave();});

  // Canvas panel
  const csIG=document.getElementById('csIG');
  if(csIG)csIG.addEventListener('click',()=>{outW=1080;outH=1350;draw();rebuildSidePanel();triggerAutoSave();});
  const csSQ=document.getElementById('csSQ');
  if(csSQ)csSQ.addEventListener('click',()=>{outW=1080;outH=1080;draw();rebuildSidePanel();triggerAutoSave();});
  const csW=document.getElementById('csW');
  if(csW)csW.addEventListener('change',()=>{outW=clamp(parseInt(csW.value)||1080,600,3000);draw();triggerAutoSave();});
  const csH=document.getElementById('csH');
  if(csH)csH.addEventListener('change',()=>{outH=clamp(parseInt(csH.value)||1350,600,4000);draw();triggerAutoSave();});

  // Projects panel
  const pNew=document.getElementById('pNew');
  if(pNew)pNew.addEventListener('click',()=>{const name=prompt('Project name:',`Menu ${new Date().toLocaleDateString()}`);if(name===null)return;createProject(name.trim());rebuildSidePanel();});
  const pSave=document.getElementById('pSave');
  if(pSave)pSave.addEventListener('click',saveProject);
  const pImportFile=document.getElementById('pImportFile');
  if(pImportFile)pImportFile.addEventListener('click',()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
    inp.onchange=async()=>{
      const file=inp.files?.[0];if(!file)return;
      const obj=safeJSON(await file.text(),null);if(!obj){toast('Invalid JSON file','error');return;}
      const store=loadStore();
      if(obj.data){
        store.items.unshift({id:uid(),name:obj.name||'Imported',createdAt:Date.now(),updatedAt:Date.now(),data:obj.data});
        store.activeId=store.items[0].id;
      }
      const r=saveStore(store);
      if(!r.ok){toast('Import failed: '+r.error,'error');return;}
      const active=store.items.find(x=>x.id===store.activeId);
      if(active?.data)await applyPayload(active.data);
      toast('Project imported!','success');rebuildSidePanel();
    };inp.click();
  });

  document.querySelectorAll('.pLoad').forEach(btn=>{
    btn.addEventListener('click',()=>loadProject(btn.dataset.id));
  });
  document.querySelectorAll('.pDel').forEach(btn=>{
    btn.addEventListener('click',()=>deleteProject(btn.dataset.id));
  });
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
loadStarterBoxes();
rebuildSidePanel();

(async()=>{
  const store=loadStore();
  if(store.items.length>0){
    const active=store.items.find(p=>p.id===store.activeId)||store.items[0];
    store.activeId=active.id;saveStore(store);
    if(active.data)await applyPayload(active.data);
  }else{
    draw();
  }

  // Default image preview
  const DEFAULT_IMG="https://images.squarespace-cdn.com/content/v1/696710c636aacc1859901840/38f723d4-604b-4459-b945-c1edaed19159/DailyMenuUpdate.png?format=750w";
  if(!imgDataURL&&DEFAULT_IMG){
    img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{imgLoaded=true;draw();};
    img.onerror=()=>{imgLoaded=false;draw();};
    img.src=DEFAULT_IMG;
  }
})();

})();
