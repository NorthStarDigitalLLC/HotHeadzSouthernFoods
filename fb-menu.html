<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hot Headz – Menu Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--void:#0a0a0e;--surface:#131318;--card:#1a1a22;--border:rgba(255,255,255,.1);--text:#f0ece6;--text2:rgba(240,236,230,.7);--text3:rgba(240,236,230,.45);--fire:#ff7a18;--fire2:#ffb347;--ember:rgba(255,122,24,.12);--danger:#ff4d4d;--success:#4dff88;--radius:14px;--radius-sm:10px;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
    #toastBox{position:fixed;top:16px;right:16px;z-index:100000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{pointer-events:auto;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;backdrop-filter:blur(12px);animation:toastIn .35s ease,toastOut .4s 2.6s ease forwards;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:340px;}
    .toast.success{background:rgba(30,60,40,.9);border:1px solid rgba(77,255,136,.2);}
    .toast.error{background:rgba(60,20,20,.9);border:1px solid rgba(255,77,77,.25);}
    .toast.info{background:rgba(20,30,60,.9);border:1px solid rgba(100,140,255,.2);}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
    .admin-gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:10000;overflow:hidden;}
    .gate-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,#1e1510,#0a0806 50%,#050404);z-index:0;}
    .gate-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 80%,rgba(196,24,0,.08),transparent 60%);}
    .gate-embers{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .gate-ember{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--fire);opacity:0;animation:gEmber linear infinite;}
    @keyframes gEmber{0%{opacity:0;transform:translateY(0) scale(1)}10%{opacity:.8}60%{opacity:.4}100%{opacity:0;transform:translateY(-100vh) scale(0.3)}}
    .gate-card{position:relative;z-index:2;width:100%;max-width:440px;animation:fadeUp .8s ease;}
    .gate-logo{display:flex;justify-content:center;margin-bottom:24px;}
    .gate-logo img{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,122,24,.3);box-shadow:0 0 40px rgba(255,122,24,.15);animation:floatL 4s ease-in-out infinite;}
    .gate-brand{font-family:'Abril Fatface',Georgia,serif;font-size:clamp(28px,7vw,38px);text-align:center;line-height:1.1;margin-bottom:4px;color:var(--text);}
    .gate-brand em{color:var(--fire);font-style:normal;}
    .gate-sub{font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:14px;color:rgba(212,168,152,.6);text-align:center;letter-spacing:.05em;margin-bottom:28px;}
    .gate-divider{width:60px;height:2px;margin:0 auto 28px;background:linear-gradient(90deg,transparent,var(--fire),transparent);border-radius:2px;}
    .gate-form{background:rgba(15,12,10,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px 28px;margin-bottom:16px;}
    .gate-form-title{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(212,168,152,.5);text-align:center;margin-bottom:20px;}
    .gate-pin-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
    .gate-pin-digit{width:48px;height:56px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:24px;font-weight:800;text-align:center;font-family:'DM Sans',sans-serif;transition:all .2s;caret-color:var(--fire);}
    .gate-pin-digit:focus{outline:none;border-color:var(--fire);background:rgba(255,122,24,.06);box-shadow:0 0 20px rgba(255,122,24,.1);}
    .gate-pin-digit.filled{border-color:rgba(255,122,24,.4);}
    .gate-pin-digit.error{border-color:var(--danger);animation:gShake .4s ease;}
    @keyframes gShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    .gate-unlock{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;color:#fff;cursor:pointer;transition:all .25s;background:linear-gradient(135deg,var(--fire),#e85520);box-shadow:0 4px 20px rgba(255,122,24,.25);}
    .gate-unlock:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,122,24,.35);}
    .gate-unlock:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
    .gate-error{color:var(--danger);font-size:12px;font-weight:700;text-align:center;min-height:18px;margin-top:10px;}
    .gate-footer{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .gate-footer a{padding:10px 20px;border-radius:40px;font-weight:700;font-size:12px;text-decoration:none;transition:all .2s;letter-spacing:.03em;}
    .gf-menu{background:rgba(255,122,24,.1);border:1px solid rgba(255,122,24,.2);color:var(--fire);}
    .gf-home{border:1px solid rgba(255,255,255,.1);color:var(--text3);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatL{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .editor{display:none;position:fixed;inset:0;z-index:9999;background:var(--void);flex-direction:column;}
    .editor.active{display:flex;}
    .topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:48px;}
    .topbar-brand{font-family:'Abril Fatface',serif;font-size:15px;white-space:nowrap;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
    .topbar-tabs{display:flex;gap:3px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .topbar-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:6px 13px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .tab-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
    .tab-btn.active{background:var(--ember);color:var(--fire);}
    .tab-btn.menu-tab{border:1px solid rgba(255,255,255,.06);}
    .tab-btn.menu-tab.active{background:rgba(100,180,255,.12);color:#7ac4ff;border-color:rgba(100,180,255,.2);}
    .tab-btn.static-tab{border:1px solid rgba(255,255,255,.06);}
    .tab-btn.static-tab.active{background:rgba(150,255,150,.1);color:#7ae59a;border-color:rgba(150,255,150,.2);}
    .tb-actions{display:flex;gap:5px;flex-shrink:0;}
    .tb-btn{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .tb-btn:hover{background:rgba(255,255,255,.1);}
    .tb-btn.undo{font-size:15px;padding:5px 9px;}
    .tb-btn.export-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;font-weight:900;padding:7px 16px;}
    .tb-btn.signout-btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--text2);font-weight:800;padding:7px 14px;margin-left:4px;}
    .tb-btn.signout-btn:hover{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.3);color:var(--danger);}
    .main-layout{flex:1;display:flex;min-height:0;overflow:hidden;}
    .canvas-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--void);}
    .canvas-toolbar{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
    .ct-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .ct-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
    .ct-sep{flex:1;}
    .ct-label{font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap;}
    .ct-range{width:80px;accent-color:var(--fire);}
    .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;overflow:hidden;}
    #hhMEcanvas{max-width:100%;max-height:100%;border-radius:8px;touch-action:none;background:#0e0e12;object-fit:contain;}
    .canvas-foot{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);background:var(--surface);}
    .cf-toggle{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;}
    .cf-toggle input{accent-color:var(--fire);}
    .side-panel{width:380px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
    .side-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
    .side-scroll::-webkit-scrollbar{width:4px;}
    .side-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
    .acc{border-bottom:1px solid var(--border);}
    .acc-head{display:flex;align-items:center;gap:7px;padding:11px 14px;cursor:pointer;user-select:none;}
    .acc-head:hover{background:rgba(255,255,255,.03);}
    .acc-arrow{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
    .acc.open .acc-arrow{transform:rotate(90deg);}
    .acc-title{font-size:13px;font-weight:800;color:var(--text);flex:1;}
    .acc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--ember);color:var(--fire);}
    .acc-body{display:none;padding:0 14px 14px;}
    .acc.open .acc-body{display:block;}
    .fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .fi{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;width:100%;margin-bottom:8px;}
    .fi:focus{outline:none;border-color:var(--fire);}
    .fi-ta{resize:vertical;min-height:80px;line-height:1.45;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .fs{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;width:100%;margin-bottom:8px;}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .sm-btn{padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .sm-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
    .sm-btn.danger{border-color:rgba(255,77,77,.2);background:rgba(255,77,77,.1);color:var(--danger);}
    .sm-btn.primary{background:var(--ember);border-color:rgba(255,122,24,.2);color:var(--fire);}
    .sm-btn.success{background:rgba(77,255,136,.1);border-color:rgba(77,255,136,.2);color:var(--success);}
    .qf-card{background:rgba(255,122,24,.04);border:1px solid rgba(255,122,24,.1);border-radius:var(--radius);padding:10px;margin-bottom:8px;}
    .qf-title{font-size:12px;font-weight:800;color:var(--fire);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
    .qf-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--fire);}
    .qf-details summary{list-style:none;}.qf-details summary::-webkit-details-marker{display:none;}
    .qf-details[open] summary{color:var(--fire)!important;}
    .swatch-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .swatch{width:26px;height:26px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .12s;}
    .swatch:hover{transform:scale(1.12);}
    .swatch.active{border-color:#fff;}
    .static-card{background:rgba(77,255,136,.04);border:1px solid rgba(77,255,136,.12);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
    .static-card-title{font-size:12px;font-weight:800;color:#7ae59a;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .static-card-title::before{content:'';width:3px;height:12px;border-radius:2px;background:#7ae59a;}
    .status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;}
    .status-pill.loading{background:rgba(100,140,255,.12);color:#7c9eff;}
    .status-pill.loaded{background:rgba(77,255,136,.12);color:#7ae59a;}
    .status-pill.error{background:rgba(255,77,77,.12);color:#ff7a7a;}
    .hours-row{display:grid;grid-template-columns:80px 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center;}
    .hours-row .hr-day{font-size:11px;font-weight:700;color:var(--text2);}
    .hours-row .fi{margin-bottom:0;padding:7px 10px;font-size:12px;}
    @media(max-width:900px){
      .side-panel{display:none;position:fixed;inset:0;width:100%;z-index:10001;border-left:none;}
      .side-panel.mobile-open{display:flex;}
      .mpc{display:flex!important;}
    }
    @media(min-width:901px){.mpc{display:none!important;}}
    .mpc{display:none;position:sticky;top:0;z-index:2;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;}
    .mpc-title{font-size:14px;font-weight:800;}
    .mpc-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;}
    .mobile-bar{display:none;flex-shrink:0;padding:8px 12px;gap:6px;border-top:1px solid var(--border);background:var(--surface);align-items:center;justify-content:space-between;}
    @media(max-width:900px){.mobile-bar{display:flex;}.tb-actions .tb-btn:not(.export-btn):not(.undo):not(.signout-btn){display:none;}}
    .mob-signout{background:rgba(255,255,255,.06)!important;border-color:rgba(255,255,255,.15)!important;color:var(--text2)!important;}
    .mob-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;}
    .mob-btn.primary{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;color:#fff;}
    .export-modal{display:none;position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
    .export-modal.active{display:flex;}
    .export-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:400px;width:100%;text-align:center;animation:fadeUp .3s ease;}
    .export-card h2{font-family:'Abril Fatface',serif;font-size:22px;margin-bottom:6px;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .export-card p{font-size:13px;color:var(--text2);margin-bottom:18px;}
    .export-big{padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%;}
    .export-big:hover{background:rgba(255,255,255,.1);}
    .export-big.main{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;}
    .export-big .icon{font-size:20px;}
    .export-big .meta{text-align:left;flex:1;}
    .export-big .meta small{display:block;font-size:11px;font-weight:600;opacity:.7;margin-top:1px;}
    .export-close{margin-top:10px;padding:8px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
<div id="toastBox"></div>
<div class="admin-gate" id="adminGate">
  <div class="gate-bg"></div>
  <div class="gate-embers" id="gateEmbers"></div>
  <div class="gate-card">
    <div class="gate-logo"><img src="/images/HotHeadzLogo.png" alt="Hot Headz" onerror="this.style.display='none'"></div>
    <div class="gate-brand">Hot Headz <em>Southern Foods</em></div>
    <div class="gate-sub">Staff Menu Editor</div>
    <div class="gate-divider"></div>
    <div class="gate-form">
      <div class="gate-form-title">Enter Staff PIN</div>
      <div class="gate-pin-wrap">
        <input class="gate-pin-digit" type="password" inputmode="numeric" maxlength="1" data-idx="0" autocomplete="off">
        <input class="gate-pin-digit" type="password" inputmode="numeric" maxlength="1" data-idx="1" autocomplete="off">
        <input class="gate-pin-digit" type="password" inputmode="numeric" maxlength="1" data-idx="2" autocomplete="off">
        <input class="gate-pin-digit" type="password" inputmode="numeric" maxlength="1" data-idx="3" autocomplete="off">
      </div>
      <button class="gate-unlock" id="unlockBtn">Unlock Editor</button>
      <div class="gate-error" id="pinError"></div>
    </div>
    <div class="gate-footer">
      <a href="menu.html" class="gf-menu">View Public Menu</a>
      <a href="/" class="gf-home">Return Home</a>
    </div>
  </div>
</div>
<div class="editor" id="editorShell">
  <div class="topbar">
    <div class="topbar-brand">Hot Headz</div>
    <div class="topbar-sep"></div>
    <div class="topbar-tabs">
      <button class="tab-btn active" data-tab="quickfill">⚡ FB Menu</button>
      <button class="tab-btn" data-tab="textboxes">Text Boxes</button>
      <button class="tab-btn" data-tab="photo">Photo</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
      <div class="topbar-sep" style="margin:0 4px;"></div>
      <button class="tab-btn menu-tab" data-tab="menu-lunch">🍽 Lunch</button>
      <div class="topbar-sep" style="margin:0 4px;"></div>
      <button class="tab-btn static-tab" data-tab="static-breakfast">🍳 Breakfast</button>
      <button class="tab-btn static-tab" data-tab="static-lunchplates">💵 Lunch Plates</button>
      <button class="tab-btn static-tab" data-tab="static-drinks">🥤 Drinks</button>
      <button class="tab-btn static-tab" data-tab="static-beer">🍺 Beer</button>
      <button class="tab-btn static-tab" data-tab="static-salad">🥗 Salad Bar</button>
      <button class="tab-btn static-tab" data-tab="static-dessert">🍮 Dessert</button>
      <button class="tab-btn static-tab" data-tab="static-crawfish">🦞 Crawfish</button>
      <button class="tab-btn static-tab" data-tab="static-hours">🕒 Hours</button>
      <button class="tab-btn static-tab" data-tab="static-settings">⚙ Settings</button>
    </div>
    <div class="tb-actions">
      <button class="tb-btn undo" id="undoBtn" title="Undo">↩</button>
      <button class="tb-btn undo" id="redoBtn" title="Redo">↪</button>
      <button class="tb-btn export-btn" id="exportBtn">Export ↓</button>
      <button class="tb-btn signout-btn" id="signOutBtn">Sign Out ←</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="canvas-panel">
      <div class="canvas-toolbar">
        <input id="hhMEfile" type="file" accept="image/*" style="font-size:11px;color:rgba(240,236,230,.7);max-width:150px;">
        <button class="ct-btn" id="resetViewBtn">Reset</button>
        <button class="ct-btn" id="fitViewBtn">Fit</button>
        <button class="ct-btn" id="rotateBtn">Rotate 90°</button>
        <div class="ct-sep"></div>
        <span class="ct-label">Photo</span>
        <input class="ct-range" id="photoZoom" type="range" min="0.3" max="4" step="0.01" value="1">
        <span class="ct-label">View</span>
        <input class="ct-range" id="viewZoom" type="range" min="0.5" max="3" step="0.01" value="1">
      </div>
      <div class="canvas-area"><canvas id="hhMEcanvas"></canvas></div>
      <div class="canvas-foot">
        <label class="cf-toggle"><input id="showText" type="checkbox" checked> Text</label>
        <label class="cf-toggle"><input id="snapOn" type="checkbox" checked> Snap</label>
        <label class="cf-toggle"><input id="outlineOn" type="checkbox" checked> Outline</label>
        <div style="flex:1"></div>
        <span style="font-size:9px;color:rgba(240,236,230,.45);">Drag=move photo • Right-drag=pan • Wheel=view zoom • Alt+Wheel=photo zoom</span>
      </div>
    </div>
    <div class="side-panel" id="sidePanel">
      <div class="mpc"><span class="mpc-title">Settings</span><button class="mpc-btn" id="closeSidePanel">Done</button></div>

function checkLockout(){
  const data=safeJSON(localStorage.getItem(LOCKOUT_KEY),null);
  if(!data)return false;
  const elapsed=(Date.now()-data.time)/60000;
  if(elapsed>=LOCKOUT_MINUTES){localStorage.removeItem(LOCKOUT_KEY);failCount=0;return false;}
  failCount=data.count||0;
  if(failCount>=MAX_ATTEMPTS){
    const remaining=Math.ceil(LOCKOUT_MINUTES-elapsed);
    document.getElementById('pinError').textContent='Too many attempts. Try again in '+remaining+' min.';
    document.getElementById('unlockBtn').disabled=true;
    setTimeout(()=>{localStorage.removeItem(LOCKOUT_KEY);failCount=0;document.getElementById('pinError').textContent='';document.getElementById('unlockBtn').disabled=false;},remaining*60000);
    return true;
  }
  return false;
}

function checkSession(){
  const ts=parseInt(localStorage.getItem(SESSION_KEY)||'0',10);
  if(ts&&(Date.now()-ts)<8*60*60*1000)return true;
  return false;
}

  const hash=await hashPin(pin);
  if(hash===PIN_HASH){
    document.getElementById('pinError').textContent='';
    failCount=0;
    unlockEditor();
  }else{
    failCount++;
    localStorage.setItem(LOCKOUT_KEY,JSON.stringify({count:failCount,time:Date.now()}));
    if(failCount>=MAX_ATTEMPTS){
      document.getElementById('pinError').textContent='Too many attempts. Locked for '+LOCKOUT_MINUTES+' minutes.';
      document.getElementById('unlockBtn').disabled=true;
    }else{
      document.getElementById('pinError').textContent='Wrong PIN. '+(MAX_ATTEMPTS-failCount)+' attempts left.';
    }
    shakeDigits();clearDigits();
  }
});

const SUPABASE_URL = 'https://zgqjzgonwvkxfbdseieg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpncWp6Z29ud3ZreGZiZHNlaWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk4NTksImV4cCI6MjA5MjE0NTg1OX0.1mGtFUKumyQUgU0pO2CxIYSKLEuYEzspCGk9ncYYavk';

// ⚠️  PASTE YOUR SERVICE_ROLE KEY HERE  ⚠️
// Required for writes (save, delete). Only this editor file sees it, behind the PIN.
// Get it from: Supabase → Settings → API → "service_role secret" → Reveal → Copy
// If left blank, writes will fail with 401/403 but reads will still work.
const SUPABASE_SERVICE_ROLE_KEY = '';

const CLOUD_NAME_KEY='hhMenuCloud_name';
function getCloudName(){return localStorage.getItem(CLOUD_NAME_KEY)||'';}

// Use service_role for writes when available, anon for reads
function sbHeaders(forWrite){
  var key = (forWrite && SUPABASE_SERVICE_ROLE_KEY) ? SUPABASE_SERVICE_ROLE_KEY : SUPABASE_ANON_KEY;
  return {
    'apikey': key,
    'Authorization': 'Bearer ' + key,
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  };
}

function sbJsonHeaders(forWrite){
  var h = sbHeaders(forWrite);
  h['Prefer'] = 'return=representation';
  return h;
}

// Low-level Supabase fetch helpers
function sbGet(path){
  return fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: sbHeaders(false) })
    .then(function(r){ return r.text(); })
    .then(function(t){ try { return JSON.parse(t); } catch(e) { return { _raw: t }; } });
}

function sbWrite(method, path, body){
  var init = { method: method, headers: sbJsonHeaders(true) };
  if (body !== undefined) init.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + '/rest/v1/' + path, init)
    .then(function(r){ return r.text().then(function(t){ return { status: r.status, ok: r.ok, text: t }; }); })
    .then(function(resp){
      var parsed = null;
      try { parsed = resp.text ? JSON.parse(resp.text) : null; } catch(e) {}
      if (!resp.ok) {
        var msg = (parsed && (parsed.message || parsed.error || parsed.hint)) || resp.text || ('HTTP ' + resp.status);
        throw new Error(msg);
      }
      return parsed;
    });
}

// ═══════════════════════════════════════════════════════════════════
// Action dispatcher — translates old Apps-Script-style {action:...} calls
// into Supabase REST calls. Keeps the rest of the editor unchanged.
// ═══════════════════════════════════════════════════════════════════
async function apiPost(params) {
  var action = params.action;
  try {
    switch(action) {

      // ── Menu defaults (breakfast/lunch/beer/hours/settings/etc) ──
      case 'getMenuDefaults': {
        var rows = await sbGet('menu_defaults?select=key,value,updated_at');
        if (!Array.isArray(rows)) return { success: false, error: rows && rows.message || 'fetch failed' };
        var defaults = {};
        rows.forEach(function(r){ defaults[r.key] = r.value; });
        return { success: true, defaults: defaults };
      }

      case 'saveMenuDefault': {
        var payload = { key: params.key, value: typeof params.json === 'string' ? JSON.parse(params.json) : params.json };
        // UPSERT via Prefer: resolution=merge-duplicates
        await fetch(SUPABASE_URL + '/rest/v1/menu_defaults', {
          method: 'POST',
          headers: Object.assign({}, sbJsonHeaders(true), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
          body: JSON.stringify(payload)
        }).then(function(r){
          if (!r.ok) return r.text().then(function(t){ throw new Error(t || ('HTTP ' + r.status)); });
        });
        return { success: true };
      }

      case 'resetMenuDefault': {
        await sbWrite('DELETE', 'menu_defaults?key=eq.' + encodeURIComponent(params.key));
        return { success: true };
      }

      // ── Full combined menu (defaults + dates) ──
      case 'getFullMenu': {
        var res = await Promise.all([
          sbGet('menu_defaults?select=key,value'),
          sbGet('lunch_dates?select=lunch_date,data')
        ]);
        var defaults = {};
        if (Array.isArray(res[0])) res[0].forEach(function(r){ defaults[r.key] = r.value; });
        var dates = {};
        if (Array.isArray(res[1])) res[1].forEach(function(r){ dates[r.lunch_date] = r.data; });
        return { success: true, data: { defaults: defaults, dates: dates } };
      }

      // ── Lunch forecast (per-date rows) ──
      case 'lunch': {
        var rows = await sbGet('lunch_dates?select=lunch_date,data,updated_at&order=lunch_date.asc');
        if (!Array.isArray(rows)) return { success: false, error: rows && rows.message || 'fetch failed' };
        var dates = {};
        rows.forEach(function(r){ dates[r.lunch_date] = r.data; });
        return { success: true, dates: dates };
      }

      case 'save-lunch': {
        var payload = { lunch_date: params.date, data: params.data, saved_by: params.publishedBy || getCloudName() || null };
        await fetch(SUPABASE_URL + '/rest/v1/lunch_dates', {
          method: 'POST',
          headers: Object.assign({}, sbJsonHeaders(true), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
          body: JSON.stringify(payload)
        }).then(function(r){
          if (!r.ok) return r.text().then(function(t){ throw new Error(t || ('HTTP ' + r.status)); });
        });
        return { success: true };
      }

      case 'delete-lunch': {
        await sbWrite('DELETE', 'lunch_dates?lunch_date=eq.' + encodeURIComponent(params.date));
        return { success: true };
      }

      // ── Drawing projects (canvas work) ──
      case 'list': {
        var rows = await sbGet('drawing_projects?select=id,name,updated_at,created_at&order=updated_at.desc');
        if (!Array.isArray(rows)) return { success: false, error: rows && rows.message || 'fetch failed' };
        return { success: true, projects: rows };
      }

      case 'load': {
        var rows = await sbGet('drawing_projects?select=*&id=eq.' + encodeURIComponent(params.id));
        if (!Array.isArray(rows) || !rows.length) return { success: false, error: 'Project not found' };
        var p = rows[0];
        return { success: true, project: { id: p.id, name: p.name, data: p.data, updatedAt: p.updated_at, createdAt: p.created_at } };
      }

      case 'save': {
        // Handle both shapes: {name, data, id} and {project: {name, data, id, savedBy}}
        var proj = params.project || params;
        var payload = {
          id: proj.id,
          name: proj.name,
          data: proj.data,
          saved_by: proj.savedBy || params.savedBy || getCloudName() || null
        };
        await fetch(SUPABASE_URL + '/rest/v1/drawing_projects', {
          method: 'POST',
          headers: Object.assign({}, sbJsonHeaders(true), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
          body: JSON.stringify(payload)
        }).then(function(r){
          if (!r.ok) return r.text().then(function(t){ throw new Error(t || ('HTTP ' + r.status)); });
        });
        return { success: true, id: proj.id };
      }

      case 'delete': {
        await sbWrite('DELETE', 'drawing_projects?id=eq.' + encodeURIComponent(params.id));
        return { success: true };
      }

      default:
        console.warn('[HH editor] Unknown action:', action);
        return { success: false, error: 'Unknown action: ' + action };
    }
  } catch(err) {
    console.warn('[HH editor] apiPost error for', action, ':', err.message);
    return { success: false, error: err.message };
  }
}

function apiGet(params){ return apiPost(params); }

async function cloudRequest(action, body) {
  body = body || {};
  try {
    return await apiPost(Object.assign({ action: action }, body));
  } catch(e) {
    toast('Cloud error: ' + e.message, 'error');
    return null;
  }
}

/* DRAWING */
function setCanvasSize(){canvas.width=outW;canvas.height=outH;}
const pxX=p=>(p/100)*canvas.width,pxY=p=>(p/100)*canvas.height,pctX=px=>(px/canvas.width)*100,pctY=px=>(px/canvas.height)*100,fontPx=p=>Math.max(6,(p/100)*canvas.height);
function roundRect(x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();}
function drawPhoto(){
  ctx.fillStyle='#111216';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!imgLoaded){ctx.save();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='700 20px system-ui';ctx.textAlign='center';ctx.fillText('Upload your menu template image to start',canvas.width/2,canvas.height/2);ctx.restore();return;}
  const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;
  const fit=Math.min(w/bw,h/bh)*photoScale;
  ctx.save();ctx.translate(w/2+photoOffsetX,h/2+photoOffsetY);ctx.rotate(photoRot*Math.PI/180);
  ctx.drawImage(img,-bw*fit/2,-bh*fit/2,bw*fit,bh*fit);ctx.restore();
}
function measureBox(b){
  const size=fontPx(b.sizePct);

  const maxW_limit=b.maxWidthPct>0?pxX(b.maxWidthPct):0;
  ctx.save();
  ctx.font=`${b.italic?'italic ':''}${b.bold?'900 ':'700 '}${Math.round(size)}px ${b.fontFamily}`;
  let lines=[];
  if(maxW_limit>0){
    for(const raw of rawLines){
      const words=raw.split(' ');
      let cur='';
      for(const w of words){
        const test=cur?cur+' '+w:w;
        if(ctx.measureText(test).width>maxW_limit&&cur){lines.push(cur);cur=w;}
        else cur=test;
      }

function rotAABB(cx,cy,rw,rh,deg){const rad=(deg||0)*Math.PI/180,hw=rw/2,hh=rh/2;const cs=[{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}];let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;for(const p of cs){const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx,ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);}return{left:minX,top:minY,right:maxX,bottom:maxY};}
function drawTextBox(b){
  const x=pxX(b.xPct),y=pxY(b.yPct),m=measureBox(b),lx=-m.maxW/2,ly=-m.totalH/2,px=b.bgPadX??14,py=b.bgPadY??10;

const HANDLE_SIZE=10;

    {id:'bl',x:h.left,y:h.bottom},{id:'br',x:h.right,y:h.bottom},
    {id:'ml',x:h.left,y:my},{id:'mr',x:h.right,y:my},

function drawOutline(){

    const isSide=handle.id==='ml'||handle.id==='mr';
    const isTopBot=handle.id==='tm'||handle.id==='bm';
    ctx.fillStyle=isSide?'rgba(100,180,255,0.95)':isTopBot?'rgba(100,255,150,0.95)':'rgba(255,122,24,0.95)';

function draw(){setCanvasSize();ctx.save();ctx.translate(viewX,viewY);ctx.scale(viewScale,viewScale);drawPhoto();if(document.getElementById('showText').checked){for(const b of boxes)drawTextBox(b);if(activeId)drawOutline();}ctx.restore();}
function resetAll(){photoScale=1;document.getElementById('photoZoom').value='1';photoRot=0;photoOffsetX=0;photoOffsetY=0;viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function fitView(){viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function maybeSnap(v){return document.getElementById('snapOn').checked?Math.round(v*2)/2:v;}
function rawFromClient(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*(canvas.width/r.width),y:(cy-r.top)*(canvas.height/r.height)};}

function hitTest(px,py){for(let i=boxes.length-1;i>=0;i--){const b=boxes[i],h=b.__hit;if(h&&px>=h.left&&px<=h.right&&py>=h.top&&py<=h.bottom)return b;}return null;}

/* POINTER EVENTS */
let resizeHandle=null;
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch'){pointers.set(e.pointerId,{clientX:e.clientX,clientY:e.clientY});if(pointers.size===2){pinchActive=true;const p=computePinch();lastMid=p?.mid;lastDist=p?.dist;dragging=false;canvas.setPointerCapture(e.pointerId);return;}}
  if(!isCoarse()&&e.button===2){const p=rawFromClient(e.clientX,e.clientY);dragging=true;dragMode='view';lastX=p.x;lastY=p.y;canvas.setPointerCapture(e.pointerId);return;}
  const p=worldFromClient(e.clientX,e.clientY);lastX=p.x;lastY=p.y;
  if(activeId&&document.getElementById('showText').checked){
    const ab=boxes.find(x=>x.id===activeId);
    if(ab){const rh=hitHandle(p.x,p.y,ab);if(rh){saveUndo();resizeHandle=rh;dragging=true;dragMode='resize';canvas.setPointerCapture(e.pointerId);return;}}
  }
  if(document.getElementById('showText').checked){const hit=hitTest(p.x,p.y);if(hit){saveUndo();activeId=hit.id;dragging=true;dragMode='text';resizeHandle=null;rebuildSidePanel();canvas.setPointerCapture(e.pointerId);draw();return;}}

});
function computePinch(){if(pointers.size!==2)return null;const pts=Array.from(pointers.values());const a=rawFromClient(pts[0].clientX,pts[0].clientY),b=rawFromClient(pts[1].clientX,pts[1].clientY);return{mid:{x:(a.x+b.x)/2,y:(a.y+b.y)/2},dist:Math.hypot(a.x-b.x,a.y-b.y)};}

function endPointer(e){dragging=false;resizeHandle=null;if(e?.pointerType==='touch'){pointers.delete(e.pointerId);if(pointers.size<2){pinchActive=false;lastMid=null;lastDist=null;}}triggerAutoSave();}

/* PAYLOADS */
function currentPayload(){return{outW,outH,imgDataURL:imgDataURL||'',photoTransform:{photoScale,photoRot,photoOffsetX,photoOffsetY},boxes};}
async function applyPayload(p){if(!p)return;if(p.imgDataURL){imgDataURL=p.imgDataURL;await loadImg(imgDataURL);}const t=p.photoTransform||{};photoScale=t.photoScale??photoScale;photoRot=t.photoRot??photoRot;photoOffsetX=t.photoOffsetX??photoOffsetX;photoOffsetY=t.photoOffsetY??photoOffsetY;document.getElementById('photoZoom').value=String(photoScale);if(Array.isArray(p.boxes))boxes=p.boxes;activeId=null;fitView();rebuildSidePanel();draw();}
function createProject(name){const s=loadStore();const p={id:uid(),name:name||`Menu ${new Date().toLocaleDateString()}`,createdAt:Date.now(),updatedAt:Date.now(),data:currentPayload()};s.items.unshift(p);s.activeId=p.id;const r=saveStore(s);if(!r.ok){toast('Save failed: '+r.error,'error');return false;}toast('Project created!','success');rebuildSidePanel();return true;}
function saveProject(askName){
  const s=loadStore();const a=s.items.find(p=>p.id===s.activeId);
  if(!a){const name=prompt('Name this project:','Menu '+new Date().toLocaleDateString());if(name===null)return;createProject(name.trim()||'Menu '+new Date().toLocaleDateString());return;}
  if(askName){const name=prompt('Rename project:',a.name);if(name===null)return;a.name=name.trim()||a.name;}
  a.updatedAt=Date.now();a.data=currentPayload();
  const r=saveStore(s);if(!r.ok){toast('Save failed: '+r.error,'error');return;}
  toast('Saved "'+a.name+'"!','success');rebuildSidePanel();
}
function renameProject(id){const s=loadStore();const p=s.items.find(x=>x.id===id);if(!p)return;const name=prompt('Rename project:',p.name);if(name===null||!name.trim())return;p.name=name.trim();p.updatedAt=Date.now();saveStore(s);toast('Renamed to "'+p.name+'"','success');rebuildSidePanel();}
function exportProjectFile(id){
  const s=loadStore();const p=s.items.find(x=>x.id===id);
  if(!p){toast('No project to export','error');return;}
  const exportData=Object.assign({},p);
  if(!exportData.data.imgDataURL&&imgDataURL){exportData.data.imgDataURL=imgDataURL;}
  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  const el=document.createElement('a');
  const safeName=(p.name||'menu').replace(/[^a-zA-Z0-9-_ ]/g,'').replace(/\s+/g,'-').toLowerCase();
  el.download=`hotheadz-${safeName}-${new Date().toISOString().slice(0,10)}.json`;
  el.href=URL.createObjectURL(blob);document.body.appendChild(el);el.click();el.remove();
  setTimeout(()=>URL.revokeObjectURL(el.href),1500);
  toast('Project file exported!','success');
}
async function loadProject(id){const s=loadStore();const p=s.items.find(x=>x.id===id);if(!p)return;s.activeId=id;saveStore(s);if(p.data)await applyPayload(p.data);rebuildSidePanel();}
function deleteProject(id){const s=loadStore();const p=s.items.find(x=>x.id===id);if(!p||!confirm(`Delete "${p.name}"?`))return;s.items=s.items.filter(x=>x.id!==id);if(s.activeId===id)s.activeId=s.items[0]?.id??null;saveStore(s);const n=s.items.find(x=>x.id===s.activeId);if(n?.data)applyPayload(n.data);else{loadStarterBoxes();imgLoaded=false;imgDataURL='';resetAll();}toast('Deleted','info');rebuildSidePanel();}

function getPhotoAABB(){if(!imgLoaded)return null;const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;const fit=Math.min(w/bw,h/bh)*photoScale;const cx=w/2+photoOffsetX,cy=h/2+photoOffsetY,dw=bw*fit,dh=bh*fit;const rad=photoRot*Math.PI/180;const corners=[{x:-dw/2,y:-dh/2},{x:dw/2,y:-dh/2},{x:dw/2,y:dh/2},{x:-dw/2,y:dh/2}];let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;for(const p of corners){const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx,ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);}return{sx:Math.max(0,Math.floor(minX)),sy:Math.max(0,Math.floor(minY)),sw:Math.max(1,Math.min(w,Math.ceil(maxX))-Math.max(0,Math.floor(minX))),sh:Math.max(1,Math.min(h,Math.ceil(maxY))-Math.max(0,Math.floor(minY)))};}
function exportCropped(mime,ext,q){if(!imgLoaded){toast('Upload template first','error');return;}const ov={viewX,viewY,viewScale};viewX=0;viewY=0;viewScale=1;draw();const a=getPhotoAABB();viewX=ov.viewX;viewY=ov.viewY;viewScale=ov.viewScale;if(!a){toast('No photo bounds','error');return;}const out=document.createElement('canvas');out.width=a.sw;out.height=a.sh;out.getContext('2d').drawImage(canvas,a.sx,a.sy,a.sw,a.sh,0,0,a.sw,a.sh);out.toBlob(blob=>{if(!blob)return;const el=document.createElement('a');el.download=`hotheadz-menu-${new Date().toISOString().slice(0,10)}.${ext}`;el.href=URL.createObjectURL(blob);document.body.appendChild(el);el.click();el.remove();setTimeout(()=>URL.revokeObjectURL(el.href),1500);toast(`${ext.toUpperCase()} downloaded!`,'success');},mime,q);draw();}
function exportJSON(){
  const s=loadStore();const a=s.items.find(p=>p.id===s.activeId);
  const payload=currentPayload();
  if(!payload.imgDataURL&&imgDataURL)payload.imgDataURL=imgDataURL;
  const proj={id:a?.id||uid(),name:a?.name||'Menu Export',createdAt:a?.createdAt||Date.now(),updatedAt:Date.now(),data:payload};

  el.download=`hotheadz-${safeName}-${new Date().toISOString().slice(0,10)}.json`;
  el.href=URL.createObjectURL(blob);document.body.appendChild(el);el.click();el.remove();
  toast('Project exported with template image!','success');
}

async function publishLunch(){
  const lunchBox=boxes.find(b=>b.name==='Lunch');
  if(!lunchBox||!lunchBox.text.trim()){toast('No Lunch text box found or it is empty','error');return;}
  const lines=lunchBox.text.split('\n').map(l=>l.trim()).filter(Boolean);
  const items=[];
  for(const line of lines){
    if(line.toUpperCase()==='LUNCH')continue;
    if(/^\d{1,2}:\d{2}\s*(AM|PM)/i.test(line))continue;
    if(/^(Same Daily|Same daily)/i.test(line)){items.push({name:line,desc:''});continue;}
    let clean=line.replace(/^[\u2022\u2023\u25E6\u2043\u2219\u2219\-\*]\s*/,'').trim();
    if(clean)items.push({name:clean,desc:''});
  }
  if(!items.length){toast('Could not parse any lunch items','error');return;}
  const now=new Date();
  const dateISO=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const itemNames=items.map(i=>i.name).join(', ');
  if(!confirm('Publish '+items.length+' lunch items to the live website for '+dateISO+'?\n\n'+itemNames))return;
  toast('Publishing to live menu...','info');
  try{
    const result=await apiPost({action:'save-lunch',date:dateISO,data:{lunch:{show:true,items:items},dessert:{items:[]},crawfish:{show:false}},publishedBy:getCloudName()});
    if(result?.success){toast('Published! '+items.length+' lunch items are now live.','success');}
    else{toast('Publish failed: '+(result?.error||'unknown error'),'error');}
  }catch(e){toast('Publish error: '+e.message,'error');}
}
document.getElementById('publishLunch').addEventListener('click',()=>{publishLunch();exportModal.classList.remove('active');});

/* ═══════════════════════════════════════════════════════════
   MENU DEFAULTS CACHE — fetches from MenuDefaults sheet in cloud
   ═══════════════════════════════════════════════════════════ */
var menuDefaultsCache = null;   // full object: { breakfast:{}, drinks:{}, beer:[], ... }
var menuDefaultsStatus = 'idle'; // 'idle' | 'loading' | 'loaded' | 'error'

async function loadMenuDefaults(force){
  if (menuDefaultsCache && !force) return menuDefaultsCache;
  menuDefaultsStatus = 'loading';
  try {
    const res = await cloudRequest('getMenuDefaults');
    if (res && res.success && res.data) {
      menuDefaultsCache = res.data;
      menuDefaultsStatus = 'loaded';
      return menuDefaultsCache;
    }
    menuDefaultsStatus = 'error';
    return null;
  } catch(e) {
    menuDefaultsStatus = 'error';
    return null;
  }
}

async function saveMenuDefaultKey(key, value){
  toast('Saving ' + key + '...', 'info');
  try {
    const res = await apiPost({ action: 'saveMenuDefault', key: key, json: JSON.stringify(value) });
    if (res && res.success) {
      if (menuDefaultsCache) menuDefaultsCache[key] = value;
      toast('Saved ' + key + '!', 'success');
      return true;
    }
    toast('Save failed: ' + (res?.error || 'unknown'), 'error');
    return false;
  } catch(e) {
    toast('Save error: ' + e.message, 'error');
    return false;
  }
}

async function resetMenuDefaultKey(key){
  if (!confirm('Reset "' + key + '" to factory defaults? Your changes will be lost.')) return false;
  toast('Resetting ' + key + '...', 'info');
  try {
    const res = await apiPost({ action: 'resetMenuDefault', key: key });
    if (res && res.success) {
      await loadMenuDefaults(true);
      toast('Reset ' + key + ' to defaults', 'success');
      return true;
    }
    toast('Reset failed: ' + (res?.error || 'unknown'), 'error');
    return false;
  } catch(e) {
    toast('Reset error: ' + e.message, 'error');
    return false;
  }
}

// ═══ lunch-date helpers (unchanged) ═══
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isoToDay(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long'});}
function isoToLabel(iso){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);return dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}

function getClosingMinutes(dayName){
  const hours = (menuDefaultsCache && menuDefaultsCache.hours && menuDefaultsCache.hours.weekly) || [];
  const entry = hours.find(h => String(h.day||'').toLowerCase() === String(dayName||'').toLowerCase());
  if (!entry || !entry.close) return 14*60;
  const m = entry.close.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 14*60;
  let h = parseInt(m[1]), mn = parseInt(m[2]);
  if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
  if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
  return h*60 + mn;
}
function getDayOffset(){
  const now = new Date();
  const dayName = now.toLocaleDateString('en-US',{weekday:'long'});
  const nowMins = now.getHours()*60 + now.getMinutes();
  const closeMins = getClosingMinutes(dayName);
  return nowMins >= closeMins ? 1 : 0;
}
function dateOffsetAdj(n){
  const shift = getDayOffset();
  const d = new Date();
  d.setDate(d.getDate() + n + shift);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ═══ STATIC TAB WIRE HANDLERS ═══ */
async function wireStaticPanel(){
  // Load fresh data if we don't have any
  if (!menuDefaultsCache && menuDefaultsStatus !== 'loading') {
    await loadMenuDefaults();
    rebuildSidePanel();
    return;
  }

  // BREAKFAST
  var bkSave = document.getElementById('bkSave');
  if (bkSave) {
    bkSave.addEventListener('click', async function(){
      var data = {
        subtitle: (document.getElementById('bkSub').value||'').trim(),
        plates: linesTo(document.getElementById('bkPlates').value),
        items: linesTo(document.getElementById('bkItems').value)
      };
      if (await saveMenuDefaultKey('breakfast', data)) rebuildSidePanel();
    });
    document.getElementById('bkReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('bkReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('breakfast')) rebuildSidePanel(); });
  }

  // LUNCH PLATES
  var lpSave = document.getElementById('lpSave');
  if (lpSave) {
    lpSave.addEventListener('click', async function(){
      var data = {
        subtitle: (document.getElementById('lpSub').value||'').trim(),
        plates: linesTo(document.getElementById('lpPlates').value)
      };
      if (await saveMenuDefaultKey('lunch', data)) rebuildSidePanel();
    });
    document.getElementById('lpReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('lpReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('lunch')) rebuildSidePanel(); });
  }

  // DRINKS
  var drSave = document.getElementById('drSave');
  if (drSave) {
    drSave.addEventListener('click', async function(){
      var data = { items: linesTo(document.getElementById('drItems').value) };
      if (await saveMenuDefaultKey('drinks', data)) rebuildSidePanel();
    });
    document.getElementById('drReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('drReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('drinks')) rebuildSidePanel(); });
  }

  // BEER
  var beSave = document.getElementById('beSave');
  if (beSave) {
    beSave.addEventListener('click', async function(){
      var data = linesTo(document.getElementById('beItems').value);
      if (await saveMenuDefaultKey('beer', data)) rebuildSidePanel();
    });
    document.getElementById('beReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('beReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('beer')) rebuildSidePanel(); });
  }

  // SALAD
  var sdSave = document.getElementById('sdSave');
  if (sdSave) {
    sdSave.addEventListener('click', async function(){
      var data = {
        subtitle: (document.getElementById('sdSub').value||'').trim(),
        items: linesTo(document.getElementById('sdItems').value),
        saladBar: {
          lettuce:  linesTo(document.getElementById('sdLettuce').value),
          toppings: linesTo(document.getElementById('sdToppings').value),
          dressing: linesTo(document.getElementById('sdDressing').value)
        }
      };
      if (await saveMenuDefaultKey('salad', data)) rebuildSidePanel();
    });
    document.getElementById('sdReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('sdReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('salad')) rebuildSidePanel(); });
  }

  // DESSERT
  var dsSave = document.getElementById('dsSave');
  if (dsSave) {
    dsSave.addEventListener('click', async function(){
      var data = {
        subtitle: (document.getElementById('dsSub').value||'').trim(),
        items: linesTo(document.getElementById('dsItems').value)
      };
      if (await saveMenuDefaultKey('dessert', data)) rebuildSidePanel();
    });
    document.getElementById('dsReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('dsReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('dessert')) rebuildSidePanel(); });
  }

  // CRAWFISH
  var cfSave = document.getElementById('cfSave');
  if (cfSave) {
    cfSave.addEventListener('click', async function(){
      var data = {
        subtitle: (document.getElementById('cfSub').value||'').trim(),
        items: linesTo(document.getElementById('cfItems').value)
      };
      if (await saveMenuDefaultKey('crawfish', data)) rebuildSidePanel();
    });
    document.getElementById('cfReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('cfReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('crawfish')) rebuildSidePanel(); });
  }

  // HOURS
  var hrSave = document.getElementById('hrSave');
  if (hrSave) {
    hrSave.addEventListener('click', async function(){
      var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      var weekly = DAYS.map(function(day, idx){
        return {
          day: day,
          open:      (document.querySelector('[data-hours-idx="'+idx+'"][data-hours-field="open"]')?.value||'').trim(),
          close:     (document.querySelector('[data-hours-idx="'+idx+'"][data-hours-field="close"]')?.value||'').trim(),
          breakfast: (document.querySelector('[data-hours-idx="'+idx+'"][data-hours-field="breakfast"]')?.value||'').trim(),
          lunch:     (document.querySelector('[data-hours-idx="'+idx+'"][data-hours-field="lunch"]')?.value||'').trim()
        };
      });
      var data = { note: (document.getElementById('hrNote').value||'').trim(), weekly: weekly };
      if (await saveMenuDefaultKey('hours', data)) rebuildSidePanel();
    });
    document.getElementById('hrReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
    document.getElementById('hrReset').addEventListener('click', async function(){ if (await resetMenuDefaultKey('hours')) rebuildSidePanel(); });
  }

  // SETTINGS
  var stSave = document.getElementById('stSave');
  if (stSave) {
    stSave.addEventListener('click', async function(){
      var settings = {
        showAdvancedTab:     !!document.getElementById('stShowAdv').checked,
        advancedDisclaimer:  (document.getElementById('stDisclaimer').value||'').trim(),
        advancedWindowDays:  parseInt(document.getElementById('stWinDays').value||'7',10) || 7,
        noDescriptionText:   (document.getElementById('stNoDesc').value||'').trim()
      };
      var phone    = (document.getElementById('stPhone').value||'').trim();
      var delivery = (document.getElementById('stDelivery').value||'').trim();
      var ok1 = await saveMenuDefaultKey('settings',     settings);
      var ok2 = await saveMenuDefaultKey('phoneTel',     phone);
      var ok3 = await saveMenuDefaultKey('deliveryNote', delivery);
      if (ok1 && ok2 && ok3) rebuildSidePanel();
    });
    document.getElementById('stReload').addEventListener('click', async function(){ await loadMenuDefaults(true); rebuildSidePanel(); });
  }
}

/* ═══ SIDE PANEL ROUTER ═══ */
let currentTab='quickfill';

function rebuildSidePanel(){
  const c=document.getElementById('sideScroll');
  if (currentTab==='quickfill')           c.innerHTML=buildQF();
  else if (currentTab==='textboxes')      c.innerHTML=buildTB();
  else if (currentTab==='photo')          c.innerHTML=buildPH();
  else if (currentTab==='projects')       c.innerHTML=buildPR();
  else if (currentTab==='menu-lunch')     { c.innerHTML=buildMenuLunch(); wireMenuPanel(); return; }
  else if (currentTab==='static-breakfast')   { c.innerHTML=buildStaticBreakfast();   wireStaticPanel(); return; }
  else if (currentTab==='static-lunchplates') { c.innerHTML=buildStaticLunchPlates(); wireStaticPanel(); return; }
  else if (currentTab==='static-drinks')      { c.innerHTML=buildStaticDrinks();      wireStaticPanel(); return; }
  else if (currentTab==='static-beer')        { c.innerHTML=buildStaticBeer();        wireStaticPanel(); return; }
  else if (currentTab==='static-salad')       { c.innerHTML=buildStaticSalad();       wireStaticPanel(); return; }
  else if (currentTab==='static-dessert')     { c.innerHTML=buildStaticDessert();     wireStaticPanel(); return; }
  else if (currentTab==='static-crawfish')    { c.innerHTML=buildStaticCrawfish();    wireStaticPanel(); return; }
  else if (currentTab==='static-hours')       { c.innerHTML=buildStaticHours();       wireStaticPanel(); return; }
  else if (currentTab==='static-settings')    { c.innerHTML=buildStaticSettings();    wireStaticPanel(); return; }
  wirePanel();
}

// Helper to render the saved-dates list
async function refreshSavedDatesList(){
  const el = document.getElementById('savedDatesList');
  if (!el) return;
  el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:6px;">Loading from cloud...</div>';
  try {
    const result = await apiPost({ action: 'lunch' });
    if (!result || !result.success) {
      el.innerHTML = '<div style="font-size:11px;color:var(--danger);padding:6px;">Could not load: ' + (result && result.error ? result.error : 'unknown error') + '</div>';
      return;
    }
    const dates = result.dates || {};
    const keys = Object.keys(dates).sort();
    if (!keys.length) {
      el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:6px;">No dates saved yet.</div>';
      return;
    }
    const todayStr = todayISO();
    let html = '';
    let pastCount = 0;
    keys.forEach(date => {
      const isPast = date < todayStr;
      const isToday = date === todayStr;
      if (isPast) pastCount++;
      const data = dates[date] || {};
      const lunch = data.lunch || {};
      const items = lunch.items || [];
      const itemCount = items.length;
      const day = isoToDay(date);
      const label = isoToLabel(date);
      const ageBadge = isPast ? '<span style="background:rgba(255,77,77,.15);color:#ff7a7a;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;">PAST</span>' :
                       isToday ? '<span style="background:rgba(255,200,80,.15);color:#ffc850;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;">TODAY</span>' :
                       '<span style="background:rgba(100,180,255,.15);color:#7ac4ff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;">UPCOMING</span>';
      html += '<div style="display:flex;align-items:center;gap:6px;padding:8px;border-radius:var(--radius-sm);margin-bottom:4px;background:'+(isPast?'rgba(255,77,77,.04)':'rgba(255,255,255,.03)')+';border:1px solid '+(isPast?'rgba(255,77,77,.12)':'var(--border)')+';">';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;">'+esc(day)+' '+ageBadge+'</div>';
      html += '<div style="font-size:10px;color:var(--text3);">'+esc(label)+' \u2022 '+itemCount+' item'+(itemCount===1?'':'s')+'</div>';
      html += '</div>';
      html += '<button class="sm-btn savedDateLoad" data-date="'+esc(date)+'" style="font-size:10px;">Load</button>';
      html += '<button class="sm-btn danger savedDateDel" data-date="'+esc(date)+'" data-day="'+esc(day)+'" style="font-size:10px;padding:4px 8px;">\u00d7</button>';
      html += '</div>';
    });
    if (pastCount > 0) {
      html = '<div style="font-size:11px;color:var(--text2);padding:6px 0;margin-bottom:6px;">Total: '+keys.length+' dates saved \u2022 <span style="color:#ff7a7a;font-weight:700;">'+pastCount+' past</span></div>' + html;
    } else {
      html = '<div style="font-size:11px;color:var(--text2);padding:6px 0;margin-bottom:6px;">Total: '+keys.length+' dates saved</div>' + html;
    }
    el.innerHTML = html;

    // Wire individual delete and load buttons
    el.querySelectorAll('.savedDateDel').forEach(btn => {
      btn.addEventListener('click', async () => {
        const date = btn.dataset.date;
        const day = btn.dataset.day;
        if (!confirm('Delete lunch for '+day+' ('+date+')? This removes the row from the spreadsheet.')) return;
        const ok = await deleteLunchForDate(date);
        if (ok) refreshSavedDatesList();
      });
    });
    el.querySelectorAll('.savedDateLoad').forEach(btn => {
      btn.addEventListener('click', () => {
        // Switch to a date button if it's in the visible 7-day range, otherwise just info-toast
        const date = btn.dataset.date;
        const dayBtn = document.querySelector('.lunchDateBtn[data-date="'+date+'"]');
        if (dayBtn) {
          dayBtn.click();
          dayBtn.scrollIntoView({behavior:'smooth',block:'nearest'});
        } else {
          toast('Date '+date+' is outside the 7-day editor range. Showing details only:', 'info');
          // Render in the editor area as read-only-ish
          const dayName = isoToDay(date);
          const data = (window._lastSavedDates && window._lastSavedDates[date]) || {};
          const items = (data.lunch && data.lunch.items) || [];
          const dessert = (data.dessert && data.dessert.items) || [];
          const showCrawfish = !data.crawfish || data.crawfish.show !== false;
          let lh = '<div style="font-size:12px;font-weight:700;color:var(--fire);margin-bottom:8px;">'+dayName+' \u2022 '+date+' (read-only \u2014 outside editor range)</div>';
          lh += '<div class="fl">Lunch Items</div>';
          const itemsText = items.map(i => typeof i==='object' ? (i.name+(i.desc?' | '+i.desc:'')) : (i||'')).join('\n');
          lh += '<textarea class="fi fi-ta" id="lunchItemsTA" rows="10">'+esc(itemsText)+'</textarea>';
          lh += '<div class="fr"><div><div class="fl">Dessert</div><input class="fi" id="lunchDessert" value="'+esc(dessert.join(', '))+'"></div>';
          lh += '<div><div class="fl">Crawfish</div><label class="cf-toggle" style="margin-top:8px;"><input type="checkbox" id="lunchCrawfish"'+(showCrawfish?' checked':'')+'> Available</label></div></div>';
          lh += '<div class="btn-row" style="margin-top:8px;">';
          lh += '<button class="sm-btn primary" id="saveLunchDate">\ud83d\udcbe Save '+date+'</button>';
          lh += '<button class="sm-btn danger" id="deleteLunchDate">\u00d7 Clear This Date</button></div>';
          const ed = document.getElementById('lunchDateEditor');
          if (ed) {
            ed.innerHTML = lh;
            // Wire up these buttons too
            document.getElementById('saveLunchDate')?.addEventListener('click', async () => {
              const lines = linesTo(document.getElementById('lunchItemsTA')?.value);
              const lunchItems = lines.map(line => { const [name, ...rest] = line.split('|'); return { name: (name||'').trim(), desc: rest.join('|').trim() }; }).filter(i => i.name);
              const dess = linesTo(document.getElementById('lunchDessert')?.value.replace(/,/g,'\n'));
              const crawfish = document.getElementById('lunchCrawfish')?.checked;
              await saveLunchForDate(date, { lunch: { show:true, items: lunchItems }, dessert: { items: dess }, crawfish: { show: crawfish } });
            });
            document.getElementById('deleteLunchDate')?.addEventListener('click', async () => {
              if (!confirm('Clear lunch for '+date+'?')) return;
              await deleteLunchForDate(date);
              refreshSavedDatesList();
            });
          }
        }
      });
    });
    // Stash the dates so the load handler can read them
    window._lastSavedDates = dates;
  } catch (e) {
    el.innerHTML = '<div style="font-size:11px;color:var(--danger);padding:6px;">Error: '+e.message+'</div>';
  }
}

// Bulk delete all past dates
async function deleteAllPastDates(){
  try {
    const result = await apiPost({ action: 'lunch' });
    if (!result || !result.success) {
      toast('Could not load dates: '+(result?.error||'unknown'), 'error');
      return;
    }
    const dates = result.dates || {};
    const todayStr = todayISO();
    const pastKeys = Object.keys(dates).filter(d => d < todayStr).sort();
    if (!pastKeys.length) {
      toast('No past dates to delete', 'info');
      return;
    }
    if (!confirm('Delete '+pastKeys.length+' past lunch date'+(pastKeys.length===1?'':'s')+'?\n\nDates to delete:\n'+pastKeys.join('\n')+'\n\nThis cannot be undone.')) return;
    toast('Deleting '+pastKeys.length+' dates...', 'info');
    let deleted = 0, failed = 0;
    for (const date of pastKeys) {
      try {
        const r = await apiPost({ action: 'delete-lunch', date: date });
        if (r && r.success) deleted++; else failed++;
      } catch (e) { failed++; }
    }
    if (failed === 0) toast('Deleted '+deleted+' past date'+(deleted===1?'':'s')+'!', 'success');
    else toast('Deleted '+deleted+', failed '+failed, 'error');
    refreshSavedDatesList();
  } catch (e) {
    toast('Error: '+e.message, 'error');
  }
}

async function saveLunchForDate(date,data){
  try{
    const j=await apiPost({action:'save-lunch',date:date,data:data});
    if(j.success){toast('Lunch saved for '+date+'!','success');if(typeof refreshSavedDatesList==='function')setTimeout(refreshSavedDatesList,300);return true;}
    else{toast('Save failed: '+(j.error||''),'error');return false;}
  }catch(e){toast('Save error: '+e.message,'error');return false;}
}
async function deleteLunchForDate(date){
  try{
    const j=await apiPost({action:'delete-lunch',date:date});
    if(j.success){toast('Lunch removed for '+date,'info');return true;}
  }catch(e){}
  return false;
}

  const bS=document.getElementById('boxSelect');if(bS)bS.addEventListener('change',()=>{activeId=bS.value||null;rebuildSidePanel();draw();});
  const aB=document.getElementById('addBoxBtn');if(aB)aB.addEventListener('click',()=>{saveUndo();const b=defaultBox('New Box','New text',50,50);boxes.push(b);activeId=b.id;rebuildSidePanel();draw();triggerAutoSave();});
  const dB=document.getElementById('dupBoxBtn');if(dB)dB.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur)return;saveUndo();const c=JSON.parse(JSON.stringify(cur));c.id=uid();c.name+=' (copy)';c.xPct=clamp(cur.xPct+2,0,100);c.yPct=clamp(cur.yPct+2,0,100);boxes.push(c);activeId=c.id;rebuildSidePanel();draw();triggerAutoSave();});
  const dlB=document.getElementById('delBoxBtn');if(dlB)dlB.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur||!confirm('Delete "'+cur.name+'"?'))return;saveUndo();boxes=boxes.filter(b=>b.id!==cur.id);activeId=null;rebuildSidePanel();draw();triggerAutoSave();});
  const b=boxes.find(x=>x.id===activeId);
  if(b){const w=(id,fn,ev='input')=>{const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);};
    w('bName',e=>{b.name=e.target.value;draw();triggerAutoSave();});w('bText',e=>{b.text=e.target.value;draw();triggerAutoSave();});
    w('bX',e=>{b.xPct=parseFloat(e.target.value);draw();triggerAutoSave();});w('bY',e=>{b.yPct=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bSize',e=>{b.sizePct=parseFloat(e.target.value);const n=document.getElementById('bSizeN');if(n)n.value=b.sizePct;draw();triggerAutoSave();});
    w('bSizeN',e=>{b.sizePct=clamp(parseFloat(e.target.value||'1'),.3,10);const s=document.getElementById('bSize');if(s)s.value=b.sizePct;draw();triggerAutoSave();});
    w('bMaxW',e=>{b.maxWidthPct=parseFloat(e.target.value);const n=document.getElementById('bMaxWN');if(n)n.value=b.maxWidthPct;draw();triggerAutoSave();});
    w('bMaxWN',e=>{b.maxWidthPct=clamp(parseFloat(e.target.value||'0'),0,95);const s=document.getElementById('bMaxW');if(s)s.value=b.maxWidthPct;draw();triggerAutoSave();});
    w('bFont',e=>{b.fontFamily=e.target.value;draw();triggerAutoSave();},'change');w('bAlign',e=>{b.align=e.target.value;draw();triggerAutoSave();},'change');
    w('bColor',e=>{b.color=e.target.value;draw();triggerAutoSave();});w('bOp',e=>{b.opacity=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bRot',e=>{b.rotationDeg=parseFloat(e.target.value||'0');draw();triggerAutoSave();});w('bLH',e=>{b.lineHeight=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bShadow',e=>{b.shadow=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bStroke',e=>{b.strokeOn=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bStrokeW',e=>{b.strokeWidth=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bBgOn',e=>{b.bgOn=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bBgColor',e=>{b.bgColor=e.target.value;draw();triggerAutoSave();});w('bBgOp',e=>{b.bgOpacity=parseFloat(e.target.value);draw();triggerAutoSave();});
    document.querySelectorAll('.bCSw').forEach(sw=>{sw.addEventListener('click',()=>{b.color=sw.dataset.color;draw();triggerAutoSave();rebuildSidePanel();});});
  }
  const pZ=document.getElementById('pZoom2');if(pZ)pZ.addEventListener('input',()=>{photoScale=parseFloat(pZ.value);document.getElementById('photoZoom').value=pZ.value;draw();});
  const pR=document.getElementById('pRot2');if(pR)pR.addEventListener('click',()=>{saveUndo();photoRot=(photoRot+90)%360;draw();triggerAutoSave();});
  const pRs=document.getElementById('pReset2');if(pRs)pRs.addEventListener('click',()=>{saveUndo();photoScale=1;photoRot=0;photoOffsetX=0;photoOffsetY=0;document.getElementById('photoZoom').value='1';draw();triggerAutoSave();});
  const pN=document.getElementById('pNew');if(pN)pN.addEventListener('click',()=>{const n=prompt('Project name:','Menu '+new Date().toLocaleDateString());if(n===null)return;createProject(n.trim()||'Menu '+new Date().toLocaleDateString());rebuildSidePanel();});
  const pSv=document.getElementById('pSave');if(pSv)pSv.addEventListener('click',()=>saveProject(false));
  const pSA=document.getElementById('pSaveAs');if(pSA)pSA.addEventListener('click',()=>saveProject(true));
  const pRn=document.getElementById('pRename');if(pRn)pRn.addEventListener('click',()=>{const s=loadStore();if(s.activeId)renameProject(s.activeId);});
  const pEA=document.getElementById('pExportActive');if(pEA)pEA.addEventListener('click',()=>{const s=loadStore();if(s.activeId)exportProjectFile(s.activeId);});
  const pI=document.getElementById('pImport');if(pI)pI.addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=async()=>{const f=inp.files?.[0];if(!f)return;const obj=safeJSON(await f.text(),null);if(!obj||!obj.data){toast('Invalid project file','error');return;}const s=loadStore();s.items.unshift({id:uid(),name:obj.name||'Imported',createdAt:Date.now(),updatedAt:Date.now(),data:obj.data});s.activeId=s.items[0].id;saveStore(s);if(s.items[0]?.data)await applyPayload(s.items[0].data);toast('Imported "'+( obj.name||'project')+'"!','success');rebuildSidePanel();};inp.click();});
  document.querySelectorAll('.pLoad').forEach(btn=>{btn.addEventListener('click',()=>loadProject(btn.dataset.id));});
  document.querySelectorAll('.pDel').forEach(btn=>{btn.addEventListener('click',()=>deleteProject(btn.dataset.id));});
  document.querySelectorAll('.pExport').forEach(btn=>{btn.addEventListener('click',()=>exportProjectFile(btn.dataset.id));});
  document.querySelectorAll('.pRenameBtn').forEach(btn=>{btn.addEventListener('click',()=>renameProject(btn.dataset.id));});
  const csn=document.getElementById('cloudSetName');
  if(csn)csn.addEventListener('click',()=>{
    const name=(document.getElementById('cloudNameInput').value||'').trim();
    if(!name){toast('Enter your name','error');return;}
    setCloudName(name);toast('Connected as '+name+'!','success');rebuildSidePanel();
  });
  const cnBtn=document.getElementById('cloudChangeName');
  if(cnBtn)cnBtn.addEventListener('click',()=>{const n=prompt('Your name:',getCloudName());if(n&&n.trim()){setCloudName(n.trim());rebuildSidePanel();}});
  const csBtn=document.getElementById('cloudSaveNew');
  if(csBtn)csBtn.addEventListener('click',()=>cloudSave());
  const crBtn=document.getElementById('cloudRefresh');
  if(crBtn)crBtn.addEventListener('click',()=>refreshCloudList());
  if(getCloudName()&&document.getElementById('cloudProjectsList'))refreshCloudList();
}

async function refreshCloudList(){
  const el=document.getElementById('cloudProjectsList');
  if(!el)return;
  el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px;">Loading from cloud...</div>';
  const projects=await cloudList();
  if(!document.getElementById('cloudProjectsList'))return;
  if(!projects||!projects.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px;">No cloud projects yet. Save one!</div>';return;}
  let ph='';
  projects.forEach(p=>{
    const d=p.updatedAt?new Date(p.updatedAt).toLocaleString():'';
    ph+='<div style="display:flex;align-items:center;gap:4px;padding:7px;border-radius:var(--radius-sm);margin-bottom:3px;background:rgba(255,255,255,.03);border:1px solid var(--border);">';
    ph+='<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>';
    ph+='<div style="font-size:9px;color:var(--text3)">'+d+(p.savedBy?' \u2022 by '+esc(p.savedBy):'')+'</div></div>';
    ph+='<button class="sm-btn cLoad" data-id="'+esc(p.id)+'">Load</button>';
    ph+='<button class="sm-btn cUpdate" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">\u2601\ufe0f Update</button>';
    ph+='<button class="sm-btn danger cDel" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">\u00d7</button></div>';
  });
  el.innerHTML=ph;
  el.querySelectorAll('.cLoad').forEach(btn=>{btn.addEventListener('click',()=>cloudLoad(btn.dataset.id));});
  el.querySelectorAll('.cUpdate').forEach(btn=>{btn.addEventListener('click',()=>cloudUpdate(btn.dataset.id,btn.dataset.name));});
  el.querySelectorAll('.cDel').forEach(btn=>{btn.addEventListener('click',()=>{cloudDelete(btn.dataset.id,btn.dataset.name).then(()=>refreshCloudList());});});
}

/* ═══ TOP TAB EVENTS ═══ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',async()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    // For static tabs, trigger a load if not loaded yet
    if (currentTab.startsWith('static-') && !menuDefaultsCache && menuDefaultsStatus !== 'loading') {
      rebuildSidePanel();
      await loadMenuDefaults();
      rebuildSidePanel();
    } else {
      rebuildSidePanel();
    }
    if(window.innerWidth<=900)document.getElementById('sidePanel').classList.add('mobile-open');
  });
});
document.getElementById('mobSettingsBtn').addEventListener('click',()=>{currentTab='quickfill';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const qt=document.querySelector('.tab-btn[data-tab="quickfill"]');if(qt)qt.classList.add('active');rebuildSidePanel();document.getElementById('sidePanel').classList.add('mobile-open');});
document.getElementById('mobLunchBtn').addEventListener('click',()=>{currentTab='menu-lunch';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const mt=document.querySelector('.tab-btn[data-tab="menu-lunch"]');if(mt)mt.classList.add('active');rebuildSidePanel();document.getElementById('sidePanel').classList.add('mobile-open');});
document.getElementById('closeSidePanel').addEventListener('click',()=>{document.getElementById('sidePanel').classList.remove('mobile-open');});

/* ═══ INIT ═══ */
loadStarterBoxes();rebuildSidePanel();
(async()=>{
  const s=loadStore();if(s.items.length>0){const a=s.items.find(p=>p.id===s.activeId)||s.items[0];s.activeId=a.id;saveStore(s);if(a.data)await applyPayload(a.data);}else draw();
  const DI="/images/FBMenu.png";
  if(!imgDataURL&&DI){img=new Image();img.onload=()=>{imgLoaded=true;draw();};img.onerror=()=>{imgLoaded=false;draw();};img.src=DI;}
  // Prefetch menu defaults silently so static tabs open instantly on first click
  loadMenuDefaults();
})();

})();
</script>
