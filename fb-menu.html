async function refreshCloudList(){
  const el=document.getElementById('cloudProjectsList');if(!el)return;
  el.innerHTML='<div class="proj-empty">Loading projects from cloud…</div>';
  const projects=await cloudList();
  const countBadge=document.getElementById('cloudCountBadge');
  if(!projects||!projects.length){
    el.innerHTML='<div class="proj-empty">No cloud projects yet.<br><strong>Save</strong> your first one above so the team can load it.</div>';
    if(countBadge)countBadge.textContent='0';
    return;
  }
  if(countBadge)countBadge.textContent=String(projects.length);
  const activeId=getActiveCloudId();
  let ph='';
  const cloudGroups = groupProjectsByDate(projects, p => p.updated_at || p.updatedAt || p.created_at || p.createdAt || 0);
  cloudGroups.forEach(group => {
    ph+='<div class="proj-date-group" data-group-header="1"><span class="proj-date-group-label">'+esc(group.label)+'</span><span class="proj-date-group-line"></span><span class="proj-date-group-count">'+group.items.length+'</span></div>';
    group.items.forEach(p=>{
    const isActive=p.id===activeId;
    const updatedAt=p.updated_at||p.updatedAt;
    const createdAt=p.created_at||p.createdAt;
    const savedBy=p.saved_by||p.savedBy||'';
    ph+='<div class="proj-card'+(isActive?' is-active':'')+'" data-name="'+esc((p.name||'').toLowerCase())+'">';
    ph+='<div class="proj-card-head"><div class="proj-card-info">';
    ph+='<div class="proj-card-name">'+esc(p.name||'(untitled)');
    if(isActive)ph+='<span class="proj-card-active-tag">Active</span>';
    ph+='</div>';
    ph+='<div class="proj-card-date">'+esc(fmtSavedAt(updatedAt)||fmtSavedAt(createdAt)||fmtSavedAt(parseTimestampFromName(p.name||''))||'Unknown date')+'</div>';
    if(savedBy)ph+='<div class="proj-card-by">by '+esc(savedBy)+'</div>';
    ph+='</div></div>';
    ph+='<div class="proj-actions">';
    if(!isActive)ph+='<button class="sm-btn primary cLoad" data-id="'+esc(p.id)+'">Load</button>';
    ph+='<button class="sm-btn cRename" data-id="'+esc(p.id)+'" data-name="'+esc(p.name||'')+'">Rename</button>';
    ph+='<button class="sm-btn danger cDel" data-id="'+esc(p.id)+'" data-name="'+esc(p.name||'')+'" style="margin-left:auto;">\u00d7 Delete</button>';
    ph+='</div>';
    ph+='</div>';
    });
  });
  el.innerHTML=ph;
  el.querySelectorAll('.cLoad').forEach(btn=>btn.addEventListener('click',()=>cloudLoad(btn.dataset.id)));
  el.querySelectorAll('.cRename').forEach(btn=>btn.addEventListener('click',()=>cloudRename(btn.dataset.id,btn.dataset.name).then(()=>refreshCloudList())));
  el.querySelectorAll('.cDel').forEach(btn=>btn.addEventListener('click',()=>cloudDelete(btn.dataset.id,btn.dataset.name).then(()=>refreshCloudList())));
}

  });
});
document.getElementById('mobSettingsBtn').addEventListener('click',()=>{currentTab='quickfill';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const qt=document.querySelector('.tab-btn[data-tab="quickfill"]');if(qt)qt.classList.add('active');rebuildSidePanel();document.getElementById('sidePanel').classList.add('mobile-open');});
document.getElementById('mobLunchBtn').addEventListener('click',()=>{currentTab='ai-lunch';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));const mt=document.querySelector('.tab-btn[data-tab="ai-lunch"]');if(mt)mt.classList.add('active');rebuildSidePanel();
  // On mobile show the LEFT panel (Lunch editor) since that's what they tapped for
  const lp=document.getElementById('sidePanelLeft');
  if(lp){ lp.style.display='flex'; lp.classList.add('mobile-open'); }
});
document.getElementById('closeSidePanel').addEventListener('click',()=>{document.getElementById('sidePanel').classList.remove('mobile-open');});
document.getElementById('closeSidePanelLeft')?.addEventListener('click',()=>{document.getElementById('sidePanelLeft').classList.remove('mobile-open');});

loadStarterBoxes();rebuildSidePanel();
(async()=>{
  const s=loadStore();if(s.items.length>0){const a=s.items.find(p=>p.id===s.activeId)||s.items[0];s.activeId=a.id;saveStore(s);if(a.data)await applyPayload(a.data);}else draw();
  const DI="/images/FBMenu.png";
  if(!imgDataURL&&DI){img=new Image();img.onload=()=>{imgLoaded=true;draw();};img.onerror=()=>{imgLoaded=false;draw();};img.src=DI;}
  loadMenuDefaults();
})();

})();
</script>
