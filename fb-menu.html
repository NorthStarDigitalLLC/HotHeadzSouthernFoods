<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hot Headz – Menu Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--void:#0a0a0e;--surface:#131318;--card:#1a1a22;--border:rgba(255,255,255,.1);--text:#f0ece6;--text2:rgba(240,236,230,.7);--text3:rgba(240,236,230,.45);--fire:#ff7a18;--fire2:#ffb347;--ember:rgba(255,122,24,.12);--danger:#ff4d4d;--success:#4dff88;--radius:14px;--radius-sm:10px;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
    #toastBox{position:fixed;top:16px;right:16px;z-index:100000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{pointer-events:auto;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;backdrop-filter:blur(12px);animation:toastIn .35s ease,toastOut .4s 2.6s ease forwards;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:340px;}
    .toast.success{background:rgba(30,60,40,.9);border:1px solid rgba(77,255,136,.2);}
    .toast.error{background:rgba(60,20,20,.9);border:1px solid rgba(255,77,77,.25);}
    .toast.info{background:rgba(20,30,60,.9);border:1px solid rgba(100,140,255,.2);}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
    .admin-gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,#1e1510,#07060a);z-index:10000;}
    .admin-card{background:rgba(20,18,22,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:44px 36px;text-align:center;max-width:460px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.5);animation:fadeUp .7s ease;}
    .lock-icon{font-size:52px;margin-bottom:14px;animation:floatL 3s ease-in-out infinite;}
    .admin-card h1{font-family:'Abril Fatface',serif;font-size:30px;margin-bottom:10px;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .admin-card p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:18px;}
    .pin-row{display:flex;gap:10px;justify-content:center;margin:20px 0 12px;}
    .pin-row input{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:40px;padding:12px 18px;width:140px;font-size:20px;text-align:center;color:#fff;font-weight:700;letter-spacing:4px;}
    .pin-row input:focus{outline:none;border-color:var(--fire);}
    .unlock-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border:none;border-radius:40px;padding:12px 24px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;}
    .error-msg{color:var(--danger);font-size:13px;min-height:20px;}
    .gate-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
    .gate-links a{padding:10px 20px;border-radius:40px;font-weight:700;font-size:13px;text-decoration:none;}
    .gl-primary{background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;}
    .gl-ghost{border:1px solid var(--border);color:var(--text2);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatL{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .editor{display:none;position:fixed;inset:0;z-index:9999;background:var(--void);flex-direction:column;}
    .editor.active{display:flex;}
    .topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:48px;}
    .topbar-brand{font-family:'Abril Fatface',serif;font-size:15px;white-space:nowrap;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
    .topbar-tabs{display:flex;gap:3px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .topbar-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:6px 13px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .tab-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
    .tab-btn.active{background:var(--ember);color:var(--fire);}
    .tb-actions{display:flex;gap:5px;flex-shrink:0;}
    .tb-btn{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .tb-btn:hover{background:rgba(255,255,255,.1);}
    .tb-btn.undo{font-size:15px;padding:5px 9px;}
    .tb-btn.export-btn{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;font-weight:900;padding:7px 16px;}
    .main-layout{flex:1;display:flex;min-height:0;overflow:hidden;}
    .canvas-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--void);}
    .canvas-toolbar{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
    .ct-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .ct-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
    .ct-sep{flex:1;}
    .ct-label{font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap;}
    .ct-range{width:80px;accent-color:var(--fire);}
    .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;overflow:hidden;}
    #hhMEcanvas{max-width:100%;max-height:100%;border-radius:8px;touch-action:none;background:#0e0e12;object-fit:contain;}
    .canvas-foot{display:flex;gap:6px;padding:6px 10px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);background:var(--surface);}
    .cf-toggle{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;}
    .cf-toggle input{accent-color:var(--fire);}
    .side-panel{width:380px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
    .side-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
    .side-scroll::-webkit-scrollbar{width:4px;}
    .side-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
    .acc{border-bottom:1px solid var(--border);}
    .acc-head{display:flex;align-items:center;gap:7px;padding:11px 14px;cursor:pointer;user-select:none;}
    .acc-head:hover{background:rgba(255,255,255,.03);}
    .acc-arrow{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
    .acc.open .acc-arrow{transform:rotate(90deg);}
    .acc-title{font-size:13px;font-weight:800;color:var(--text);flex:1;}
    .acc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--ember);color:var(--fire);}
    .acc-body{display:none;padding:0 14px 14px;}
    .acc.open .acc-body{display:block;}
    .fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .fi{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;width:100%;margin-bottom:8px;}
    .fi:focus{outline:none;border-color:var(--fire);}
    .fi-ta{resize:vertical;min-height:80px;line-height:1.45;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .fs{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:13px;font-weight:600;width:100%;margin-bottom:8px;}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .sm-btn{padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .sm-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
    .sm-btn.danger{border-color:rgba(255,77,77,.2);background:rgba(255,77,77,.1);color:var(--danger);}
    .sm-btn.primary{background:var(--ember);border-color:rgba(255,122,24,.2);color:var(--fire);}
    .qf-card{background:rgba(255,122,24,.04);border:1px solid rgba(255,122,24,.1);border-radius:var(--radius);padding:10px;margin-bottom:8px;}
    .qf-title{font-size:12px;font-weight:800;color:var(--fire);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
    .qf-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--fire);}
    .qf-hint{font-size:10px;color:var(--text3);margin-bottom:6px;line-height:1.4;}
    .qf-details summary{list-style:none;}.qf-details summary::-webkit-details-marker{display:none;}
    .qf-details[open] summary{color:var(--fire)!important;}
    .swatch-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .swatch{width:26px;height:26px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .12s;}
    .swatch:hover{transform:scale(1.12);}
    .swatch.active{border-color:#fff;}
    @media(max-width:900px){
      .side-panel{display:none;position:fixed;inset:0;width:100%;z-index:10001;border-left:none;}
      .side-panel.mobile-open{display:flex;}
      .mpc{display:flex!important;}
    }
    @media(min-width:901px){.mpc{display:none!important;}}
    .mpc{display:none;position:sticky;top:0;z-index:2;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;}
    .mpc-title{font-size:14px;font-weight:800;}
    .mpc-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;}
    .mobile-bar{display:none;flex-shrink:0;padding:8px 12px;gap:6px;border-top:1px solid var(--border);background:var(--surface);align-items:center;justify-content:space-between;}
    @media(max-width:900px){.mobile-bar{display:flex;}.tb-actions .tb-btn:not(.export-btn):not(.undo){display:none;}}
    .mob-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;}
    .mob-btn.primary{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;color:#fff;}
    .export-modal{display:none;position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
    .export-modal.active{display:flex;}
    .export-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:400px;width:100%;text-align:center;animation:fadeUp .3s ease;}
    .export-card h2{font-family:'Abril Fatface',serif;font-size:22px;margin-bottom:6px;background:linear-gradient(135deg,var(--fire2),var(--fire));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .export-card p{font-size:13px;color:var(--text2);margin-bottom:18px;}
    .export-big{padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%;}
    .export-big:hover{background:rgba(255,255,255,.1);}
    .export-big.main{background:linear-gradient(135deg,var(--fire),var(--fire2));border-color:transparent;}
    .export-big .icon{font-size:20px;}
    .export-big .meta{text-align:left;flex:1;}
    .export-big .meta small{display:block;font-size:11px;font-weight:600;opacity:.7;margin-top:1px;}
    .export-close{margin-top:10px;padding:8px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
<div id="toastBox"></div>
<div class="admin-gate" id="adminGate">
  <div class="admin-card">
    <div class="lock-icon">🔒</div>
    <h1>Menu Editor</h1>
    <p>Staff-only area for building the daily Facebook menu post.</p>
    <div class="pin-row">
      <input type="password" id="pinInput" maxlength="6" placeholder="PIN" inputmode="numeric">
      <button class="unlock-btn" id="unlockBtn">Unlock</button>
    </div>
    <div class="error-msg" id="pinError"></div>
    <div class="gate-links">
      <a href="/menu" class="gl-primary">View Menu</a>
      <a href="/" class="gl-ghost">Home</a>
    </div>
  </div>
</div>
<div class="editor" id="editorShell">
  <div class="topbar">
    <div class="topbar-brand">Hot Headz</div>
    <div class="topbar-sep"></div>
    <div class="topbar-tabs">
      <button class="tab-btn active" data-tab="quickfill">⚡ Quick Fill</button>
      <button class="tab-btn" data-tab="textboxes">Text Boxes</button>
      <button class="tab-btn" data-tab="photo">Photo</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
    </div>
    <div class="tb-actions">
      <button class="tb-btn undo" id="undoBtn" title="Undo">↩</button>
      <button class="tb-btn undo" id="redoBtn" title="Redo">↪</button>
      <button class="tb-btn export-btn" id="exportBtn">Export ↓</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="canvas-panel">
      <div class="canvas-toolbar">
        <input id="hhMEfile" type="file" accept="image/*" style="font-size:11px;color:rgba(240,236,230,.7);max-width:150px;">
        <button class="ct-btn" id="resetViewBtn">Reset</button>
        <button class="ct-btn" id="fitViewBtn">Fit</button>
        <button class="ct-btn" id="rotateBtn">Rotate 90°</button>
        <div class="ct-sep"></div>
        <span class="ct-label">Photo</span>
        <input class="ct-range" id="photoZoom" type="range" min="0.3" max="4" step="0.01" value="1">
        <span class="ct-label">View</span>
        <input class="ct-range" id="viewZoom" type="range" min="0.5" max="3" step="0.01" value="1">
      </div>
      <div class="canvas-area"><canvas id="hhMEcanvas"></canvas></div>
      <div class="canvas-foot">
        <label class="cf-toggle"><input id="showText" type="checkbox" checked> Text</label>
        <label class="cf-toggle"><input id="snapOn" type="checkbox" checked> Snap</label>
        <label class="cf-toggle"><input id="outlineOn" type="checkbox" checked> Outline</label>
        <div style="flex:1"></div>
        <span style="font-size:9px;color:rgba(240,236,230,.45);">Drag=move photo • Right-drag=pan • Wheel=view zoom • Alt+Wheel=photo zoom</span>
      </div>
    </div>
    <div class="side-panel" id="sidePanel">
      <div class="mpc"><span class="mpc-title">Settings</span><button class="mpc-btn" id="closeSidePanel">Done</button></div>
      <div class="side-scroll" id="sideScroll"></div>
    </div>
  </div>
  <div class="mobile-bar">
    <button class="mob-btn" id="mobUndoBtn">↩ Undo</button>
    <button class="mob-btn" id="mobSettingsBtn">⚙ Edit</button>
    <button class="mob-btn primary" id="mobExportBtn">Export ↓</button>
  </div>
</div>
<div class="export-modal" id="exportModal">
  <div class="export-card">
    <h2>Export Menu</h2>
    <p>Download your finished menu image.</p>
    <button class="export-big main" id="dlJpg"><span class="icon">📸</span><span class="meta">Download JPG<small>Best for Facebook — post this one</small></span></button>
    <button class="export-big" id="dlPng"><span class="icon">🖼</span><span class="meta">Download PNG<small>Lossless quality — larger file</small></span></button>
    <button class="export-big" id="dlJson"><span class="icon">📤</span><span class="meta">Export Project File<small>Share with team — they import it and pick up where you left off</small></span></button>
    <button class="export-close" id="closeExport">Cancel</button>
  </div>
</div>
<script>
(function(){
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const uid=()=>Math.random().toString(16).slice(2)+'-'+Date.now().toString(16);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m,t='info'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastBox').appendChild(e);setTimeout(()=>e.remove(),3200);}
function safeJSON(r,f){try{return JSON.parse(r)}catch{return f}}
function toHex(c){if(/^#([0-9a-f]{3}){1,2}$/i.test(String(c)))return c;const m=String(c).match(/rgba?\((\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);if(m)return'#'+[m[1],m[2],m[3]].map(x=>clamp(+x,0,255).toString(16).padStart(2,'0')).join('');return'#ffffff';}
function hexRgba(h,a){const x=String(h||'#000').replace('#','');const f=x.length===3?x.split('').map(c=>c+c).join(''):x.padEnd(6,'0').slice(0,6);return`rgba(${parseInt(f.slice(0,2),16)},${parseInt(f.slice(2,4),16)},${parseInt(f.slice(4,6),16)},${clamp(a,0,1)})`;}
function todayDefaults(){const n=new Date();return{weekday:n.toLocaleDateString(undefined,{weekday:'long'}),dateStr:n.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'})};}
const isCoarse=()=>{try{return matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0}catch{return false}};

const FONTS=[
  {label:"System",value:'system-ui,-apple-system,Segoe UI,Roboto,Arial'},
  {label:"DM Sans",value:'"DM Sans",system-ui,sans-serif'},
  {label:"Abril Fatface",value:'"Abril Fatface",Georgia,serif'},
  {label:"DM Serif Display",value:'"DM Serif Display",Georgia,serif'},
  {label:"Playfair Display",value:'"Playfair Display",Georgia,serif'},
  {label:"Bebas Neue",value:'"Bebas Neue",Impact,sans-serif'},
  {label:"Oswald",value:'"Oswald",Arial,sans-serif'},
  {label:"Georgia",value:'Georgia,"Times New Roman",serif'},
  {label:"Verdana",value:'Verdana,Geneva,sans-serif'},
  {label:"Courier",value:'"Courier New",Courier,monospace'},
];
const BRAND_COLORS=['#ffffff','#f8ede6','#ffa048','#f87038','#f05020','#e83010','#c41800','#000000','#1e0a0c','#130509','#d4a898'];

/* GATE */
const ADMIN_PIN='2172';
document.getElementById('unlockBtn').addEventListener('click',()=>{if(document.getElementById('pinInput').value.trim()===ADMIN_PIN){document.getElementById('pinError').textContent='';document.getElementById('adminGate').style.display='none';document.getElementById('editorShell').classList.add('active');setTimeout(()=>draw(),60);}else document.getElementById('pinError').textContent='Incorrect PIN.';});
document.getElementById('pinInput').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('unlockBtn').click();});

/* CANVAS STATE */
const canvas=document.getElementById('hhMEcanvas'),ctx=canvas.getContext('2d',{alpha:false});
let img=new Image(),imgLoaded=false,imgDataURL='';
let photoScale=1,photoRot=0,photoOffsetX=0,photoOffsetY=0;
let viewX=0,viewY=0,viewScale=1;
const outW=1080,outH=1350;
let boxes=[],activeId=null,dragging=false,dragMode='image',lastX=0,lastY=0;
const pointers=new Map();let pinchActive=false,lastMid=null,lastDist=null;
canvas.addEventListener('contextmenu',e=>e.preventDefault());

/* UNDO/REDO */
let undoStack=[],redoStack=[];
function saveUndo(){undoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));if(undoStack.length>40)undoStack.shift();redoStack=[];}
function doUndo(){if(!undoStack.length)return;redoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));const s=JSON.parse(undoStack.pop());boxes=s.boxes;photoScale=s.photoScale;photoRot=s.photoRot;photoOffsetX=s.photoOffsetX;photoOffsetY=s.photoOffsetY;document.getElementById('photoZoom').value=String(photoScale);activeId=null;rebuildSidePanel();draw();toast('Undo','info');}
function doRedo(){if(!redoStack.length)return;undoStack.push(JSON.stringify({boxes,photoScale,photoRot,photoOffsetX,photoOffsetY}));const s=JSON.parse(redoStack.pop());boxes=s.boxes;photoScale=s.photoScale;photoRot=s.photoRot;photoOffsetX=s.photoOffsetX;photoOffsetY=s.photoOffsetY;document.getElementById('photoZoom').value=String(photoScale);activeId=null;rebuildSidePanel();draw();toast('Redo','info');}
document.getElementById('undoBtn').addEventListener('click',doUndo);
document.getElementById('redoBtn').addEventListener('click',doRedo);
document.getElementById('mobUndoBtn').addEventListener('click',doUndo);
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();if(e.shiftKey)doRedo();else doUndo();}if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();doRedo();}if(e.key==='Escape'){activeId=null;rebuildSidePanel();draw();}});

/* AUTO-SAVE */
const PK='hhMenuEditorProjects_v38';let ast=null;
function triggerAutoSave(){clearTimeout(ast);ast=setTimeout(()=>{const s=loadStore();const a=s.items.find(p=>p.id===s.activeId);if(a){a.updatedAt=Date.now();a.data=currentPayload();saveStore(s);}},2000);}
function loadStore(){const s=safeJSON(localStorage.getItem(PK),null);if(s&&Array.isArray(s.items))return s;return{activeId:null,items:[]};}
function saveStore(s){try{localStorage.setItem(PK,JSON.stringify(s));return{ok:true}}catch(e){return{ok:false,error:String(e?.message||e)}}}

/* CLOUD STORAGE (Google Sheets) */
const CLOUD_URL='https://script.google.com/macros/s/AKfycbxHd4heBpNJzAsgodKJMlgq8dVa_qlpHjIUHHRFYL6AIJys-d4x5Mxm1P_egFfvQiNtnQ/exec';
const CLOUD_NAME_KEY='hhMenuCloud_name';
function getCloudUrl(){return CLOUD_URL;}
function getCloudName(){return localStorage.getItem(CLOUD_NAME_KEY)||'';}
function setCloudName(n){localStorage.setItem(CLOUD_NAME_KEY,n);}

async function cloudRequest(action,body={}){
  const url=getCloudUrl();
  if(!url){toast('Set your Google Sheets URL in Projects > Cloud Settings','error');return null;}
  try{
    if(action==='list'){
      const r=await fetch(url+'?action=list');
      return await r.json();
    }
    if(action==='load'){
      const r=await fetch(url+'?action=load&id='+encodeURIComponent(body.id));
      return await r.json();
    }
    if(action==='save'||action==='delete'){
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,...body})});
      return await r.json();
    }
  }catch(e){toast('Cloud error: '+e.message,'error');return null;}
}

async function cloudSave(name){
  const projName=name||prompt('Project name for cloud:','Menu '+new Date().toLocaleDateString());
  if(!projName)return;
  toast('Saving to cloud...','info');
  const payload=currentPayload();
  // Strip image data to keep sheet size manageable — staff will have the template loaded locally
  const lightPayload={...payload,imgDataURL:''};
  const result=await cloudRequest('save',{project:{id:uid(),name:projName.trim(),savedBy:getCloudName(),data:lightPayload}});
  if(result?.success){toast('Saved "'+projName.trim()+'" to cloud!','success');rebuildSidePanel();}
  else toast('Cloud save failed: '+(result?.error||'unknown'),'error');
}

async function cloudUpdate(id,name){
  toast('Updating cloud...','info');
  const payload=currentPayload();
  const lightPayload={...payload,imgDataURL:''};
  const result=await cloudRequest('save',{project:{id,name,savedBy:getCloudName(),data:lightPayload}});
  if(result?.success)toast('Updated "'+name+'" on cloud!','success');
  else toast('Cloud update failed: '+(result?.error||'unknown'),'error');
}

async function cloudList(){
  const result=await cloudRequest('list');
  if(result?.success)return result.projects||[];
  toast('Could not load cloud projects: '+(result?.error||'unknown'),'error');
  return[];
}

async function cloudLoad(id){
  toast('Loading from cloud...','info');
  const result=await cloudRequest('load',{id});
  if(result?.success&&result.project?.data){
    await applyPayload(result.project.data);
    toast('Loaded "'+result.project.name+'" from cloud!','success');
    rebuildSidePanel();
  }else toast('Cloud load failed: '+(result?.error||'unknown'),'error');
}

async function cloudDelete(id,name){
  if(!confirm('Delete "'+name+'" from cloud? This affects everyone.'))return;
  const result=await cloudRequest('delete',{id});
  if(result?.success){toast('Deleted from cloud','info');rebuildSidePanel();}
  else toast('Cloud delete failed: '+(result?.error||'unknown'),'error');
}

function fileToDataURL(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(String(x.result||''));x.onerror=j;x.readAsDataURL(f);})}

/* DRAWING */
function setCanvasSize(){canvas.width=outW;canvas.height=outH;}
const pxX=p=>(p/100)*canvas.width,pxY=p=>(p/100)*canvas.height,pctX=px=>(px/canvas.width)*100,pctY=px=>(px/canvas.height)*100,fontPx=p=>Math.max(6,(p/100)*canvas.height);
function roundRect(x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();}
function drawPhoto(){
  ctx.fillStyle='#111216';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!imgLoaded){ctx.save();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='700 20px system-ui';ctx.textAlign='center';ctx.fillText('Upload your menu template image to start',canvas.width/2,canvas.height/2);ctx.restore();return;}
  const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;
  const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;
  const fit=Math.min(w/bw,h/bh)*photoScale;
  ctx.save();ctx.translate(w/2+photoOffsetX,h/2+photoOffsetY);ctx.rotate(photoRot*Math.PI/180);
  ctx.drawImage(img,-bw*fit/2,-bh*fit/2,bw*fit,bh*fit);ctx.restore();
}
function measureBox(b){
  const size=fontPx(b.sizePct);
  const rawLines=String(b.text??'').split('\n');
  const lineH=size*(b.lineHeight||1.15);
  const maxW_limit=b.maxWidthPct>0?pxX(b.maxWidthPct):0;
  ctx.save();
  ctx.font=`${b.italic?'italic ':''}${b.bold?'900 ':'700 '}${Math.round(size)}px ${b.fontFamily}`;
  let lines=[];
  if(maxW_limit>0){
    for(const raw of rawLines){
      const words=raw.split(' ');
      let cur='';
      for(const w of words){
        const test=cur?cur+' '+w:w;
        if(ctx.measureText(test).width>maxW_limit&&cur){lines.push(cur);cur=w;}
        else cur=test;
      }
      if(cur)lines.push(cur); else lines.push('');
    }
  }else{lines=rawLines;}
  let maxW=0;for(const l of lines)maxW=Math.max(maxW,ctx.measureText(l).width);
  if(maxW_limit>0)maxW=Math.min(maxW,maxW_limit);
  ctx.restore();
  return{lines,size,lineH,maxW,totalH:lines.length*lineH};
}
function rotAABB(cx,cy,rw,rh,deg){const rad=(deg||0)*Math.PI/180,hw=rw/2,hh=rh/2;const cs=[{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw,y:hh},{x:-hw,y:hh}];let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;for(const p of cs){const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx,ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);}return{left:minX,top:minY,right:maxX,bottom:maxY};}
function drawTextBox(b){
  const x=pxX(b.xPct),y=pxY(b.yPct),m=measureBox(b),lx=-m.maxW/2,ly=-m.totalH/2,px=b.bgPadX??14,py=b.bgPadY??10;
  ctx.save();ctx.translate(x,y);ctx.rotate((b.rotationDeg||0)*Math.PI/180);
  if(b.bgOn){ctx.save();ctx.shadowBlur=0;ctx.fillStyle=hexRgba(b.bgColor||'#000',clamp(b.bgOpacity??.3,0,1));roundRect(lx-px,ly-py,m.maxW+px*2,m.totalH+py*2,b.bgRadius??14);ctx.fill();ctx.restore();}
  if(b.shadow){ctx.shadowColor=b.shadowColor||'rgba(0,0,0,0.7)';ctx.shadowBlur=b.shadowBlur??10;}else{ctx.shadowColor='rgba(0,0,0,0)';ctx.shadowBlur=0;}
  ctx.fillStyle=hexRgba(b.color||'#fff',clamp(b.opacity??1,0,1));
  ctx.font=`${b.italic?'italic ':''}${b.bold?'900 ':'700 '}${Math.round(m.size)}px ${b.fontFamily}`;
  ctx.textBaseline='middle';
  const al=(b.align||'left').toLowerCase();let dx=0;
  if(al==='center'){ctx.textAlign='center';dx=0;}else if(al==='right'){ctx.textAlign='right';dx=lx+m.maxW;}else{ctx.textAlign='left';dx=lx;}
  // Draw text stroke first (outline behind fill for readability)
  if(b.strokeOn&&b.strokeWidth>0){
    ctx.save();ctx.shadowBlur=0;ctx.shadowColor='transparent';
    ctx.strokeStyle=b.strokeColor||'#000000';ctx.lineWidth=b.strokeWidth||2;ctx.lineJoin='round';
    for(let i=0;i<m.lines.length;i++)ctx.strokeText(m.lines[i],dx,ly+(i+.5)*m.lineH);
    ctx.restore();

    if(b.shadow){ctx.shadowColor=b.shadowColor||'rgba(0,0,0,0.7)';ctx.shadowBlur=b.shadowBlur??10;}
  }

  const boxW=Math.max(textW,constraintW)+(b.bgOn?px*2:0);
  const rh=m.totalH+(b.bgOn?py*2:0);
  b.__hit=rotAABB(x,y,boxW,rh,b.rotationDeg||0);
  b.__rawW=boxW;b.__rawH=rh;b.__cx=x;b.__cy=y;

const HANDLE_SIZE=10;
function getHandles(b){
  if(!b||!b.__hit)return[];
  const h=b.__hit;
  const mx=(h.left+h.right)/2,my=(h.top+h.bottom)/2;
  return[
    {id:'tl',x:h.left,y:h.top,cursor:'nwse-resize'},
    {id:'tr',x:h.right,y:h.top,cursor:'nesw-resize'},
    {id:'bl',x:h.left,y:h.bottom,cursor:'nesw-resize'},
    {id:'br',x:h.right,y:h.bottom,cursor:'nwse-resize'},
    {id:'ml',x:h.left,y:my,cursor:'ew-resize'},
    {id:'mr',x:h.right,y:my,cursor:'ew-resize'},
    {id:'tm',x:mx,y:h.top,cursor:'ns-resize'},
    {id:'bm',x:mx,y:h.bottom,cursor:'ns-resize'},
  ];
}
function hitHandle(px,py,b){
  const handles=getHandles(b);
  const hs=HANDLE_SIZE*2.5; // bigger hit area for easier grabbing
  for(const h of handles){if(Math.abs(px-h.x)<hs&&Math.abs(py-h.y)<hs)return h;}
  return null;
}
function drawOutline(){
  if(!document.getElementById('outlineOn').checked)return;
  const b=boxes.find(x=>x.id===activeId);if(!b||!b.__hit)return;
  const h=b.__hit;
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.setLineDash([6,5]);
  ctx.strokeRect(h.left,h.top,h.right-h.left,h.bottom-h.top);ctx.setLineDash([]);
  // Draw handles
  const handles=getHandles(b);
  for(const handle of handles){
    const isSide=handle.id==='ml'||handle.id==='mr';
    const isTopBot=handle.id==='tm'||handle.id==='bm';
    const isCorner=!isSide&&!isTopBot;
    const sz=isCorner?6:5;
    ctx.fillStyle=isSide?'rgba(100,180,255,0.95)':isTopBot?'rgba(100,255,150,0.95)':'rgba(255,122,24,0.95)';
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    if(isSide){
      // Draw wider horizontal bar for side handles
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(handle.x-4,handle.y-10,8,20,3):ctx.rect(handle.x-4,handle.y-10,8,20);
      ctx.fill();ctx.stroke();
    }else if(isTopBot){
      // Draw wider vertical bar for top/bottom
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(handle.x-10,handle.y-4,20,8,3):ctx.rect(handle.x-10,handle.y-4,20,8);
      ctx.fill();ctx.stroke();
    }else{
      // Corner circles
      ctx.beginPath();ctx.arc(handle.x,handle.y,sz,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
  }
  ctx.restore();
}
function draw(){setCanvasSize();ctx.save();ctx.translate(viewX,viewY);ctx.scale(viewScale,viewScale);drawPhoto();if(document.getElementById('showText').checked){for(const b of boxes)drawTextBox(b);if(activeId)drawOutline();}ctx.restore();}
function resetAll(){photoScale=1;document.getElementById('photoZoom').value='1';photoRot=0;photoOffsetX=0;photoOffsetY=0;viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function fitView(){viewX=0;viewY=0;viewScale=1;document.getElementById('viewZoom').value='1';draw();}
function maybeSnap(v){return document.getElementById('snapOn').checked?Math.round(v*2)/2:v;}
function rawFromClient(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*(canvas.width/r.width),y:(cy-r.top)*(canvas.height/r.height)};}
function worldFromClient(cx,cy){const r=rawFromClient(cx,cy);return{x:(r.x-viewX)/viewScale,y:(r.y-viewY)/viewScale};}
function hitTest(px,py){for(let i=boxes.length-1;i>=0;i--){const b=boxes[i],h=b.__hit;if(h&&px>=h.left&&px<=h.right&&py>=h.top&&py<=h.bottom)return b;}return null;}

/* POINTER EVENTS */
let resizeHandle=null;
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch'){pointers.set(e.pointerId,{clientX:e.clientX,clientY:e.clientY});if(pointers.size===2){pinchActive=true;const p=computePinch();lastMid=p?.mid;lastDist=p?.dist;dragging=false;canvas.setPointerCapture(e.pointerId);return;}}
  if(!isCoarse()&&e.button===2){const p=rawFromClient(e.clientX,e.clientY);dragging=true;dragMode='view';lastX=p.x;lastY=p.y;canvas.setPointerCapture(e.pointerId);return;}
  const p=worldFromClient(e.clientX,e.clientY);lastX=p.x;lastY=p.y;
  // Check resize handles first
  if(activeId&&document.getElementById('showText').checked){
    const ab=boxes.find(x=>x.id===activeId);
    if(ab){const rh=hitHandle(p.x,p.y,ab);if(rh){saveUndo();resizeHandle=rh;dragging=true;dragMode='resize';canvas.setPointerCapture(e.pointerId);return;}}
  }
  if(document.getElementById('showText').checked){const hit=hitTest(p.x,p.y);if(hit){saveUndo();activeId=hit.id;dragging=true;dragMode='text';resizeHandle=null;rebuildSidePanel();canvas.setPointerCapture(e.pointerId);draw();return;}}
  activeId=null;resizeHandle=null;rebuildSidePanel();dragging=true;dragMode='image';canvas.setPointerCapture(e.pointerId);draw();
});
function computePinch(){if(pointers.size!==2)return null;const pts=Array.from(pointers.values());const a=rawFromClient(pts[0].clientX,pts[0].clientY),b=rawFromClient(pts[1].clientX,pts[1].clientY);return{mid:{x:(a.x+b.x)/2,y:(a.y+b.y)/2},dist:Math.hypot(a.x-b.x,a.y-b.y)};}
canvas.addEventListener('pointermove',e=>{
  if(e.pointerType==='touch'&&pointers.has(e.pointerId))pointers.set(e.pointerId,{clientX:e.clientX,clientY:e.clientY});
  if(pinchActive&&pointers.size===2){const p=computePinch();if(!p)return;if(lastMid){viewX+=p.mid.x-lastMid.x;viewY+=p.mid.y-lastMid.y;}if(lastDist&&p.dist){viewScale=clamp(viewScale*(p.dist/lastDist),.5,3);document.getElementById('viewZoom').value=String(viewScale);}lastMid=p.mid;lastDist=p.dist;draw();return;}

    const b=boxes.find(x=>x.id===activeId);if(!b||!resizeHandle)return;
    const hid=resizeHandle.id;
    const hit=b.__hit;
    // Corner handles: scale font size proportionally
    if(hid==='tl'||hid==='tr'||hid==='bl'||hid==='br'){
      // Drag outward = bigger, inward = smaller
      const cx=(hit.left+hit.right)/2, cy=(hit.top+hit.bottom)/2;
      const px=lastX, py=lastY; // current pointer pos (already updated)
      const prevDist=Math.hypot((px-dx)-cx,(py-dy)-cy);
      const newDist=Math.hypot(px-cx,py-cy);

        const ratio=newDist/prevDist;
        b.sizePct=clamp(b.sizePct*ratio,0.3,10);
        // Also scale maxWidthPct if set
        if(b.maxWidthPct>0)b.maxWidthPct=clamp(b.maxWidthPct*ratio,2,95);
      }
    }
    // Side handles: adjust maxWidth by dragging left/right edge
    if(hid==='ml'||hid==='mr'){
      // Get current box width in pixels from hit box
      const curHitW=hit.right-hit.left;

      if(!b.maxWidthPct||b.maxWidthPct===0){
        b.maxWidthPct=pctX(curHitW);
      }
      // Dragging right edge right = wider, left edge left = wider
      const dir=hid==='mr'?1:-1;
      const deltaW=dx*dir;
      const newWPx=pxX(b.maxWidthPct)+deltaW*2; // *2 because box is centered
      b.maxWidthPct=clamp(pctX(newWPx),3,95);

      b.xPct=clamp(b.xPct+pctX(dx)/2,0,100);
    }
    // Top/bottom handles: adjust line height
    if(hid==='tm'||hid==='bm'){
      const dir=hid==='bm'?1:-1;
      b.lineHeight=clamp((b.lineHeight||1.15)+dy*dir*0.003,0.8,2.5);
    }
    draw();triggerAutoSave();return;
  }

function getPhotoAABB(){if(!imgLoaded)return null;const w=canvas.width,h=canvas.height,iw=img.naturalWidth,ih=img.naturalHeight;const rot=(photoRot%180)!==0,bw=rot?ih:iw,bh=rot?iw:ih;const fit=Math.min(w/bw,h/bh)*photoScale;const cx=w/2+photoOffsetX,cy=h/2+photoOffsetY,dw=bw*fit,dh=bh*fit;const rad=photoRot*Math.PI/180;const corners=[{x:-dw/2,y:-dh/2},{x:dw/2,y:-dh/2},{x:dw/2,y:dh/2},{x:-dw/2,y:dh/2}];let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;for(const p of corners){const rx=p.x*Math.cos(rad)-p.y*Math.sin(rad)+cx,ry=p.x*Math.sin(rad)+p.y*Math.cos(rad)+cy;minX=Math.min(minX,rx);minY=Math.min(minY,ry);maxX=Math.max(maxX,rx);maxY=Math.max(maxY,ry);}return{sx:Math.max(0,Math.floor(minX)),sy:Math.max(0,Math.floor(minY)),sw:Math.max(1,Math.min(w,Math.ceil(maxX))-Math.max(0,Math.floor(minX))),sh:Math.max(1,Math.min(h,Math.ceil(maxY))-Math.max(0,Math.floor(minY)))};}
function exportCropped(mime,ext,q){if(!imgLoaded){toast('Upload template first','error');return;}const ov={viewX,viewY,viewScale};viewX=0;viewY=0;viewScale=1;draw();const a=getPhotoAABB();viewX=ov.viewX;viewY=ov.viewY;viewScale=ov.viewScale;if(!a){toast('No photo bounds','error');return;}const out=document.createElement('canvas');out.width=a.sw;out.height=a.sh;out.getContext('2d').drawImage(canvas,a.sx,a.sy,a.sw,a.sh,0,0,a.sw,a.sh);out.toBlob(blob=>{if(!blob)return;const el=document.createElement('a');el.download=`hotheadz-menu-${new Date().toISOString().slice(0,10)}.${ext}`;el.href=URL.createObjectURL(blob);document.body.appendChild(el);el.click();el.remove();setTimeout(()=>URL.revokeObjectURL(el.href),1500);toast(`${ext.toUpperCase()} downloaded!`,'success');},mime,q);draw();}

  let h='';

  // CLOUD
  h+='<div class="acc open"><div class="acc-head"><span class="acc-arrow">\u25b6</span><span class="acc-title">\u2601\ufe0f Cloud (Shared)</span></div><div class="acc-body">';
  if(!cloudName){
    h+='<div style="background:rgba(255,122,24,.06);border:1px solid rgba(255,122,24,.12);border-radius:var(--radius);padding:12px;margin-bottom:8px;">';
    h+='<div style="font-size:12px;font-weight:800;color:var(--fire);margin-bottom:6px;">Enter Your Name</div>';
    h+='<div style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px;">So the team knows who saved each project.</div>';
    h+='<input class="fi" id="cloudNameInput" placeholder="Your name">';
    h+='<button class="sm-btn primary" id="cloudSetName">\u2601\ufe0f Set Name & Connect</button>';
    h+='</div>';
  }else{
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">';
    h+='<div style="width:8px;height:8px;border-radius:50%;background:#4dff88;flex-shrink:0;"></div>';
    h+='<span style="font-size:11px;color:var(--success);font-weight:700;">Connected</span>';
    h+='<span style="font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">as '+esc(cloudName)+'</span>';
    h+='<button class="sm-btn" id="cloudChangeName" style="font-size:10px;">Change Name</button>';
    h+='</div>';
    h+='<div class="btn-row" style="margin-bottom:8px;">';
    h+='<button class="sm-btn primary" id="cloudSaveNew">\u2601\ufe0f Save to Cloud</button>';
    h+='<button class="sm-btn" id="cloudRefresh">\ud83d\udd04 Load Cloud Projects</button>';
    h+='</div>';
    h+='<div id="cloudProjectsList" style="min-height:30px;"><div style="font-size:11px;color:var(--text3);padding:6px;">Click "Load Cloud Projects" to see shared saves.</div></div>';
  }
  h+='</div></div>';

  // LOCAL
  h+='<div class="acc"><div class="acc-head"><span class="acc-arrow">\u25b6</span><span class="acc-title">\ud83d\udcbe Local (This Device)</span><span class="acc-badge">'+s.items.length+'</span></div><div class="acc-body">';
  if(activeProj){
    h+='<div style="background:var(--ember);border:1px solid rgba(255,122,24,.2);border-radius:var(--radius);padding:10px;margin-bottom:10px;">';
    h+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">Current Local Project</div>';
    h+='<div style="font-size:14px;font-weight:800;color:var(--fire);margin-bottom:4px;">'+esc(activeProj.name)+'</div>';
    h+='<div style="font-size:10px;color:var(--text3);margin-bottom:8px;">'+new Date(activeProj.updatedAt||Date.now()).toLocaleString()+'</div>';
    h+='<div class="btn-row">';
    h+='<button class="sm-btn primary" id="pSave">\ud83d\udcbe Save</button>';
    h+='<button class="sm-btn" id="pSaveAs">Save As</button>';
    h+='<button class="sm-btn" id="pRename">Rename</button>';
    h+='<button class="sm-btn" id="pExportActive">\ud83d\udce4 Export</button>';
    h+='</div></div>';
  }
  h+='<div class="btn-row" style="margin-bottom:8px;"><button class="sm-btn primary" id="pNew">\u2795 New</button><button class="sm-btn" id="pImport">\ud83d\udce5 Import File</button></div>';
  if(!s.items.length)h+='<p style="font-size:12px;color:var(--text3)">No local projects.</p>';
  else s.items.forEach(p=>{
    const ac=p.id===s.activeId;const d=new Date(p.updatedAt||p.createdAt||Date.now()).toLocaleString();
    h+='<div style="display:flex;align-items:center;gap:4px;padding:7px;border-radius:var(--radius-sm);margin-bottom:3px;background:'+(ac?'var(--ember)':'rgba(255,255,255,.03)')+';border:1px solid '+(ac?'rgba(255,122,24,.15)':'var(--border)')+'">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:'+(ac?'var(--fire)':'var(--text)')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div><div style="font-size:9px;color:var(--text3)">'+d+'</div></div>';
    if(!ac)h+='<button class="sm-btn pLoad" data-id="'+esc(p.id)+'">Load</button>';
    h+='<button class="sm-btn pExport" data-id="'+esc(p.id)+'">\ud83d\udce4</button>';
    h+='<button class="sm-btn pRenameBtn" data-id="'+esc(p.id)+'">\u270f\ufe0f</button>';
    h+='<button class="sm-btn danger pDel" data-id="'+esc(p.id)+'">\u00d7</button></div>';
  });
  h+='</div></div>';
  return h;
}

function wirePanel(){
  document.querySelectorAll('.acc-head').forEach(h=>{h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));});
  document.querySelectorAll('.qf-input').forEach(el=>{el.addEventListener('input',()=>{const box=boxes.find(b=>b.name===el.dataset.name);if(box){saveUndo();box.text=el.value;draw();triggerAutoSave();}});});

  // QF inline styling controls
  document.querySelectorAll('.qf-color').forEach(el=>{el.addEventListener('input',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.color=el.value;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-size').forEach(el=>{el.addEventListener('input',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.sizePct=parseFloat(el.value);const lbl=el.parentElement.querySelector('.qf-size-val');if(lbl)lbl.textContent=b.sizePct.toFixed(1);draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-bold').forEach(el=>{el.addEventListener('click',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){saveUndo();b.bold=!b.bold;draw();rebuildSidePanel();triggerAutoSave();}});});
  document.querySelectorAll('.qf-italic').forEach(el=>{el.addEventListener('click',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){saveUndo();b.italic=!b.italic;draw();rebuildSidePanel();triggerAutoSave();}});});
  document.querySelectorAll('.qf-font').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.fontFamily=el.value;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-align').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.align=el.value;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-shadow').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.shadow=!!el.checked;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-stroke').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.strokeOn=!!el.checked;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-strokew').forEach(el=>{el.addEventListener('input',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.strokeWidth=parseFloat(el.value);draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-maxw').forEach(el=>{el.addEventListener('input',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.maxWidthPct=parseFloat(el.value);draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-bg').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.bgOn=!!el.checked;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-bgop').forEach(el=>{el.addEventListener('input',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.bgOpacity=parseFloat(el.value);draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-vis').forEach(el=>{el.addEventListener('change',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){saveUndo();b.opacity=el.checked?1:0;draw();triggerAutoSave();}});});
  document.querySelectorAll('.qf-csw').forEach(el=>{el.addEventListener('click',()=>{const b=boxes.find(x=>x.id===el.dataset.id);if(b){b.color=el.dataset.color;draw();rebuildSidePanel();triggerAutoSave();}});});
  document.querySelectorAll('.qf-del').forEach(el=>{el.addEventListener('click',()=>{const id=el.dataset.id;const name=el.dataset.name;if(!confirm('Delete "'+name+'" from the menu?'))return;saveUndo();boxes=boxes.filter(b=>b.id!==id);if(activeId===id)activeId=null;draw();rebuildSidePanel();triggerAutoSave();toast('Removed "'+name+'"','info');});});
  const qfT=document.getElementById('qfToday');if(qfT)qfT.addEventListener('click',()=>{const t=todayDefaults();const d=boxes.find(b=>b.name==='Day'),dt=boxes.find(b=>b.name==='Date');if(d){saveUndo();d.text=t.weekday;}if(dt)dt.text=t.dateStr;draw();rebuildSidePanel();triggerAutoSave();toast("Today's date filled!",'success');});
  const qfY=document.getElementById('qfYesterday');if(qfY)qfY.addEventListener('click',()=>{const s=loadStore();const prev=s.items.find(p=>p.id!==s.activeId);if(!prev||!prev.data?.boxes){toast('No previous project found','error');return;}saveUndo();for(const pb of prev.data.boxes){const cur=boxes.find(b=>b.name===pb.name);if(cur&&pb.name!=='Day'&&pb.name!=='Date')cur.text=pb.text;}const t=todayDefaults();const d=boxes.find(b=>b.name==='Day'),dt=boxes.find(b=>b.name==='Date');if(d)d.text=t.weekday;if(dt)dt.text=t.dateStr;draw();rebuildSidePanel();triggerAutoSave();toast("Copied previous items!",'success');});
  const qfR=document.getElementById('qfReset');if(qfR)qfR.addEventListener('click',()=>{if(!confirm('Reset all?'))return;saveUndo();loadStarterBoxes();draw();rebuildSidePanel();triggerAutoSave();toast('Reset','info');});
  const qfAC=document.getElementById('qfAddCustom');if(qfAC)qfAC.addEventListener('click',()=>{const name=prompt('Custom field name:','Special');if(!name)return;saveUndo();const b=defaultBox(name.trim(),name.trim()+'\n\n\u2022 Item 1\n\u2022 Item 2',50,50,{isCustom:true,sizePct:1.4,shadowBlur:8,lineHeight:1.22});boxes.push(b);activeId=b.id;draw();rebuildSidePanel();triggerAutoSave();toast('Custom field "'+name.trim()+'" added! Drag it on canvas to position.','success');});
  const bS=document.getElementById('boxSelect');if(bS)bS.addEventListener('change',()=>{activeId=bS.value||null;rebuildSidePanel();draw();});
  const aB=document.getElementById('addBoxBtn');if(aB)aB.addEventListener('click',()=>{saveUndo();const b=defaultBox('New Box','New text',50,50);boxes.push(b);activeId=b.id;rebuildSidePanel();draw();triggerAutoSave();});
  const dB=document.getElementById('dupBoxBtn');if(dB)dB.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur)return;saveUndo();const c=JSON.parse(JSON.stringify(cur));c.id=uid();c.name+=' (copy)';c.xPct=clamp(cur.xPct+2,0,100);c.yPct=clamp(cur.yPct+2,0,100);boxes.push(c);activeId=c.id;rebuildSidePanel();draw();triggerAutoSave();});
  const dlB=document.getElementById('delBoxBtn');if(dlB)dlB.addEventListener('click',()=>{const cur=boxes.find(x=>x.id===activeId);if(!cur||!confirm('Delete "'+cur.name+'"?'))return;saveUndo();boxes=boxes.filter(b=>b.id!==cur.id);activeId=null;rebuildSidePanel();draw();triggerAutoSave();});
  const b=boxes.find(x=>x.id===activeId);
  if(b){const w=(id,fn,ev='input')=>{const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);};
    w('bName',e=>{b.name=e.target.value;draw();triggerAutoSave();});w('bText',e=>{b.text=e.target.value;draw();triggerAutoSave();});
    w('bX',e=>{b.xPct=parseFloat(e.target.value);draw();triggerAutoSave();});w('bY',e=>{b.yPct=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bSize',e=>{b.sizePct=parseFloat(e.target.value);const n=document.getElementById('bSizeN');if(n)n.value=b.sizePct;draw();triggerAutoSave();});
    w('bSizeN',e=>{b.sizePct=clamp(parseFloat(e.target.value||'1'),.3,10);const s=document.getElementById('bSize');if(s)s.value=b.sizePct;draw();triggerAutoSave();});
    w('bMaxW',e=>{b.maxWidthPct=parseFloat(e.target.value);const n=document.getElementById('bMaxWN');if(n)n.value=b.maxWidthPct;draw();triggerAutoSave();});
    w('bMaxWN',e=>{b.maxWidthPct=clamp(parseFloat(e.target.value||'0'),0,95);const s=document.getElementById('bMaxW');if(s)s.value=b.maxWidthPct;draw();triggerAutoSave();});
    w('bFont',e=>{b.fontFamily=e.target.value;draw();triggerAutoSave();},'change');w('bAlign',e=>{b.align=e.target.value;draw();triggerAutoSave();},'change');
    w('bColor',e=>{b.color=e.target.value;draw();triggerAutoSave();});w('bOp',e=>{b.opacity=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bRot',e=>{b.rotationDeg=parseFloat(e.target.value||'0');draw();triggerAutoSave();});w('bLH',e=>{b.lineHeight=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bShadow',e=>{b.shadow=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bStroke',e=>{b.strokeOn=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bStrokeW',e=>{b.strokeWidth=parseFloat(e.target.value);draw();triggerAutoSave();});
    w('bBgOn',e=>{b.bgOn=!!e.target.checked;draw();triggerAutoSave();},'change');
    w('bBgColor',e=>{b.bgColor=e.target.value;draw();triggerAutoSave();});w('bBgOp',e=>{b.bgOpacity=parseFloat(e.target.value);draw();triggerAutoSave();});
    document.querySelectorAll('.bCSw').forEach(sw=>{sw.addEventListener('click',()=>{b.color=sw.dataset.color;draw();triggerAutoSave();rebuildSidePanel();});});
  }
  const pZ=document.getElementById('pZoom2');if(pZ)pZ.addEventListener('input',()=>{photoScale=parseFloat(pZ.value);document.getElementById('photoZoom').value=pZ.value;draw();});
  const pR=document.getElementById('pRot2');if(pR)pR.addEventListener('click',()=>{saveUndo();photoRot=(photoRot+90)%360;draw();triggerAutoSave();});
  const pRs=document.getElementById('pReset2');if(pRs)pRs.addEventListener('click',()=>{saveUndo();photoScale=1;photoRot=0;photoOffsetX=0;photoOffsetY=0;document.getElementById('photoZoom').value='1';draw();triggerAutoSave();});
  const pN=document.getElementById('pNew');if(pN)pN.addEventListener('click',()=>{const n=prompt('Project name:','Menu '+new Date().toLocaleDateString());if(n===null)return;createProject(n.trim()||'Menu '+new Date().toLocaleDateString());rebuildSidePanel();});
  const pSv=document.getElementById('pSave');if(pSv)pSv.addEventListener('click',()=>saveProject(false));
  const pSA=document.getElementById('pSaveAs');if(pSA)pSA.addEventListener('click',()=>saveProject(true));
  const pRn=document.getElementById('pRename');if(pRn)pRn.addEventListener('click',()=>{const s=loadStore();if(s.activeId)renameProject(s.activeId);});
  const pEA=document.getElementById('pExportActive');if(pEA)pEA.addEventListener('click',()=>{const s=loadStore();if(s.activeId)exportProjectFile(s.activeId);});
  const pI=document.getElementById('pImport');if(pI)pI.addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=async()=>{const f=inp.files?.[0];if(!f)return;const obj=safeJSON(await f.text(),null);if(!obj||!obj.data){toast('Invalid project file','error');return;}const s=loadStore();s.items.unshift({id:uid(),name:obj.name||'Imported',createdAt:Date.now(),updatedAt:Date.now(),data:obj.data});s.activeId=s.items[0].id;saveStore(s);if(s.items[0]?.data)await applyPayload(s.items[0].data);toast('Imported "'+( obj.name||'project')+'"! Template and all settings loaded.','success');rebuildSidePanel();};inp.click();});
  document.querySelectorAll('.pLoad').forEach(btn=>{btn.addEventListener('click',()=>loadProject(btn.dataset.id));});
  document.querySelectorAll('.pDel').forEach(btn=>{btn.addEventListener('click',()=>deleteProject(btn.dataset.id));});
  document.querySelectorAll('.pExport').forEach(btn=>{btn.addEventListener('click',()=>exportProjectFile(btn.dataset.id));});
  document.querySelectorAll('.pRenameBtn').forEach(btn=>{btn.addEventListener('click',()=>renameProject(btn.dataset.id));});

  // Cloud wiring
  const csn=document.getElementById('cloudSetName');
  if(csn)csn.addEventListener('click',()=>{
    const name=(document.getElementById('cloudNameInput').value||'').trim();
    if(!name){toast('Enter your name','error');return;}
    setCloudName(name);toast('Connected as '+name+'!','success');rebuildSidePanel();
  });
  const cnBtn=document.getElementById('cloudChangeName');
  if(cnBtn)cnBtn.addEventListener('click',()=>{const n=prompt('Your name:',getCloudName());if(n&&n.trim()){setCloudName(n.trim());rebuildSidePanel();}});
  const csBtn=document.getElementById('cloudSaveNew');
  if(csBtn)csBtn.addEventListener('click',()=>cloudSave());
  const crBtn=document.getElementById('cloudRefresh');
  if(crBtn)crBtn.addEventListener('click',async()=>{
    const el=document.getElementById('cloudProjectsList');
    if(el)el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px;">Loading...</div>';
    const projects=await cloudList();
    if(!el)return;
    if(!projects.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px;">No cloud projects yet. Save one!</div>';return;}
    let ph='';
    projects.forEach(p=>{
      const d=p.updatedAt?new Date(p.updatedAt).toLocaleString():'';
      ph+='<div style="display:flex;align-items:center;gap:4px;padding:7px;border-radius:var(--radius-sm);margin-bottom:3px;background:rgba(255,255,255,.03);border:1px solid var(--border);">';
      ph+='<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>';
      ph+='<div style="font-size:9px;color:var(--text3)">'+d+(p.savedBy?' \u2022 by '+esc(p.savedBy):'')+'</div></div>';
      ph+='<button class="sm-btn cLoad" data-id="'+esc(p.id)+'">Load</button>';
      ph+='<button class="sm-btn cUpdate" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">\u2601\ufe0f Update</button>';
      ph+='<button class="sm-btn danger cDel" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">\u00d7</button></div>';
    });
    el.innerHTML=ph;
    el.querySelectorAll('.cLoad').forEach(btn=>{btn.addEventListener('click',()=>cloudLoad(btn.dataset.id));});
    el.querySelectorAll('.cUpdate').forEach(btn=>{btn.addEventListener('click',()=>cloudUpdate(btn.dataset.id,btn.dataset.name));});
    el.querySelectorAll('.cDel').forEach(btn=>{btn.addEventListener('click',()=>{cloudDelete(btn.dataset.id,btn.dataset.name).then(()=>{crBtn.click();});});});
  });
}

/* INIT */
loadStarterBoxes();rebuildSidePanel();
(async()=>{
  const s=loadStore();if(s.items.length>0){const a=s.items.find(p=>p.id===s.activeId)||s.items[0];s.activeId=a.id;saveStore(s);if(a.data)await applyPayload(a.data);}else draw();
  // Load template from site's own images folder
  const DI="/Images/FBMenu.png";
  if(!imgDataURL&&DI){
    img=new Image();
    img.onload=()=>{imgLoaded=true;draw();};
    img.onerror=()=>{
      // Fallback: try lowercase path
      img=new Image();
      img.onload=()=>{imgLoaded=true;draw();};
      img.onerror=()=>{imgLoaded=false;draw();};
      img.src="/images/FBMenu.png";
    };
    img.src=DI;
  }
})();
})();
</script>
</html>
