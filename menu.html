<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Headz Southern Foods – Menu</title>
  <meta name="description" content="Fresh Southern cooking – breakfast, lunch, salad bar & more.">

  <!-- Google Fonts & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* ---------- RESET / BASE ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: #07060a;
      color: rgba(255,255,255,0.92);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      padding-bottom: 90px; /* space for bottom dock */
    }

    /* ---------- FLOATING DOCK (from homepage) ---------- */
    :root {
      --gen-glass: rgba(6,7,10,0.62);
      --gen-glass-2: rgba(6,7,10,0.78);
      --gen-border: rgba(255,255,255,0.14);
      --gen-border-2: rgba(255,255,255,0.22);
      --gen-text: rgba(255,255,255,0.92);
      --gen-muted: rgba(255,255,255,0.62);
      --gen-hotA: rgba(255,120,70,0.82);
      --gen-hotB: rgba(255,60,140,0.74);
      --gen-radius-pill: 999px;
      --gen-shadow: 0 18px 50px rgba(0,0,0,0.62);
    }

    .gen-root, .gen-root * { box-sizing: border-box; }
    .gen-root {
      position: fixed;
      inset: 0;
      z-index: 999999;
      pointer-events: none;
    }
    .gen-dock {
      pointer-events: auto;
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(660px, calc(100vw - 26px));
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: var(--gen-radius-pill);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(6,7,10,0.62);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--gen-shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .gen-dock-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.92);
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.36);
      padding: 10px 8px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform 0.14s ease;
    }
    .gen-dock-btn:hover {
      transform: translateY(-1px);
      background: rgba(0,0,0,0.56);
      border-color: rgba(255,255,255,0.22);
    }
    .gen-dock-ic { font-size: 16px; }
    .gen-dock-tx {
      font-size: 11.5px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gen-dock-cta {
      background: linear-gradient(90deg, rgba(255,120,70,0.22), rgba(255,60,140,0.16));
    }
    .gen-dock-btn.is-active {
      background: rgba(42,127,98,0.3);
      border-color: rgba(255,179,90,0.5);
    }
    @media (max-width: 720px) {
      .gen-dock { gap: 8px; padding: 9px; }
      .gen-dock-ic { font-size: 15px; }
      .gen-dock-tx { font-size: 11px; }
    }
    @media (max-width: 380px) {
      .gen-dock-tx { display: none; }
    }

    /* ---------- MENU STYLES ---------- */
    :root {
      --paper: #f6f0e6;
      --ink: #14110e;
      --accent: #c05a2a;
    }
    .menu-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      color: var(--paper);
    }
    .menu-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .menu-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-family: Georgia, serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .menu-hours {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-top: 0.5rem;
    }
    .menu-note {
      font-size: 1rem;
      opacity: 0.75;
      margin-top: 0.25rem;
    }
    .menu-delivery {
      margin-top: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }
    .category {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }
    .category h2 {
      font-size: 1.8rem;
      font-family: Georgia, serif;
      font-weight: 700;
      margin-bottom: 0.25rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
      padding-bottom: 0.25rem;
    }
    .category-sub {
      font-size: 1rem;
      opacity: 0.8;
      margin: 0.5rem 0 1rem;
    }
    .category-details {
      font-size: 0.95rem;
      opacity: 0.85;
      margin: 1rem 0 0;
      padding: 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    /* Item grid */
    .item-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    @media (min-width: 640px) {
      .item-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.5rem 0;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
    }
    .item-name {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .item-desc {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-left: 0.5rem;
      font-style: italic;
    }
    .item-price {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      margin-left: 1rem;
    }

    /* Loading / error states */
    .loading, .error {
      text-align: center;
      padding: 4rem 1rem;
      font-size: 1.2rem;
    }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <!-- invisible anchors for possible future use (optional) -->
  <div id="gen-home" style="position: absolute; top:0; height:1px; width:1px; opacity:0;"></div>

  <!-- floating dock -->
  <div id="genRoot" class="gen-root" hidden>
    <nav id="genDock" class="gen-dock" aria-label="Quick actions" hidden>
      <a class="gen-dock-btn" href="index.html" aria-label="Home">
        <span class="gen-dock-ic" aria-hidden="true">🏠</span>
        <span class="gen-dock-tx">Home</span>
      </a>
      <a class="gen-dock-btn is-active" href="menu.html" aria-label="Menu">
        <span class="gen-dock-ic" aria-hidden="true">🍽️</span>
        <span class="gen-dock-tx">Menu</span>
      </a>
      <a class="gen-dock-btn" href="delivery.html" aria-label="Delivery options">
        <span class="gen-dock-ic" aria-hidden="true">🚗</span>
        <span class="gen-dock-tx">Delivery</span>
      </a>
      <a class="gen-dock-btn gen-dock-cta" href="tel:3372211035" aria-label="Place an order">
        <span class="gen-dock-ic" aria-hidden="true">📞</span>
        <span class="gen-dock-tx">Order</span>
      </a>
      <a class="gen-dock-btn" href="about.html" aria-label="About us">
        <span class="gen-dock-ic" aria-hidden="true">ℹ️</span>
        <span class="gen-dock-tx">About</span>
      </a>
    </nav>
  </div>

  <!-- main menu content -->
  <main class="menu-page" id="menu-root">
    <div class="menu-header">
      <h1>Hot Headz Southern Foods</h1>
      <div class="menu-hours" id="hours-line"></div>
      <div class="menu-note" id="note-line"></div>
      <div class="menu-delivery" id="delivery-line"></div>
    </div>

    <div id="categories-container" class="categories"></div>
    <div id="loading" class="loading">Loading menu…</div>
    <div id="error" class="error" hidden></div>
  </main>

  <script>
    (function() {
      const DATA_URL = "/menu-data.html"; // your hidden data page
      const container = document.getElementById('categories-container');
      const loading = document.getElementById('loading');
      const errorDiv = document.getElementById('error');
      const hoursEl = document.getElementById('hours-line');
      const noteEl = document.getElementById('note-line');
      const deliveryEl = document.getElementById('delivery-line');

      // show dock
      const root = document.getElementById('genRoot');
      const dock = document.getElementById('genDock');
      if (root && dock) {
        root.hidden = false;
        dock.hidden = false;
      }

      async function fetchData() {
        try {
          const res = await fetch(DATA_URL, { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const html = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const script = doc.querySelector('#hh-menu-data');
          if (!script) throw new Error('Menu data not found');
          return JSON.parse(script.textContent);
        } catch (err) {
          throw new Error('Failed to load menu: ' + err.message);
        }
      }

      function renderItem(item) {
        const desc = item.description ? `<span class="item-desc">${escapeHtml(item.description)}</span>` : '';
        const price = item.price ? `<span class="item-price">${escapeHtml(item.price)}</span>` : '';
        return `
          <div class="menu-item">
            <span class="item-name">${escapeHtml(item.name)}${desc}</span>
            ${price}
          </div>
        `;
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function renderCategory(cat) {
        let itemsHtml = '';
        if (cat.items && cat.items.length) {
          itemsHtml = cat.items.map(renderItem).join('');
        }
        let detailsHtml = '';
        if (cat.details) {
          detailsHtml = `<div class="category-details">${escapeHtml(cat.details)}</div>`;
        }
        return `
          <section class="category">
            <h2>${escapeHtml(cat.name)}</h2>
            ${cat.subtitle ? `<p class="category-sub">${escapeHtml(cat.subtitle)}</p>` : ''}
            <div class="item-grid">
              ${itemsHtml}
            </div>
            ${detailsHtml}
          </section>
        `;
      }

      async function init() {
        try {
          const data = await fetchData();
          hoursEl.textContent = data.hours || '';
          noteEl.textContent = data.note || '';
          deliveryEl.textContent = data.delivery || '';

          if (data.categories && data.categories.length) {
            container.innerHTML = data.categories.map(renderCategory).join('');
          } else {
            container.innerHTML = '<p class="error">No menu categories found.</p>';
          }
          loading.hidden = true;
        } catch (err) {
          loading.hidden = true;
          errorDiv.hidden = false;
          errorDiv.textContent = err.message;
          console.error(err);
        }
      }

      init();
    })();
  </script>
</body>
</html>
