function toISO(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}

function parseISO(iso){var p=String(iso).split("-").map(Number);return new Date(p[0],(p[1]||1)-1,p[2]||1)}
function normKey(k){var m=String(k||"").trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(!m)return null;return m[1]+"-"+String(Number(m[2])).padStart(2,"0")+"-"+String(Number(m[3])).padStart(2,"0")}
function biz(day){var l=String(day||"").toLowerCase();var o=l==="sunday"?"7:00 AM":l==="saturday"?"6:00 AM":"5:30 AM";var c=l==="sunday"?"3:00 PM":"2:00 PM";return{day:day,open:o,close:c,breakfast:o+" \u2013 10:30 AM",lunch:"11:00 AM \u2013 "+c,crawfish:["thursday","friday","saturday","sunday"].indexOf(l)>=0?"4:00 PM \u2013 8:00 PM":""}}
function t12(s){if(!s)return null;var m=String(s).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);if(!m)return null;var h=parseInt(m[1],10),min=parseInt(m[2],10),ap=m[3].toUpperCase();if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return h*60+min}

var panelConfigs=[];
function initPanel(prefix,isoDate,dayName){panelConfigs.push({prefix:prefix,isoDate:isoDate,dayName:dayName});var h=biz(dayName),closure=getClosure(dayName),hoursEl=$(prefix+"Hours");if(closure&&closure.closed){$(prefix+"Closed").classList.remove("hide");var msg=$(prefix+"ClosedMsg");if(msg)msg.textContent=closure.message||"See you next time!";if(hoursEl)hoursEl.textContent=dayName+": Closed";return}if(hoursEl)hoursEl.innerHTML="<strong>"+dayName+"</strong> &nbsp;"+h.open+" \u2013 "+h.close+" &nbsp;\xb7&nbsp; Breakfast "+h.breakfast+" &nbsp;\xb7&nbsp; Lunch "+h.lunch+(h.crawfish?" &nbsp;\xb7&nbsp; Crawfish "+h.crawfish:"");buildPanelContent(prefix,isoDate,dayName)}
function buildPanelContent(prefix,isoDate){var catNavEl=$(prefix+"CatNav"),sectionsEl=$(prefix+"CatSections");if(!catNavEl||!sectionsEl)return;var activeBtn=catNavEl.querySelector(".cat-btn.active");var activeIdx=activeBtn?activeBtn.dataset.idx:"0";var cats=buildCats(isoDate);catNavEl.innerHTML=cats.map(function(c,i){return'<button class="cat-btn'+(c.isBeer?" beer-btn":"")+(String(i)===activeIdx?" active":"")+'" data-idx="'+i+'">'+c.icon+" "+esc(c.name)+"</button>"}).join("");sectionsEl.innerHTML=cats.map(function(c,i){return'<div class="cat-section'+(String(i)===activeIdx?" visible":"")+'" data-idx="'+i+'">'+renderCatHTML(c)+"</div>"}).join("");var btns=catNavEl.querySelectorAll(".cat-btn"),secs=sectionsEl.querySelectorAll(".cat-section");btns.forEach(function(btn){btn.addEventListener("click",function(){var idx=btn.dataset.idx;btns.forEach(function(b){b.classList.toggle("active",b.dataset.idx===idx)});secs.forEach(function(s){s.classList.toggle("visible",s.dataset.idx===idx);if(s.dataset.idx===idx)observeItems(s)})})});secs.forEach(function(s){if(s.classList.contains("visible"))observeItems(s)})}
function todayAt(timeStr){var m=t12(timeStr);if(m==null)return null;var d=new Date();d.setHours(Math.floor(m/60),m%60,0,0);return d}
function fmtCountdown(diffMs){if(diffMs<=0)return{h:"00",m:"00",s:"00"};var t=Math.floor(diffMs/1000);return{h:String(Math.floor(t/3600)).padStart(2,"0"),m:String(Math.floor(t%3600/60)).padStart(2,"0"),s:String(t%60).padStart(2,"0")}}

function updateStatus(dayName,isoDate){var todayISO=toISO(new Date()),isToday=isoDate===todayISO,h=biz(dayName),closure=getClosure(dayName);var dot=$("statusDot"),txt=$("statusText"),sub=$("heroSub"),cdWrap=$("countdownWrap"),cdLabel=$("countdownLabel"),cdH=$("cdHours"),cdM=$("cdMins"),cdS=$("cdSecs");if(cdWrap)cdWrap.style.display="none";if(closure&&closure.closed){dot.className="status-dot closed";txt.textContent="CLOSED \u2013 "+(closure.message||"");if(sub)sub.textContent=dayName+" \xb7 Closed";return}if(!isToday){dot.className="status-dot warn";txt.textContent=dayName+" \xb7 OPENS AT "+h.open;if(sub)sub.textContent=dayName+" \xb7 "+h.open+" \u2013 "+h.close;var td=parseISO(isoDate);td.setHours(Math.floor(t12(h.open)/60),t12(h.open)%60,0,0);var diff=td-new Date();if(diff>0){var cd=fmtCountdown(diff);cdLabel.textContent="Opens in";cdH.textContent=cd.h;cdM.textContent=cd.m;cdS.textContent=cd.s;cdWrap.style.display=""}return}var now=new Date(),mins=now.getHours()*60+now.getMinutes(),openMin=t12(h.open),closeMin=t12(h.close),bkEnd=t12("10:30 AM"),lunchStart=t12("11:00 AM"),cfStart=h.crawfish?t12("4:00 PM"):null,cfEnd=h.crawfish?t12("8:00 PM"):null;var isInMain=openMin!=null&&closeMin!=null&&mins>=openMin&&mins<closeMin,isInCrawfish=cfStart!=null&&cfEnd!=null&&mins>=cfStart&&mins<cfEnd;dot.className="status-dot "+(isInMain||isInCrawfish?"open":"closed");if(sub)sub.textContent=dayName+" \xb7 "+h.open+" \u2013 "+h.close;function setCD(label,target){var diff=target-now;if(diff>0){var cd=fmtCountdown(diff);cdLabel.textContent=label;cdH.textContent=cd.h;cdM.textContent=cd.m;cdS.textContent=cd.s;cdWrap.style.display=""}}if(mins<openMin){txt.textContent="CLOSED \xb7 OPENS AT "+h.open;setCD("Opens in",todayAt(h.open))}else if(mins<bkEnd){txt.textContent="NOW SERVING BREAKFAST";setCD("Breakfast ends in",todayAt("10:30 AM"))}else if(mins<lunchStart){txt.textContent="TRANSITION \xb7 LUNCH AT 11:00 AM";setCD("Lunch starts in",todayAt("11:00 AM"))}else if(mins<closeMin){txt.textContent="NOW SERVING LUNCH";setCD("Lunch ends in",todayAt(h.close))}else if(cfStart&&mins<cfStart){txt.textContent="CRAWFISH AT 4:00 PM";setCD("Crawfish starts in",todayAt("4:00 PM"))}else if(cfEnd&&mins<cfEnd){txt.textContent="NOW SERVING CRAWFISH";setCD("Crawfish ends in",todayAt("8:00 PM"))}else{txt.textContent="CLOSED \xb7 SEE YOU TOMORROW";var tom=new Date(now);tom.setDate(tom.getDate()+1);var tomDay=wkDay(tom),tomH=biz(tomDay),tomOpen=t12(tomH.open);if(tomOpen!=null){var target=new Date(tom);target.setHours(Math.floor(tomOpen/60),tomOpen%60,0,0);var diff2=target-now;if(diff2>0){var cd2=fmtCountdown(diff2);cdLabel.textContent="Opens "+tomDay+" at "+tomH.open;cdH.textContent=cd2.h;cdM.textContent=cd2.m;cdS.textContent=cd2.s;cdWrap.style.display=""}}}}

function buildAdvanced(startISO){var tabsEl=$("advDayTabs"),cardsEl=$("advCards"),discEl=$("advDisclaimer");if(!tabsEl||!cardsEl)return;if(discEl)discEl.textContent=data.settings.advancedDisclaimer||"Lunch forecast \u2014 subject to change.";var start=parseISO(startISO),entries=[];for(var i=0;i<(data.settings.advancedWindowDays||7);i++){var d=new Date(start);d.setDate(start.getDate()+i);var iso=toISO(d),dayName=wkDay(d),h=biz(dayName),closure=getClosure(dayName),dayMenu=getMenu(iso),def=data.defaults||{};var tab=document.createElement("button");tab.className="adv-day-tab"+(i===0?" active":"");tab.textContent=dayName.slice(0,3)+" "+(d.getMonth()+1)+"/"+d.getDate();tabsEl.appendChild(tab);var card=document.createElement("div");card.className="adv-card"+(i===0?" visible":"");var lp=normItems(dayMenu&&dayMenu.lunch&&dayMenu.lunch.plates||def.lunch&&def.lunch.plates||[]);var li=normLunch(dayMenu&&dayMenu.lunch&&dayMenu.lunch.items||[]);var inner='<div class="adv-card-title">'+esc(dayName)+'</div><div class="adv-card-sub">'+esc(fmtDate(d))+" \xb7 "+(closure&&closure.closed?"Closed":"Lunch "+h.lunch)+"</div>";if(closure&&closure.closed){inner+='<p style="color:rgba(245,237,228,.82)">'+esc(closure.message||"Closed")+"</p>"}else{if(lp.length)inner+='<div class="section-label">Plates</div><div class="plates-row">'+lp.map(function(p){return'<div class="plate-card">'+esc(p)+"</div>"}).join("")+"</div>";if(li.length){inner+='<div class="section-label">Lunch Items</div><ul class="item-list">';li.forEach(function(item){inner+='<li class="menu-item" onclick="this.classList.toggle(\'expanded\')"><div class="item-name">'+esc(item.name)+'</div><div class="item-desc">'+esc(item.desc||"")+'</div><div class="item-hint">tap for details</div></li>'});inner+="</ul>"}else inner+='<p style="color:rgba(245,237,228,.65);margin-top:12px">Lunch menu not posted yet \u2014 check back soon.</p>'}card.innerHTML=inner;cardsEl.appendChild(card);entries.push({tab:tab,card:card})}entries.forEach(function(e,idx){e.tab.addEventListener("click",function(){entries.forEach(function(item,i){item.tab.classList.toggle("active",i===idx);item.card.classList.toggle("visible",i===idx);if(i===idx)observeItems(item.card)})})});if(entries[0])observeItems(entries[0].card)}

function setupDayTabs(){var tabs=[$("tabToday"),$("tabTomorrow"),$("tabAdvanced")],panels=[$("panelToday"),$("panelTomorrow"),$("panelAdvanced")];tabs.forEach(function(tab,i){if(tab)tab.addEventListener("click",function(){tabs.forEach(function(t,ti){t.classList.toggle("active",ti===i)});panels.forEach(function(p,pi){p.classList.toggle("visible",pi===i);if(pi===i){var secs=p.querySelectorAll(".cat-section.visible");secs.forEach(function(s){observeItems(s)})}})})})}

var flashTimer=null,flashInterval=null;
function showFlash(title,text){var modal=$("flashModal"),cnt=$("flashCount");if(!modal)return;$("flashTitle").textContent=title;$("flashText").textContent=text;if(flashTimer)clearTimeout(flashTimer);if(flashInterval)clearInterval(flashInterval);var r=5;cnt.textContent=r;modal.classList.add("show");flashInterval=setInterval(function(){r--;if(r>0)cnt.textContent=r;else clearInterval(flashInterval)},1000);flashTimer=setTimeout(function(){hideFlash()},5000)}

// ═══ INIT — with cloud re-render support ═══
function initMenuPage(){
  var freshData=(typeof MENU_DATA!=="undefined")?MENU_DATA:null;
  if(!freshData)return;
  Object.assign(data,freshData);

  // THE KEY FIX: update the existing 'menus' closure IN PLACE
  // getMenu() reads from this variable, not data.menus
  var rawMenus=data.menus||{};
  var oldKeys=Object.keys(menus);
  for(var i=0;i<oldKeys.length;i++) delete menus[oldKeys[i]];
  var newKeys=Object.keys(rawMenus);
  for(var j=0;j<newKeys.length;j++){
    var nk=normKey(newKeys[j]);
    if(nk) menus[nk]=rawMenus[newKeys[j]];
  }
  data.menus=menus;

  var now=new Date(),todayISO=toISO(now),todayName=wkDay(now);
  var tom=new Date(now);tom.setDate(now.getDate()+1);
  var tomorrowISO=toISO(tom),tomorrowName=wkDay(tom);
  var dTI=todayISO,dTN=todayName,dToI=tomorrowISO,dToN=tomorrowName;
  var ct=getClosure(todayName);
  if(pastClose(todayName)&&!(ct&&ct.closed)){dTI=tomorrowISO;dTN=tomorrowName;var da=new Date(now);da.setDate(now.getDate()+2);dToI=toISO(da);dToN=wkDay(da)}
  $("tabToday").textContent=dTN;$("tabTomorrow").textContent=dToN;
  panelConfigs=[];
  initPanel("today",dTI,dTN);initPanel("tomorrow",dToI,dToN);
  var advTabs=$("advDayTabs"),advCards=$("advCards");
  if(advTabs)advTabs.innerHTML="";if(advCards)advCards.innerHTML="";
  buildAdvanced(dTI);updateStatus(dTN,dTI);
  window._hhDTN=dTN;window._hhDTI=dTI;
}

setupDayTabs();
initMenuPage();
setInterval(function(){if(window._hhDTN&&window._hhDTI)updateStatus(window._hhDTN,window._hhDTI)},1000);
setTimeout(handleHash,150);
window.addEventListener("hashchange",handleHash);

// Re-render when cloud lunch data arrives
window.addEventListener("menuDataReady",function(e){
  console.log("[HH] Cloud lunch received, refreshing menu...");
  if(e.detail){var keys=Object.keys(e.detail);for(var i=0;i<keys.length;i++)MENU_DATA[keys[i]]=e.detail[keys[i]]}
  initMenuPage();
});
})();
