<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orbit Menu</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#orbit{
position:relative;
width:420px;
height:420px;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
border-radius:70px;
background:#c05a2a;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 30px rgba(192,90,42,.6);
}

.node{
position:absolute;
width:100px;
height:100px;
border-radius:50px;
background:#1b1b1b;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
transition:.3s;
}

.node:hover{
transform:scale(1.1);
background:#c05a2a;
}

#items{
position:fixed;
bottom:0;
left:0;
right:0;
height:50%;
background:#111;
overflow:auto;
padding:20px;
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
}

.card{
background:#1b1b1b;
padding:16px;
border-radius:10px;
cursor:pointer;
}

.card:hover{
background:#c05a2a;
}

#detail{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:none;
align-items:center;
justify-content:center;
text-align:center;
}

button.call{
margin-top:20px;
padding:16px 26px;
font-size:20px;
background:#c05a2a;
border:none;
border-radius:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="orbit">
<div class="center" id="open">MENU</div>
</div>

<div id="items">
<h2 id="catTitle"></h2>
<div class="grid" id="grid"></div>
</div>

<div id="detail">
<div>
<h1 id="itemName"></h1>
<p id="itemDesc"></p>
<h2 id="itemPrice"></h2>
<button class="call" onclick="call()">CALL TO ORDER</button>
</div>
</div>

<script src="menu-data.html"></script>

<script>

const orbit = document.getElementById("orbit")
const open = document.getElementById("open")
const itemsPanel = document.getElementById("items")
const grid = document.getElementById("grid")
const catTitle = document.getElementById("catTitle")

const detail = document.getElementById("detail")
const itemName = document.getElementById("itemName")
const itemDesc = document.getElementById("itemDesc")
const itemPrice = document.getElementById("itemPrice")

function createOrbit(){

const cats = Object.keys(MENU_DATA)
const radius = 170
const centerX = 210
const centerY = 210

cats.forEach((c,i)=>{

const angle = (i/cats.length)*Math.PI*2

const x = centerX + radius*Math.cos(angle) - 50
const y = centerY + radius*Math.sin(angle) - 50

const node = document.createElement("div")
node.className="node"
node.style.left=x+"px"
node.style.top=y+"px"
node.innerText=c

node.onclick=()=>openCategory(c)

orbit.appendChild(node)

})

}

function openCategory(cat){

catTitle.innerText=cat
grid.innerHTML=""
itemsPanel.style.display="block"

MENU_DATA[cat].forEach(item=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<strong>${item.name}</strong><br>
${item.price}
`

card.onclick=()=>showItem(item)

grid.appendChild(card)

})

}

function showItem(item){

detail.style.display="flex"

itemName.innerText=item.name
itemDesc.innerText=item.desc||""
itemPrice.innerText=item.price

}

function call(){

window.location.href="tel:3372211035"

}

open.onclick=()=>{

const nodes=document.querySelectorAll(".node")

nodes.forEach(n=>{
n.style.opacity= n.style.opacity=="1" ? "0" : "1"
})

}

createOrbit()

</script>

</body>
</html>
