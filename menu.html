    .back-btn .arrow { color: var(--accent-hot); font-size: 20px; transition: transform 0.3s; }
    .back-btn:hover .arrow { transform: translateX(-4px); }

    /* ═══ DIVIDER ═══ */
    .section-divider {
      width: 100%; height: 1px; border: none;
      background: linear-gradient(90deg, transparent, var(--border-warm), transparent);
      margin: 10px 0 4px;
    }

    /* ═══ FLASH MODAL ═══ */
    .flash-overlay {
      position: fixed; inset: 0; display: none; place-items: center; z-index: 200;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(16px); padding: 18px;
    }
    .flash-overlay.show { display: grid; }
    .flash-card {
      width: min(460px, calc(100vw - 32px)); border-radius: 28px;
      border: 1px solid var(--border-warm); background: var(--surface-solid);
      padding: 36px; text-align: center;
      animation: flashPop 0.4s var(--ease-spring);
    }
    @keyframes flashPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .flash-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--accent-light); margin-bottom: 10px; }
    /* READABILITY: flash-text from text-mid → .90 */
    .flash-text { color: rgba(245,237,228,0.90); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
    .flash-countdown {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-hot), var(--ember));
      color: #fff; font-weight: 900; font-size: 22px;
      box-shadow: 0 0 30px var(--accent-glow); margin-bottom: 12px;
    }
    /* READABILITY: flash sub from text-dim → .70 */
    .flash-sub { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,237,228,0.70); }

    .hide { display: none !important; }

    @media (max-width: 640px) {
      .plates-row { grid-template-columns: 1fr; }
      .salad-grid { grid-template-columns: 1fr; }
      .app { padding: 0 12px 140px; }
      .hero { padding: 40px 0 24px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>

<div class="app">
  <header class="hero">
    <div class="hero-flame">🔥</div>
    <div class="hero-eyebrow">DeRidder, Louisiana</div>
    <h1 class="hero-title">Hot Headz<br><em>Southern Foods</em></h1>
    <p class="hero-sub" id="heroSub">Loading menu&hellip;</p>
    <div class="status-wrap">
      <div class="status-badge">
        <span class="status-dot closed" id="statusDot"></span>
        <span id="statusText">Checking&hellip;</span>
      </div>
    </div>
    <div class="countdown-wrap" id="countdownWrap" style="display:none;">
      <div class="countdown-label" id="countdownLabel"></div>
      <div class="countdown-timer">
        <div class="countdown-block"><span class="countdown-num" id="cdHours">00</span><span class="countdown-unit">HR</span></div>
        <div class="countdown-sep">:</div>
        <div class="countdown-block"><span class="countdown-num" id="cdMins">00</span><span class="countdown-unit">MIN</span></div>
        <div class="countdown-sep">:</div>
        <div class="countdown-block"><span class="countdown-num" id="cdSecs">00</span><span class="countdown-unit">SEC</span></div>
      </div>
    </div>
  </header>

  <nav class="day-tabs-wrap">
    <div class="day-tabs">
      <button class="day-tab active" id="tabToday">Today</button>
      <button class="day-tab" id="tabTomorrow">Tomorrow</button>
      <button class="day-tab" id="tabAdvanced">Weekly Forecast</button>
    </div>
  </nav>

  <div class="panel visible" id="panelToday">
    <div class="hours-line" id="todayHours"></div>
    <hr class="section-divider" />
    <nav class="cat-nav" id="todayCatNav"></nav>
    <div id="todayCatSections"></div>
    <div class="closed-state hide" id="todayClosed"><h2>Closed Today</h2><p id="todayClosedMsg">See you next time!</p></div>
  </div>

  <div class="panel" id="panelTomorrow">
    <div class="hours-line" id="tomorrowHours"></div>
    <hr class="section-divider" />
    <nav class="cat-nav" id="tomorrowCatNav"></nav>
    <div id="tomorrowCatSections"></div>
    <div class="closed-state hide" id="tomorrowClosed"><h2>Closed</h2><p id="tomorrowClosedMsg">See you next time!</p></div>
  </div>

  <div class="panel" id="panelAdvanced">
    <div class="hours-line" id="advDisclaimer"></div>
    <div class="adv-day-tabs" id="advDayTabs"></div>
    <div id="advCards"></div>
  </div>

  <div class="closed-state hide" id="loadError"><h2>Menu couldn't load</h2><p id="loadErrorMsg">Try again in a moment.</p></div>
</div>

<a class="back-btn" href="index.html"><span class="arrow">&#8592;</span> Back to Home</a>

<div class="flash-overlay" id="flashModal">
  <div class="flash-card">
    <div class="flash-countdown" id="flashCount">5</div>
    <div class="flash-title" id="flashTitle">Closed</div>
    <div class="flash-text" id="flashText"></div>
    <div class="flash-sub">Closing automatically</div>
  </div>
</div>

<script src="menu-data.js"></script>

<script>
(function () {
  "use strict";

  /* ═══════════════════════════════════════
     PARTICLE SYSTEM
     ═══════════════════════════════════════ */
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  let W, H, particles = [], raf;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * W;
      this.y = init ? Math.random() * H : H + 20;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedY = -(Math.random() * 0.4 + 0.1);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.25 + 0.05;
      this.fadeSpeed = Math.random() * 0.0008 + 0.0002;
      const r = Math.random();
      if (r < 0.3) { this.r = 255; this.g = 120 + Math.random()*60; this.b = 40; this.opacity *= 1.5; }
      else if (r < 0.5) { this.r = 255; this.g = 180; this.b = 100; }
      else { this.r = 180; this.g = 165; this.b = 150; }
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX + Math.sin(this.y * 0.008) * 0.15;
      this.opacity -= this.fadeSpeed;
      if (this.opacity <= 0 || this.y < -20) this.reset(false);
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.opacity})`;
      ctx.fill();
    }
  }

  const COUNT = window.innerWidth < 640 ? 40 : 80;
  for (let i = 0; i < COUNT; i++) particles.push(new Particle());

  function animateParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    raf = requestAnimationFrame(animateParticles);
  }
  animateParticles();

  /* ═══════════════════════════════════════
     SCROLL REVEAL
     ═══════════════════════════════════════ */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const delay = el.dataset.revealDelay || 0;
        setTimeout(() => { el.classList.add("revealed"); }, delay);
        revealObserver.unobserve(el);
      }
    });
  }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });

  function observeItems(container) {
    const items = container.querySelectorAll(".menu-item");
    items.forEach((item, i) => {
      item.style.transition = `opacity 0.55s cubic-bezier(0.16,1,0.3,1) ${i * 0.04}s, transform 0.55s cubic-bezier(0.16,1,0.3,1) ${i * 0.04}s`;
      item.dataset.revealDelay = 0;
      revealObserver.observe(item);
    });
  }

  /* ═══════════════════════════════════════
     CORE MENU LOGIC
     ═══════════════════════════════════════ */
  const $ = id => document.getElementById(id);
  const esc = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function toISO(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
  function wkDay(d){return d.toLocaleDateString("en-US",{weekday:"long"});}
  function parseISO(iso){const[y,m,d]=String(iso).split("-").map(Number);return new Date(y,(m||1)-1,d||1);}
  function normKey(k){const m=String(k||"").trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(!m)return null;return`${m[1]}-${String(Number(m[2])).padStart(2,"0")}-${String(Number(m[3])).padStart(2,"0")}`;}
  function biz(day){const l=String(day||"").toLowerCase();const o=l==="sunday"?"7:00 AM":(l==="saturday"?"6:00 AM":"5:30 AM");const c=l==="sunday"?"3:00 PM":"2:00 PM";return{day,open:o,close:c,breakfast:`${o} – 10:30 AM`,lunch:`11:00 AM – ${c}`,crawfish:["thursday","friday","saturday","sunday"].includes(l)?"4:00 PM – 8:00 PM":""};}
  function t12(s){if(!s)return null;const m=String(s).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);if(!m)return null;let h=parseInt(m[1],10);const min=parseInt(m[2],10);const ap=m[3].toUpperCase();if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return h*60+min;}
  function inRange(mins,r){if(!r||!String(r).includes("–")&&!String(r).includes("-"))return false;const[a,b]=String(r).split(/[–-]/).map(s=>s.trim());const s=t12(a),e=t12(b);if(s==null||e==null)return false;return mins>=s&&mins<=e;}
  function pastClose(day){const h=biz(day);const cl=t12(h.close);if(cl==null)return false;const n=new Date();return(n.getHours()*60+n.getMinutes())>=cl;}

  const data=(typeof MENU_DATA!=="undefined")?MENU_DATA:null;
  if(!data){$("loadError")?.classList.remove("hide");return;}
  const rawMenus=data.menus||{};const menus={};
  Object.keys(rawMenus).forEach(k=>{const nk=normKey(k);if(nk)menus[nk]=rawMenus[k];});
  data.menus=menus;

  function getMenu(iso){return menus[iso]||null;}
  function getClosure(dayName){const c=data.closures||{};const k=Object.keys(c).find(k=>k.toLowerCase()===String(dayName||"").toLowerCase());return k?c[k]:null;}
  function normItems(a){return Array.isArray(a)?a.map(x=>String(x||"").trim()).filter(Boolean):[];}
  function normLunch(a){if(!Array.isArray(a))return[];return a.map(r=>{if(r&&typeof r==="object")return{name:String(r.name||"").trim(),desc:String(r.desc||"").trim()};const s=String(r||"").trim();return s?{name:s,desc:""}:null;}).filter(Boolean).filter(x=>x.name);}

  function buildCats(isoDate){
    const menu=getMenu(isoDate)||{};const def=data.defaults||{};const cats=[];
    const bkP=normItems(menu.breakfast?.plates??def.breakfast?.plates??[]);
    const bkI=normItems(menu.breakfast?.items??def.breakfast?.items??[]);
    if(bkP.length||bkI.length)cats.push({id:"breakfast",name:"Breakfast",icon:"🍳",sub:"Same daily · Served at opening",plates:bkP,items:bkI});
    const lP=normItems(menu.lunch?.plates??def.lunch?.plates??[]);
    const lI=normLunch(menu.lunch?.items??[]);
    if(lP.length||lI.length)cats.push({id:"lunch",name:"Lunch",icon:"🍽",sub:"Changes daily",plates:lP,items:lI,hasLunchItems:true});
    const beers=data.beer||[];
    if(beers.length)cats.push({id:"beer",name:"Beer",icon:"🍺",sub:"Ice cold",items:beers,isBeer:true});
    const cf=menu.crawfish||{};const cfShow=cf.show!==false;
    const cfI=normItems(cf.items??def.crawfish?.items??[]);
    if(cfShow&&cfI.length)cats.push({id:"crawfish",name:"Crawfish",icon:"🦞",sub:"Seasonal special",items:cfI,isCrawfish:true});
    const salad=menu.salad||def.salad||{};const sP=normItems(salad.items??[]);const sB=salad.saladBar||{};
    if(sP.length||sB.lettuce?.length||sB.toppings?.length)cats.push({id:"salad",name:"Salad Bar",icon:"🥗",sub:"Build your own",pricing:sP,saladBar:sB});
    const drI=normItems(menu.drinks?.items??def.drinks?.items??[]);
    if(drI.length)cats.push({id:"drinks",name:"Drinks",icon:"🥤",sub:"Cold & hot",items:drI});
    const dsI=normItems(menu.dessert?.items??def.dessert?.items??[]);
    if(dsI.length)cats.push({id:"dessert",name:"Dessert",icon:"🍮",sub:"Sweet finish",items:dsI});
    return cats;
  }

  function renderCatHTML(cat){
    let html=`<div class="cat-header"><div><div class="cat-name">${cat.icon} ${esc(cat.name)}</div><div class="cat-subtitle">${esc(cat.sub||"")}</div></div></div>`;
    if(cat.plates?.length)html+=`<div class="section-label">Plates &amp; Pricing</div><div class="plates-row">${cat.plates.map(p=>`<div class="plate-card">${esc(p)}</div>`).join("")}</div>`;
    if(cat.hasLunchItems&&cat.items?.length){
      html+=`<div class="section-label">Today's Specials</div><ul class="item-list">`;
      cat.items.forEach(item=>{
        const desc=item.desc||data.settings.noDescriptionText||"";
        html+=`<li class="menu-item" onclick="this.classList.toggle('expanded')"><div class="item-name">${esc(item.name)}</div><div class="item-desc">${esc(desc)}</div><div class="item-hint">tap for details</div></li>`;
      });
      html+=`</ul>`;
    }
    if(!cat.hasLunchItems&&cat.items?.length){
      html+=`<div class="section-label">${cat.isBeer?"Available":cat.isCrawfish?"Details":"Items"}</div><ul class="item-list">`;
      cat.items.forEach(item=>{
        const name=typeof item==="string"?item:item.name;
        html+=`<li class="menu-item${cat.isBeer?" beer-item":""}"><div class="item-name">${cat.isBeer?"🍺 ":""}${esc(name)}</div></li>`;
      });
      html+=`</ul>`;
    }
    if(cat.id==="salad"){
      if(cat.pricing?.length)html+=`<div class="section-label">Pricing</div><ul class="item-list">${cat.pricing.map(p=>`<li class="menu-item"><div class="item-name">${esc(p)}</div></li>`).join("")}</ul>`;
      const sb=cat.saladBar||{};
      html+=`<div class="section-label">Build Your Salad</div><div class="salad-grid">`;
      if(sb.lettuce?.length)html+=`<div><div class="salad-col-title">Lettuce</div><ul class="item-list">${sb.lettuce.map(x=>`<li class="menu-item"><div class="item-name">${esc(x)}</div></li>`).join("")}</ul></div>`;
      if(sb.toppings?.length)html+=`<div><div class="salad-col-title">Toppings</div><ul class="item-list">${sb.toppings.map(x=>`<li class="menu-item"><div class="item-name">${esc(x)}</div></li>`).join("")}</ul></div>`;
      if(sb.dressing?.length)html+=`<div><div class="salad-col-title">Dressing</div><ul class="item-list">${sb.dressing.map(x=>`<li class="menu-item"><div class="item-name">${esc(x)}</div></li>`).join("")}</ul></div>`;
      html+=`</div>`;
    }
    if(cat.isCrawfish)html=`<div class="crawfish-wrap">${html}</div>`;
    return html;
  }

  let panelConfigs=[];

  function initPanel(prefix,isoDate,dayName){
    panelConfigs.push({prefix,isoDate,dayName});
    const h=biz(dayName);const closure=getClosure(dayName);const hoursEl=$(`${prefix}Hours`);
    if(closure?.closed){$(`${prefix}Closed`)?.classList.remove("hide");const msg=$(`${prefix}ClosedMsg`);if(msg)msg.textContent=closure.message||"See you next time!";if(hoursEl)hoursEl.textContent=`${dayName}: Closed`;return;}
    if(hoursEl)hoursEl.innerHTML=`<strong>${dayName}</strong> &nbsp;${h.open} – ${h.close} &nbsp;·&nbsp; Breakfast ${h.breakfast} &nbsp;·&nbsp; Lunch ${h.lunch}${h.crawfish?` &nbsp;·&nbsp; Crawfish ${h.crawfish}`:""}`;
    buildPanelContent(prefix,isoDate,dayName);
  }

  function buildPanelContent(prefix,isoDate,dayName){
    const catNavEl=$(`${prefix}CatNav`);const sectionsEl=$(`${prefix}CatSections`);
    if(!catNavEl||!sectionsEl)return;
    const activeBtn=catNavEl.querySelector(".cat-btn.active");
    const activeIdx=activeBtn?activeBtn.dataset.idx:"0";
    const cats=buildCats(isoDate);
    catNavEl.innerHTML=cats.map((c,i)=>`<button class="cat-btn${c.isBeer?" beer-btn":""}${String(i)===activeIdx?" active":""}" data-idx="${i}">${c.icon} ${esc(c.name)}</button>`).join("");
    sectionsEl.innerHTML=cats.map((c,i)=>`<div class="cat-section${String(i)===activeIdx?" visible":""}" data-idx="${i}">${renderCatHTML(c)}</div>`).join("");
    const btns=catNavEl.querySelectorAll(".cat-btn");const secs=sectionsEl.querySelectorAll(".cat-section");
    btns.forEach(btn=>{btn.addEventListener("click",()=>{const idx=btn.dataset.idx;btns.forEach(b=>b.classList.toggle("active",b.dataset.idx===idx));secs.forEach(s=>{s.classList.toggle("visible",s.dataset.idx===idx);if(s.dataset.idx===idx)observeItems(s);});});});
    secs.forEach(s=>{if(s.classList.contains("visible"))observeItems(s);});
  }

  function todayAt(timeStr) {
    const m = t12(timeStr);
    if (m == null) return null;
    const d = new Date();
    d.setHours(Math.floor(m / 60), m % 60, 0, 0);
    return d;
  }

  function tomorrowAt(timeStr) {
    const d = todayAt(timeStr);
    if (!d) return null;
    d.setDate(d.getDate() + 1);
    return d;
  }

  function fmtCountdown(diffMs) {
    if (diffMs <= 0) return { h: "00", m: "00", s: "00" };
    const totalSec = Math.floor(diffMs / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return { h: String(h).padStart(2, "0"), m: String(m).padStart(2, "0"), s: String(s).padStart(2, "0") };
  }

  function updateStatus(dayName, isoDate) {
    const todayISO = toISO(new Date());
    const isToday = isoDate === todayISO;
    const h = biz(dayName);
    const closure = getClosure(dayName);
    const dot = $("statusDot"), txt = $("statusText"), sub = $("heroSub");
    const cdWrap = $("countdownWrap"), cdLabel = $("countdownLabel");
    const cdH = $("cdHours"), cdM = $("cdMins"), cdS = $("cdSecs");

    if (cdWrap) cdWrap.style.display = "none";

    if (closure?.closed) {
      dot.className = "status-dot closed";
      txt.textContent = "CLOSED – " + (closure.message || "");
      if (sub) sub.textContent = dayName + " · Closed";
      return;
    }

    if (!isToday) {
      dot.className = "status-dot warn";
      txt.textContent = dayName + " · OPENS AT " + h.open;
      if (sub) sub.textContent = `${dayName} · ${h.open} – ${h.close}`;
      const targetDate = parseISO(isoDate);
      targetDate.setHours(Math.floor(t12(h.open) / 60), t12(h.open) % 60, 0, 0);
      const diff = targetDate - new Date();
      if (diff > 0) {
        const cd = fmtCountdown(diff);
        cdLabel.textContent = "Opens in";
        cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s;
        cdWrap.style.display = "";
      }
      return;
    }

    const now = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const openMin = t12(h.open);
    const closeMin = t12(h.close);
    const bkEnd = t12("10:30 AM");
    const lunchStart = t12("11:00 AM");
    const cfStart = h.crawfish ? t12("4:00 PM") : null;
    const cfEnd = h.crawfish ? t12("8:00 PM") : null;

    const isInMain = openMin != null && closeMin != null && mins >= openMin && mins < closeMin;
    const isInCrawfish = cfStart != null && cfEnd != null && mins >= cfStart && mins < cfEnd;
    const isOpen = isInMain || isInCrawfish;

    dot.className = "status-dot " + (isOpen ? "open" : "closed");
    if (sub) sub.textContent = `${dayName} · ${h.open} – ${h.close}`;

    if (mins < openMin) {
      txt.textContent = "CLOSED · OPENS AT " + h.open;
      const target = todayAt(h.open);
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Opens in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else if (mins < bkEnd) {
      txt.textContent = "NOW SERVING BREAKFAST";
      const target = todayAt("10:30 AM");
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Breakfast ends in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else if (mins < lunchStart) {
      txt.textContent = "TRANSITION · LUNCH AT 11:00 AM";
      const target = todayAt("11:00 AM");
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Lunch starts in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else if (mins < closeMin) {
      txt.textContent = "NOW SERVING LUNCH";
      const target = todayAt(h.close);
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Lunch ends in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else if (cfStart && mins < cfStart) {
      txt.textContent = "CRAWFISH AT 4:00 PM";
      const target = todayAt("4:00 PM");
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Crawfish starts in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else if (cfEnd && mins < cfEnd) {
      txt.textContent = "NOW SERVING CRAWFISH";
      const target = todayAt("8:00 PM");
      const diff = target - now;
      if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = "Crawfish ends in"; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
    } else {
      txt.textContent = "CLOSED · SEE YOU TOMORROW";
      const tomDate = new Date(now);
      tomDate.setDate(tomDate.getDate() + 1);
      const tomDay = wkDay(tomDate);
      const tomH = biz(tomDay);
      const tomOpen = t12(tomH.open);
      if (tomOpen != null) {
        const target = new Date(tomDate);
        target.setHours(Math.floor(tomOpen / 60), tomOpen % 60, 0, 0);
        const diff = target - now;
        if (diff > 0) { const cd = fmtCountdown(diff); cdLabel.textContent = `Opens ${tomDay} at ${tomH.open}`; cdH.textContent = cd.h; cdM.textContent = cd.m; cdS.textContent = cd.s; cdWrap.style.display = ""; }
      }
    }
  }

  function buildAdvanced(startISO){
    const tabsEl=$("advDayTabs"),cardsEl=$("advCards"),discEl=$("advDisclaimer");
    if(!tabsEl||!cardsEl)return;
    if(discEl)discEl.textContent=data.settings.advancedDisclaimer||"Lunch forecast — subject to change.";
    const start=parseISO(startISO);const entries=[];
    for(let i=0;i<(data.settings.advancedWindowDays||7);i++){
      const d=new Date(start);d.setDate(start.getDate()+i);
      const iso=toISO(d);const dayName=wkDay(d);const h=biz(dayName);
      const closure=getClosure(dayName);const dayMenu=getMenu(iso);const def=data.defaults||{};
      const tab=document.createElement("button");tab.className="adv-day-tab"+(i===0?" active":"");
      tab.textContent=`${dayName.slice(0,3)} ${d.getMonth()+1}/${d.getDate()}`;tabsEl.appendChild(tab);
      const card=document.createElement("div");card.className="adv-card"+(i===0?" visible":"");
      const lp=normItems(dayMenu?.lunch?.plates??def.lunch?.plates??[]);
      const li=normLunch(dayMenu?.lunch?.items??[]);
      let inner=`<div class="adv-card-title">${esc(dayName)}</div><div class="adv-card-sub">${esc(fmtDate(d))} · ${closure?.closed?"Closed":`Lunch ${h.lunch}`}</div>`;
      if(closure?.closed){inner+=`<p style="color:rgba(245,237,228,0.82)">${esc(closure.message||"Closed")}</p>`;}
      else{
        if(lp.length)inner+=`<div class="section-label">Plates</div><div class="plates-row">${lp.map(p=>`<div class="plate-card">${esc(p)}</div>`).join("")}</div>`;
        if(li.length){
          inner+=`<div class="section-label">Lunch Items</div><ul class="item-list">`;
          li.forEach(item=>{inner+=`<li class="menu-item" onclick="this.classList.toggle('expanded')"><div class="item-name">${esc(item.name)}</div><div class="item-desc">${esc(item.desc||"")}</div><div class="item-hint">tap for details</div></li>`;});
          inner+=`</ul>`;
        }else inner+=`<p style="color:rgba(245,237,228,0.65);margin-top:12px">Lunch menu not posted yet — check back soon.</p>`;
      }
      card.innerHTML=inner;cardsEl.appendChild(card);entries.push({tab,card});
    }
    entries.forEach((e,idx)=>{e.tab.addEventListener("click",()=>{entries.forEach((item,i)=>{item.tab.classList.toggle("active",i===idx);item.card.classList.toggle("visible",i===idx);if(i===idx)observeItems(item.card);});});});
    if(entries[0])observeItems(entries[0].card);
  }

  function setupDayTabs(){
    const tabs=[$("tabToday"),$("tabTomorrow"),$("tabAdvanced")];
    const panels=[$("panelToday"),$("panelTomorrow"),$("panelAdvanced")];
    tabs.forEach((tab,i)=>{tab?.addEventListener("click",()=>{tabs.forEach((t,ti)=>t.classList.toggle("active",ti===i));panels.forEach((p,pi)=>{p.classList.toggle("visible",pi===i);if(pi===i){const secs=p.querySelectorAll(".cat-section.visible");secs.forEach(s=>observeItems(s));}});});});
  }

  let flashTimer=null,flashInterval=null;
  function showFlash(title,text){const modal=$("flashModal"),cnt=$("flashCount");if(!modal)return;$("flashTitle").textContent=title;$("flashText").textContent=text;if(flashTimer)clearTimeout(flashTimer);if(flashInterval)clearInterval(flashInterval);let r=5;cnt.textContent=r;modal.classList.add("show");flashInterval=setInterval(()=>{r--;if(r>0)cnt.textContent=r;else clearInterval(flashInterval);},1000);flashTimer=setTimeout(()=>hideFlash(),5000);}
  function hideFlash(){if(flashTimer){clearTimeout(flashTimer);flashTimer=null;}if(flashInterval){clearInterval(flashInterval);flashInterval=null;}$("flashModal")?.classList.remove("show");}
  $("flashModal")?.addEventListener("click",hideFlash);
  $("flashModal")?.querySelector(".flash-card")?.addEventListener("click",e=>e.stopPropagation());
  window.addEventListener("keydown",e=>{if(e.key==="Escape")hideFlash();});

  function handleHash(){
    const hash=(window.location.hash||"").replace("#","").toLowerCase();if(!hash)return;
    if(hash==="tomorrow"){$("tabTomorrow")?.click();return;}
    if(hash==="advanced"||hash==="forecast"){$("tabAdvanced")?.click();return;}
  }

  setupDayTabs();
  const now=new Date();const todayISO=toISO(now);const todayName=wkDay(now);
  const tom=new Date(now);tom.setDate(now.getDate()+1);
  const tomorrowISO=toISO(tom);const tomorrowName=wkDay(tom);
  let dTI=todayISO,dTN=todayName,dToI=tomorrowISO,dToN=tomorrowName;
  const ct=getClosure(todayName);
  if(pastClose(todayName)&&!ct?.closed){dTI=tomorrowISO;dTN=tomorrowName;const da=new Date(now);da.setDate(now.getDate()+2);dToI=toISO(da);dToN=wkDay(da);}
  $("tabToday").textContent=dTN;$("tabTomorrow").textContent=dToN;
  panelConfigs=[];
  initPanel("today",dTI,dTN);initPanel("tomorrow",dToI,dToN);
  buildAdvanced(dTI);updateStatus(dTN,dTI);
  setInterval(()=>updateStatus(dTN,dTI),1000);
  setTimeout(handleHash,150);
  window.addEventListener("hashchange",handleHash);
})();
</script>
</body>
</html>
