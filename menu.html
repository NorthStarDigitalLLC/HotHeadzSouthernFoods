<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Futuristic Holographic Menu</title>

<!-- External libs -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

<style>
  :root{
    --bg:#05060a;
    --accent:#44e6ff;
    --ghost:#7ff0ff;
    --glass: rgba(255,255,255,0.06);
    --menu-size: min(34vh, 520px);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  html,body{height:100%;margin:0;background:radial-gradient(circle at 10% 10%, #071022 0%, var(--bg) 40%), #000;color:#eaf8ff;overflow:hidden}
  .app{
    position:relative;width:100%;height:100%;display:flex;align-items:flex-start;justify-content:flex-start;
  }

  /* Toggle / Hamburger */
  #menuToggle{
    position: absolute;
    left: 24px;
    top: 24px;
    width:56px;height:56px;border-radius:14px;border:none;cursor:pointer;
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    box-shadow: 0 6px 30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    display:grid;place-items:center;
    z-index: 30;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  #menuToggle:focus{outline:3px solid rgba(68,230,255,0.22)}
  #menuToggle:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(68,230,255,0.06)}

  /* hamburger lines */
  .ham{
    width:26px;height:2px;background:linear-gradient(90deg,var(--ghost),var(--accent));
    position:relative;border-radius:2px;transition: all .35s cubic-bezier(.2,.8,.2,1);
  }
  .ham::before,.ham::after{
    content:"";position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ghost),var(--accent));
    border-radius:2px;transition: all .35s cubic-bezier(.2,.8,.2,1)
  }
  .ham::before{top:-8px}
  .ham::after{bottom:-8px}

  /* Active hamburger to "X" */
  #menuToggle.active .ham{transform:rotate(45deg)}
  #menuToggle.active .ham::before{transform:rotate(-90deg);top:0}
  #menuToggle.active .ham::after{opacity:0}

  /* Canvas container */
  #menuCanvas{position:absolute;left:0;top:0;right:0;bottom:0;z-index:10;display:block}

  /* ARIA live region for announcements */
  #ariaLive{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}

  /* Fallback radial CSS menu */
  .fallback-menu{
    position:absolute;inset:unset;z-index:20;left:24px;top:96px;
    display:none;flex-direction:column;gap:10px;background:var(--glass);border-radius:12px;padding:12px;backdrop-filter: blur(8px);
  }
  .fallback-menu .item{color:#d1f6ff;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,0.04)}
  .fallback-menu .item:hover{background:linear-gradient(90deg, rgba(68,230,255,0.06), rgba(68,230,255,0.02));transform:translateY(-2px)}

  /* small helpful HUD */
  .hud{
    position:absolute;right:28px;bottom:28px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius:10px;padding:10px 12px;color:#b9f8ff;font-size:13px;z-index:20;border:1px solid rgba(68,230,255,0.06)
  }

  /* Responsive */
  @media (max-width:800px){
    #menuToggle{left:12px;top:12px}
    .fallback-menu{left:12px;top:68px}
  }

  /* Accessibility high-contrast mode toggle (example) */
  .high-contrast body{ --accent:#00ffff; --ghost:#ffffff; background:#000;}
</style>
</head>
<body>
  <div class="app" id="app">
    <button id="menuToggle" aria-expanded="false" aria-controls="holoMenu" aria-label="Open main menu">
      <span class="ham" aria-hidden="true"></span>
    </button>

    <!-- WebGL canvas -->
    <canvas id="menuCanvas" role="img" aria-label="Holographic site menu visualization"></canvas>

    <!-- Fallback CSS menu for devices without WebGL -->
    <nav class="fallback-menu" id="fallbackMenu" role="menu" aria-hidden="true"></nav>

    <!-- ARIA live for announcements -->
    <div id="ariaLive" role="status" aria-live="polite"></div>

    <div class="hud" aria-hidden="true">Say: "Open About" • Click items to visit • Voice & keyboard accessible</div>
  </div>

<script>
/* =========================
   Config & menu data
   ========================= */
const menuItems = [
  { id: 'home',    title: 'Home',      color: 0x44e6ff, href: '#home',    icon: '🏠' },
  { id: 'about',   title: 'About',     color: 0xff66b6, href: '#about',   icon: '🛰️' },
  { id: 'services',title: 'Services',  color: 0x9bff77, href: '#services',icon: '⚙️' },
  { id: 'work',    title: 'Work',      color: 0xffb86a, href: '#work',    icon: '💠' },
  { id: 'blog',    title: 'Blog',      color: 0x9bd6ff, href: '#blog',    icon: '✒️' },
  { id: 'contact', title: 'Contact',   color: 0xff8cf3, href: '#contact', icon: '✉️' },
];

/* Local intelligence key for localStorage */
const STORAGE_KEY = "holoMenuUsage_v1";

/* =========================
   Predictive ordering
   ========================= */

/* We maintain usage data: {id: {freq: n, last: timestamp}}
   Score = freq * 2 + recencyFactor (0..1)
*/
function loadUsage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveUsage(u){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); } catch(e){} }
function recordClick(id){
  const u = loadUsage();
  const now = Date.now();
  if(!u[id]) u[id] = { freq: 0, last: now };
  u[id].freq += 1;
  u[id].last = now;
  saveUsage(u);
}
function scoreId(id){
  const u = loadUsage();
  const meta = u[id];
  if(!meta) return 0;
  const freqScore = meta.freq;
  const recencyScore = Math.max(0, 1 - ((Date.now() - meta.last)/(1000*60*60*24*30))); // 30 day decay
  return freqScore*2 + recencyScore;
}
function orderedItems(){
  return [...menuItems].sort((a,b) => scoreId(b.id) - scoreId(a.id));
}

/* =========================
   Utilities
   ========================= */
const $ = sel => document.querySelector(sel);
const $all = sel => Array.from(document.querySelectorAll(sel));
function announce(text){ $('#ariaLive').textContent = text; }

/* =========================
   Fallback CSS menu
   ========================= */
const fallbackEl = $('#fallbackMenu');
function createFallback() {
  fallbackEl.innerHTML = '';
  const items = orderedItems();
  items.forEach(it=>{
    const el = document.createElement('div');
    el.className = 'item';
    el.role = 'menuitem';
    el.tabIndex = 0;
    el.innerHTML = `<strong style="margin-right:8px">${it.icon}</strong>${it.title}`;
    el.addEventListener('click', ()=>{
      recordClick(it.id);
      announce(`${it.title} opened`);
      window.location.href = it.href;
    });
    el.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' || e.key===' ') el.click();
    });
    fallbackEl.appendChild(el);
  });
}

/* =========================
   WebGL Holo Menu (Three.js)
   ========================= */
const canvas = document.getElementById('menuCanvas');
let renderer, scene, camera, raycaster, pointer, items3D = [], ringGroup, particleGroup, animId;
let clock = new THREE.Clock();

function initThree(){
  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMappingExposure = 1.0;

  // Scene & camera
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 620);

  // Lighting
  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(0.5, 1, 0.5);
  scene.add(dir);

  // Groups
  ringGroup = new THREE.Group();
  scene.add(ringGroup);
  particleGroup = new THREE.Group();
  scene.add(particleGroup);

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2(-9999, -9999);
}

/* Create canvas texture for each menu item (text + icon) */
function createTextTexture(item, size=512){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // background transparent
  ctx.clearRect(0,0,size,size);
  // glow gradient
  const g = ctx.createLinearGradient(0,0,size, size);
  g.addColorStop(0, 'rgba(255,255,255,0.06)');
  g.addColorStop(1, 'rgba(68,230,255,0.06)');
  ctx.fillStyle = g;
  // rounded background
  const pad = 28;
  roundRect(ctx, pad, pad, size-2*pad, size-2*pad, 28);
  ctx.fill();
  // title
  ctx.font = 'bold 44px Inter, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.fillText(item.title, size/2, size/2 + 10);
  // icon
  ctx.font = '48px system-ui, serif';
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fillText(item.icon, size/2, size/2 - 46);
  // small subtitle
  ctx.font = '14px Inter, Arial';
  ctx.fillStyle = 'rgba(210,255,255,0.6)';
  ctx.fillText(item.id, size/2, size - 48);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  tex.needsUpdate = true;
  return tex;
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* Holographic shader material (fragment + vertex) */
const HoloShader = {
  uniforms: {
    uTime: { value: 0 },
    uTex: { value: null },
    uColor: { value: new THREE.Color(0x44e6ff) },
    uOpacity: { value: 0.96 },
  },
  vertexShader: `
    varying vec2 vUv;
    varying float vWave;
    uniform float uTime;
    void main(){
      vUv = uv;
      vec3 pos = position;
      // subtle wavy displacement
      float wave = sin((uv.x+uTime*0.25)*6.2831)*0.8 + cos((uv.y+uTime*0.5)*3.1415)*0.6;
      pos.z += wave * 6.0 * (1.0 - uv.y);
      vWave = wave;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D uTex;
    uniform float uTime;
    uniform vec3 uColor;
    uniform float uOpacity;
    varying vec2 vUv;
    varying float vWave;
    // procedural noise (cheap)
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453123); }
    float noise(vec2 p){
      vec2 i = floor(p);
      vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
    }
    void main(){
      vec4 base = texture2D(uTex, vUv);
      // scanlines
      float scan = sin((vUv.y*200.0 + uTime*40.0) * 3.1415) * 0.03;
      // noisy shimmer
      float n = noise(vUv*20.0 + uTime*0.7) * 0.12;
      // tinted glass overlay
      vec3 tint = uColor * (0.25 + vUv.y*0.75);
      // fresnel rim
      float fres = pow(1.0 - abs(vWave)*0.2 - vUv.y, 2.0);
      vec3 color = mix(base.rgb, tint, 0.38) + n + scan;
      color += fres * 0.2;
      float alpha = base.a * uOpacity + 0.02;
      // holographic edge
      float edge = smoothstep(0.03, 0.0, min(vUv.x, 1.0 - vUv.x) + min(vUv.y, 1.0 - vUv.y));
      color += vec3(0.3,0.6,0.7) * (1.0-edge) * 0.18;
      gl_FragColor = vec4(color, clamp(alpha, 0.02, 1.0));
    }
  `
};

/* Create holographic items and layout them around a ring */
function buildRing(){
  // Clear prev
  items3D.forEach(it=>{
    it.mesh.geometry.dispose();
    it.mesh.material.dispose();
    ringGroup.remove(it.mesh);
  });
  items3D = [];

  const items = orderedItems();
  const count = items.length;
  const radius = 240;
  const planeW = 200, planeH = 120;

  items.forEach((it, idx)=>{
    const tex = createTextTexture(it, 512);
    const mat = new THREE.ShaderMaterial({
      ...HoloShader,
      uniforms: {
        uTime: { value: 0 },
        uTex: { value: tex },
        uColor: { value: new THREE.Color(it.color) },
        uOpacity: { value: 0.96 }
      },
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    const geo = new THREE.PlaneGeometry(planeW, planeH, 12, 6);
    const mesh = new THREE.Mesh(geo, mat);
    // position around a subtly tilted ring
    const angle = (idx / count) * Math.PI*2;
    const y = Math.sin(angle*0.6) * 40;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius*0.18 - 60; // slight forward/back
    mesh.position.set(x, y, z);
    mesh.lookAt(0,0,0); // face center
    mesh.userData = { id: it.id, href: it.href, title: it.title };
    ringGroup.add(mesh);
    items3D.push({ item: it, mesh, mat, tex, base: { x,y,z,angle } });
  });

  // particle field (sparse)
  buildParticleField();
}

/* Create a modest particle field that reacts to pointer */
function buildParticleField(){
  // Clear previous
  while(particleGroup.children.length) {
    const c = particleGroup.children.pop();
    if(c.geometry) c.geometry.dispose();
    if(c.material) c.material.dispose();
  }
  const pts = new THREE.BufferGeometry();
  const count = 220;
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = 280 + Math.random()*380;
    const theta = Math.random()*Math.PI*2;
    const vy = (Math.random()-0.5)*120;
    positions[i*3+0] = Math.cos(theta)*r* (0.2 + Math.random()*1.0);
    positions[i*3+1] = vy;
    positions[i*3+2] = Math.sin(theta)*r* (0.2 + Math.random()*1.0);
  }
  pts.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({ size: 2.6, color: 0x66f0ff, transparent:true, opacity:0.72, depthWrite:false});
  const points = new THREE.Points(pts,mat);
  particleGroup.add(points);
}

/* Interaction: hover & click */
let hovered = null;
function handlePointerMove(clientX, clientY){
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
}

function animate(){
  const t = clock.getElapsedTime();
  // update shader times
  items3D.forEach((entry, idx)=>{
    entry.mat.uniforms.uTime.value = t;
    // subtle breathing & float
    entry.mesh.rotation.z = Math.sin(t*0.7 + idx)*0.02;
    entry.mesh.position.y = entry.base.y + Math.sin(t*0.8 + idx)*6;
  });

  // raycast
  raycaster.setFromCamera(pointer, camera);
  const intersects = raycaster.intersectObjects(items3D.map(e=>e.mesh), true);
  if(intersects.length){
    const obj = intersects[0].object;
    if(hovered !== obj){
      if(hovered) onUnhover(hovered);
      hovered = obj;
      onHover(obj);
    }
  } else {
    if(hovered) onUnhover(hovered);
    hovered = null;
  }

  // animate camera slight orbit to look alive
  const camTargetX = Math.sin(t*0.06) * 10;
  gsap.to(camera.position, { duration: 0.6, x: camTargetX, ease: "sine.inOut" });
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
  animId = requestAnimationFrame(animate);
}

function onHover(mesh){
  // bring forward & scale up
  gsap.to(mesh.position, { z: mesh.position.z - 36, duration:0.35, ease:"expo.out" });
  gsap.to(mesh.scale, { x:1.18, y:1.18, z:1.18, duration:0.35, ease:"expo.out" });
  // glow increase
  gsap.to(mesh.material.uniforms.uOpacity, { value: 1.0, duration:0.28 });
  announce(`${mesh.userData.title} focused`);
}
function onUnhover(mesh){
  const original = items3D.find(e=>e.mesh===mesh).base;
  gsap.to(mesh.position, { x: original.x, y: original.y, z: original.z, duration:0.6, ease:"elastic.out(1,0.6)" });
  gsap.to(mesh.scale, { x:1, y:1, z:1, duration:0.6, ease:"elastic.out(1,0.6)" });
  gsap.to(mesh.material.uniforms.uOpacity, { value: 0.96, duration:0.6 });
}

/* Click handler: record and navigate (simulate SPA friendly) */
function handleClick(){
  if(!hovered) return;
  const id = hovered.userData.id;
  recordClick(id);
  // animate feedback
  gsap.to(hovered.scale, { x:1.4, y:1.4, duration:0.18, yoyo:true, repeat:1, ease:'power3.inOut' });
  announce(`${hovered.userData.title} opened`);
  // For demo navigate by hash or call function; real site should route properly
  setTimeout(()=>{ window.location.href = hovered.userData.href; }, 240);
  // Rebuild ring to reflect personalization reorder
  setTimeout(()=>{ buildRing(); }, 520);
}

/* Responsiveness & fallback */
function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}

/* Pause animation when page hidden */
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){ cancelAnimationFrame(animId); } else { clock.start(); animate(); }
});

/* =========================
   Voice recognition (Web Speech API)
   ========================= */
let recognition;
function initVoice(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e)=>{
    const spoken = e.results[0][0].transcript.toLowerCase();
    announce(`Heard: ${spoken}`);
    // Try to match "open/about/contact"
    for(const it of menuItems){
      if(spoken.includes(it.title.toLowerCase()) || spoken.includes(it.id.toLowerCase())){
        // animate to that item and click
        const found = items3D.find(entry => entry.item.id === it.id);
        if(found){
          // move pointer to its position (visual)
          handlePointerMove(window.innerWidth/2 + (found.mesh.position.x*1.1), window.innerHeight/2 - (found.mesh.position.y*1.1));
          gsap.delayedCall(0.2, ()=>{ hovered = found.mesh; handleClick(); });
          return;
        }
      }
    }
    announce('No match found in menu.');
  };
  recognition.onend = ()=>{/* UI status could go here */};
  recognition.onerror = (e)=>{ console.warn('Speech error', e); };
}

function startVoice(){
  if(!recognition) return alert('Voice not supported in this browser.');
  recognition.start();
  announce('Listening...');
}

/* =========================
   Init & event wiring
   ========================= */
let webglAvailable = true;
function start(){
  // Check WebGL support
  try{
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if(!gl) throw 'no gl';
  } catch(e){ webglAvailable = false; }

  if(!webglAvailable){
    $('#menuCanvas').style.display = 'none';
    fallbackEl.style.display = 'flex';
    fallbackEl.setAttribute('aria-hidden', 'false');
    createFallback();
    return;
  }

  initThree();
  createFallback(); // fallback hidden but useful for smaller screens and semantics
  buildRing();
  animate();
  initVoice();

  // Events
  window.addEventListener('resize', onResize);
  window.addEventListener('mousemove', (e)=>{ handlePointerMove(e.clientX, e.clientY); });
  window.addEventListener('touchmove', (e)=>{ if(e.touches && e.touches[0]) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY); });

  // click mapping
  window.addEventListener('click', (e)=>{
    // avoid clicks on the hamburger or on fallback controls
    if(e.target.closest('#menuToggle')) return;
    handleClick();
  });

  // keyboard navigation: arrows to cycle through items, enter to open
  let idx = 0;
  document.addEventListener('keydown', (e)=>{
    const count = items3D.length;
    if(count === 0) return;
    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){ idx = (idx+1)%count; focusIdx(idx); e.preventDefault(); }
    if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){ idx = (idx-1+count)%count; focusIdx(idx); e.preventDefault(); }
    if(e.key === 'Enter' || e.key === ' '){ hovered = items3D[idx].mesh; handleClick(); e.preventDefault(); }
    if(e.key === 'v' && (e.ctrlKey || e.metaKey)){ startVoice(); e.preventDefault(); } // quick voice hotkey
  });

  function focusIdx(i){
    idx = i;
    const entry = items3D[idx];
    if(entry){
      // move pointer visually toward it
      const rect = canvas.getBoundingClientRect();
      const x = rect.left + rect.width/2 + entry.mesh.position.x*1.05;
      const y = rect.top + rect.height/2 - entry.mesh.position.y*1.05;
      handlePointerMove(x, y);
      hovered = entry.mesh;
      onHover(entry.mesh);
    }
  }
}

/* =========================
   Toggle menu visibility & UI
   ========================= */
const btn = $('#menuToggle');
btn.addEventListener('click', ()=>{
  const active = btn.classList.toggle('active');
  btn.setAttribute('aria-expanded', active ? 'true' : 'false');
  $('#fallbackMenu').style.display = (!webglAvailable && active) ? 'flex' : 'none';
  // when opening: animate camera zoom in and wake animations
  if(active){
    gsap.to(camera.position, { z: 520, duration: 0.6, ease:'expo.out' });
    $('#fallbackMenu').setAttribute('aria-hidden', 'false');
    announce('Menu opened');
  } else {
    gsap.to(camera.position, { z: 620, duration: 0.6, ease:'expo.in' });
    $('#fallbackMenu').setAttribute('aria-hidden', 'true');
    announce('Menu closed');
  }
});
/* Quick double-click / long-press on toggle to start voice */
let pressTimer;
btn.addEventListener('mousedown', ()=>{ pressTimer = setTimeout(()=> startVoice(), 700); });
btn.addEventListener('mouseup', ()=>{ clearTimeout(pressTimer); });
btn.addEventListener('touchstart', ()=>{ pressTimer = setTimeout(()=> startVoice(), 700); });
btn.addEventListener('touchend', ()=>{ clearTimeout(pressTimer); });

/* =========================
   Start everything
   ========================= */
start();
/* initial fallback creation */
createFallback();

</script>
