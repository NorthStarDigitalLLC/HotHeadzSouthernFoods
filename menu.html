      phase: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.03,

  var pctEl = document.getElementById('loadPct');

}

  if (_stageIdleTimer) { clearInterval(_stageIdleTimer); _stageIdleTimer = null; }
}

setLoadStage(0);

function applyFullMenu(d){

  var defs = d.defaults || {};
