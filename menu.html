<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Restaurant Menu</title>
  <style>
    /* Basic styling – customize to your taste */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f8f8;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #b22222;
    }
    .menu-section {
      margin-bottom: 40px;
    }
    .category-title {
      font-size: 2rem;
      border-bottom: 2px solid #b22222;
      padding-bottom: 5px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .menu-item {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .menu-item:hover {
      transform: translateY(-5px);
    }
    .item-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #b22222;
      margin-bottom: 5px;
    }
    .item-description {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }
    .item-price {
      font-weight: bold;
      color: #2e8b57;
    }
    .error-message {
      color: red;
      text-align: center;
      padding: 20px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Our Menu</h1>
  <div id="menu-container" class="loading">Loading menu...</div>

  <script>
    // Replace with the actual path to your menu-data.html
    const DATA_URL = 'menu-data.html';

    // Function to extract menu items from the fetched HTML
    function parseMenuData(htmlString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');

      // --- ADJUST THIS PART TO MATCH YOUR HTML STRUCTURE ---
      // Example: assume each menu item is inside an element with class 'menu-item'
      // and contains:
      // - .item-name for the name
      // - .item-description for description (optional)
      // - .item-price for price
      // - data-category attribute for category (or a parent category element)
      const items = [];
      const itemElements = doc.querySelectorAll('.menu-item'); // change selector

      itemElements.forEach(el => {
        const name = el.querySelector('.item-name')?.textContent.trim() || 'Unknown';
        const description = el.querySelector('.item-description')?.textContent.trim() || '';
        const price = el.querySelector('.item-price')?.textContent.trim() || '';
        // Get category from a data attribute or a parent category element
        const category = el.dataset.category || 'Other'; // fallback

        items.push({
          name,
          description,
          price,
          category
        });
      });
      // -----------------------------------------------------

      return items;
    }

    // Group items by category
    function groupByCategory(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.category]) {
          acc[item.category] = [];
        }
        acc[item.category].push(item);
        return acc;
      }, {});
    }

    // Render the menu into the container
    function renderMenu(menuContainer, groupedItems) {
      menuContainer.innerHTML = ''; // clear loading

      for (const [category, items] of Object.entries(groupedItems)) {
        const section = document.createElement('div');
        section.className = 'menu-section';

        const title = document.createElement('h2');
        title.className = 'category-title';
        title.textContent = category;
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'menu-grid';

        items.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'menu-item';

          itemDiv.innerHTML = `
            <div class="item-name">${item.name}</div>
            <div class="item-description">${item.description}</div>
            <div class="item-price">${item.price}</div>
          `;

          grid.appendChild(itemDiv);
        });

        section.appendChild(grid);
        menuContainer.appendChild(section);
      }
    }

    // Fetch and display the menu
    async function loadMenu() {
      const menuContainer = document.getElementById('menu-container');

      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) {
          throw new Error(`Failed to load menu data: ${response.status}`);
        }
        const html = await response.text();
        const items = parseMenuData(html);
        
        if (items.length === 0) {
          menuContainer.innerHTML = '<p class="error-message">No menu items found.</p>';
          return;
        }

        const grouped = groupByCategory(items);
        renderMenu(menuContainer, grouped);
      } catch (error) {
        console.error(error);
        menuContainer.innerHTML = `<p class="error-message">Error loading menu: ${error.message}</p>`;
      }
    }

    // Start the process
    loadMenu();
  </script>
</body>
</html>
