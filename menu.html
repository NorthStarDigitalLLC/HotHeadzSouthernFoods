<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick Wall Category Wheel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --brick1:#b96d43;
      --brick2:#9f5733;
      --brick3:#7e3f24;
      --mortar:#d2b7a3;
      --bg:#24140e;
      --hole:#05080c;
      --ring:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --accent:#ffb95e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at center, rgba(255,190,120,0.08), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.45)),
        var(--bg);
      overflow:hidden;
    }

    .wall{
      position:fixed;
      inset:0;
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:6px;
      padding:10px;
      z-index:0;
    }
    .brick{
      position:relative;
      border-radius:4px;
      border:1px solid rgba(0,0,0,.18);
      background:linear-gradient(135deg,var(--brick1),var(--brick2),var(--brick3));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
      min-height:48px;
      overflow:hidden;
    }
    .brick::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 50%,rgba(0,0,0,.10));
      border-radius:3px;
    }

    .portal-wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:32px 20px 44px;
    }

    .headline{
      text-align:center;
      margin-bottom:24px;
      max-width:900px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.14);
      font-size:11px;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(255,255,255,.68);
      backdrop-filter:blur(8px);
    }
    h1{
      margin:14px 0 10px;
      font-size:clamp(2rem,4vw,3.5rem);
      line-height:1;
      font-weight:700;
      letter-spacing:-.03em;
    }
    .sub{
      margin:0 auto;
      max-width:760px;
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
    }

    .hole{
      position:relative;
      width:min(1100px,82vw);
      height:min(760px,74vh);
      max-height:760px;
      border-radius:42px;
      background:
        radial-gradient(circle at center, rgba(255,180,110,.05), transparent 45%),
        radial-gradient(circle at center, rgba(8,12,18,.96), rgba(3,5,8,.99));
      border:1px solid rgba(79,39,22,.72);
      box-shadow:
        0 50px 120px rgba(0,0,0,.65),
        inset 0 0 70px rgba(255,160,90,.05),
        inset 0 0 0 16px rgba(86,45,26,.35),
        inset 0 0 0 36px rgba(44,21,12,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .fragment{
      position:absolute;
      border-radius:4px;
      border:1px solid rgba(0,0,0,.22);
      background:linear-gradient(135deg,var(--brick1),var(--brick2),var(--brick3));
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      animation:float 7s ease-in-out infinite;
    }
    .fragment::after{
      content:"";
      position:absolute;
      inset:2px;
      border-radius:2px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.18) 0 48%, transparent 48% 52%, rgba(255,255,255,.08) 52% 100%);
      opacity:.4;
    }
    @keyframes float{
      0%,100%{transform:translate(0,0) rotate(var(--rot))}
      25%{transform:translate(8px,-10px) rotate(calc(var(--rot) + 4deg))}
      50%{transform:translate(-8px,8px) rotate(calc(var(--rot) - 5deg))}
      75%{transform:translate(10px,4px) rotate(calc(var(--rot) + 2deg))}
    }

    .controls{
      position:absolute;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      z-index:5;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:#fff;
      color:#111827;
    }
    .btn-secondary{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(8px);
    }

    .stage{
      position:relative;
      width:min(520px,88vw);
      height:min(520px,88vw);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wheel-shell{
      position:absolute;
      inset:50%;
      width:360px;
      height:360px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.04);
      box-shadow:0 0 80px rgba(255,255,255,.08);
      backdrop-filter:blur(8px);
      animation:spin 40s linear infinite;
    }
    .wheel-shell::before,
    .wheel-shell::after{
      content:"";
      position:absolute;
      border-radius:999px;
      inset:22px;
      border:1px dashed rgba(255,255,255,.10);
    }
    .wheel-shell::after{
      inset:46px;
      border-style:solid;
    }
    @keyframes spin{
      from{transform:translate(-50%,-50%) rotate(0)}
      to{transform:translate(-50%,-50%) rotate(360deg)}
    }

    .node{
      position:absolute;
      width:96px;
      height:96px;
      margin:-48px 0 0 -48px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(15,23,42,.85);
      color:#fff;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      backdrop-filter:blur(10px);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-align:center;
      padding:10px;
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      overflow:hidden;
    }
    .node:hover{
      transform:scale(1.08) translateY(-2px);
      box-shadow:0 22px 50px rgba(0,0,0,.42);
      border-color:rgba(255,255,255,.26);
    }
    .node::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:var(--grad, linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.04)));
      opacity:0;
      transition:opacity .2s ease;
    }
    .node:hover::before{opacity:1}
    .node > *{position:relative;z-index:1}
    .node-icon{
      font-size:20px;
      line-height:1;
    }
    .node-label{
      font-size:12px;
      line-height:1.15;
      font-weight:600;
    }

    .hub{
      position:relative;
      z-index:3;
      width:144px;
      height:144px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(2,6,23,.92);
      box-shadow:0 0 50px rgba(0,0,0,.45);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
    }
    .hub .spark{
      font-size:18px;
      margin-bottom:8px;
      color:#ffd79e;
    }
    .hub .main{
      font-size:14px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
    .hub .minor{
      margin-top:6px;
      font-size:10px;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(255,255,255,.45);
    }

    .card{
      width:min(460px,88vw);
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(2,6,23,.82);
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      backdrop-filter:blur(10px);
      animation:cardIn .28s ease;
    }
    @keyframes cardIn{
      from{opacity:0;transform:scale(.9) translateY(8px)}
      to{opacity:1;transform:scale(1) translateY(0)}
    }
    .card-top{
      height:8px;
      background:linear-gradient(90deg,#fb923c,#fde68a,#f97316);
    }
    .card-body{
      padding:32px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.24em;
      color:rgba(255,255,255,.6);
      margin-bottom:16px;
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
    }
    .card h3{
      margin:0;
      font-size:clamp(1.7rem,3vw,2.2rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .badge{
      width:44px;
      height:44px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);
      font-size:20px;
      flex:none;
    }
    .card p{
      margin:20px 0 0;
      color:rgba(255,255,255,.76);
      font-size:15px;
      line-height:1.8;
      white-space:pre-wrap;
    }

    .fade{
      animation:fade .22s ease;
    }
    @keyframes fade{
      from{opacity:0;transform:scale(.96)}
      to{opacity:1;transform:scale(1)}
    }

    @media (max-width: 900px){
      .hole{
        width:min(96vw,1100px);
        height:min(72vh,680px);
      }
      .wheel-shell{width:300px;height:300px}
      .node{width:82px;height:82px;margin:-41px 0 0 -41px}
      .hub{width:128px;height:128px}
    }
    @media (max-width: 640px){
      .portal-wrap{padding-top:22px}
      .headline{margin-bottom:16px}
      .sub{font-size:14px}
      .controls{top:18px}
      .btn{padding:10px 14px;font-size:13px}
      .wheel-shell{width:270px;height:270px}
      .node{width:76px;height:76px;margin:-38px 0 0 -38px}
      .node-label{font-size:11px}
      .hub{width:116px;height:116px}
      .card-body{padding:24px}
    }
  </style>
</head>
<body>
  <div id="wall" class="wall" aria-hidden="true"></div>

  <main class="portal-wrap">
    <section class="headline">
      <div class="eyebrow">Interactive Wall Portal</div>
      <h1>Break Through the Wall</h1>
      <p class="sub">
        Choose a category from the wheel, switch to that category’s item wheel, then replace it with an information card when an item is selected.
      </p>
    </section>

    <section class="hole">
      <div class="controls" id="controls"></div>
      <div id="fragments"></div>
      <div id="stage" class="stage"></div>
    </section>
  </main>

  <script>
    const DATA = {
      categories: [
        {
          id: "services",
          label: "Services",
          icon: "🛠️",
          gradient: "linear-gradient(135deg, rgba(251,146,60,.88), rgba(249,115,22,.76))",
          items: [
            {
              id: "web-design",
              label: "Web Design",
              icon: "🎨",
              title: "Web Design",
              description: "Custom layouts, visual systems, and responsive user experiences tailored to your brand."
            },
            {
              id: "seo",
              label: "SEO",
              icon: "🔎",
              title: "Search Optimization",
              description: "On-page strategy, technical improvements, and content structure designed to increase discoverability."
            },
            {
              id: "branding",
              label: "Branding",
              icon: "✨",
              title: "Brand Systems",
              description: "Identity development, messaging alignment, and brand consistency across digital touchpoints."
            },
            {
              id: "hosting",
              label: "Hosting",
              icon: "🌐",
              title: "Hosting & Support",
              description: "Reliable infrastructure, maintenance, monitoring, and long-term site support."
            }
          ]
        },
        {
          id: "industries",
          label: "Industries",
          icon: "🧱",
          gradient: "linear-gradient(135deg, rgba(56,189,248,.88), rgba(6,182,212,.76))",
          items: [
            {
              id: "construction",
              label: "Construction",
              icon: "🏗️",
              title: "Construction",
              description: "Portfolio-ready presentation for projects, service lines, and trust-building proof points."
            },
            {
              id: "medical",
              label: "Medical",
              icon: "⚕️",
              title: "Medical",
              description: "Clear, compliant, patient-friendly information structures with strong calls to action."
            },
            {
              id: "legal",
              label: "Legal",
              icon: "⚖️",
              title: "Legal",
              description: "Professional layouts for practice areas, attorney bios, and streamlined lead intake."
            },
            {
              id: "retail",
              label: "Retail",
              icon: "🛍️",
              title: "Retail",
              description: "Visual merchandising online with category-led pathways and persuasive product storytelling."
            }
          ]
        },
        {
          id: "materials",
          label: "Materials",
          icon: "🔨",
          gradient: "linear-gradient(135deg, rgba(248,113,113,.88), rgba(244,63,94,.76))",
          items: [
            {
              id: "brick",
              label: "Brick",
              icon: "🧱",
              title: "Brick Texture",
              description: "Classic, rugged masonry styling with layered shadows and weathered detail."
            },
            {
              id: "stone",
              label: "Stone",
              icon: "🪨",
              title: "Stone Texture",
              description: "Heavy, carved surfaces with organic edges for a monumental feel."
            },
            {
              id: "metal",
              label: "Metal",
              icon: "⚙️",
              title: "Metal Texture",
              description: "Industrial finishes with brushed highlights and cool reflective accents."
            },
            {
              id: "glass",
              label: "Glass",
              icon: "🔷",
              title: "Glass Texture",
              description: "Clean translucent panels with polished light behavior and modern contrast."
            }
          ]
        }
      ]
    };

    const state = {
      selectedCategoryId: null,
      selectedItemId: null
    };

    const wall = document.getElementById("wall");
    const stage = document.getElementById("stage");
    const controls = document.getElementById("controls");
    const fragments = document.getElementById("fragments");

    function buildWall() {
      const total = 168;
      for (let i = 0; i < total; i++) {
        const b = document.createElement("div");
        b.className = "brick";
        wall.appendChild(b);
      }
    }

    function buildFragments() {
      const defs = [
        { left: "10%", top: "18%", w: 64, h: 32, r: -16, d: "0s" },
        { left: "76%", top: "22%", w: 56, h: 28, r: 22, d: ".2s" },
        { left: "18%", top: "72%", w: 48, h: 24, r: 12, d: ".4s" },
        { left: "70%", top: "76%", w: 64, h: 32, r: -24, d: ".6s" },
        { left: "5%", top: "48%", w: 56, h: 28, r: -8, d: ".1s" },
        { left: "82%", top: "52%", w: 48, h: 24, r: 14, d: ".5s" },
        { left: "30%", top: "8%", w: 40, h: 20, r: -30, d: ".3s" },
        { left: "56%", top: "86%", w: 40, h: 20, r: 18, d: ".7s" }
      ];
      defs.forEach(def => {
        const el = document.createElement("div");
        el.className = "fragment";
        el.style.left = def.left;
        el.style.top = def.top;
        el.style.width = def.w + "px";
        el.style.height = def.h + "px";
        el.style.setProperty("--rot", def.r + "deg");
        el.style.animationDelay = def.d;
        fragments.appendChild(el);
      });
    }

    function getSelectedCategory() {
      return DATA.categories.find(c => c.id === state.selectedCategoryId) || null;
    }

    function getSelectedItem() {
      const category = getSelectedCategory();
      if (!category) return null;
      return category.items.find(i => i.id === state.selectedItemId) || null;
    }

    function createButton(text, variant, onClick) {
      const btn = document.createElement("button");
      btn.className = `btn ${variant === "primary" ? "btn-primary" : "btn-secondary"}`;
      btn.textContent = text;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function polarToCartesian(angle, radius) {
      const radians = ((angle - 90) * Math.PI) / 180;
      return {
        x: Math.cos(radians) * radius,
        y: Math.sin(radians) * radius
      };
    }

    function renderControls() {
      controls.innerHTML = "";
      const category = getSelectedCategory();
      const item = getSelectedItem();

      if (category && !item) {
        controls.appendChild(createButton("Back to Categories", "primary", () => {
          state.selectedCategoryId = null;
          state.selectedItemId = null;
          render();
        }));
      }

      if (category && item) {
        controls.appendChild(createButton(`Back to ${category.label}`, "primary", () => {
          state.selectedItemId = null;
          render();
        }));
        controls.appendChild(createButton("All Categories", "secondary", () => {
          state.selectedCategoryId = null;
          state.selectedItemId = null;
          render();
        }));
      }
    }

    function renderWheel(title, centerLabel, entries, onSelect) {
      const wrap = document.createElement("div");
      wrap.className = "fade";
      wrap.style.position = "relative";
      wrap.style.width = "100%";
      wrap.style.height = "100%";

      const shell = document.createElement("div");
      shell.className = "wheel-shell";
      wrap.appendChild(shell);

      const radius = window.innerWidth < 640 ? 135 : window.innerWidth < 900 ? 150 : 180;

      entries.forEach((entry, index) => {
        const angle = (360 / entries.length) * index;
        const pos = polarToCartesian(angle, radius - 28);
        const btn = document.createElement("button");
        btn.className = "node";
        btn.style.left = `calc(50% + ${pos.x}px)`;
        btn.style.top = `calc(50% + ${pos.y}px)`;
        btn.style.setProperty("--grad", entry.gradient || "linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04))");
        btn.innerHTML = `
          <div class="node-icon">${entry.icon || "✦"}</div>
          <div class="node-label">${entry.label}</div>
        `;
        btn.addEventListener("click", () => onSelect(entry.id));
        wrap.appendChild(btn);
      });

      const hub = document.createElement("div");
      hub.className = "hub";
      hub.innerHTML = `
        <div class="spark">✦</div>
        <div class="main">${centerLabel}</div>
        <div class="minor">${title}</div>
      `;
      wrap.appendChild(hub);

      return wrap;
    }

    function renderCard(item) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-top"></div>
        <div class="card-body">
          <div class="pill">Selected Item</div>
          <div class="card-head">
            <div>
              <h3>${item.title}</h3>
            </div>
            <div class="badge">${item.icon || "ℹ️"}</div>
          </div>
          <p>${item.description}</p>
        </div>
      `;
      return card;
    }

    function renderStage() {
      stage.innerHTML = "";
      const category = getSelectedCategory();
      const item = getSelectedItem();

      if (!category) {
        stage.appendChild(renderWheel(
          "Choose a Path",
          "Categories",
          DATA.categories,
          (id) => {
            state.selectedCategoryId = id;
            state.selectedItemId = null;
            render();
          }
        ));
        return;
      }

      if (category && !item) {
        stage.appendChild(renderWheel(
          "Choose an Item",
          category.label,
          category.items.map(item => ({ ...item, gradient: category.gradient })),
          (id) => {
            state.selectedItemId = id;
            render();
          }
        ));
        return;
      }

      stage.appendChild(renderCard(item));
    }

    function render() {
      renderControls();
      renderStage();
    }

    buildWall();
    buildFragments();
    render();
  </script>
</body>
</html>
