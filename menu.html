function initPage(){

setupTabs();

// Fetch lunch from Apps Script via GET (same pattern as working staff portal)
fetch(CLOUD_URL + '?action=lunch', { method: 'GET', mode: 'cors' })
  .then(function(r) { return r.text(); })
  .then(function(text) {
    try {
      var result = JSON.parse(text);
      if (result && result.success && result.dates) {
        var keys = Object.keys(result.dates);
        for (var i = 0; i < keys.length; i++) {
          var nk = nKey(keys[i]);
          if (nk) menus[nk] = result.dates[keys[i]];
        }
        console.log('[HH] Loaded ' + keys.length + ' lunch dates from cloud');
        initPage(); // Re-render with cloud data
      }
    } catch(e) { console.warn('[HH] Parse error:', e.message); }
  })
  .catch(function(err) { console.warn('[HH] Lunch fetch failed:', err.message); });
